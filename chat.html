<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCore | Gateway</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get session from page.html
        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';

        const { user: userName, lounge: loungeId, mode, uid: userUid } = session;

        async function startGateway() {
            const loungeRef = doc(db, "lounges", loungeId);
            const loungeSnap = await getDoc(loungeRef);

            // 1. Check if lounge exists
            if (!loungeSnap.exists() && mode !== 'create') {
                alert("Lounge not found.");
                window.location.href = 'page.html';
                return;
            }

            // 2. ADMIN BYPASS: If you created it, go straight to chats.html
            if (mode === 'create') {
                // Ensure adminUid is set in the main doc so chats.html recognizes you
                await setDoc(loungeRef, { 
                    adminUid: userUid,
                    loungeName: session.loungeName || "New Lounge" 
                }, { merge: true });
                
                window.location.replace('chats.html');
                return;
            }

            // 3. MEMBER KNOCKING: Create a unique request document
            const myReqRef = doc(db, "lounges", loungeId, "requests", userUid);
            
            await setDoc(myReqRef, {
                name: userName,
                uid: userUid,
                status: 'pending',
                timestamp: serverTimestamp()
            });

            document.getElementById('gate-ui').innerHTML = `
                <div class="spinner"></div>
                <h2>Knocking...</h2>
                <p>Waiting for the Admin to grant access.</p>
                <div class="user-tag">${userName}</div>
            `;

            // 4. LISTEN ONLY TO MY REQUEST
            // This prevents the "Admin declining others kicks me" bug
            onSnapshot(myReqRef, (snap) => {
                if (snap.exists()) {
                    const status = snap.data().status;
                    if (status === 'accepted') {
                        window.location.replace('chats.html');
                    } else if (status === 'rejected') {
                        alert("The Admin declined your request.");
                        window.location.href = 'page.html';
                    }
                }
            });
        }

        window.onload = startGateway;
    </script>

    <style>
        body {
            margin: 0;
            background: #0b141a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #gate-ui {
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(88, 166, 255, 0.1);
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-weight: 600; margin-bottom: 10px; color: #58a6ff; }
        p { color: #8696a0; font-size: 0.9rem; line-height: 1.4; }
        .user-tag {
            margin-top: 30px;
            display: inline-block;
            background: #202c33;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #58a6ff;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>
    <div id="gate-ui">
        <p>Initializing Secure Link...</p>
    </div>
</body>
</html>
