<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield | Aethercore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --wa-green: #25D366; --bg-main: #0b141a; --bubble-me: #005c4b; --bubble-them: #202c33; }
        body { background: var(--bg-main); color: #e9edef; font-family: -apple-system, BlinkMacSystemFont, sans-serif; position: fixed; inset: 0; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-workspace { display: none; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 64px; background: #202c33; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; }
        
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; }
        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-top-left-radius: 0; }
        
        .footer { background: #202c33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .input-pill { background: #2a3942; border-radius: 24px; flex: 1; display: flex; align-items: center; padding: 0 14px; height: 44px; position: relative; }
        .action-btn { background: var(--wa-green); color: #0b141a; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; shrink: 0; border: none; touch-action: none; }
        
        .overlay { position: fixed; inset: 0; background: #0b141a; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #admin-panel { display: none; background: #f59e0b; color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        .chat-img { width: 120px; height: 160px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        
        #photo-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; opacity: 0; transition: opacity 0.3s ease; touch-action: none; }
        #photo-viewer.active { display: flex; opacity: 1; }
        .viewer-header { height: 60px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(0,0,0,0.5); z-index: 10001; }
        .viewer-container { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.1s ease-out; }

        .input-field { width: 100%; background: #2a3942; padding: 15px; border-radius: 12px; text-align: center; outline: none; border: 1px solid rgba(255,255,255,0.05); color: #007AFF; font-weight: bold; }
        .input-field::placeholder { color: #5e727e; font-weight: normal; }
        .sender-tag { font-size: 11px; font-weight: 600; margin-bottom: 2px; color: #34b7f1; }
    </style>
</head>
<body>

    <!-- Join/Create UI -->
    <div id="home-view" class="overlay">
        <div class="w-full max-w-xs space-y-6 text-center">
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter italic">Student Lounge</h1>
            
            <div id="initial-options" class="space-y-3">
                <button onclick="showNamingView('create')" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-bold uppercase text-xs text-white/70">New Session</button>
                <div class="py-2 text-gray-600 text-xs font-bold uppercase tracking-widest">or join existing</div>
                <button onclick="showNamingView('join')" class="w-full bg-blue-600/10 border border-blue-500/20 p-5 rounded-2xl font-bold uppercase text-xs text-blue-500">Connect to Room</button>
            </div>

            <!-- Naming/Room Code View -->
            <div id="naming-view" class="space-y-3 hidden">
                <input type="text" id="userNameInput" placeholder="Enter your name" class="input-field">
                <input type="text" id="roomCodeInput" placeholder="ROOM CODE" class="input-field uppercase hidden">
                
                <div class="flex gap-2">
                    <button onclick="cancelNaming()" class="w-1/3 bg-white/5 p-4 rounded-2xl text-[10px] font-bold uppercase text-white/50">Back</button>
                    <button id="confirmBtn" class="flex-1 bg-blue-600 p-4 rounded-2xl text-[10px] font-bold uppercase shadow-lg">Proceed</button>
                </div>
            </div>

            <a href="index.html" class="block text-gray-500 text-[10px] uppercase tracking-widest mt-4">Back to Dashboard</a>
        </div>
    </div>

    <div id="wait-view" class="overlay" style="display:none">
        <div class="text-center space-y-6">
            <div class="relative animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mx-auto"></div>
            <h2 class="text-xl font-bold">Requesting Access</h2>
            <p class="text-gray-400 text-sm">Waiting for admin approval...</p>
        </div>
    </div>

    <!-- Chat UI -->
    <div id="main-workspace">
        <header class="header">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-gray-400 mr-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                </a>
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm shadow-inner">S</div>
                <div class="flex flex-col">
                    <span class="text-[15px] font-bold leading-tight">Student Lounge</span>
                    <div class="flex items-center gap-2">
                        <span id="status-text" class="text-[11px] text-gray-400 tracking-wider">Secure Channel</span>
                        <div id="admin-panel" onclick="approveUser()">ACCEPT REQ?</div>
                    </div>
                </div>
            </div>
        </header>

        <main id="chatBox">
            <div id="e2ee-banner" class="self-center bg-[#182229] text-[#ffd700] text-[10px] px-4 py-1.5 rounded-lg mb-4 border border-[#ffd700]/10 tracking-widest uppercase">End-to-End Encrypted</div>
        </main>

        <footer class="footer">
            <button onclick="document.getElementById('fileInput').click()" class="text-gray-400 p-1">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
            </button>
            <div class="input-pill">
                <input type="text" id="chatInput" placeholder="Message" autocomplete="off" class="w-full bg-transparent outline-none text-sm py-2 text-white">
                <div id="recIndicator" class="hidden absolute left-4 text-red-500 font-bold text-xs uppercase"><span class="animate-pulse">●</span> Rec...</div>
            </div>
            <button id="mainAction" class="action-btn">
                <svg id="micIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <svg id="sendIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <!-- Photo Viewer -->
    <div id="photo-viewer">
        <div class="viewer-header">
            <button onclick="closeViewer()" class="text-white font-bold text-sm">CLOSE</button>
            <a id="download-link" href="#" download="Aethercore_Image.png" class="text-blue-400 font-bold text-sm">DOWNLOAD</a>
        </div>
        <div class="viewer-container" id="viewer-stage">
            <img id="viewer-img" src="">
        </div>
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf,text/plain" onchange="processFile(this.files[0])">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        let myId = localStorage.getItem('user_persistent_id') || "ID-" + Math.floor(Math.random()*9999);
        localStorage.setItem('user_persistent_id', myId);
        
        let savedName = localStorage.getItem('user_chat_name') || "";
        let currentRoom, isAdmin = false;
        let mediaRecorder, audioChunks = [];

        window.showNamingView = (mode) => {
            document.getElementById('initial-options').classList.add('hidden');
            document.getElementById('naming-view').classList.remove('hidden');
            document.getElementById('userNameInput').value = savedName;
            
            if(mode === 'join') {
                document.getElementById('roomCodeInput').classList.remove('hidden');
                document.getElementById('confirmBtn').onclick = () => joinRoom();
            } else {
                document.getElementById('roomCodeInput').classList.add('hidden');
                document.getElementById('confirmBtn').onclick = () => createRoom();
            }
        };

        window.cancelNaming = () => {
            document.getElementById('initial-options').classList.remove('hidden');
            document.getElementById('naming-view').classList.add('hidden');
        };

        window.createRoom = async () => {
            const name = document.getElementById('userNameInput').value.trim();
            if(!name) return alert("Please enter your name");
            localStorage.setItem('user_chat_name', name);
            savedName = name;
            isAdmin = true;
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], status: 'active', pendingReq: null });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const name = document.getElementById('userNameInput').value.trim();
            const code = document.getElementById('roomCodeInput').value.toUpperCase().trim();
            if(!name || !code) return alert("Fill all fields");
            localStorage.setItem('user_chat_name', name);
            savedName = name;
            await updateDoc(doc(db, "rooms", code), { pendingReq: myId });
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'flex';
            onSnapshot(doc(db, "rooms", code), s => { if(s.data()?.pendingReq === 'approved') openWorkspace(code); });
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => { 
                document.body.style.height = window.visualViewport.height + 'px'; 
                window.scrollTo(0,0);
            });
        }

        const chatInput = document.getElementById('chatInput');
        const mainAction = document.getElementById('mainAction');

        chatInput.oninput = () => {
            const hasText = chatInput.value.trim().length > 0;
            document.getElementById('micIcon').classList.toggle('hidden', hasText);
            document.getElementById('sendIcon').classList.toggle('hidden', !hasText);
        };

        mainAction.addEventListener('pointerdown', (e) => {
            if (chatInput.value.trim().length === 0) { e.preventDefault(); startRec(); }
            else { e.preventDefault(); sendMessage(); }
        });

        mainAction.addEventListener('pointerup', (e) => {
            if (chatInput.value.trim().length === 0) { stopRec(); }
        });

        const startRec = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const reader = new FileReader();
                    reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/mp4' }));
                    reader.onloadend = () => uploadMedia(reader.result, 'audio');
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                document.getElementById('recIndicator').classList.remove('hidden');
                chatInput.style.opacity = "0";
            } catch(e) { alert("Mic error"); }
        };

        const stopRec = () => {
            if (mediaRecorder?.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recIndicator').classList.add('hidden');
                chatInput.style.opacity = "1";
            }
        };

        window.approveUser = async () => {
            await updateDoc(doc(db, "rooms", currentRoom), { pendingReq: 'approved' });
            document.getElementById('admin-panel').style.display = 'none';
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'none';
            document.getElementById('main-workspace').style.display = 'flex';
            document.getElementById('status-text').innerText = "ROOM: " + code;
            onSnapshot(doc(db, "rooms", code), s => {
                const data = s.data();
                if(isAdmin && data?.pendingReq && data.pendingReq !== 'approved') document.getElementById('admin-panel').style.display = 'block';
                renderChat(data?.messages || []);
            });
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            chatInput.value = ""; chatInput.oninput();
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, senderName: savedName, text, type: 'text', time: Date.now() }) });
        }

        async function uploadMedia(data, type, fileName = "") {
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, senderName: savedName, data, type, fileName, time: Date.now() }) });
        }

        window.processFile = (file) => {
            const reader = new FileReader();
            const type = file.type.startsWith('image') ? 'image' : 'doc';
            reader.onload = e => uploadMedia(e.target.result, type, file.name);
            reader.readAsDataURL(file);
        };

        window.openImage = (src) => {
            const vImg = document.getElementById('viewer-img');
            vImg.src = src; document.getElementById('download-link').href = src;
            const v = document.getElementById('photo-viewer');
            v.style.display = 'flex'; setTimeout(() => v.classList.add('active'), 10);
        };

        window.closeViewer = () => {
            const v = document.getElementById('photo-viewer');
            v.classList.remove('active'); setTimeout(() => v.style.display = 'none', 300);
        };

        function renderChat(messages) {
            const box = document.getElementById('chatBox');
            const banner = document.getElementById('e2ee-banner');
            box.innerHTML = ''; box.appendChild(banner);
            messages.forEach(m => {
                const isMe = m.user === myId;
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-3`;
                
                // Show Name Tag only for others
                let nameTag = !isMe ? `<span class="sender-tag ml-1">${m.senderName || 'Student'}</span>` : "";
                
                let inner = nameTag;
                if(m.type === 'text') {
                    inner += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${m.text}</div>`;
                } else if(m.type === 'audio') {
                    inner += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}"><audio controls class="h-8 w-44 brightness-90 invert"><source src="${m.data}"></audio></div>`;
                } else if(m.type === 'image') {
                    inner += `<img src="${m.data}" class="chat-img shadow-xl border border-white/10" onclick="openImage('${m.data}')">`;
                } else if(m.type === 'doc') {
                    inner += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'} flex flex-col gap-2"><span class="text-[11px] opacity-70 truncate max-w-[100px]">${m.fileName}</span><a href="${m.data}" download="${m.fileName}" class="bg-blue-600 px-3 py-1.5 rounded text-[10px] font-bold text-center uppercase">Download</a></div>`;
                }
                
                div.innerHTML = inner;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
