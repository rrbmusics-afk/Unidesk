<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Gateway</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';

        const { user: userName, lounge: loungeId, mode } = session;

        document.addEventListener('DOMContentLoaded', async () => {
            if (mode === 'create') {
                handleCreate();
            } else {
                handleJoin();
            }
        });

        async function handleCreate() {
            // Admin creates the lounge document
            await setDoc(doc(db, "lounges", loungeId), {
                admin: userName,
                createdAt: serverTimestamp(),
                loungeName: loungeId 
            }, { merge: true });
            
            // Redirect to the actual chat page
            window.location.href = 'chats.html';
        }

        async function handleJoin() {
            const loungeRef = doc(db, "lounges", loungeId);
            const loungeSnap = await getDoc(loungeRef);

            if (loungeSnap.exists()) {
                // Show knocking screen and send request
                document.getElementById('knocking-screen').style.display = 'flex';
                
                const reqRef = await addDoc(collection(db, "lounges", loungeId, "requests"), {
                    name: userName,
                    status: 'pending',
                    timestamp: Date.now()
                });

                // Listen for admin approval
                onSnapshot(doc(db, "lounges", loungeId, "requests", reqRef.id), (snap) => {
                    if (snap.exists() && snap.data().status === 'accepted') {
                        window.location.href = 'chats.html';
                    }
                });
            } else {
                // Professional Error handling
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-screen').style.display = 'flex';
                setTimeout(() => {
                    window.location.href = 'page.html';
                }, 3000);
            }
        }
    </script>
    <style>
        :root { --bg: #05070a; --accent: #58a6ff; --error: #ff4d4d; --text-dim: #8b949e; }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container { padding: 20px; width: 90%; max-width: 400px; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #30363d;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .overlay { display: none; flex-direction: column; align-items: center; }
        h2 { letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase; }
        p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Initial Loading State -->
        <div id="loading-state">
            <div class="spinner"></div>
            <h2 style="color: var(--accent);">Verifying Session</h2>
            <p>Please wait while we connect you to the AetherCore servers...</p>
        </div>

        <!-- Knocking Screen (Visible only when joining valid room) -->
        <div id="knocking-screen" class="overlay">
            <div class="spinner" style="border-top-color: #f1c40f;"></div>
            <h2 style="color: #f1c40f;">Knocking...</h2>
            <p>Room found. Waiting for the Lounge Admin to grant you access.</p>
        </div>

        <!-- Error Screen (Visible only if room doesn't exist) -->
        <div id="error-screen" class="overlay">
            <div style="font-size: 3rem; margin-bottom: 20px;">🚫</div>
            <h2 style="color: var(--error);">Lounge Not Found</h2>
            <p>The 6-digit code entered does not match any active sessions.</p>
            <p style="color: var(--accent); margin-top: 20px; font-weight: bold;">Returning to Lobby...</p>
        </div>
    </div>

</body>
</html>
