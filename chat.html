<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Pro</title>
    <link rel="stylesheet" href="chat.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
</head>
<body>

    <div id="app-root">
        
        <section id="screen-auth" class="v-screen active">
            <div class="aether-brand">
                <h1>Aethercore</h1>
                <span>ENCRYPTED END-TO-END</span>
            </div>

            <div class="tab-system">
                <div class="tab-nav">
                    <button id="t-create" class="t-btn active" onclick="ui.toggleTab('create')">Create</button>
                    <button id="t-join" class="t-btn" onclick="ui.toggleTab('join')">Join</button>
                </div>

                <div id="f-create" class="tab-panel active">
                    <input type="text" id="in-admin-name" placeholder="Admin Name" required>
                    <input type="text" id="in-group-name" placeholder="Group Name" required>
                    <button id="btn-create" class="main-action" onclick="core.createRoom()" disabled>Create Experience</button>
                </div>

                <div id="f-join" class="tab-panel">
                    <input type="text" id="in-user-name" placeholder="Your Name" required>
                    <input type="text" id="in-code" placeholder="Room Code" required>
                    <button id="btn-join" class="main-action" onclick="core.joinRoom()" disabled>Knock to Join</button>
                </div>
            </div>
        </section>

        <section id="screen-chat" class="v-screen">
            <header class="app-header" onclick="ui.openInfo()">
                <div class="h-user">
                    <img id="h-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                    <div class="h-details">
                        <b id="h-title">Group</b>
                        <small id="h-code">Code: ---</small>
                    </div>
                </div>
            </header>

            <div id="admin-notif" class="admin-strip hidden" onclick="ui.openApprovals()">
                <span>Pending Approval Requests</span>
                <span class="material-icons-round">arrow_forward</span>
            </div>

            <div id="chat-flow" class="doodle-bg">
                </div>

            <footer class="app-input">
                <div class="input-card">
                    <button onclick="ui.triggerDocs()"><span class="material-icons-round">attach_file</span></button>
                    <textarea id="main-input" placeholder="Message..." rows="1"></textarea>
                    <button id="mic-trigger" class="mic-btn"><span class="material-icons-round">mic</span></button>
                    <button id="send-trigger" class="hidden"><span class="material-icons-round">send</span></button>
                </div>
            </footer>
        </section>

    </div>

    <input type="file" id="file-pick" hidden multiple>
    <input type="file" id="img-pick" hidden accept="image/*">

    <script src="chat.js"></script>
</body>
</html>
