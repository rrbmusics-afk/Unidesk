<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9;
            --u-obsidian: #0B0E11;
            --u-border: rgba(255, 255, 255, 0.08);
            --wa-bg: #0B141A;
            --wa-panel: #202C33;
            --wa-bubble-me: #005C4B;
            --wa-bubble-them: #202C33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', sans-serif; background: var(--u-obsidian); 
            color: white; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* --- FIXED HOME ALIGNMENT --- */
        #view-auth {
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; /* Perfect Center */
            padding: 20px;
            background: radial-gradient(circle at top, #1a1f24 0%, #0b0e11 100%);
        }

        .brand-header { text-align: center; margin-bottom: 40px; }
        .brand-logo { font-weight: 800; font-size: 50px; font-style: italic; color: var(--u-blue); margin: 0; letter-spacing: -3px; }

        .glass-card {
            background: rgba(25, 29, 33, 0.95); width: 100%; max-width: 380px;
            padding: 35px; border-radius: 40px; border: 1px solid var(--u-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; /* Align items inside */
        }

        .avatar-box { width: 110px; height: 110px; margin: -90px 0 30px 0; position: relative; }
        #avatar-preview { width: 100%; height: 100%; border-radius: 38px; object-fit: cover; border: 4px solid var(--u-obsidian); background: #1c2126; }
        .cam-btn { position: absolute; bottom: -2px; right: -2px; background: var(--u-blue); width: 34px; height: 34px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--u-obsidian); cursor: pointer; }

        .u-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--u-border); padding: 18px 20px; border-radius: 18px; color: white; font-size: 16px; margin-bottom: 12px; text-align: center; }
        .btn-exec { width: 100%; padding: 20px; border-radius: 20px; background: #fff; color: #000; font-weight: 800; font-size: 15px; margin-top: 10px; border: none; cursor: pointer; transition: 0.2s; }

        /* --- MOBILE OPTIMIZED CHAT --- */
        #view-chat { height: 100dvh; display: flex; flex-direction: column; background: var(--wa-bg); position: relative; }
        .wa-doodle { position: absolute; inset: 0; opacity: 0.05; pointer-events: none; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); filter: invert(1); z-index: 1; }

        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; z-index: 10; gap: 12px; height: 72px; }
        .head-pfp { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .head-meta { flex: 1; display: flex; flex-direction: column; }
        .head-meta h2 { margin: 0; font-size: 17px; font-weight: 600; }
        .lounge-id-tag { font-size: 11px; color: var(--u-blue); font-weight: 800; letter-spacing: 0.5px; margin-top: 1px; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; z-index: 2; -webkit-overflow-scrolling: touch; }
        .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; color: white; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .msg-me { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 0; }
        .msg-them { align-self: flex-start; background: var(--wa-bubble-them); border-top-left-radius: 0; }
        .msg-sender { font-size: 11px; font-weight: 800; color: #35cd96; display: block; margin-bottom: 2px; }

        footer { background: var(--wa-panel); padding: 10px 12px; display: flex; align-items: center; gap: 10px; z-index: 10; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .pill { flex: 1; background: #2A3942; border-radius: 25px; padding: 5px 18px; display: flex; align-items: center; }
        .pill input { background: transparent; border: none; color: white; padding: 10px 0; flex: 1; font-size: 16px; }
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: #00a884; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="app-engine">
        <section id="view-auth">
            <div class="brand-header">
                <h1 class="brand-logo">UNIDESK</h1>
            </div>

            <div class="glass-card">
                <div class="avatar-box">
                    <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="pfp-input" class="cam-btn"><i class="fas fa-camera"></i></label>
                    <input type="file" id="pfp-input" class="hidden" accept="image/*" onchange="ctrl.onFile(this)">
                </div>

                <input type="text" id="in-name" class="u-input" placeholder="Display Name">
                <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name">
                
                <button class="btn-exec" onclick="ctrl.init()">CREATE LOUNGE</button>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="wa-doodle"></div>
            <header>
                <img id="header-pfp" class="head-pfp">
                <div class="head-meta">
                    <h2 id="header-title">Lounge</h2>
                    <span id="header-id" class="lounge-id-tag">ID: #000000</span>
                </div>
                <i class="fas fa-ellipsis-v" style="color: #aebac1;"></i>
            </header>

            <div id="chat-flow"></div>

            <footer>
                <div class="pill">
                    <input type="text" id="msg-input" placeholder="Message" oninput="ctrl.onTyping()">
                </div>
                <button class="send-btn" onclick="ctrl.send()">
                    <i id="action-icon" class="fas fa-microphone"></i>
                </button>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = { uid: 'u'+Date.now(), file: null, room: null, name: '' };

        const ctrl = {
            onFile: (el) => {
                state.file = el.files[0];
                if(state.file) document.getElementById('avatar-preview').src = URL.createObjectURL(state.file);
            },
            init: async () => {
                const lName = document.getElementById('in-lounge').value.trim();
                state.name = document.getElementById('in-name').value.trim();
                if(!lName || !state.name) return;

                const code = Math.floor(100000 + Math.random()*900000).toString();
                let url = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                if(state.file) {
                    const sRef = ref(storage, `pfps/${code}.jpg`);
                    await uploadBytes(sRef, state.file);
                    url = await getDownloadURL(sRef);
                }

                const room = { name: lName, code: code, avatar: url, admin: state.uid };
                await setDoc(doc(db, "lounges", code), room);
                ctrl.launch(room);
            },
            launch: (room) => {
                state.room = room;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');

                document.getElementById('header-pfp').src = room.avatar;
                document.getElementById('header-title').innerText = room.name;
                document.getElementById('header-id').innerText = `ID: #${room.code}`;
                
                const q = query(collection(db, "lounges", room.code, "messages"), orderBy("ts", "asc"));
                onSnapshot(q, snap => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const isMe = m.uid === state.uid;
                        const div = document.createElement('div');
                        div.className = `msg ${isMe ? 'msg-me' : 'msg-them'}`;
                        div.innerHTML = `<span class="msg-sender">${isMe ? 'You' : m.sender}</span>${m.text}`;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            onTyping: () => {
                const val = document.getElementById('msg-input').value.trim();
                document.getElementById('action-icon').className = val ? "fas fa-paper-plane" : "fas fa-microphone";
            },
            send: async () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "lounges", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.name, ts: serverTimestamp()
                });
                inp.value = "";
                ctrl.onTyping();
            }
        };
        window.ctrl = ctrl;
    </script>
</body>
</html>
