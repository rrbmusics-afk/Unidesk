<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethercore Lounge</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="entrance-screen" class="screen active">
        <div class="brand-header">
            <div class="logo">AC</div>
            <h1>Aethercore</h1>
        </div>
        
        <div class="tab-container">
            <div class="tab-header">
                <button class="tab-btn active" onclick="switchTab('create')">Create Lounge</button>
                <button class="tab-btn" onclick="switchTab('join')">Join Lounge</button>
            </div>

            <div class="tab-content" id="create-tab">
                <input type="text" id="create-user-name" placeholder="Your Professional Name" oninput="validateForm()">
                <input type="text" id="create-lounge-name" placeholder="Lounge Topic" oninput="validateForm()">
                <button id="create-proceed" class="action-btn locked" disabled onclick="handleCreate()">Establish Hub</button>
            </div>

            <div class="tab-content hidden" id="join-tab">
                <input type="text" id="join-user-name" placeholder="Your Name" oninput="validateForm()">
                <input type="text" id="join-lounge-code" placeholder="Enter 6-Digit Hub Code" oninput="validateForm()">
                <button id="join-proceed" class="action-btn locked" disabled onclick="handleJoin()">Request Entry</button>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="chat-header" onclick="showGroupInfo()">
            <div class="header-left">
                <img id="group-icon" src="default-hub.png" class="header-pfp">
                <div class="header-meta">
                    <h3 id="display-lounge-name">Strategy Hub</h3>
                    <span id="display-lounge-code">#------</span>
                </div>
            </div>
            <div id="admin-badge" class="badge hidden">Admin</div>
        </div>

        <div id="pending-requests-bar" class="request-banner hidden" onclick="openRequestPopup()">
            <i class="fas fa-user-plus"></i> Pending Join Requests
        </div>

        <div id="message-feed" class="message-container">
            </div>

        <div class="input-bar">
            <label class="attach-btn">
                <i class="fas fa-plus"></i>
                <input type="file" id="doc-input" multiple hidden accept=".pdf,.doc,.docx">
            </label>
            <div class="text-input-wrapper">
                <input type="text" id="msg-input" placeholder="Type a message..." oninput="toggleVoiceMode()">
            </div>
            <button id="action-trigger" class="voice-btn">
                <i class="fas fa-microphone" id="trigger-icon"></i>
            </button>
        </div>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
