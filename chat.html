<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <div id="chat-screen">
        <div class="chat-header">
            <div class="header-avatar">SH</div>
            <div class="header-info">
                <h4>Strategy Hub</h4>
                <span>Tap for lounge info</span>
            </div>
            <div class="admin-badge">Admin</div>
        </div>

        <div id="message-container" class="message-feed">
            <div class="msg-group received">
                <span class="sender-name">Alex (Admin)</span>
                <div class="msg-bubble">
                    Welcome to the Student Lounge! All project files are pinned.
                    <span class="msg-time">10:45 AM</span>
                </div>
            </div>

            <div class="msg-group sent">
                <div class="msg-bubble">
                    Got it, thanks!
                    <span class="msg-time">10:46 AM</span>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="msg-input" placeholder="Type a message">
            </div>
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                </svg>
            </button>
        </div>
    </div>

</body>
</html>
