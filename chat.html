<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Enterprise Secure Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --accent: #2D7FF9;
            --accent-glow: rgba(45, 127, 249, 0.35);
            --bg: #040508;
            --surface: #0D1117;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
        }

        * { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
        }

        body { 
            background: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Mesh Background */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(45, 127, 249, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(123, 97, 255, 0.06) 0%, transparent 40%);
            z-index: -1;
        }

        .hidden { display: none !important; }

        /* Main Core Container */
        .core-gate {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            z-index: 10;
        }

        .premium-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 48px;
            padding: 50px 40px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Subtle Inner Glow */
        .premium-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        .logo-mark {
            width: 60px; height: 60px;
            background: var(--accent);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 0 30px var(--accent-glow);
            font-size: 24px;
        }

        h1 { font-weight: 800; font-size: 32px; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
        .tagline { color: var(--text-dim); font-size: 14px; text-align: center; margin-bottom: 40px; }

        /* Modern Tab Switcher */
        .nav-pill {
            display: flex; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 6px; margin-bottom: 32px;
        }

        .pill-btn {
            flex: 1; border: none; background: transparent; color: var(--text-dim);
            padding: 14px; border-radius: 18px; font-weight: 700; font-size: 13px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .pill-btn.active {
            background: #FFFFFF; color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Input Experience */
        .field-wrap { margin-bottom: 18px; position: relative; }
        
        .prime-input {
            width: 100%; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px 24px; border-radius: 24px;
            color: #fff; font-size: 16px; font-weight: 500;
            transition: 0.3s; text-align: left;
        }

        .prime-input:focus {
            border-color: var(--accent);
            background: rgba(255,255,255,0.05);
            outline: none;
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        /* Profile Uploader */
        .pfp-conductor {
            width: 130px; height: 130px; margin: 0 auto 30px;
            position: relative; cursor: pointer;
        }

        .pfp-image {
            width: 100%; height: 100%; border-radius: 50px;
            object-fit: cover; border: 2px solid var(--border);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pfp-conductor:hover .pfp-image { transform: scale(1.05) rotate(3deg); border-color: var(--accent); }

        .pfp-badge {
            position: absolute; bottom: 0; right: 0;
            background: var(--accent); width: 40px; height: 40px;
            border-radius: 14px; border: 4px solid var(--surface);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* Action Button */
        .btn-launch {
            width: 100%; padding: 22px; border-radius: 24px;
            border: none; background: #1a1f26; color: rgba(255,255,255,0.3);
            font-weight: 800; font-size: 16px; cursor: not-allowed;
            transition: 0.4s; margin-top: 20px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .btn-launch.active {
            background: var(--accent); color: white;
            cursor: pointer; box-shadow: 0 20px 40px var(--accent-glow);
        }

        .btn-launch.active:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Knocking Architecture */
        #knock-view {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .sonar {
            position: relative; width: 160px; height: 160px;
            display: flex; align-items: center; justify-content: center;
        }

        .sonar-wave {
            position: absolute; width: 100%; height: 100%;
            border: 1px solid var(--accent); border-radius: 50%;
            animation: sonar 3s infinite; opacity: 0;
        }
        .sonar-wave:nth-child(2) { animation-delay: 1s; }
        .sonar-wave:nth-child(3) { animation-delay: 2s; }

        @keyframes sonar {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        .lock-icon { font-size: 40px; color: var(--accent); z-index: 2; text-shadow: 0 0 20px var(--accent-glow); }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="core-gate" id="auth-screen">
        <div class="premium-card">
            <div class="logo-mark"><i class="fas fa-shield-halved"></i></div>
            <h1>Aethercore</h1>
            <p class="tagline">Military-grade ephemeral communication.</p>

            <div class="nav-pill">
                <button class="pill-btn active" id="tab-c" onclick="toggleMode('create')">Create Node</button>
                <button class="pill-btn" id="tab-j" onclick="toggleMode('join')">Join Node</button>
            </div>

            <div id="pfp-area">
                <div class="pfp-conductor" onclick="document.getElementById('hidden-file').click()">
                    <img id="pfp-view" class="pfp-image" src="https://ui-avatars.com/api/?background=1a1f26&color=fff&name=A">
                    <div class="pfp-badge"><i class="fas fa-plus"></i></div>
                </div>
                <input type="file" id="hidden-file" class="hidden" accept="image/*" onchange="handlePFP(this)">
            </div>

            <div class="field-wrap">
                <input type="text" id="user-name" class="prime-input" placeholder="Identity Name" oninput="checkForm()">
            </div>
            
            <div class="field-wrap" id="lounge-wrap">
                <input type="text" id="lounge-name" class="prime-input" placeholder="Lounge Identifier" oninput="checkForm()">
            </div>

            <div class="field-wrap hidden" id="code-wrap">
                <input type="text" id="lounge-code" class="prime-input" placeholder="6-Digit Access Key" maxlength="6" oninput="checkForm()">
            </div>

            <button id="launch-btn" class="btn-launch" onclick="initiate()">
                <span>INITIALIZE LINK</span>
                <i class="fas fa-arrow-right-long"></i>
            </button>
        </div>
    </div>

    <div id="knock-view" class="hidden">
        <div class="sonar">
            <div class="sonar-wave"></div>
            <div class="sonar-wave"></div>
            <div class="sonar-wave"></div>
            <i class="fas fa-key lock-icon"></i>
        </div>
        <h2 style="margin-top: 50px; font-weight: 800; letter-spacing: 2px;">REQUESTING ENTRY</h2>
        <p style="color: var(--text-dim); margin-top: 10px;">Awaiting node admin authorization...</p>
    </div>

    <script type="module">
        // Firebase Logic Integration (Same robust structure as previous, optimized for 2-page flow)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let mode = 'create';
        const uid = 'X-' + Math.random().toString(36).substr(2, 9).toUpperCase();

        window.toggleMode = (m) => {
            mode = m;
            document.getElementById('tab-c').classList.toggle('active', m==='create');
            document.getElementById('tab-j').classList.toggle('active', m==='join');
            document.getElementById('pfp-area').classList.toggle('hidden', m==='join');
            document.getElementById('lounge-wrap').classList.toggle('hidden', m==='join');
            document.getElementById('code-wrap').classList.toggle('hidden', m==='create');
            checkForm();
        };

        window.handlePFP = (el) => {
            if(el.files[0]) document.getElementById('pfp-view').src = URL.createObjectURL(el.files[0]);
        };

        window.checkForm = () => {
            const u = document.getElementById('user-name').value.trim();
            const l = document.getElementById('lounge-name').value.trim();
            const c = document.getElementById('lounge-code').value.trim();
            const btn = document.getElementById('launch-btn');
            
            const isReady = (mode === 'create') ? (u && l) : (u && c.length === 6);
            btn.classList.toggle('active', isReady);
        };

        window.initiate = async () => {
            const name = document.getElementById('user-name').value.trim();
            const btn = document.getElementById('launch-btn');
            btn.innerHTML = `<i class="fas fa-sync fa-spin"></i> GENERATING NODE...`;

            if(mode === 'create') {
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                let pfp = "https://ui-avatars.com/api/?background=2D7FF9&color=fff&name=" + name;
                
                const file = document.getElementById('hidden-file').files[0];
                if(file) {
                    const sRef = ref(storage, `nodes/${code}/avatar.jpg`);
                    await uploadBytes(sRef, file);
                    pfp = await getDownloadURL(sRef);
                }

                await setDoc(doc(db, "rooms", code), {
                    name: document.getElementById('lounge-name').value.trim(),
                    code, avatar: pfp, admin: uid
                });

                location.href = `page.html?code=${code}&uid=${uid}&name=${encodeURIComponent(name)}`;
            } else {
                const code = document.getElementById('lounge-code').value.trim();
                const snap = await getDoc(doc(db, "rooms", code));
                
                if(!snap.exists()) {
                    alert("Node not found on Aethercore grid.");
                    btn.innerHTML = `<span>INITIALIZE LINK</span><i class="fas fa-arrow-right-long"></i>`;
                    return;
                }

                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('knock-view').classList.remove('hidden');

                const reqRef = doc(db, "rooms", code, "requests", uid);
                await setDoc(reqRef, { name, uid });

                onSnapshot(reqRef, (s) => {
                    if(!s.exists()) {
                        location.href = `page.html?code=${code}&uid=${uid}&name=${encodeURIComponent(name)}`;
                    }
                });
            }
        };
    </script>
</body>
</html>
