<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unidesk | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --u-blue: #2D7FF9; --u-bg: #0B0E11; --u-border: rgba(255,255,255,0.08); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--u-bg); color: white; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(25, 29, 33, 0.98); width: 90%; max-width: 400px; padding: 40px; border-radius: 45px; border: 1px solid var(--u-border); text-align: center; }
        .tab-nav { display: flex; background: rgba(255,255,255,0.05); border-radius: 18px; padding: 5px; margin-bottom: 30px; border: 1px solid var(--u-border); }
        .tab-btn { flex: 1; padding: 14px; border: none; background: transparent; color: #8E8E93; font-weight: 800; cursor: pointer; border-radius: 14px; }
        .tab-btn.active { background: var(--u-blue); color: white; }
        .pfp-wrap { width: 110px; height: 110px; margin: 0 auto 25px auto; position: relative; cursor: pointer; }
        #pfp-img { width: 100%; height: 100%; border-radius: 38px; object-fit: cover; border: 3px solid var(--u-blue); background: #1c2126; }
        .u-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--u-border); padding: 18px; border-radius: 20px; color: white; font-size: 16px; margin-bottom: 12px; text-align: center; }
        .btn-exec { width: 100%; padding: 22px; border-radius: 22px; background: var(--u-blue); color: white; font-weight: 800; border: none; cursor: pointer; opacity: 0.2; pointer-events: none; transition: 0.3s; }
        .btn-exec.ready { opacity: 1; pointer-events: auto; box-shadow: 0 10px 20px rgba(45, 127, 249, 0.4); }
        .hidden { display: none !important; }
        #knocking-ui { position: fixed; inset: 0; background: var(--u-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .pulse { font-size: 60px; color: var(--u-blue); animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="glass-card" id="main-ui">
        <div class="tab-nav">
            <button id="t-create" class="tab-btn active" onclick="setMode('create')">CREATE</button>
            <button id="t-join" class="tab-btn" onclick="setMode('join')">JOIN</button>
        </div>

        <div id="pfp-zone">
            <div class="pfp-wrap" onclick="document.getElementById('f-pfp').click()">
                <img id="pfp-img" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
            </div>
            <input type="file" id="f-pfp" class="hidden" accept="image/*" onchange="preview(this)">
        </div>

        <input type="text" id="in-user" class="u-input" placeholder="Your Name" oninput="val()">
        <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name" oninput="val()">
        <input type="text" id="in-code" class="u-input hidden" placeholder="6-Digit Code" oninput="val()">
        
        <button id="btn-submit" class="btn-exec" onclick="start()">PROCEED</button>
    </div>

    <div id="knocking-ui" class="hidden">
        <div class="pulse"><i class="fas fa-door-closed"></i></div>
        <h2 style="margin-top:20px;">KNOCKING...</h2>
        <p style="color:#8E8E93;">Waiting for Admin approval</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let mode = 'create';
        let uid = 'U' + Math.random().toString(36).substr(2,6);

        window.setMode = (m) => {
            mode = m;
            document.getElementById('t-create').classList.toggle('active', m==='create');
            document.getElementById('t-join').classList.toggle('active', m==='join');
            document.getElementById('pfp-zone').classList.toggle('hidden', m==='join');
            document.getElementById('in-lounge').classList.toggle('hidden', m==='join');
            document.getElementById('in-code').classList.toggle('hidden', m==='create');
            window.val();
        };

        window.preview = (el) => { if(el.files[0]) document.getElementById('pfp-img').src = URL.createObjectURL(el.files[0]); };

        window.val = () => {
            const u = document.getElementById('in-user').value.trim();
            const l = document.getElementById('in-lounge').value.trim();
            const c = document.getElementById('in-code').value.trim();
            const ready = (mode === 'create') ? (u && l) : (u && c.length === 6);
            document.getElementById('btn-submit').classList.toggle('ready', ready);
        };

        window.start = async () => {
            const name = document.getElementById('in-user').value;
            if(mode === 'create') {
                const code = Math.floor(100000 + Math.random()*900000).toString();
                let url = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";
                const file = document.getElementById('f-pfp').files[0];
                if(file) {
                    const sRef = ref(storage, `pfps/${code}.jpg`);
                    await uploadBytes(sRef, file);
                    url = await getDownloadURL(sRef);
                }
                await setDoc(doc(db, "rooms", code), { name: document.getElementById('in-lounge').value, code, avatar: url, admin: uid });
                location.href = `page.html?code=${code}&uid=${uid}&name=${name}`;
            } else {
                const code = document.getElementById('in-code').value;
                const snap = await getDoc(doc(db, "rooms", code));
                if(!snap.exists()) return alert("Invalid Code");

                document.getElementById('main-ui').classList.add('hidden');
                document.getElementById('knocking-ui').classList.remove('hidden');

                const reqRef = doc(db, "rooms", code, "requests", uid);
                await setDoc(reqRef, { name, uid });
                onSnapshot(reqRef, s => { if(!s.exists()) location.href = `page.html?code=${code}&uid=${uid}&name=${name}`; });
            }
        };
    </script>
</body>
</html>
