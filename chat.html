<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9; --u-obsidian: #0B0E11; --u-border: rgba(255, 255, 255, 0.08);
            --wa-bg: #0B141A; --wa-panel: #202C33; --wa-bubble-me: #005C4B; --wa-bubble-them: #202C33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--u-obsidian); color: white; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- AUTH SCREEN --- */
        #view-auth { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at top, #1a1f24 0%, #0b0e11 100%); }
        .glass-card { background: rgba(25, 29, 33, 0.95); width: 100%; max-width: 380px; padding: 35px; border-radius: 40px; border: 1px solid var(--u-border); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .toggle-box { display: flex; width: 100%; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; margin-bottom: 25px; border: 1px solid var(--u-border); }
        .tgl-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #8E8E93; font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 12px; }
        .tgl-btn.active { background: var(--u-blue); color: white; }

        .pfp-stage { width: 100px; height: 100px; margin-bottom: 20px; position: relative; }
        #pfp-preview { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; border: 3px solid var(--u-blue); }

        .u-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--u-border); padding: 16px; border-radius: 15px; color: white; font-size: 16px; margin-bottom: 12px; text-align: center; }
        .btn-exec { width: 100%; padding: 18px; border-radius: 18px; background: #fff; color: #000; font-weight: 800; border: none; cursor: pointer; }

        /* --- KNOCKING VIEW --- */
        #view-knock { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: var(--u-obsidian); }
        .pulse-icon { font-size: 50px; color: var(--u-blue); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* --- CHAT VIEW --- */
        #view-chat { height: 100dvh; display: flex; flex-direction: column; background: var(--wa-bg); }
        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; height: 72px; gap: 12px; z-index: 10; }
        .h-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .h-meta { flex: 1; }
        .h-meta h2 { margin: 0; font-size: 17px; }
        .h-id { font-size: 11px; color: var(--u-blue); font-weight: 800; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 15px; color: white; position: relative; }
        .bubble-me { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 0; }
        .bubble-them { align-self: flex-start; background: var(--wa-bubble-them); border-top-left-radius: 0; }

        /* --- ADMIN REQUEST POPUP --- */
        #admin-requests { position: fixed; top: 80px; left: 10px; right: 10px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .req-card { background: rgba(45, 127, 249, 0.95); padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .req-btn { background: white; color: black; border: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 12px; }

        footer { background: var(--wa-panel); padding: 10px; display: flex; gap: 10px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .pill { flex: 1; background: #2A3942; border-radius: 25px; padding: 0 15px; height: 45px; display: flex; align-items: center; }
        .pill input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: #00a884; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-auth">
            <div class="glass-card">
                <div class="toggle-box">
                    <button id="t-create" class="tgl-btn active" onclick="ui.setMode('create')">CREATE</button>
                    <button id="t-join" class="tgl-btn" onclick="ui.setMode('join')">JOIN</button>
                </div>
                <div class="pfp-stage" id="pfp-area">
                    <img id="pfp-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <input type="file" id="pfp-input" class="hidden" onchange="ui.onFile(this)">
                    <label for="pfp-input" style="position:absolute; inset:0; cursor:pointer;"></label>
                </div>
                <input type="text" id="in-user" class="u-input" placeholder="Your Name">
                <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name">
                <input type="text" id="in-code" class="u-input hidden" placeholder="6-Digit Code">
                <button class="btn-exec" onclick="logic.start()">INITIALIZE</button>
            </div>
        </section>

        <section id="view-knock" class="hidden">
            <div class="pulse-icon"><i class="fas fa-door-open"></i></div>
            <h2 style="margin-top:20px;">Knocking...</h2>
            <p style="color:#8E8E93;">Waiting for Admin to let you in</p>
        </section>

        <section id="view-chat" class="hidden">
            <div id="admin-requests"></div> <header>
                <img id="h-img" class="h-img">
                <div class="h-meta">
                    <h2 id="h-name">Lounge</h2>
                    <span id="h-id" class="h-id">ID: #000000</span>
                </div>
                <i class="fas fa-ellipsis-v"></i>
            </header>
            <div id="chat-flow"></div>
            <footer>
                <div class="pill"><input type="text" id="msg-input" placeholder="Message"></div>
                <button class="send-btn" onclick="logic.send()"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const state = { mode: 'create', uid: 'u'+Date.now(), room: null, name: '' };

        window.ui = {
            setMode: (m) => {
                state.mode = m;
                document.getElementById('t-create').classList.toggle('active', m==='create');
                document.getElementById('t-join').classList.toggle('active', m==='join');
                document.getElementById('pfp-area').classList.toggle('hidden', m==='join');
                document.getElementById('in-lounge').classList.toggle('hidden', m==='join');
                document.getElementById('in-code').classList.toggle('hidden', m==='create');
            },
            onFile: (el) => {
                if(el.files[0]) document.getElementById('pfp-preview').src = URL.createObjectURL(el.files[0]);
            }
        };

        window.logic = {
            start: async () => {
                state.name = document.getElementById('in-user').value.trim();
                if(!state.name) return alert("Name required");

                if(state.mode === 'create') {
                    const lName = document.getElementById('in-lounge').value.trim();
                    const code = Math.floor(100000 + Math.random()*900000).toString();
                    const room = { name: lName, code: code, avatar: document.getElementById('pfp-preview').src, admin: state.uid };
                    await setDoc(doc(db, "lounges", code), room);
                    logic.joinChat(room);
                } else {
                    const code = document.getElementById('in-code').value.trim();
                    const roomSnap = await getDoc(doc(db, "lounges", code));
                    if(!roomSnap.exists()) return alert("Lounge not found");
                    
                    // KNOCK LOGIC
                    document.getElementById('view-auth').classList.add('hidden');
                    document.getElementById('view-knock').classList.remove('hidden');
                    
                    const reqRef = doc(db, "lounges", code, "requests", state.uid);
                    await setDoc(reqRef, { name: state.name, ts: serverTimestamp() });

                    // Wait for Approval
                    onSnapshot(reqRef, (s) => {
                        if(!s.exists()) { // Admin deleted it (accepted or rejected)
                            // Double check if we are in members now
                            logic.joinChat(roomSnap.data());
                        }
                    });
                }
            },
            joinChat: (room) => {
                state.room = room;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-knock').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');
                
                document.getElementById('h-img').src = room.avatar;
                document.getElementById('h-name').innerText = room.name;
                document.getElementById('h-id').innerText = `ID: #${room.code}`;

                // Listen for Messages
                onSnapshot(query(collection(db, "lounges", room.code, "messages"), orderBy("ts", "asc")), s => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    s.forEach(d => {
                        const m = d.data();
                        const isMe = m.uid === state.uid;
                        flow.innerHTML += `<div class="bubble ${isMe?'bubble-me':'bubble-them'}">
                            <span style="font-size:10px; font-weight:800; display:block; color:#35cd96">${isMe?'You':m.sender}</span>
                            ${m.text}</div>`;
                    });
                    flow.scrollTop = flow.scrollHeight;
                });

                // ADMIN ONLY: Listen for Knocks
                if(state.uid === room.admin) {
                    onSnapshot(collection(db, "lounges", room.code, "requests"), s => {
                        const box = document.getElementById('admin-requests');
                        box.innerHTML = "";
                        s.forEach(d => {
                            const r = d.data();
                            box.innerHTML += `<div class="req-card" id="req-${d.id}">
                                <span><b>${r.name}</b> is knocking...</span>
                                <button class="req-btn" onclick="logic.accept('${d.id}')">ACCEPT</button>
                            </div>`;
                        });
                    });
                }
            },
            accept: async (targetUid) => {
                await deleteDoc(doc(db, "lounges", state.room.code, "requests", targetUid));
            },
            send: async () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "lounges", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.name, ts: serverTimestamp()
                });
                inp.value = "";
            }
        };
    </script>
</body>
</html>
