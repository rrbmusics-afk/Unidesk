<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9;
            --u-obsidian: #0B0E11;
            --u-glass: rgba(255, 255, 255, 0.03);
            --u-border: rgba(255, 255, 255, 0.08);
            /* WhatsApp Pro Palette */
            --wa-bg: #0B141A;
            --wa-panel: #202C33;
            --wa-bubble-me: #005C4B;
            --wa-bubble-them: #202C33;
            --wa-text: #E9EDEF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--u-obsidian); color: white; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- SCREEN 1: THE GATE (AUTH) --- */
        #view-auth {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
            background: radial-gradient(circle at top, #1a1f24 0%, #0b0e11 100%);
        }
        .brand-header { text-align: center; margin-bottom: 50px; }
        .brand-logo { font-weight: 800; font-size: 54px; font-style: italic; color: var(--u-blue); margin: 0; letter-spacing: -3px; filter: drop-shadow(0 0 15px rgba(45,127,249,0.3)); }
        
        .glass-card {
            background: rgba(25, 29, 33, 0.95); width: 100%; max-width: 400px;
            padding: 40px 30px; border-radius: 40px; border: 1px solid var(--u-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
        }

        .pfp-uploader { width: 120px; height: 120px; margin: -100px auto 30px; position: relative; }
        #pfp-preview { width: 100%; height: 100%; border-radius: 42px; object-fit: cover; border: 4px solid var(--u-obsidian); background: #1c2126; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .cam-icon { position: absolute; bottom: -5px; right: -5px; background: var(--u-blue); width: 38px; height: 38px; border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--u-obsidian); cursor: pointer; }

        .u-input { width: 100%; background: var(--u-glass); border: 1px solid var(--u-border); padding: 20px; border-radius: 20px; color: white; font-size: 16px; margin-bottom: 12px; transition: 0.3s; }
        .u-input:focus { border-color: var(--u-blue); background: rgba(255,255,255,0.06); }
        .btn-exec { width: 100%; padding: 22px; border-radius: 20px; background: #fff; color: #000; font-weight: 800; font-size: 16px; margin-top: 20px; border: none; cursor: pointer; letter-spacing: 0.5px; }

        /* --- SCREEN 2: THE LOUNGE (CHAT) --- */
        #view-chat { height: 100vh; display: flex; flex-direction: column; background: var(--wa-bg); position: relative; }
        .wa-doodle { 
            position: absolute; inset: 0; opacity: 0.06; pointer-events: none;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            filter: invert(1); z-index: 1;
        }

        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; z-index: 10; gap: 12px; height: 65px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-pfp { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #2a3942; }
        .header-info { flex: 1; }
        .header-info h2 { margin: 0; font-size: 17px; font-weight: 600; color: var(--wa-text); }
        .header-info p { margin: 0; font-size: 12px; color: #8696a0; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 5px; z-index: 2; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; line-height: 1.4; color: var(--wa-text); position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .bubble-me { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 0; }
        .bubble-them { align-self: flex-start; background: var(--wa-bubble-them); border-top-left-radius: 0; }
        .sender-name { font-size: 12px; font-weight: 700; color: #35cd96; display: block; margin-bottom: 2px; }

        .footer { background: var(--wa-panel); padding: 10px 12px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .input-wrap { flex: 1; background: #2A3942; border-radius: 25px; padding: 5px 18px; display: flex; align-items: center; }
        .input-wrap input { background: transparent; border: none; color: white; padding: 10px 0; flex: 1; font-size: 16px; }
        .fab { width: 50px; height: 50px; border-radius: 50%; background: #00a884; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="root">
        <section id="view-auth">
            <div class="brand-header">
                <h1 class="brand-logo">UNIDESK</h1>
                <p style="color: #8E8E93; font-size: 10px; letter-spacing: 5px; font-weight: 700;">AETHERCORE SYSTEM</p>
            </div>

            <div class="glass-card">
                <div class="pfp-uploader">
                    <img id="pfp-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="pfp-input" class="cam-icon"><i class="fas fa-camera"></i></label>
                    <input type="file" id="pfp-input" class="hidden" accept="image/*" onchange="engine.onImage(this)">
                </div>

                <input type="text" id="in-user" class="u-input" placeholder="Your Display Name">
                <input type="text" id="in-room" class="u-input" placeholder="Lounge Name">
                
                <button class="btn-exec" onclick="engine.createLounge()">INITIALIZE LOUNGE</button>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="wa-doodle"></div>
            <header>
                <img id="header-img" class="header-pfp" src="">
                <div class="header-info">
                    <h2 id="header-name">Lounge</h2>
                    <p>online • secure</p>
                </div>
                <i class="fas fa-ellipsis-v" style="color: #aebac1; font-size: 18px;"></i>
            </header>

            <div id="chat-flow"></div>

            <div class="footer">
                <i class="far fa-smile" style="color: #8696a0; font-size: 24px;"></i>
                <div class="input-wrap">
                    <input type="text" id="msg-input" placeholder="Message" oninput="engine.toggleIcon()">
                    <i class="fas fa-paperclip" style="color: #8696a0; transform: rotate(45deg); margin-left: 10px;"></i>
                </div>
                <button class="fab" onclick="engine.send()">
                    <i id="action-icon" class="fas fa-microphone"></i>
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35",
            measurementId: "G-M26R027F70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = { uid: 'u'+Date.now(), file: null, room: null, myName: '' };

        const engine = {
            onImage: (el) => {
                state.file = el.files[0];
                if(state.file) document.getElementById('pfp-preview').src = URL.createObjectURL(state.file);
            },
            createLounge: async () => {
                const lName = document.getElementById('in-room').value.trim();
                state.myName = document.getElementById('in-user').value.trim();
                if(!lName || !state.myName) return alert("Fill all details");

                const btn = document.querySelector('.btn-exec');
                btn.innerText = "CONFIGURING CLOUD...";
                btn.disabled = true;

                const code = Math.floor(100000 + Math.random()*900000).toString();
                let pfpUrl = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                if(state.file) {
                    const sRef = ref(storage, `pfps/${code}.jpg`);
                    await uploadBytes(sRef, state.file);
                    pfpUrl = await getDownloadURL(sRef);
                }

                const roomObj = { name: lName, code: code, avatar: pfpUrl, admin: state.uid };
                await setDoc(doc(db, "rooms", code), roomObj);
                engine.openLounge(roomObj);
            },
            openLounge: (room) => {
                state.room = room;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');

                // MAPPING METADATA TO HEADER
                document.getElementById('header-name').innerText = room.name;
                document.getElementById('header-img').src = room.avatar;

                const q = query(collection(db, "rooms", room.code, "messages"), orderBy("ts", "asc"));
                onSnapshot(q, snap => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const isMe = m.uid === state.uid;
                        const div = document.createElement('div');
                        div.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                        div.innerHTML = `<span class="sender-name">${isMe ? 'You' : m.sender}</span>${m.text}`;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            toggleIcon: () => {
                const val = document.getElementById('msg-input').value.trim();
                document.getElementById('action-icon').className = val ? "fas fa-paper-plane" : "fas fa-microphone";
            },
            send: async () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "rooms", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.myName, ts: serverTimestamp()
                });
                inp.value = "";
                engine.toggleIcon();
            }
        };

        window.engine = engine;
    </script>
</body>
</html>
