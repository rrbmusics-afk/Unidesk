<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Student Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body class="bg-[#050608] text-white overflow-hidden">

    <header class="h-16 bg-[#0F1116]/80 backdrop-blur-md border-b border-white/5 flex items-center justify-between px-4 z-50 sticky top-0" onclick="openGroupInfo()">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="groupPfp" src="https://api.dicebear.com/7.x/bottts/svg?seed=Strategy" class="w-10 h-10 rounded-2xl border border-white/10 bg-[#161B22]">
                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-[#0F1116] rounded-full"></div>
            </div>
            <div class="flex flex-col">
                <h3 class="text-[15px] font-bold tracking-tight">Strategy Hub</h3>
                <span class="text-[11px] text-gray-500 uppercase tracking-widest font-medium">#492011 • Secure</span>
            </div>
        </div>
        <div id="adminBadge" class="bg-blue-600/20 text-blue-400 text-[9px] px-2 py-1 rounded-md font-black uppercase border border-blue-500/30">Admin</div>
    </header>

    <div id="reqBanner" class="hidden bg-amber-500 text-black px-4 py-2 flex justify-between items-center text-xs font-bold cursor-pointer animate-pulse" onclick="showRequests()">
        <span><i class="fas fa-user-plus mr-2"></i> NEW JOIN REQUEST</span>
        <i class="fas fa-chevron-right"></i>
    </div>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-4 doodle-bg">
        <div class="flex justify-center">
            <span class="bg-white/5 border border-white/10 text-[10px] px-4 py-1.5 rounded-full text-amber-200/70 uppercase tracking-tighter">
                <i class="fas fa-lock mr-1 text-[8px]"></i> End-to-End Encrypted
            </span>
        </div>
        
        <div class="flex flex-col items-start max-w-[85%]">
            <span class="text-[10px] font-bold text-blue-400 ml-1 mb-1">Alex (Admin)</span>
            <div class="bg-[#1C1F26] p-3 rounded-2xl rounded-tl-none border border-white/5 shadow-xl">
                <p class="text-sm leading-relaxed">Welcome to the Student Lounge! All project files are pinned in the vault.</p>
                <span class="block text-[9px] text-gray-500 mt-1 text-right">10:45 AM</span>
            </div>
        </div>

        <div class="flex flex-col items-end ml-auto max-w-[85%]">
            <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none shadow-lg shadow-blue-900/20">
                <p class="text-sm leading-relaxed text-white">Got it, thanks! I'll check the PDF maker now.</p>
                <div class="flex items-center justify-end gap-1 mt-1">
                    <span class="text-[9px] text-blue-200/60">10:46 AM</span>
                    <i class="fas fa-check-double text-[8px] text-blue-200"></i>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-3 bg-[#0F1116] border-t border-white/5 pb-[env(safe-area-inset-bottom)]">
        <div class="flex items-center gap-2">
            <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-plus-circle text-xl"></i>
            </button>
            <div class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-4 py-2.5">
                <input type="text" id="msgInput" placeholder="Message Strategy Hub..." class="bg-transparent w-full outline-none text-sm placeholder:text-gray-600" oninput="toggleInputMode()">
            </div>
            <button id="actionBtn" class="w-11 h-11 bg-white text-black rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <i id="actionIcon" class="fas fa-microphone"></i>
            </button>
        </div>
    </footer>

</body>
</html>
