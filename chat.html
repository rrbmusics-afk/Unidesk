<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9;
            --u-obsidian: #0B0E11;
            --u-border: rgba(255, 255, 255, 0.08);
            --wa-bg: #0B141A;
            --wa-panel: #202C33;
            --wa-text: #E9EDEF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', sans-serif; background: var(--u-obsidian); color: white; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* --- AUTH SCREEN --- */
        #view-auth { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .glass-card {
            background: rgba(25, 29, 33, 0.95); width: 100%; max-width: 400px;
            padding: 35px; border-radius: 35px; border: 1px solid var(--u-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
        }
        .avatar-circle { width: 110px; height: 110px; margin: -90px auto 30px; position: relative; }
        #avatar-preview { width: 100%; height: 100%; border-radius: 40px; object-fit: cover; border: 4px solid var(--u-obsidian); background: #1c2126; }
        .cam-badge { position: absolute; bottom: -2px; right: -2px; background: var(--u-blue); width: 34px; height: 34px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--u-obsidian); }
        .u-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--u-border); padding: 18px 20px; border-radius: 18px; color: white; font-size: 16px; margin-bottom: 12px; }
        .btn-prime { width: 100%; padding: 20px; border-radius: 18px; background: #fff; color: #000; font-weight: 800; font-size: 15px; margin-top: 20px; border: none; cursor: pointer; }

        /* --- WHATSAPP CHAT SCREEN --- */
        #view-chat { height: 100vh; display: flex; flex-direction: column; background: var(--wa-bg); position: relative; }
        .wa-doodle { 
            position: absolute; inset: 0; opacity: 0.05; pointer-events: none;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            filter: invert(1); z-index: 1;
        }

        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; z-index: 10; gap: 12px; height: 62px; }
        .header-pfp { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .header-info h2 { margin: 0; font-size: 16px; font-weight: 600; color: var(--wa-text); }
        .header-info p { margin: 0; font-size: 12px; color: #8696a0; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; z-index: 2; }
        .wa-bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; color: var(--wa-text); position: relative; }
        .wa-me { align-self: flex-end; background: #005C4B; border-top-right-radius: 0; }
        .wa-them { align-self: flex-start; background: #202C33; border-top-left-radius: 0; }

        .wa-footer { background: var(--wa-panel); padding: 8px 12px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .input-pill { flex: 1; background: #2A3942; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; }
        .input-pill input { background: transparent; border: none; color: white; padding: 10px 0; flex: 1; font-size: 16px; }
        .wa-fab { width: 48px; height: 48px; border-radius: 50%; background: #00a884; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-auth">
            <div class="glass-card">
                <div class="avatar-circle">
                    <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="file-pfp" class="cam-badge"><i class="fas fa-camera"></i></label>
                    <input type="file" id="file-pfp" class="hidden" accept="image/*" onchange="ctrl.onFile(this)">
                </div>

                <input type="text" id="in-user" class="u-input" placeholder="Your Name">
                <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name">
                
                <button id="btn-exec" class="btn-prime" onclick="ctrl.init()">CREATE LOUNGE</button>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="wa-doodle"></div>
            <header>
                <img id="chat-header-img" class="header-pfp">
                <div class="header-info" style="flex:1">
                    <h2 id="chat-header-name">Lounge Name</h2>
                    <p id="chat-header-status">online</p>
                </div>
                <i class="fas fa-ellipsis-v" style="color: #aebac1;"></i>
            </header>

            <div id="chat-flow"></div>

            <div class="wa-footer">
                <div class="input-pill">
                    <input type="text" id="chat-input" placeholder="Message">
                </div>
                <button class="wa-fab" onclick="ctrl.send()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = { uid: 'u'+Date.now(), file: null, room: null, name: '' };

        const ctrl = {
            onFile: (el) => {
                state.file = el.files[0];
                if(state.file) document.getElementById('avatar-preview').src = URL.createObjectURL(state.file);
            },
            init: async () => {
                const loungeName = document.getElementById('in-lounge').value.trim();
                state.name = document.getElementById('in-user').value.trim();
                if(!loungeName || !state.name) return;

                document.getElementById('btn-exec').innerText = "CREATING...";
                const code = Math.floor(100000 + Math.random()*900000).toString();
                let url = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                if(state.file) {
                    const sRef = ref(storage, `pfps/${code}.jpg`);
                    await uploadBytes(sRef, state.file);
                    url = await getDownloadURL(sRef);
                }

                const room = { name: loungeName, code: code, avatar: url, admin: state.uid };
                await setDoc(doc(db, "lounges", code), room);
                ctrl.launch(room);
            },
            launch: (room) => {
                state.room = room;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');

                // SYNC DATA TO CHAT SCREEN
                document.getElementById('chat-header-img').src = room.avatar;
                document.getElementById('chat-header-name').innerText = room.name;
                
                const q = query(collection(db, "lounges", room.code, "messages"), orderBy("ts", "asc"));
                onSnapshot(q, snap => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const div = document.createElement('div');
                        div.className = `wa-bubble ${m.uid === state.uid ? 'wa-me' : 'wa-them'}`;
                        div.innerText = m.text;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            send: async () => {
                const inp = document.getElementById('chat-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "lounges", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.name, ts: serverTimestamp()
                });
                inp.value = "";
            }
        };
        window.ctrl = ctrl;
    </script>
</body>
</html>
