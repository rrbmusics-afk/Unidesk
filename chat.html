<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9; --u-bg: #0B0E11; --u-border: rgba(255,255,255,0.1);
            --wa-bg: #0B141A; --wa-panel: #202C33; --wa-me: #005C4B; --wa-them: #202C33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--u-bg); color: white; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- AUTH SCREEN --- */
        #view-auth { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at top, #1c2126 0%, #0b0e11 100%); }
        .glass-card { background: rgba(25, 29, 33, 0.98); width: 100%; max-width: 380px; padding: 35px; border-radius: 40px; border: 1px solid var(--u-border); box-shadow: 0 40px 100px rgba(0,0,0,0.6); backdrop-filter: blur(20px); text-align: center; }
        
        .tab-box { display: flex; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; margin-bottom: 25px; border: 1px solid var(--u-border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #8E8E93; font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 12px; }
        .tab-btn.active { background: var(--u-blue); color: white; }

        .pfp-preview-wrap { width: 110px; height: 110px; margin: 0 auto 20px auto; position: relative; }
        #auth-pfp-img { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; border: 3px solid var(--u-blue); background: #1c2126; }
        
        .u-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--u-border); padding: 18px; border-radius: 18px; color: white; font-size: 16px; margin-bottom: 12px; text-align: center; }
        .btn-exec { width: 100%; padding: 20px; border-radius: 20px; background: var(--u-blue); color: white; font-weight: 800; font-size: 15px; border: none; cursor: pointer; transition: 0.3s; opacity: 0.3; pointer-events: none; }
        .btn-exec.ready { opacity: 1; pointer-events: auto; box-shadow: 0 10px 20px rgba(45, 127, 249, 0.4); }

        /* --- CHAT VIEW --- */
        #view-chat { height: 100dvh; display: flex; flex-direction: column; background: var(--wa-bg); }
        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; height: 72px; gap: 12px; z-index: 10; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .h-meta h2 { margin: 0; font-size: 17px; }
        .h-id { font-size: 11px; color: var(--u-blue); font-weight: 800; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: var(--wa-bg); opacity: 0.9; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; color: white; position: relative; }
        .bubble-me { align-self: flex-end; background: var(--wa-me); border-top-right-radius: 0; }
        .bubble-them { align-self: flex-start; background: var(--wa-them); border-top-left-radius: 0; }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-auth">
            <div class="glass-card">
                <div class="tab-box">
                    <button id="t-create" class="tab-btn active" onclick="ctrl.tab('create')">CREATE</button>
                    <button id="t-join" class="tab-btn" onclick="ctrl.tab('join')">JOIN</button>
                </div>

                <div id="auth-pfp-area">
                    <div class="pfp-preview-wrap">
                        <img id="auth-pfp-img" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    </div>
                    <input type="file" id="file-pfp" class="hidden" accept="image/*" onchange="ctrl.preview(this)">
                    <label for="file-pfp" style="color:var(--u-blue); font-size:12px; font-weight:800; cursor:pointer; display:block; margin-bottom:15px;">SELECT GROUP PHOTO</label>
                </div>

                <input type="text" id="in-name" class="u-input" placeholder="Your Display Name" oninput="ctrl.val()">
                <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name" oninput="ctrl.val()">
                <input type="text" id="in-code" class="u-input hidden" placeholder="Enter 6-Digit Code" oninput="ctrl.val()">
                
                <button id="btn-go" class="btn-exec" onclick="ctrl.submit()">PROCEED</button>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <header>
                <img id="header-img" class="h-img">
                <div style="flex:1">
                    <h2 id="header-name">Lounge</h2>
                    <span id="header-id" class="h-id"></span>
                </div>
                <i class="fas fa-ellipsis-v"></i>
            </header>
            <div id="chat-flow"></div>
            <footer style="padding:10px; background:var(--wa-panel); display:flex; gap:10px;">
                <input type="text" id="msg-in" style="flex:1; background:#2A3942; border:none; padding:12px; border-radius:20px; color:white;" placeholder="Message">
                <button onclick="ctrl.send()" style="background:#00a884; border:none; width:45px; height:45px; border-radius:50%; color:white;"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = { mode: 'create', uid: 'user_'+Math.random().toString(36).substr(2,5), room: null };

        window.ctrl = {
            tab: (m) => {
                state.mode = m;
                document.getElementById('t-create').classList.toggle('active', m==='create');
                document.getElementById('t-join').classList.toggle('active', m==='join');
                document.getElementById('auth-pfp-area').classList.toggle('hidden', m==='join');
                document.getElementById('in-lounge').classList.toggle('hidden', m==='join');
                document.getElementById('in-code').classList.toggle('hidden', m==='create');
                ctrl.val();
            },
            preview: (el) => {
                if(el.files[0]) document.getElementById('auth-pfp-img').src = URL.createObjectURL(el.files[0]);
            },
            val: () => {
                const name = document.getElementById('in-name').value.trim();
                const lounge = document.getElementById('in-lounge').value.trim();
                const code = document.getElementById('in-code').value.trim();
                const btn = document.getElementById('btn-go');
                
                let isReady = false;
                if(state.mode === 'create') isReady = name.length > 0 && lounge.length > 0;
                else isReady = name.length > 0 && code.length === 6;
                
                btn.classList.toggle('ready', isReady);
            },
            submit: async () => {
                const name = document.getElementById('in-name').value.trim();
                if(state.mode === 'create') {
                    const lName = document.getElementById('in-lounge').value.trim();
                    const code = Math.floor(100000 + Math.random()*900000).toString();
                    let pfpUrl = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                    const file = document.getElementById('file-pfp').files[0];
                    if(file) {
                        const sRef = ref(storage, `rooms/${code}/pfp.jpg`);
                        await uploadBytes(sRef, file);
                        pfpUrl = await getDownloadURL(sRef);
                    }

                    const room = { name: lName, code, avatar: pfpUrl, admin: state.uid };
                    await setDoc(doc(db, "rooms", code), room);
                    ctrl.enter(room, name);
                } else {
                    const code = document.getElementById('in-code').value.trim();
                    const snap = await getDoc(doc(db, "rooms", code));
                    if(snap.exists()) ctrl.enter(snap.data(), name);
                    else alert("Lounge Code Not Found!");
                }
            },
            enter: (room, userName) => {
                state.room = room;
                state.userName = userName;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');
                document.getElementById('header-img').src = room.avatar;
                document.getElementById('header-name').innerText = room.name;
                document.getElementById('header-id').innerText = `ID: #${room.code}`;

                onSnapshot(query(collection(db, "rooms", room.code, "messages"), orderBy("ts", "asc")), s => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    s.forEach(d => {
                        const m = d.data();
                        const isMe = m.uid === state.uid;
                        flow.innerHTML += `<div class="bubble ${isMe?'bubble-me':'bubble-them'}">
                            <b style="font-size:10px; color:#35cd96; display:block;">${isMe?'You':m.sender}</b>${m.text}</div>`;
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            send: async () => {
                const inp = document.getElementById('msg-in');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "rooms", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.userName, ts: serverTimestamp()
                });
                inp.value = "";
            }
        };
    </script>
</body>
</html>
