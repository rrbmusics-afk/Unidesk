<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Chat</title>
    <script type="module">
        // Firebase Setup
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State Management
        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'index.html';

        const loungeId = session.lounge;
        const userName = session.user;
        const isCreator = session.mode === 'create';
        let myRequestId = null;

        // UI Elements
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('header-title').innerText = loungeId;
            if (isCreator) {
                initLounge();
            } else {
                sendJoinRequest();
            }
            listenForMessages();
        });

        // --- CORE FUNCTIONS ---

        async function initLounge() {
            // Create lounge in Firestore if it doesn't exist
            await setDoc(doc(db, "lounges", loungeId), {
                name: loungeId,
                admin: userName,
                createdAt: Date.now()
            }, { merge: true });
            
            document.getElementById('admin-tools').style.display = 'block';
            listenForRequests();
        }

        async function sendJoinRequest() {
            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.style.display = 'flex';

            // Add self to requests
            const reqRef = await addDoc(collection(db, "lounges", loungeId, "requests"), {
                name: userName,
                status: 'pending',
                timestamp: Date.now()
            });
            myRequestId = reqRef.id;

            // Listen for approval
            onSnapshot(doc(db, "lounges", loungeId, "requests", myRequestId), (snap) => {
                if (snap.exists() && snap.data().status === 'accepted') {
                    loadingOverlay.style.display = 'none';
                }
            });
        }

        function listenForRequests() {
            onSnapshot(collection(db, "lounges", loungeId, "requests"), (snapshot) => {
                const list = document.getElementById('request-list');
                const badge = document.getElementById('req-count');
                let count = 0;
                list.innerHTML = '';
                
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (data.status === 'pending') {
                        count++;
                        const li = document.createElement('div');
                        li.className = 'request-item';
                        li.innerHTML = `
                            <span>${data.name} wants to join</span>
                            <button onclick="approveUser('${docSnap.id}')">Accept</button>
                        `;
                        list.appendChild(li);
                    }
                });
                badge.innerText = count;
                badge.style.display = count > 0 ? 'block' : 'none';
            });
        }

        window.approveUser = async (reqId) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status: 'accepted' });
        };

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                text: input.value,
                sender: userName,
                timestamp: Date.now()
            });
            input.value = '';
        }

        function listenForMessages() {
            const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-container');
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const div = document.createElement('div');
                    div.className = `message ${msg.sender === userName ? 'sent' : 'received'}`;
                    div.innerHTML = `<div class="sender-name">${msg.sender}</div>${msg.text}`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.toggleReqPopup = () => {
            const p = document.getElementById('request-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };
        
        window.sendMessage = sendMessage;
    </script>
    <style>
        :root {
            --whatsapp-bg: #0b141a;
            --header-bg: #202c33;
            --msg-sent: #005c4b;
            --msg-received: #202c33;
            --accent: #58a6ff;
        }
        body { margin: 0; background: var(--whatsapp-bg); color: white; font-family: sans-serif; }
        
        /* Header */
        header { background: var(--header-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        
        /* Chat Area */
        #chat-container { height: calc(100vh - 130px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; position: relative; }
        .sent { align-self: flex-end; background: var(--msg-sent); }
        .received { align-self: flex-start; background: var(--msg-received); }
        .sender-name { font-size: 0.7rem; color: var(--accent); margin-bottom: 4px; font-weight: bold; }

        /* Input Area */
        .input-area { position: fixed; bottom: 0; width: 100%; background: var(--header-bg); padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 8px; color: white; outline: none; }
        
        /* Overlay & Popups */
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #request-popup { display: none; position: absolute; top: 60px; right: 10px; background: #2a3942; border-radius: 8px; width: 250px; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .request-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #3b4a54; }
        .req-btn { background: var(--accent); border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: white; }
        #req-count { position: absolute; top: 5px; right: 5px; background: red; font-size: 10px; border-radius: 50%; padding: 2px 6px; }
    </style>
</head>
<body>

    <header>
        <div id="header-title">Lounge Name</div>
        <div id="admin-tools" style="display: none; position: relative;">
            <button class="req-btn" onclick="toggleReqPopup()">🔔</button>
            <span id="req-count">0</span>
            <div id="request-popup">
                <h4 style="margin-bottom: 10px;">Join Requests</h4>
                <div id="request-list"></div>
            </div>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message">
        <button onclick="sendMessage()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">✈️</button>
    </div>

    <div id="loading-overlay">
        <h2>Knocking...</h2>
        <p>Waiting for admin to let you in.</p>
    </div>

</body>
</html>
