<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9;
            --u-obsidian: #0B0E11;
            --u-border: rgba(255, 255, 255, 0.08);
            --wa-bg: #0B141A;
            --wa-panel: #202C33;
            --wa-bubble-me: #005C4B;
            --wa-bubble-them: #202C33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--u-obsidian); color: white; overflow: hidden; }
        .hidden { display: none !important; }

        /* --- AUTH SCREEN --- */
        #view-auth {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            background: radial-gradient(circle at top, #1a1f24 0%, #0b0e11 100%);
        }

        .glass-card {
            background: rgba(25, 29, 33, 0.95); width: 100%; max-width: 380px;
            padding: 35px; border-radius: 40px; border: 1px solid var(--u-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center;
        }

        /* Create/Join Toggle Bar */
        .toggle-bar {
            display: flex; width: 100%; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 4px; margin-bottom: 25px; border: 1px solid var(--u-border);
        }
        .tgl-btn {
            flex: 1; padding: 12px; border: none; background: transparent; color: #8E8E93; font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 12px; transition: 0.3s;
        }
        .tgl-btn.active { background: var(--u-blue); color: white; box-shadow: 0 4px 15px rgba(45, 127, 249, 0.3); }

        .pfp-stage { width: 105px; height: 105px; margin: -90px 0 25px 0; position: relative; }
        #avatar-preview { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; border: 4px solid var(--u-obsidian); background: #1c2126; }
        .cam-badge { position: absolute; bottom: -2px; right: -2px; background: var(--u-blue); width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--u-obsidian); }

        .u-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--u-border); padding: 18px 20px; border-radius: 18px; color: white; font-size: 16px; margin-bottom: 12px; text-align: center; transition: 0.3s; }
        .u-input:focus { border-color: var(--u-blue); background: rgba(255,255,255,0.07); }
        .btn-prime { width: 100%; padding: 20px; border-radius: 20px; background: #fff; color: #000; font-weight: 800; font-size: 15px; border: none; cursor: pointer; margin-top: 10px; }

        /* --- WHATSAPP CHAT SCREEN --- */
        #view-chat { height: 100dvh; display: flex; flex-direction: column; background: var(--wa-bg); position: relative; }
        .wa-doodle { position: absolute; inset: 0; opacity: 0.05; pointer-events: none; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); filter: invert(1); z-index: 1; }

        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; z-index: 10; gap: 12px; height: 72px; }
        .h-pfp { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .h-info { flex: 1; }
        .h-info h2 { margin: 0; font-size: 17px; font-weight: 600; color: white; }
        .h-id { font-size: 11px; color: var(--u-blue); font-weight: 800; letter-spacing: 0.5px; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; z-index: 2; -webkit-overflow-scrolling: touch; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 15px; color: white; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .bubble-me { align-self: flex-end; background: var(--wa-bubble-me); border-top-right-radius: 0; }
        .bubble-them { align-self: flex-start; background: var(--wa-bubble-them); border-top-left-radius: 0; }
        .sender-tag { font-size: 11px; font-weight: 800; color: #35cd96; display: block; margin-bottom: 2px; }

        footer { background: var(--wa-panel); padding: 10px 12px; display: flex; align-items: center; gap: 10px; z-index: 10; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .pill { flex: 1; background: #2A3942; border-radius: 25px; padding: 5px 18px; display: flex; align-items: center; }
        .pill input { background: transparent; border: none; color: white; padding: 10px 0; flex: 1; font-size: 16px; }
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: #00a884; border: none; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-auth">
            <div class="glass-card">
                <div class="toggle-bar">
                    <button id="btn-mode-create" class="tgl-btn active" onclick="ctrl.setMode('create')">CREATE</button>
                    <button id="btn-mode-join" class="tgl-btn" onclick="ctrl.setMode('join')">JOIN</button>
                </div>

                <div class="pfp-stage" id="pfp-container">
                    <img id="avatar-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="pfp-input" class="cam-badge"><i class="fas fa-camera"></i></label>
                    <input type="file" id="pfp-input" class="hidden" accept="image/*" onchange="ctrl.onFile(this)">
                </div>

                <input type="text" id="in-user" class="u-input" placeholder="Your Name">
                
                <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name">
                <input type="text" id="in-code" class="u-input hidden" placeholder="Enter 6-Digit Code">
                
                <button id="btn-submit" class="btn-prime" onclick="ctrl.init()">START COMMUNICATION</button>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="wa-doodle"></div>
            <header>
                <img id="h-img" class="h-pfp">
                <div class="h-info">
                    <h2 id="h-title">Lounge</h2>
                    <span id="h-id-display" class="h-id">ID: #000000</span>
                </div>
                <i class="fas fa-ellipsis-v" style="color: #aebac1;"></i>
            </header>

            <div id="chat-flow"></div>

            <footer>
                <div class="pill">
                    <input type="text" id="msg-input" placeholder="Message" oninput="ctrl.onTyping()">
                </div>
                <button class="send-btn" onclick="ctrl.send()">
                    <i id="action-icon" class="fas fa-microphone"></i>
                </button>
            </footer>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = { mode: 'create', uid: 'u'+Date.now(), file: null, room: null, name: '' };

        const ctrl = {
            setMode: (m) => {
                state.mode = m;
                document.getElementById('btn-mode-create').classList.toggle('active', m==='create');
                document.getElementById('btn-mode-join').classList.toggle('active', m==='join');
                document.getElementById('pfp-container').classList.toggle('hidden', m==='join');
                document.getElementById('in-lounge').classList.toggle('hidden', m==='join');
                document.getElementById('in-code').classList.toggle('hidden', m==='create');
                document.getElementById('btn-submit').innerText = m === 'create' ? 'CREATE LOUNGE' : 'JOIN LOUNGE';
            },
            onFile: (el) => {
                state.file = el.files[0];
                if(state.file) document.getElementById('avatar-preview').src = URL.createObjectURL(state.file);
            },
            init: async () => {
                state.name = document.getElementById('in-user').value.trim();
                if(!state.name) return alert("Please enter your name");

                if(state.mode === 'create') {
                    const lName = document.getElementById('in-lounge').value.trim();
                    if(!lName) return;
                    const code = Math.floor(100000 + Math.random()*900000).toString();
                    let url = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                    if(state.file) {
                        const sRef = ref(storage, `pfps/${code}.jpg`);
                        await uploadBytes(sRef, state.file);
                        url = await getDownloadURL(sRef);
                    }

                    const room = { name: lName, code: code, avatar: url, admin: state.uid };
                    await setDoc(doc(db, "lounges", code), room);
                    ctrl.launch(room);
                } else {
                    const code = document.getElementById('in-code').value.trim();
                    const snap = await getDoc(doc(db, "lounges", code));
                    if(snap.exists()) ctrl.launch(snap.data());
                    else alert("Lounge not found. Check the code.");
                }
            },
            launch: (room) => {
                state.room = room;
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');

                document.getElementById('h-img').src = room.avatar;
                document.getElementById('h-title').innerText = room.name;
                document.getElementById('h-id-display').innerText = `ID: #${room.code}`;
                
                const q = query(collection(db, "lounges", room.code, "messages"), orderBy("ts", "asc"));
                onSnapshot(q, snap => {
                    const flow = document.getElementById('chat-flow');
                    flow.innerHTML = "";
                    snap.forEach(d => {
                        const m = d.data();
                        const isMe = m.uid === state.uid;
                        const div = document.createElement('div');
                        div.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                        div.innerHTML = `<span class="sender-tag">${isMe ? 'You' : m.sender}</span>${m.text}`;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            onTyping: () => {
                const val = document.getElementById('msg-input').value.trim();
                document.getElementById('action-icon').className = val ? "fas fa-paper-plane" : "fas fa-microphone";
            },
            send: async () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "lounges", state.room.code, "messages"), {
                    text: inp.value, uid: state.uid, sender: state.name, ts: serverTimestamp()
                });
                inp.value = "";
                ctrl.onTyping();
            }
        };
        window.ctrl = ctrl;
    </script>
</body>
</html>
