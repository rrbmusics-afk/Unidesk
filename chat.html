<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge | Entrance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --card: #0F1116; --border: rgba(255,255,255,0.08); }
        * { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: #fff; margin: 0; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #050608 100%);
        }
        .glass-card {
            width: 92%; max-width: 380px; background: var(--card); border-radius: 42px;
            padding: 35px; border: 1px solid var(--border); box-shadow: 0 40px 100px rgba(0,0,0,0.7);
        }
        .tab-switcher {
            display: grid; grid-template-columns: 1fr 1fr; background: #000; 
            padding: 5px; border-radius: 22px; margin-bottom: 28px; border: 1px solid var(--border);
        }
        .tab-btn {
            border: none; background: transparent; color: #444; padding: 12px; 
            border-radius: 18px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.4s;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .avatar-zone { width: 105px; height: 105px; margin: 0 auto 28px; position: relative; cursor: pointer; }
        .pfp-frame { 
            width: 100%; height: 100%; border-radius: 35px; border: 2px dashed var(--border); 
            background: #1C1F26; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .pfp-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cam-badge {
            position: absolute; right: -5px; bottom: -5px; background: var(--accent);
            width: 34px; height: 34px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--card);
        }
        .input-stack input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 18px; border-radius: 20px; color: #fff; text-align: center; margin-bottom: 12px; font-size: 15px;
        }
        .action-btn {
            width: 100%; padding: 20px; border-radius: 24px; border: none; background: #14171C; color: #333; 
            font-weight: 800; transition: 0.5s; cursor: not-allowed; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .action-btn.unlocked { background: #fff; color: #000; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="text-center mb-10">
        <h1 class="text-4xl font-black text-[#2D7FF9] italic tracking-tighter uppercase leading-none">Student Lounge</h1>
        <p class="text-[9px] text-gray-600 tracking-[0.5em] font-bold uppercase mt-3">Secure Academic Hub</p>
    </div>

    <div class="glass-card">
        <div class="tab-switcher">
            <button class="tab-btn active" onclick="setMode('create', this)">CREATE</button>
            <button class="tab-btn" onclick="setMode('join', this)">JOIN</button>
        </div>

        <div id="pfp-ui" class="avatar-zone" onclick="document.getElementById('file-up').click()">
            <div class="pfp-frame" id="frame">
                <i class="fas fa-user text-3xl text-[#333]" id="user-icon"></i>
                <img id="preview">
            </div>
            <div class="cam-badge"><i class="fas fa-plus text-xs"></i></div>
            <input type="file" id="file-up" class="hidden" accept="image/*" onchange="loadImg(this)">
        </div>

        <div class="input-stack">
            <input type="text" id="user" placeholder="YOUR NAME" oninput="v()">
            <input type="text" id="lounge" placeholder="LOUNGE NAME" oninput="v()">
            <input type="text" id="code" class="hidden" placeholder="6-DIGIT CODE" maxlength="6" oninput="v()">
        </div>

        <button id="go-btn" class="action-btn" disabled onclick="handleProceed()">
            <span id="btn-txt">INITIALIZE</span>
            <i class="fas fa-bolt-lightning"></i>
        </button>
    </div>

    <script>
        let mode = 'create';
        let imgData = "";

        function setMode(m, el) {
            mode = m;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('pfp-ui').classList.toggle('hidden', m==='join');
            document.getElementById('lounge').classList.toggle('hidden', m==='join');
            document.getElementById('code').classList.toggle('hidden', m==='create');
            document.getElementById('btn-txt').innerText = m === 'create' ? 'INITIALIZE' : 'CONNECT';
            v();
        }

        function loadImg(i) {
            if (i.files && i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    imgData = e.target.result;
                    document.getElementById('preview').src = imgData;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('user-icon').style.display = 'none';
                    document.getElementById('frame').style.borderStyle = 'solid';
                };
                r.readAsDataURL(i.files[0]);
            }
        }

        function v() {
            const u = document.getElementById('user').value.trim();
            const l = document.getElementById('lounge').value.trim();
            const c = document.getElementById('code').value.trim();
            const isOk = (mode === 'create') ? (u && l) : (u && c.length === 6);
            const b = document.getElementById('go-btn');
            b.disabled = !isOk; b.classList.toggle('unlocked', isOk);
        }

        function handleProceed() {
    const name = document.getElementById('user').value.trim();
    const lTitle = document.getElementById('lounge').value.trim();
    // Use entered code if joining, or generate a random one if creating
    const lCode = mode === 'join' ? document.getElementById('code').value.trim() : Math.floor(100000 + Math.random() * 900000).toString();

    localStorage.setItem('user_pfp', imgData);
    localStorage.setItem('user_name', name);
    localStorage.setItem('lounge_title', mode === 'create' ? lTitle : "Student Lounge");
    localStorage.setItem('lounge_code', lCode);

    location.href = 'message.html';
}

    </script>
</body>
</html>
