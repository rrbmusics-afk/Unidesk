<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="screen-home" class="screen active">
        <div class="ae-container">
            <div class="brand">
                <h1>AETHERCORE</h1>
                <p>END-TO-END ENCRYPTED</p>
            </div>

            <div class="tabs">
                <button onclick="switchTab('create')" id="tab-c" class="active">Create</button>
                <button onclick="switchTab('join')" id="tab-j">Join</button>
            </div>

            <div id="panel-create" class="auth-panel">
                <input type="text" id="c-user" placeholder="Your Name" oninput="validateAuth()">
                <input type="text" id="c-group" placeholder="Group Name" oninput="validateAuth()">
                <button id="btn-create" class="btn-locked" onclick="handleCreate()">CREATE ROOM</button>
            </div>

            <div id="panel-join" class="auth-panel hidden">
                <input type="text" id="j-user" placeholder="Your Name" oninput="validateAuth()">
                <input type="text" id="j-code" placeholder="6-Digit Code" oninput="validateAuth()">
                <button id="btn-join" class="btn-locked" onclick="handleJoin()">JOIN ROOM</button>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="screen-chat" class="screen">
        <header class="chat-header">
            <div id="admin-banner" class="hidden" onclick="toggleApprovals(true)">
                <i class="fa-solid fa-bell"></i> PENDING REQUESTS
            </div>
            
            <div class="header-main" onclick="openGroupInfo()">
                <img id="header-pfp" src="" class="pfp-circle">
                <div class="header-text">
                    <h2 id="header-title">---</h2>
                    <span id="header-code">CODE: ---</span>
                </div>
                <div class="header-actions">
                    <i class="fa-solid fa-paperclip" onclick="document.getElementById('doc-input').click()"></i>
                </div>
            </div>
        </header>

        <div id="chat-flow" class="chat-bg">
            <!-- Messages load here -->
        </div>

        <footer class="input-area">
            <div class="input-container">
                <textarea id="msg-input" placeholder="Message..." rows="1" oninput="autoResize(this)"></textarea>
            </div>
            <button id="action-btn" class="action-circle">
                <i id="action-icon" class="fa-solid fa-microphone"></i>
            </button>
        </footer>
    </div>

    <!-- MODAL: GROUP INFO -->
    <div id="modal-info" class="full-modal hidden">
        <div class="modal-header">
            <i class="fa-solid fa-arrow-left" onclick="closeGroupInfo()"></i>
            <span>Group Info</span>
            <i id="admin-delete" class="fa-solid fa-trash hidden" onclick="deleteGroup()"></i>
        </div>
        <div class="modal-body">
            <div class="pfp-section">
                <img id="info-pfp" onclick="viewPfpLarge()">
                <label id="admin-pfp-edit" class="hidden">
                    <i class="fa-solid fa-camera"></i>
                    <input type="file" id="pfp-input" accept="image/*" class="hidden" onchange="updatePfp(this)">
                </label>
            </div>
            <h2 id="info-title">---</h2>
            <p id="info-code-display">---</p>
            
            <div class="member-list-card">
                <h3>PARTICIPANTS</h3>
                <div id="member-list"></div>
            </div>
            
            <button class="btn-leave" onclick="leaveGroup()">Leave Group</button>
        </div>
    </div>

    <!-- MODAL: APPROVALS -->
    <div id="modal-approvals" class="popup-modal hidden">
        <div class="popup-content">
            <h3>Entry Requests</h3>
            <div id="approval-items"></div>
            <button onclick="toggleApprovals(false)">Close</button>
        </div>
    </div>

    <input type="file" id="doc-input" multiple class="hidden" onchange="handleFiles(this)">

    <!-- Firebase SDKs -->
    <script type="module" src="chat.js"></script>
</body>
</html>
