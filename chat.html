<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --card: #0F1116; 
            --border: rgba(255,255,255,0.08); 
            --empty: #1C1F26;
        }

        * { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; margin: 0; min-height: 100dvh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #050608 100%);
        }

        .glass-card {
            width: 92%; max-width: 380px; background: var(--card); border-radius: 42px;
            padding: 35px; border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7); position: relative;
        }

        /* Mode Switcher */
        .tab-switcher {
            display: grid; grid-template-columns: 1fr 1fr; background: #000; 
            padding: 5px; border-radius: 22px; margin-bottom: 28px; border: 1px solid var(--border);
        }

        .tab-btn {
            border: none; background: transparent; color: #444;
            padding: 12px; border-radius: 18px; font-size: 11px;
            font-weight: 800; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1.5px;
        }

        .tab-btn.active { background: var(--accent); color: #fff; box-shadow: 0 8px 20px rgba(45,127,249,0.25); }

        /* Empty Profile UI */
        .avatar-zone {
            width: 105px; height: 105px; margin: 0 auto 28px; position: relative; cursor: pointer;
        }
        
        .pfp-frame { 
            width: 100%; height: 100%; border-radius: 35px; 
            border: 2px dashed var(--border); background: var(--empty);
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s; overflow: hidden;
        }

        .pfp-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .pfp-frame i.user-placeholder { font-size: 32px; color: #333; }

        .cam-badge {
            position: absolute; right: -5px; bottom: -5px; background: var(--accent);
            width: 34px; height: 34px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; border: 4px solid var(--card); font-size: 12px;
        }

        /* Inputs */
        .input-stack input {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            padding: 18px; border-radius: 20px; color: #fff; text-align: center;
            margin-bottom: 12px; font-size: 15px; transition: 0.3s;
        }
        .input-stack input:focus { border-color: var(--accent); background: rgba(45,127,249,0.04); }
        .input-stack input::placeholder { color: #333; font-weight: 500; }

        /* Locked Go-Button */
        .action-btn {
            width: 100%; padding: 20px; border-radius: 24px; border: none;
            background: #14171C; color: #333; font-weight: 800; font-size: 14px;
            margin-top: 15px; transition: 0.5s var(--easing); cursor: not-allowed;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            letter-spacing: 1px;
        }

        .action-btn.unlocked { 
            background: #fff; color: #000; cursor: pointer; 
            box-shadow: 0 15px 35px rgba(255,255,255,0.1); 
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="text-center mb-10">
        <h1 class="text-4xl font-black text-[#2D7FF9] italic tracking-tighter uppercase leading-none">Unidesk</h1>
        <p class="text-[9px] text-gray-600 tracking-[0.5em] font-bold uppercase mt-2">Aethercore Interactive</p>
    </div>

    <div class="glass-card">
        <div class="tab-switcher">
            <button class="tab-btn active" id="tab-create" onclick="setMode('create')">CREATE</button>
            <button class="tab-btn" id="tab-join" onclick="setMode('join')">JOIN</button>
        </div>

        <div id="pfp-trigger" class="avatar-zone" onclick="document.getElementById('file-upload').click()">
            <div class="pfp-frame" id="frame">
                <i class="fas fa-user user-placeholder" id="user-icon"></i>
                <img id="img-preview">
            </div>
            <div class="cam-badge"><i class="fas fa-plus"></i></div>
            <input type="file" id="file-upload" class="hidden" accept="image/*" onchange="loadImg(this)">
        </div>

        <div class="input-stack">
            <input type="text" id="name" placeholder="YOUR NAME" oninput="checkFields()">
            <input type="text" id="l-name" placeholder="LOUNGE NAME" oninput="checkFields()">
            <input type="text" id="l-code" class="hidden" placeholder="6-DIGIT CODE" maxlength="6" oninput="checkFields()">
        </div>

        <button id="go" class="action-btn" disabled onclick="submit()">
            <span id="txt">INITIALIZE</span>
            <i class="fas fa-bolt-lightning"></i>
        </button>
    </div>

    <script>
        let mode = 'create';

        function setMode(m) {
            mode = m;
            document.getElementById('tab-create').classList.toggle('active', m==='create');
            document.getElementById('tab-join').classList.toggle('active', m==='join');
            
            document.getElementById('pfp-trigger').classList.toggle('hidden', m==='join');
            document.getElementById('l-name').classList.toggle('hidden', m==='join');
            document.getElementById('l-code').classList.toggle('hidden', m==='create');
            
            document.getElementById('txt').innerText = m === 'create' ? 'INITIALIZE' : 'CONNECT';
            checkFields();
        }

        function loadImg(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                const preview = document.getElementById('img-preview');
                const icon = document.getElementById('user-icon');
                const frame = document.getElementById('frame');

                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    icon.style.display = 'none';
                    frame.style.borderStyle = 'solid';
                    frame.style.borderColor = 'rgba(255,255,255,0.1)';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkFields() {
            const n = document.getElementById('name').value.trim();
            const ln = document.getElementById('l-name').value.trim();
            const lc = document.getElementById('l-code').value.trim();
            const btn = document.getElementById('go');

            const isOk = (mode === 'create') ? (n && ln) : (n && lc.length === 6);
            
            btn.disabled = !isOk;
            btn.classList.toggle('unlocked', isOk);
        }

        function submit() {
            // Your logic for Firebase room creation or joining
            console.log("Submitting " + mode);
        }
    </script>
</body>
</html>
