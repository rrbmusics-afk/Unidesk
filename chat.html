<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge</title>
</head>
<body>

    <div id="app">
        <!-- VIEW 1: ENTRANCE -->
        <section id="entrance-view" class="view">
            <div class="card">
                <h1>Student Lounge</h1>
                <div class="tabs">
                    <button id="tab-create" class="active" onclick="switchTab('create')">Create</button>
                    <button id="tab-join" onclick="switchTab('join')">Join</button>
                </div>

                <div class="form-group">
                    <input type="text" id="username" placeholder="Your Name">
                    <input type="text" id="lounge-name" placeholder="Lounge Name">
                    <input type="text" id="lounge-code-input" placeholder="Lounge Code" class="hidden">
                    <button id="main-action-btn" onclick="processEntry()">Continue</button>
                </div>
            </div>
        </section>

        <!-- VIEW 2: KNOCKING -->
        <section id="knocking-view" class="view hidden">
            <div class="card text-center">
                <div class="loader-circle"></div>
                <h2>Knocking...</h2>
                <p>Wait for the Admin to approve your request.</p>
            </div>
        </section>

        <!-- VIEW 3: CHAT SPACE -->
        <section id="chat-view" class="view hidden">
            <div class="chat-container">
                <header>
                    <div class="lounge-meta">
                        <h2 id="header-lname">Lounge</h2>
                        <span id="header-lcode">#0000</span>
                    </div>
                    <div id="admin-tools" class="hidden">
                        <button onclick="toggleRequests()" class="req-toggle">
                            Requests (<span id="req-count">0</span>)
                        </button>
                    </div>
                </header>

                <div id="request-drawer" class="hidden"></div>
                <div id="chat-messages"></div>

                <div class="bottom-bar">
                    <input type="text" id="chat-input" placeholder="Message...">
                    <button onclick="handleSend()">Send</button>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
