<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Unidesk Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --ac-black: #000000;
            --ac-white: #FFFFFF;
            --ac-gray-100: #F2F2F7;
            --ac-gray-200: #E5E5EA;
            --ac-gray-500: #8E8E93;
            --whatsapp-green: #008069;
            --bubble-mine: #E7FFDB;
            --bubble-theirs: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Inter', sans-serif; background: var(--ac-gray-100); overflow: hidden; }
        .hidden { display: none !important; }

        /* --- HOME SCREEN --- */
        #view-entrance { height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; }
        .auth-card { width: 90%; max-width: 400px; padding: 40px; text-align: center; }
        .brand-h1 { font-weight: 800; font-size: 44px; letter-spacing: -2px; margin: 0; }
        
        /* Profile Image Upload Circle (WhatsApp Style) */
        .profile-upload-wrapper {
            position: relative; width: 110px; height: 110px; margin: 20px auto 30px;
        }
        #preview-img { 
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover; 
            border: 2px solid var(--ac-gray-200); background: #f9f9f9;
        }
        .upload-icon-overlay {
            position: absolute; bottom: 0; right: 0; background: var(--ac-black);
            color: white; width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
            cursor: pointer; border: 3px solid white;
        }

        .ac-input {
            width: 100%; padding: 16px; margin: 8px 0; border: 1.5px solid var(--ac-gray-200);
            border-radius: 14px; font-size: 16px; font-weight: 500;
        }
        .btn-action {
            width: 100%; padding: 18px; border: none; border-radius: 14px;
            background: var(--ac-black); color: #fff; font-weight: 700;
            margin-top: 20px; cursor: pointer; transition: 0.3s;
        }
        .btn-action:disabled { opacity: 0.2; }

        /* --- CHAT VIEW --- */
        #view-chat { height: 100vh; display: flex; flex-direction: column; background: #E5DDD5; position: relative; }
        .chat-doodle { 
            position: absolute; inset: 0; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            opacity: 0.06; pointer-events: none; 
        }

        header {
            background: #fff; padding: 10px 16px; display: flex; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 10;
        }
        .group-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 12px; }
        .header-meta h2 { margin: 0; font-size: 16px; font-weight: 700; }
        .header-meta p { margin: 0; font-size: 11px; color: var(--ac-gray-500); }

        #msg-flow { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 2; }
        .bubble {
            padding: 8px 12px; border-radius: 14px; font-size: 15px; max-width: 80%;
            position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }
        .mine { align-self: flex-end; background: var(--bubble-mine); border-top-right-radius: 2px; }
        .theirs { align-self: flex-start; background: var(--bubble-theirs); border-top-left-radius: 2px; }

        .bottom-shelf { background: #F0F2F5; padding: 10px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .input-container { flex: 1; background: #fff; border-radius: 24px; padding: 4px 15px; display: flex; align-items: center; }
        .input-container input { flex: 1; border: none; padding: 10px 0; font-size: 16px; }
        .circle-action { width: 45px; height: 45px; border-radius: 50%; background: var(--whatsapp-green); color: #fff; border: none; }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-entrance">
            <div class="auth-card">
                <h1 class="brand-h1">UNIDESK</h1>
                <p style="color: gray; font-size: 12px; letter-spacing: 2px; font-weight: 600; margin-bottom: 30px;">STUDENT LOUNGE</p>
                
                <div id="avatar-container" class="profile-upload-wrapper">
                    <img id="preview-img" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="field-avatar" class="upload-icon-overlay">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="field-avatar" accept="image/*" class="hidden" onchange="ui.previewAvatar(this)">
                </div>

                <div id="auth-fields">
                    <input type="text" id="field-user" class="ac-input" placeholder="Your Display Name">
                    <input type="text" id="field-room-name" class="ac-input" placeholder="Lounge Name">
                    <input type="text" id="field-room-code" class="ac-input hidden" placeholder="Enter 6-Digit Code">
                    
                    <div style="display:flex; gap: 10px; margin-top: 20px;">
                        <button id="tab-create" style="flex:1; border:none; background:#eee; padding:10px; border-radius:10px; font-weight:700;" onclick="ui.setMode('create')">CREATE</button>
                        <button id="tab-join" style="flex:1; border:none; background:#eee; padding:10px; border-radius:10px; font-weight:700;" onclick="ui.setMode('join')">JOIN</button>
                    </div>

                    <button id="btn-submit" class="btn-action" onclick="core.init()">START COMMUNICATION</button>
                </div>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="chat-doodle"></div>
            <header>
                <img id="chat-avatar" class="group-img" src="">
                <div class="header-meta">
                    <h2 id="chat-name-display">Lounge Name</h2>
                    <p id="chat-code-display">#000000</p>
                </div>
            </header>

            <div id="msg-flow"></div>

            <div class="bottom-shelf">
                <div class="input-container">
                    <input type="text" id="msg-input" placeholder="Message">
                    <i class="fas fa-paperclip" style="color: gray;"></i>
                </div>
                <button class="circle-action" onclick="core.sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const state = {
            mode: 'create',
            uid: 'u' + Math.random().toString(36).substr(2, 9),
            activeRoom: null,
            selectedFile: null
        };

        const ui = {
            setMode: (m) => {
                state.mode = m;
                document.getElementById('field-room-name').classList.toggle('hidden', m === 'join');
                document.getElementById('avatar-container').classList.toggle('hidden', m === 'join');
                document.getElementById('field-room-code').classList.toggle('hidden', m === 'create');
            },
            previewAvatar: (input) => {
                if (input.files && input.files[0]) {
                    state.selectedFile = input.files[0];
                    const reader = new FileReader();
                    reader.onload = e => document.getElementById('preview-img').src = e.target.result;
                    reader.readAsDataURL(input.files[0]);
                }
            }
        };

        const core = {
            init: async () => {
                const userName = document.getElementById('field-user').value;
                const roomName = document.getElementById('field-room-name').value;
                const code = state.mode === 'create' ? Math.floor(100000 + Math.random() * 900000).toString() : document.getElementById('field-room-code').value;

                if (state.mode === 'create') {
                    let downloadURL = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";
                    
                    // --- STORAGE UPLOAD LOGIC ---
                    if (state.selectedFile) {
                        const storageRef = ref(storage, `lounges/${code}/profile.jpg`);
                        await uploadBytes(storageRef, state.selectedFile);
                        downloadURL = await getDownloadURL(storageRef);
                    }

                    const roomData = {
                        name: roomName,
                        code: code,
                        admin: state.uid,
                        avatar: downloadURL,
                        members: [state.uid]
                    };
                    await setDoc(doc(db, "lounges", code), roomData);
                    core.launchChat(roomData, userName);
                } else {
                    const snap = await getDoc(doc(db, "lounges", code));
                    if(snap.exists()) core.launchChat(snap.data(), userName);
                }
            },
            launchChat: (room, userName) => {
                state.activeRoom = room;
                state.userName = userName;
                document.getElementById('view-entrance').classList.add('hidden');
                document.getElementById('view-chat').classList.remove('hidden');
                document.getElementById('chat-name-display').innerText = room.name;
                document.getElementById('chat-code-display').innerText = `#${room.code}`;
                document.getElementById('chat-avatar').src = room.avatar;
                core.listenMessages();
            },
            listenMessages: () => {
                const q = query(collection(db, "lounges", state.activeRoom.code, "messages"), orderBy("ts", "asc"));
                onSnapshot(q, snap => {
                    const flow = document.getElementById('msg-flow');
                    flow.innerHTML = '';
                    snap.forEach(d => {
                        const m = d.data();
                        const div = document.createElement('div');
                        div.className = `bubble ${m.uid === state.uid ? 'mine' : 'theirs'}`;
                        div.innerHTML = `<small style="font-weight:700; display:block; color:#008069">${m.sender}</small>${m.text}`;
                        flow.appendChild(div);
                    });
                    flow.scrollTop = flow.scrollHeight;
                });
            },
            sendMessage: async () => {
                const inp = document.getElementById('msg-input');
                if(!inp.value.trim()) return;
                await addDoc(collection(db, "lounges", state.activeRoom.code, "messages"), {
                    text: inp.value,
                    uid: state.uid,
                    sender: state.userName,
                    ts: serverTimestamp()
                });
                inp.value = '';
            }
        };

        window.ui = ui;
        window.core = core;
    </script>
</body>
</html>
