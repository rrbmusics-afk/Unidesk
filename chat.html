<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aether | Personal Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --wa-green: #25D366; --bg-main: #0b141a; --bubble-me: #005c4b; --bubble-them: #202c33; --border: rgba(255,255,255,0.08); }
        
        html, body { 
            background: var(--bg-main); color: #e9edef; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        }
        
        .view-layer { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--bg-main); }
        #home-view { display: flex; z-index: 100; overflow-y: auto; padding: 40px 24px; }
        #main-workspace { z-index: 50; }
        
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
        .nav-bar { height: 64px; background: #202c33; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        
        .bubble { max-width: 82%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; }
        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .room-item { background: #111b21; border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        .action-btn { background: var(--wa-green); color: #0b141a; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #info-overlay { display: none; position: fixed; inset: 0; background: #0b141a; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <!-- 1. ENTRY VIEW -->
    <div id="home-view" class="view-layer">
        <div class="w-full max-w-sm mx-auto space-y-8">
            <div class="text-center">
                <h1 class="text-5xl font-black text-blue-500 italic tracking-tighter">AETHER</h1>
                <p class="text-[10px] font-bold text-gray-500 tracking-[0.4em] uppercase mt-1">My Lounges</p>
            </div>
            
            <div class="glass-card space-y-4">
                <input type="text" id="userName" placeholder="Your Name" class="w-full bg-[#111b21] p-4 rounded-xl text-center outline-none text-white font-bold border border-white/5">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="handleAction('create')" class="bg-white/5 p-4 rounded-xl font-bold text-[10px] uppercase">New Room</button>
                    <button onclick="handleAction('join')" class="bg-blue-600 p-4 rounded-xl font-bold text-[10px] uppercase">Join Code</button>
                </div>
                <div id="extra-fields" class="hidden space-y-3 pt-4 border-t border-white/5">
                    <input type="text" id="groupName" placeholder="Group Name" class="hidden w-full bg-[#0b141a] p-4 rounded-xl text-center outline-none text-white font-bold border border-blue-500/20">
                    <input type="text" id="roomCode" placeholder="Code" class="hidden w-full bg-[#0b141a] p-4 rounded-xl text-center outline-none text-blue-400 font-mono font-bold uppercase border border-blue-500/20">
                    <button id="finalSubmit" class="w-full bg-blue-600 p-4 rounded-xl font-black text-[11px] uppercase">Confirm</button>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-2">Recents</h3>
                <div id="my-rooms-list" class="space-y-2">
                    <!-- Only joined/created rooms will appear here -->
                </div>
            </div>
        </div>
    </div>

    <!-- 2. KNOCKING VIEW -->
    <div id="wait-view" class="fixed inset-0 z-[200] hidden flex-col items-center justify-center bg-[#0b141a]">
        <div class="w-16 h-16 bg-blue-600 rounded-full animate-pulse mb-4 flex items-center justify-center text-xl">🚪</div>
        <h2 class="text-xl font-black italic">KNOCKING...</h2>
        <button onclick="location.reload()" class="mt-6 text-gray-500 text-[10px] font-bold uppercase">Cancel</button>
    </div>

    <!-- 3. CHAT VIEW -->
    <div id="main-workspace" class="view-layer">
        <header class="nav-bar" onclick="openInfo()">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-black text-white" id="header-initial">?</div>
                <div class="flex flex-col">
                    <span id="header-title" class="text-sm font-black truncate max-w-[150px]">...</span>
                    <span id="sub-count" class="text-[9px] text-gray-400 font-bold uppercase">...</span>
                </div>
            </div>
            <button id="admin-req-pill" onclick="event.stopPropagation(); toggleReqs(true)" class="hidden bg-orange-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black animate-bounce">REQUESTS</button>
        </header>

        <main id="chatBox"></main>

        <footer class="footer">
            <div class="input-pill"><input type="text" id="msgInput" placeholder="Message..." class="w-full bg-transparent outline-none text-sm text-white"></div>
            <button onclick="sendMsg()" class="action-btn">➤</button>
        </footer>
    </div>

    <!-- INFO / MEMBERS OVERLAY -->
    <div id="info-overlay">
        <div class="p-4 flex items-center bg-[#202c33] justify-between">
            <button onclick="document.getElementById('info-overlay').style.display='none'" class="text-blue-500 font-bold text-sm">Back</button>
            <span class="font-black text-xs uppercase tracking-widest">Details</span>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
            <div id="members-list" class="space-y-2"></div>
        </div>
        <div class="p-6 bg-[#111b21] space-y-2">
            <button id="del-btn" onclick="deleteRoom()" class="hidden w-full bg-red-600/10 text-red-500 p-4 rounded-xl text-[10px] font-black uppercase">Delete Group</button>
            <button id="leave-btn" onclick="leaveRoom()" class="hidden w-full bg-white/5 p-4 rounded-xl text-[10px] font-black uppercase">Leave Group</button>
        </div>
    </div>

    <!-- REQUESTS OVERLAY -->
    <div id="req-overlay" class="fixed inset-0 bg-black/95 z-[2000] hidden flex-col justify-center p-6">
        <div class="bg-[#202c33] rounded-3xl overflow-hidden max-w-sm mx-auto w-full">
            <div id="req-list" class="p-4 space-y-2"></div>
            <button onclick="toggleReqs(false)" class="w-full p-4 text-[10px] font-bold text-gray-500 uppercase">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Persistent User ID for this browser
        let myId = localStorage.getItem('ae_id') || "USR-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('ae_id', myId);

        let myRooms = JSON.parse(localStorage.getItem('ae_rooms') || "[]");
        let currentUserName = localStorage.getItem('ae_name') || "";
        document.getElementById('userName').value = currentUserName;

        // Render "My Rooms" list from LocalStorage
        function renderMyRooms() {
            const listDiv = document.getElementById('my-rooms-list');
            listDiv.innerHTML = myRooms.length ? '' : '<div class="text-center py-4 text-gray-600 text-xs italic">No joined rooms yet.</div>';
            
            myRooms.forEach(code => {
                onSnapshot(doc(db, "rooms", code), (s) => {
                    if(!s.exists()) {
                        // Remove from local list if room was deleted in DB
                        myRooms = myRooms.filter(c => c !== code);
                        localStorage.setItem('ae_rooms', JSON.stringify(myRooms));
                        renderMyRooms();
                        return;
                    }
                    const data = s.data();
                    const elId = `room-${code}`;
                    let el = document.getElementById(elId);
                    if(!el) {
                        el = document.createElement('div');
                        el.id = elId;
                        el.className = 'room-item';
                        listDiv.appendChild(el);
                    }
                    el.onclick = () => { currentUserName ? enterRoom(code) : alert("Enter your name first"); };
                    el.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-black">${data.name[0]}</div>
                            <span class="text-xs font-black text-white">${data.name}</span>
                        </div>
                        <span class="text-[9px] font-mono text-blue-500">${code}</span>
                    `;
                });
            });
        }
        renderMyRooms();

        window.handleAction = (mode) => {
            currentUserName = document.getElementById('userName').value.trim();
            if(!currentUserName) return alert("Enter name first");
            localStorage.setItem('ae_name', currentUserName);
            document.getElementById('extra-fields').classList.remove('hidden');
            if(mode === 'create') {
                document.getElementById('groupName').classList.remove('hidden');
                document.getElementById('roomCode').classList.add('hidden');
                document.getElementById('finalSubmit').onclick = createRoom;
            } else {
                document.getElementById('roomCode').classList.remove('hidden');
                document.getElementById('groupName').classList.add('hidden');
                document.getElementById('finalSubmit').onclick = joinRoom;
            }
        };

        async function createRoom() {
            const gName = document.getElementById('groupName').value.trim() || "Aether Lounge";
            const code = Math.random().toString(36).substr(2, 6).toUpperCase();
            await setDoc(doc(db, "rooms", code), {
                name: gName, admin: myId, members: [{id: myId, name: currentUserName}], memberIds: [myId], pending: [], msgs: []
            });
            saveRoomLocal(code);
            enterRoom(code);
        }

        async function joinRoom() {
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if(!snap.exists()) return alert("Room not found");
            
            if(snap.data().memberIds.includes(myId)) return enterRoom(code);

            await updateDoc(ref, { pending: arrayUnion({ id: myId, name: currentUserName }) });
            document.getElementById('wait-view').classList.remove('hidden');
            
            const unsub = onSnapshot(ref, (s) => {
                if(s.exists() && s.data().memberIds.includes(myId)) { 
                    unsub(); 
                    document.getElementById('wait-view').classList.add('hidden');
                    saveRoomLocal(code);
                    enterRoom(code); 
                }
            });
        }

        function saveRoomLocal(code) {
            if(!myRooms.includes(code)) {
                myRooms.push(code);
                localStorage.setItem('ae_rooms', JSON.stringify(myRooms));
            }
        }

        function enterRoom(code) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('main-workspace').style.display = 'flex';
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                if(!s.exists()) { location.reload(); return; }
                const data = s.data();
                const isAdmin = data.admin === myId;
                
                document.getElementById('header-title').innerText = data.name;
                document.getElementById('header-initial').innerText = data.name[0];
                document.getElementById('sub-count').innerText = `${data.memberIds.length} Members • ${code}`;

                document.getElementById('del-btn').style.display = isAdmin ? 'block' : 'none';
                document.getElementById('leave-btn').style.display = isAdmin ? 'none' : 'block';

                if(isAdmin) {
                    const p = data.pending || [];
                    document.getElementById('admin-req-pill').style.display = p.length > 0 ? 'block' : 'none';
                    document.getElementById('req-list').innerHTML = p.map(u => `
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl">
                            <span class="text-sm font-bold">${u.name}</span>
                            <button onclick="approve('${code}','${u.id}','${u.name}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-black">ACCEPT</button>
                        </div>
                    `).join('');
                }

                document.getElementById('members-list').innerHTML = data.members.map(m => `
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl border border-white/5">
                        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-xs font-black">${m.name[0]}</div>
                        <span class="text-sm font-bold">${m.name} ${m.id === data.admin ? '👑' : ''}</span>
                    </div>
                `).join('');

                const box = document.getElementById('chatBox');
                box.innerHTML = (data.msgs || []).map(m => `
                    <div class="bubble ${m.uid === myId ? 'bubble-me' : 'bubble-them'}">
                        ${m.uid !== myId ? `<div class="text-[9px] text-blue-400 font-black uppercase mb-1">${m.uName}</div>` : ''}
                        <div class="text-sm leading-tight">${m.text}</div>
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            });

            window.sendMsg = async () => {
                const inp = document.getElementById('msgInput');
                if(!inp.value.trim()) return;
                await updateDoc(doc(db, "rooms", code), { msgs: arrayUnion({ uid: myId, uName: currentUserName, text: inp.value }) });
                inp.value = "";
            };

            window.approve = async (c, id, name) => {
                await updateDoc(doc(db, "rooms", c), { pending: arrayRemove({ id, name }), members: arrayUnion({ id, name }), memberIds: arrayUnion(id) });
            };

            window.deleteRoom = async () => { if(confirm("Delete room?")) await deleteDoc(doc(db, "rooms", code)); };
            window.leaveRoom = async () => {
                if(confirm("Leave group?")) {
                    const snap = await getDoc(doc(db, "rooms", code));
                    const me = snap.data().members.find(m => m.id === myId);
                    await updateDoc(doc(db, "rooms", code), { members: arrayRemove(me), memberIds: arrayRemove(myId) });
                    myRooms = myRooms.filter(c => c !== code);
                    localStorage.setItem('ae_rooms', JSON.stringify(myRooms));
                    location.reload();
                }
            };
        }

        window.openInfo = () => document.getElementById('info-overlay').style.display = 'flex';
        window.toggleReqs = (show) => document.getElementById('req-overlay').style.display = show ? 'flex' : 'none';
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
