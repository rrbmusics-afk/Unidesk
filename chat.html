<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Secure Node</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --accent: #2D7FF9;
            --bg: #040507;
            --card: #0D1117;
            --border: rgba(255, 255, 255, 0.07);
            --text-dim: #94A3B8;
            --safe-top: env(safe-area-inset-top);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
        }

        body { 
            background: var(--bg);
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* High-fidelity background mesh */
        .mesh {
            position: fixed; inset: 0;
            background: 
                radial-gradient(at 0% 0%, rgba(45, 127, 249, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(123, 97, 255, 0.08) 0px, transparent 50%);
            z-index: -1;
        }

        /* Mobile Wrapper */
        .wrapper {
            width: 100%;
            max-width: 440px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            padding-top: calc(40px + var(--safe-top));
        }

        /* Header */
        header { text-align: center; margin-bottom: 48px; }
        .brand { font-size: 34px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 8px; }
        .status-tag { 
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(45, 127, 249, 0.1); color: var(--accent);
            padding: 6px 14px; border-radius: 100px; font-size: 11px; font-weight: 800;
            letter-spacing: 1px; border: 1px solid rgba(45, 127, 249, 0.2);
        }

        /* Premium Module */
        .auth-module {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 32px;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Mode Switcher (Join/Create) */
        .mode-nav {
            display: flex; background: rgba(0,0,0,0.3);
            border-radius: 20px; padding: 5px; margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            flex: 1; border: none; background: transparent; color: var(--text-dim);
            padding: 14px; border-radius: 16px; font-weight: 700; font-size: 13px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer;
        }

        .mode-btn.active {
            background: #fff; color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Avatar Conducter */
        .avatar-wrap {
            width: 120px; height: 120px; margin: 0 auto 30px;
            position: relative; cursor: pointer;
        }

        .avatar-img {
            width: 100%; height: 100%; border-radius: 44px;
            object-fit: cover; border: 2px solid var(--border);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-badge {
            position: absolute; bottom: -6px; right: -6px;
            background: var(--accent); width: 36px; height: 36px;
            border-radius: 14px; border: 4px solid var(--card);
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        /* Inputs */
        .input-group { margin-bottom: 16px; }
        .prime-input {
            width: 100%; background: rgba(255,255,255,0.02);
            border: 1px solid var(--border); padding: 20px 24px;
            border-radius: 22px; color: #fff; font-size: 16px;
            transition: 0.3s; text-align: left;
        }

        .prime-input:focus {
            border-color: var(--accent); background: rgba(45, 127, 249, 0.03);
            outline: none; box-shadow: 0 0 0 5px rgba(45, 127, 249, 0.1);
        }

        /* Action Button */
        .launch-btn {
            width: 100%; padding: 22px; border-radius: 24px;
            border: none; background: #1A1F26; color: #3A414A;
            font-weight: 800; font-size: 16px; margin-top: 16px;
            transition: 0.5s; pointer-events: none;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .launch-btn.ready {
            background: #fff; color: #000;
            pointer-events: auto; cursor: pointer;
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }

        .launch-btn:active { transform: scale(0.97); }

        /* Knocking State */
        .knock-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .sonar {
            width: 80px; height: 80px; background: var(--accent);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 0 40px rgba(45, 127, 249, 0.4);
        }

        .sonar::after {
            content: ''; position: absolute; inset: -10px; border: 2px solid var(--accent);
            border-radius: 50%; animation: sonar-pulse 2s infinite;
        }

        @keyframes sonar-pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="mesh"></div>

    <div class="wrapper" id="home-view">
        <header>
            <h1 class="brand">AETHERCORE</h1>
            <div class="status-tag"><i class="fas fa-circle" style="font-size: 6px;"></i> ENCRYPTION ACTIVE</div>
        </header>

        <main class="auth-module">
            <div class="mode-nav">
                <button class="mode-btn active" id="btn-create" onclick="setMode('create')">CREATE</button>
                <button class="mode-btn" id="btn-join" onclick="setMode('join')">JOIN</button>
            </div>

            <div id="pfp-conductor">
                <div class="avatar-wrap" onclick="document.getElementById('file-input').click()">
                    <img id="avatar-img" class="avatar-img" src="https://ui-avatars.com/api/?background=11141B&color=64748B&name=?">
                    <div class="avatar-badge"><i class="fas fa-camera"></i></div>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*" onchange="preview(this)">
            </div>

            <div class="input-group">
                <input type="text" id="in-name" class="prime-input" placeholder="Display Name" oninput="validate()">
            </div>

            <div class="input-group" id="lounge-box">
                <input type="text" id="in-lounge" class="prime-input" placeholder="Lounge Name" oninput="validate()">
            </div>

            <div class="input-group hidden" id="code-box">
                <input type="text" id="in-code" class="prime-input" placeholder="6-Digit Access Code" maxlength="6" oninput="validate()">
            </div>

            <button id="main-btn" class="launch-btn" onclick="execute()">
                <span>INITIALIZE NODE</span>
                <i class="fas fa-chevron-right"></i>
            </button>
        </main>

        <footer style="margin-top: auto; text-align: center; padding: 20px;">
            <p style="font-size: 10px; color: #334155; font-weight: 700; letter-spacing: 2px;">END-TO-END QUANTUM SECURE</p>
        </footer>
    </div>

    <div id="knock-screen" class="knock-screen hidden">
        <div class="sonar"><i class="fas fa-fingerprint" style="font-size: 32px; color: #fff;"></i></div>
        <h2 style="margin-top: 40px; font-weight: 800; letter-spacing: 1px;">KNOCKING...</h2>
        <p style="color: var(--text-dim); font-size: 14px; margin-top: 10px;">Awaiting node admin approval</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let mode = 'create';
        const myUID = 'AC-' + Math.random().toString(36).substr(2, 6).toUpperCase();

        window.setMode = (m) => {
            mode = m;
            document.getElementById('btn-create').classList.toggle('active', m === 'create');
            document.getElementById('btn-join').classList.toggle('active', m === 'join');
            document.getElementById('pfp-conductor').classList.toggle('hidden', m === 'join');
            document.getElementById('lounge-box').classList.toggle('hidden', m === 'join');
            document.getElementById('code-box').classList.toggle('hidden', m === 'create');
            validate();
        };

        window.preview = (el) => {
            if(el.files[0]) document.getElementById('avatar-img').src = URL.createObjectURL(el.files[0]);
        };

        window.validate = () => {
            const n = document.getElementById('in-name').value.trim();
            const l = document.getElementById('in-lounge').value.trim();
            const c = document.getElementById('in-code').value.trim();
            const ready = (mode === 'create') ? (n && l) : (n && c.length === 6);
            document.getElementById('main-btn').classList.toggle('ready', ready);
        };

        window.execute = async () => {
            const name = document.getElementById('in-name').value.trim();
            const btn = document.getElementById('main-btn');
            btn.innerHTML = `<i class="fas fa-sync fa-spin"></i> GENERATING LINK...`;

            if(mode === 'create') {
                const roomCode = Math.floor(100000 + Math.random() * 900000).toString();
                let pfp = "https://ui-avatars.com/api/?background=2D7FF9&color=fff&name=" + name;
                
                const file = document.getElementById('file-input').files[0];
                if(file) {
                    const sRef = ref(storage, `rooms/${roomCode}/avatar.jpg`);
                    await uploadBytes(sRef, file);
                    pfp = await getDownloadURL(sRef);
                }

                await setDoc(doc(db, "rooms", roomCode), {
                    name: document.getElementById('in-lounge').value,
                    code: roomCode, avatar: pfp, admin: myUID
                });

                location.href = `page.html?code=${roomCode}&uid=${myUID}&name=${encodeURIComponent(name)}`;
            } else {
                const roomCode = document.getElementById('in-code').value;
                const snap = await getDoc(doc(db, "rooms", roomCode));
                
                if(!snap.exists()) {
                    alert("Invalid Node Identifier");
                    btn.innerHTML = `<span>INITIALIZE NODE</span><i class="fas fa-chevron-right"></i>`;
                    return;
                }

                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('knock-screen').classList.remove('hidden');

                const reqRef = doc(db, "rooms", roomCode, "requests", myUID);
                await setDoc(reqRef, { name, uid: myUID });

                onSnapshot(reqRef, (s) => {
                    if(!s.exists()) {
                        location.href = `page.html?code=${roomCode}&uid=${myUID}&name=${encodeURIComponent(name)}`;
                    }
                });
            }
        };
    </script>
</body>
</html>
