<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --u-blue: #2D7FF9;
            --u-deep-black: #0B0E11;
            --u-glass-black: rgba(21, 25, 28, 0.95);
            --u-border: rgba(255, 255, 255, 0.08);
            --u-text-dim: #8E8E93;
            --wa-green: #00A884;
            --wa-bubble-mine: #005C4B;
            --wa-bubble-theirs: #202C33;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', sans-serif; background: var(--u-deep-black); 
            color: #fff; overflow: hidden;
        }

        .hidden { display: none !important; }

        /* --- THEME: HIGH-END OBSIDIAN ENTRANCE --- */
        #view-entrance {
            height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 30px;
            background: radial-gradient(circle at top, #1a1f24 0%, #0b0e11 100%);
        }

        .brand-header { margin-bottom: 50px; text-align: center; }
        .brand-logo { 
            font-weight: 800; font-size: 52px; font-style: italic; 
            color: var(--u-blue); margin: 0; letter-spacing: -3px;
            filter: drop-shadow(0 0 15px rgba(45, 127, 249, 0.3));
        }
        .brand-sub { font-size: 11px; letter-spacing: 4px; color: var(--u-text-dim); font-weight: 700; }

        .auth-container {
            width: 100%; max-width: 400px;
            background: var(--u-glass-black);
            border: 1px solid var(--u-border);
            border-radius: 32px; padding: 35px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }

        /* Profile Uploader */
        .pfp-stage { width: 120px; height: 120px; margin: -80px auto 30px; position: relative; }
        #pfp-preview { 
            width: 100%; height: 100%; border-radius: 40px; object-fit: cover; 
            border: 4px solid var(--u-deep-black); background: #1c2126;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cam-btn {
            position: absolute; bottom: -5px; right: -5px; background: var(--u-blue);
            width: 36px; height: 36px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; border: 3px solid var(--u-deep-black);
        }

        .u-input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--u-border);
            padding: 18px 22px; border-radius: 18px; color: white; font-size: 16px;
            margin-bottom: 12px; transition: 0.3s;
        }
        .u-input:focus { border-color: var(--u-blue); background: rgba(255,255,255,0.08); outline: none; }

        .action-grid { display: flex; gap: 10px; margin-top: 10px; }
        .mode-btn { 
            flex: 1; padding: 14px; border-radius: 14px; border: 1px solid var(--u-border);
            background: transparent; color: var(--u-text-dim); font-weight: 700; cursor: pointer;
        }
        .mode-btn.active { background: var(--u-blue); color: white; border-color: var(--u-blue); }

        .btn-main {
            width: 100%; padding: 20px; border-radius: 20px; background: #fff;
            color: #000; font-weight: 800; font-size: 15px; margin-top: 25px;
            cursor: pointer; border: none; letter-spacing: 1px; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.98); }

        /* --- THEME: WHATSAPP DARK PRODUCTION CHAT --- */
        #view-chat { 
            height: 100vh; display: flex; flex-direction: column; 
            background: #0B141A; position: relative; 
        }
        .wa-doodle { 
            position: absolute; inset: 0; opacity: 0.05; pointer-events: none;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            filter: invert(1); z-index: 1;
        }

        header {
            background: #202C33; padding: 10px 16px; display: flex; 
            align-items: center; z-index: 10; gap: 12px;
        }
        .chat-pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-meta h2 { margin: 0; font-size: 16px; font-weight: 600; }
        .chat-meta p { margin: 0; font-size: 12px; color: var(--u-text-dim); }

        #msg-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; z-index: 2; }
        .msg-box { max-width: 85%; padding: 6px 10px 8px; border-radius: 8px; font-size: 15px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .mine { align-self: flex-end; background: var(--wa-bubble-mine); color: #E9EDEF; border-top-right-radius: 0; margin-bottom: 4px; }
        .theirs { align-self: flex-start; background: var(--wa-bubble-theirs); color: #E9EDEF; border-top-left-radius: 0; margin-bottom: 4px; }
        
        .sender-name { font-size: 12px; font-weight: 700; color: #ffbc38; margin-bottom: 2px; }

        .wa-input-bar { background: #202C33; padding: 10px; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .wa-input-wrap { flex: 1; background: #2A3942; border-radius: 24px; padding: 5px 15px; display: flex; align-items: center; }
        .wa-input-wrap input { background: transparent; border: none; color: white; padding: 10px 0; flex: 1; font-size: 16px; }
        
        .wa-action-btn { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--wa-green); 
            border: none; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="app">
        <section id="view-entrance">
            <div class="brand-header">
                <h1 class="brand-logo">UNIDESK</h1>
                <p class="brand-sub">AETHERCORE ECOSYSTEM</p>
            </div>

            <div class="auth-container">
                <div id="pfp-module" class="pfp-stage">
                    <img id="pfp-preview" src="https://cdn-icons-png.flaticon.com/512/9131/9131529.png">
                    <label for="pfp-file" class="cam-btn"><i class="fas fa-camera"></i></label>
                    <input type="file" id="pfp-file" class="hidden" accept="image/*">
                </div>

                <div class="action-grid">
                    <button id="mode-create" class="mode-btn active">CREATE</button>
                    <button id="mode-join" class="mode-btn">JOIN</button>
                </div>

                <div style="margin-top: 20px;">
                    <input type="text" id="in-name" class="u-input" placeholder="Your Username">
                    <input type="text" id="in-lounge" class="u-input" placeholder="Lounge Name">
                    <input type="text" id="in-code" class="u-input hidden" placeholder="Lounge Code">
                    
                    <button id="main-exec" class="btn-main">INITIALIZE SESSION</button>
                </div>
            </div>
        </section>

        <section id="view-chat" class="hidden">
            <div class="wa-doodle"></div>
            <header>
                <img id="head-pfp" class="chat-pfp">
                <div class="chat-meta" style="flex: 1;">
                    <h2 id="head-name">Lounge</h2>
                    <p id="head-status">Secure Connection Active</p>
                </div>
                <i class="fas fa-search" style="color: #aebac1; margin-right: 15px;"></i>
                <i class="fas fa-ellipsis-v" style="color: #aebac1;"></i>
            </header>

            <div id="msg-flow"></div>

            <div class="wa-input-bar">
                <i class="far fa-smile" style="color: #aebac1; font-size: 24px;"></i>
                <div class="wa-input-wrap">
                    <input type="text" id="wa-input" placeholder="Type a message">
                    <i class="fas fa-paperclip" style="color: #aebac1; transform: rotate(45deg);"></i>
                </div>
                <button id="wa-send" class="wa-action-btn">
                    <i id="wa-icon" class="fas fa-microphone"></i>
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let state = {
            mode: 'create',
            file: null,
            uid: 'u' + Date.now()
        };

        // --- BUTTON HANDLING ---
        document.getElementById('mode-create').onclick = () => switchMode('create');
        document.getElementById('mode-join').onclick = () => switchMode('join');
        document.getElementById('pfp-file').onchange = (e) => {
            state.file = e.target.files[0];
            if(state.file) document.getElementById('pfp-preview').src = URL.createObjectURL(state.file);
        };

        function switchMode(m) {
            state.mode = m;
            document.getElementById('mode-create').classList.toggle('active', m === 'create');
            document.getElementById('mode-join').classList.toggle('active', m === 'join');
            document.getElementById('in-lounge').classList.toggle('hidden', m === 'join');
            document.getElementById('pfp-module').classList.toggle('hidden', m === 'join');
            document.getElementById('in-code').classList.toggle('hidden', m === 'create');
        }

        // --- SESSION INITIALIZATION ---
        document.getElementById('main-exec').onclick = async () => {
            const name = document.getElementById('in-name').value.trim();
            if(!name) return alert("Enter Username");

            document.getElementById('main-exec').innerText = "CONNECTING...";

            if(state.mode === 'create') {
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                let url = "https://cdn-icons-png.flaticon.com/512/9131/9131529.png";

                if(state.file) {
                    const sRef = ref(storage, `lounges/${code}.jpg`);
                    await uploadBytes(sRef, state.file);
                    url = await getDownloadURL(sRef);
                }

                const room = {
                    name: document.getElementById('in-lounge').value.trim(),
                    code, avatar: url, admin: state.uid
                };
                await setDoc(doc(db, "rooms", code), room);
                enterChat(room, name);
            } else {
                const code = document.getElementById('in-code').value.trim();
                const snap = await getDoc(doc(db, "rooms", code));
                if(snap.exists()) enterChat(snap.data(), name);
                else alert("Invalid Code");
            }
        };

        function enterChat(room, myName) {
            document.getElementById('view-entrance').classList.add('hidden');
            document.getElementById('view-chat').classList.remove('hidden');
            document.getElementById('head-pfp').src = room.avatar;
            document.getElementById('head-name').innerText = room.name;
            document.getElementById('head-status').innerText = `Lounge ID: ${room.code}`;

            const q = query(collection(db, "rooms", room.code, "messages"), orderBy("ts", "asc"));
            onSnapshot(q, snap => {
                const flow = document.getElementById('msg-flow');
                flow.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMine = m.uid === state.uid;
                    const div = document.createElement('div');
                    div.className = `msg-box ${isMine ? 'mine' : 'theirs'}`;
                    div.innerHTML = `<div class="sender-name">${isMine ? 'You' : m.sender}</div>${m.text}`;
                    flow.appendChild(div);
                });
                flow.scrollTop = flow.scrollHeight;
            });

            // Message Sending
            const inp = document.getElementById('wa-input');
            const icon = document.getElementById('wa-icon');
            const btn = document.getElementById('wa-send');

            inp.oninput = () => {
                icon.className = inp.value.trim() ? "fas fa-paper-plane" : "fas fa-microphone";
            };

            btn.onclick = async () => {
                const val = inp.value.trim();
                if(!val) return;
                await addDoc(collection(db, "rooms", room.code, "messages"), {
                    text: val, sender: myName, uid: state.uid, ts: serverTimestamp()
                });
                inp.value = "";
                icon.className = "fas fa-microphone";
            };
        }
    </script>
</body>
</html>
