<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge | Aethercore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --wa-green: #25D366; --bg-main: #0b141a; --bubble-me: #005c4b; --bubble-them: #202c33; }
        
        html, body { 
            background: var(--bg-main); color: #e9edef; font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        }
        
        /* Views */
        .view-layer { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 10; background: var(--bg-main); }
        #home-view { display: flex; z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        #main-workspace { z-index: 50; }
        #wait-view { z-index: 200; justify-content: center; align-items: center; }

        .nav-bar { height: 60px; background: #202c33; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; cursor: pointer; }
        .status-bar { height: 40px; background: #111b21; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #chatBox { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; }
        
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-top-left-radius: 0; }
        
        .footer { background: #202c33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
        .input-pill { background: #2a3942; border-radius: 24px; flex: 1; display: flex; align-items: center; padding: 0 14px; height: 44px; }
        .action-btn { background: var(--wa-green); color: #0b141a; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        #info-overlay { display: none; position: fixed; inset: 0; background: #0b141a; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <!-- 1. HOME VIEW (Entry) -->
    <div id="home-view" class="view-layer">
        <div class="w-full max-w-xs space-y-6 text-center">
            <h1 class="text-4xl font-black text-blue-500 italic tracking-tighter">Student Lounge</h1>
            
            <div id="initial-buttons" class="space-y-3">
                <button onclick="prepareView('create')" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-bold uppercase text-xs">Create Room (Admin)</button>
                <button onclick="prepareView('join')" class="w-full bg-blue-600/10 border border-blue-500/20 p-5 rounded-2xl font-bold uppercase text-xs text-blue-500">Join Room (Knock)</button>
            </div>

            <div id="input-fields" class="hidden space-y-3">
                <input type="text" id="userName" placeholder="Your Name" class="w-full bg-[#2a3942] p-4 rounded-xl text-center outline-none text-white font-bold">
                <input type="text" id="groupName" placeholder="Group Name" class="hidden w-full bg-[#2a3942] p-4 rounded-xl text-center outline-none text-white font-bold">
                <input type="text" id="roomCode" placeholder="Enter Code" class="hidden w-full bg-[#2a3942] p-4 rounded-xl text-center outline-none text-blue-400 font-bold uppercase">
                <div class="flex gap-2">
                    <button onclick="location.reload()" class="w-1/3 bg-white/5 p-4 rounded-xl text-[10px] font-bold">BACK</button>
                    <button id="submitBtn" class="flex-1 bg-blue-600 p-4 rounded-xl text-[10px] font-bold">CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. KNOCKING VIEW -->
    <div id="wait-view" class="view-layer">
        <div class="text-center space-y-4">
            <div class="text-5xl animate-bounce">🚪</div>
            <h2 class="text-xl font-bold">Knocking...</h2>
            <p class="text-gray-500 text-sm">Wait for Admin to accept you.</p>
            <button onclick="location.reload()" class="text-blue-500 text-xs font-bold">CANCEL</button>
        </div>
    </div>

    <!-- 3. MAIN WORKSPACE -->
    <div id="main-workspace" class="view-layer">
        <header class="nav-bar" onclick="openInfo()">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold" id="header-initial">G</div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold">Student Lounge</span>
                    <span id="sub-name" class="text-[10px] text-gray-400 font-bold uppercase">...</span>
                </div>
            </div>
            <button id="admin-req-pill" onclick="event.stopPropagation(); toggleReqs(true)" class="hidden bg-orange-500 text-black px-3 py-1 rounded-full text-[9px] font-black">REQUESTS (<span id="req-count">0</span>)</button>
        </header>

        <div class="status-bar">
            <span id="full-name" class="text-[11px] font-bold uppercase truncate pr-4"></span>
            <span id="display-code" class="text-blue-500 font-mono text-xs font-bold">------</span>
        </div>

        <main id="chatBox"></main>

        <footer class="footer">
            <div class="input-pill"><input type="text" id="msgInput" placeholder="Message..." class="w-full bg-transparent outline-none text-sm text-white"></div>
            <button onclick="sendMsg()" class="action-btn">➤</button>
        </footer>
    </div>

    <!-- ADMIN REQUESTS OVERLAY -->
    <div id="req-overlay" class="fixed inset-0 bg-black/90 z-[2000] hidden flex-col justify-center items-center p-6">
        <div class="bg-[#202c33] w-full max-w-xs rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-white/5 font-bold text-center text-orange-400">WAITING LIST</div>
            <div id="req-list" class="max-h-60 overflow-y-auto"></div>
            <button onclick="toggleReqs(false)" class="w-full p-4 text-xs text-gray-500 font-bold uppercase">Close</button>
        </div>
    </div>

    <!-- INFO OVERLAY -->
    <div id="info-overlay">
        <div class="p-4 flex items-center bg-[#202c33] justify-between">
            <button onclick="document.getElementById('info-overlay').style.display='none'" class="text-blue-500 font-bold">← Back</button>
            <span class="font-bold">Group Info</span>
            <div class="w-10"></div>
        </div>
        <div class="p-10 flex flex-col items-center space-y-6">
            <div class="w-32 h-32 bg-blue-600 rounded-full flex items-center justify-center text-4xl font-bold shadow-xl">G</div>
            <h2 id="info-title" class="text-2xl font-bold italic"></h2>
            <div class="w-full space-y-4">
                <button id="edit-btn" onclick="editRoom()" class="hidden w-full bg-white/5 p-4 rounded-xl text-xs font-bold">✎ EDIT ROOM NAME</button>
                <button id="del-btn" onclick="deleteRoom()" class="hidden w-full bg-red-500/10 text-red-500 p-4 rounded-xl text-xs font-bold">DELETE GROUP</button>
                <button id="leave-btn" onclick="leaveRoom()" class="hidden w-full bg-white/5 p-4 rounded-xl text-xs font-bold">LEAVE GROUP</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const db = getFirestore(initializeApp(firebaseConfig));

        let myId = localStorage.getItem('sl_id') || "U" + Math.random().toString(36).substr(2, 5);
        localStorage.setItem('sl_id', myId);

        let currentRoom = "";
        let isAdmin = false;

        window.prepareView = (mode) => {
            document.getElementById('initial-buttons').classList.add('hidden');
            document.getElementById('input-fields').classList.remove('hidden');
            if(mode === 'create') {
                document.getElementById('groupName').classList.remove('hidden');
                document.getElementById('submitBtn').onclick = createRoom;
            } else {
                document.getElementById('roomCode').classList.remove('hidden');
                document.getElementById('submitBtn').onclick = joinRoom;
            }
        };

        async function createRoom() {
            const uName = document.getElementById('userName').value.trim();
            const gName = document.getElementById('groupName').value.trim() || "New Lounge";
            if(!uName) return alert("Enter your name");

            const code = Math.random().toString(36).substr(2, 6).toUpperCase();
            await setDoc(doc(db, "rooms", code), {
                name: gName, admin: myId, members: [myId], pending: [], msgs: []
            });
            
            currentRoom = code;
            localStorage.setItem('sl_name', uName);
            enterRoom(code);
        }

        async function joinRoom() {
            const uName = document.getElementById('userName').value.trim();
            const code = document.getElementById('roomCode').value.trim().toUpperCase();
            if(!uName || !code) return alert("Fill all fields");

            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if(!snap.exists()) return alert("Room not found");

            localStorage.setItem('sl_name', uName);
            
            if(snap.data().members.includes(myId)) {
                enterRoom(code);
            } else {
                await updateDoc(ref, { pending: arrayUnion({ id: myId, name: uName }) });
                document.getElementById('home-view').style.display = 'none';
                document.getElementById('wait-view').style.display = 'flex';
                
                onSnapshot(ref, (s) => {
                    if(s.exists() && s.data().members.includes(myId)) enterRoom(code);
                });
            }
        }

        function enterRoom(code) {
            currentRoom = code;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('wait-view').style.display = 'none';
            document.getElementById('main-workspace').style.display = 'flex';
            document.getElementById('display-code').innerText = code;

            onSnapshot(doc(db, "rooms", code), (s) => {
                if(!s.exists()) { location.reload(); return; }
                const data = s.data();
                isAdmin = data.admin === myId;

                document.getElementById('full-name').innerText = data.name;
                document.getElementById('sub-name').innerText = data.name;
                document.getElementById('info-title').innerText = data.name;

                // Admin Controls
                document.getElementById('edit-btn').style.display = isAdmin ? 'block' : 'none';
                document.getElementById('del-btn').style.display = isAdmin ? 'block' : 'none';
                document.getElementById('leave-btn').style.display = isAdmin ? 'none' : 'block';

                if(isAdmin) {
                    const p = data.pending || [];
                    document.getElementById('admin-req-pill').style.display = p.length > 0 ? 'block' : 'none';
                    document.getElementById('req-count').innerText = p.length;
                    document.getElementById('req-list').innerHTML = p.map(u => `
                        <div class="p-4 border-b border-white/5 flex justify-between items-center">
                            <span class="text-sm font-bold">${u.name}</span>
                            <button onclick="approve('${u.id}', '${u.name}')" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">ACCEPT</button>
                        </div>
                    `).join('');
                }

                const box = document.getElementById('chatBox');
                box.innerHTML = (data.msgs || []).map(m => `
                    <div class="bubble ${m.uid === myId ? 'bubble-me' : 'bubble-them'}">
                        ${m.uid !== myId ? `<div class="text-[10px] text-blue-400 font-bold">${m.uName}</div>` : ''}
                        <div>${m.text}</div>
                    </div>
                `).join('');
                box.scrollTop = box.scrollHeight;
            });
        }

        window.approve = async (id, name) => {
            await updateDoc(doc(db, "rooms", currentRoom), {
                pending: arrayRemove({ id, name }),
                members: arrayUnion(id)
            });
        };

        window.sendMsg = async () => {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim()) return;
            await updateDoc(doc(db, "rooms", currentRoom), {
                msgs: arrayUnion({ uid: myId, uName: localStorage.getItem('sl_name'), text: inp.value })
            });
            inp.value = "";
        };

        window.editRoom = async () => {
            const n = prompt("New Name?");
            if(n) await updateDoc(doc(db, "rooms", currentRoom), { name: n });
        };

        window.deleteRoom = async () => {
            if(confirm("Delete Group?")) await deleteDoc(doc(db, "rooms", currentRoom));
        };

        window.leaveRoom = async () => {
            if(confirm("Leave Group?")) {
                await updateDoc(doc(db, "rooms", currentRoom), { members: arrayRemove(myId) });
                location.reload();
            }
        };

        window.openInfo = () => document.getElementById('info-overlay').style.display = 'flex';
        window.toggleReqs = (show) => document.getElementById('req-overlay').style.display = show ? 'flex' : 'none';
        
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
    </script>
</body>
</html>
