<div id="chat-screen" class="screen active">
    <!-- Corporate Header -->
    <div class="chat-header">
        <div class="header-avatar" id="lounge-avatar"></div>
        <div class="header-info" onclick="openLoungeInfo()">
            <h4 id="active-lounge-name">Strategy Hub</h4>
            <span id="active-lounge-status">Tap for lounge info</span>
        </div>
        <div class="admin-badge">Admin</div>
    </div>

    <!-- Scrollable Chat Area -->
    <div id="message-container" class="message-feed">
        <!-- Example Received Message -->
        <div class="msg received">
            <strong>Alex (Admin)</strong><br>
            Welcome to the Student Lounge! All project files are pinned.
            <span class="msg-time">10:45 AM</span>
        </div>

        <!-- Example Sent Message -->
        <div class="msg sent">
            Got it, thanks!
            <span class="msg-time">10:46 AM</span>
        </div>
    </div>

    <!-- WhatsApp Style Input -->
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message">
        <button id="send-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
            </svg>
        </button>
    </div>
</div>
