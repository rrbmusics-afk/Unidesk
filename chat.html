<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge | Aethercore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --wa-green: #25D366; --bg-main: #0b141a; --bubble-me: #005c4b; --bubble-them: #202c33; }
        body { background: var(--bg-main); color: #e9edef; font-family: -apple-system, BlinkMacSystemFont, sans-serif; position: fixed; inset: 0; margin: 0; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-workspace { display: none; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 64px; background: #202c33; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; }
        
        /* Message Containers */
        .msg-row { display: flex; flex-direction: column; width: 100%; }
        .row-me { align-items: flex-end; }
        .row-them { align-items: flex-start; }

        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; }
        .bubble-me { background: var(--bubble-me); border-top-right-radius: 0; }
        .bubble-them { background: var(--bubble-them); border-top-left-radius: 0; }
        
        .sender-tag { font-size: 11px; font-weight: 700; margin-bottom: 2px; color: #34b7f1; padding-left: 4px; }
        
        .footer { background: #202c33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .input-pill { background: #2a3942; border-radius: 24px; flex: 1; display: flex; align-items: center; padding: 0 14px; height: 44px; position: relative; }
        .action-btn { background: var(--wa-green); color: #0b141a; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; shrink: 0; border: none; }
        
        .overlay { position: fixed; inset: 0; background: #0b141a; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #admin-panel { display: none; background: #f59e0b; color: black; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .input-field { width: 100%; background: #2a3942; padding: 15px; border-radius: 12px; text-align: center; outline: none; border: 1px solid rgba(255,255,255,0.05); color: #007AFF; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Join/Create UI -->
    <div id="home-view" class="overlay">
        <div class="w-full max-w-xs space-y-6 text-center">
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter italic">Student Lounge</h1>
            <div id="initial-options" class="space-y-3">
                <button onclick="showNamingView('create')" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-bold uppercase text-xs text-white/70">New Session</button>
                <div class="py-2 text-gray-600 text-xs font-bold uppercase tracking-widest">or join existing</div>
                <button onclick="showNamingView('join')" class="w-full bg-blue-600/10 border border-blue-500/20 p-5 rounded-2xl font-bold uppercase text-xs text-blue-500">Connect to Room</button>
            </div>
            <div id="naming-view" class="space-y-3 hidden">
                <input type="text" id="userNameInput" placeholder="Enter your name" class="input-field">
                <input type="text" id="roomCodeInput" placeholder="ROOM CODE" class="input-field uppercase hidden">
                <div class="flex gap-2">
                    <button onclick="cancelNaming()" class="w-1/3 bg-white/5 p-4 rounded-2xl text-[10px] font-bold uppercase text-white/50">Back</button>
                    <button id="confirmBtn" class="flex-1 bg-blue-600 p-4 rounded-2xl text-[10px] font-bold uppercase shadow-lg">Proceed</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat UI -->
    <div id="main-workspace">
        <header class="header">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm shadow-inner">S</div>
                <div class="flex flex-col">
                    <span class="text-[15px] font-bold leading-tight">Student Lounge</span>
                    <div class="flex items-center gap-2">
                        <span id="status-text" class="text-[11px] text-gray-400 tracking-wider">Secure Channel</span>
                        <div id="admin-panel" onclick="approveUser()">ACCEPT REQ?</div>
                    </div>
                </div>
            </div>
        </header>

        <main id="chatBox">
            <div id="e2ee-banner" class="self-center bg-[#182229] text-[#ffd700] text-[10px] px-4 py-1.5 rounded-lg mb-4 border border-[#ffd700]/10 tracking-widest uppercase">End-to-End Encrypted</div>
        </main>

        <footer class="footer">
            <div class="input-pill">
                <input type="text" id="chatInput" placeholder="Message" autocomplete="off" class="w-full bg-transparent outline-none text-sm py-2 text-white">
            </div>
            <button id="mainAction" onclick="sendMessage()" class="action-btn">
                <svg id="sendIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        // CRITICAL: Ensure local ID is retrieved correctly
        let myId = localStorage.getItem('user_persistent_id');
        if (!myId) {
            myId = "ID-" + Math.floor(Math.random()*100000);
            localStorage.setItem('user_persistent_id', myId);
        }
        
        let savedName = localStorage.getItem('user_chat_name') || "";
        let currentRoom, isAdmin = false;

        window.showNamingView = (mode) => {
            document.getElementById('initial-options').classList.add('hidden');
            document.getElementById('naming-view').classList.remove('hidden');
            document.getElementById('userNameInput').value = savedName;
            if(mode === 'join') {
                document.getElementById('roomCodeInput').classList.remove('hidden');
                document.getElementById('confirmBtn').onclick = () => joinRoom();
            } else {
                document.getElementById('roomCodeInput').classList.add('hidden');
                document.getElementById('confirmBtn').onclick = () => createRoom();
            }
        };

        window.createRoom = async () => {
            const name = document.getElementById('userNameInput').value.trim();
            if(!name) return;
            localStorage.setItem('user_chat_name', name);
            savedName = name;
            isAdmin = true;
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], status: 'active', pendingReq: null });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const name = document.getElementById('userNameInput').value.trim();
            const code = document.getElementById('roomCodeInput').value.toUpperCase().trim();
            if(!name || !code) return;
            localStorage.setItem('user_chat_name', name);
            savedName = name;
            await updateDoc(doc(db, "rooms", code), { pendingReq: myId });
            openWorkspace(code); // For this demo, auto-entering
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('main-workspace').style.display = 'flex';
            document.getElementById('status-text').innerText = "ROOM: " + code;
            onSnapshot(doc(db, "rooms", code), s => {
                renderChat(s.data()?.messages || []);
            });
        }

        window.sendMessage = async () => {
            const chatInput = document.getElementById('chatInput');
            const text = chatInput.value.trim();
            if(!text) return;
            chatInput.value = "";
            await updateDoc(doc(db, "rooms", currentRoom), { 
                messages: arrayUnion({ 
                    user: myId, 
                    senderName: savedName, 
                    text: text, 
                    time: Date.now() 
                }) 
            });
        };

        function renderChat(messages) {
            const box = document.getElementById('chatBox');
            const banner = document.getElementById('e2ee-banner');
            box.innerHTML = ''; 
            box.appendChild(banner);

            messages.forEach(m => {
                // COMPARISON CHECK: Does this message belong to the local user?
                const isMe = String(m.user) === String(myId);
                
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'row-me' : 'row-them'}`;
                
                let html = "";
                // Only show name tag if it's NOT me
                if (!isMe) {
                    html += `<span class="sender-tag">${m.senderName || 'Student'}</span>`;
                }
                
                html += `<div class="bubble ${isMe ? 'bubble-me' : 'bubble-them'}">${m.text}</div>`;
                
                row.innerHTML = html;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
