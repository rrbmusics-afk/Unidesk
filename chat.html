<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Pro</title>
    <link rel="stylesheet" href="chat.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="app-viewport">
        <section id="view-auth" class="screen active">
            <div class="brand">
                <h1>Aethercore</h1>
                <p>SECURE E2EE COMMUNICATION</p>
            </div>

            <div class="auth-card">
                <div class="tabs">
                    <button id="t-create" class="tab-btn active" onclick="ui.tab('create')">Create</button>
                    <button id="t-join" class="tab-btn" onclick="ui.tab('join')">Join</button>
                </div>

                <div id="panel-create" class="panel active">
                    <input type="text" id="in-admin" placeholder="Admin Name" oninput="ui.check()">
                    <input type="text" id="in-group" placeholder="Group Name" oninput="ui.check()">
                    <button id="btn-create" class="main-btn" disabled onclick="core.create()">Initialize Room</button>
                </div>

                <div id="panel-join" class="panel">
                    <input type="text" id="in-user" placeholder="Your Name" oninput="ui.check()">
                    <input type="text" id="in-code" placeholder="Room Code" oninput="ui.check()">
                    <button id="btn-join" class="main-btn" disabled onclick="core.join()">Knock to Join</button>
                </div>
            </div>
        </section>

        <section id="view-chat" class="screen">
            <header class="header">
                <div class="h-left">
                    <img id="h-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                    <div>
                        <b id="h-name">Group</b>
                        <small id="h-code">Code: ---</small>
                    </div>
                </div>
            </header>
            <div id="chat-flow" class="doodle-bg"></div>
            <footer class="footer">
                <div class="input-pill">
                    <textarea id="msg-input" placeholder="Secure Message..." rows="1" oninput="ui.toggleSend()"></textarea>
                    <button id="mic-btn" class="act-btn"><span class="material-icons-round">mic</span></button>
                    <button id="send-btn" class="act-btn hidden" onclick="core.send()"><span class="material-icons-round">send</span></button>
                </div>
            </footer>
        </section>
    </div>

    <script src="chat.js"></script>
</body>
</html>
