<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Gateway</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, mode, uid: userUid } = session;

        document.addEventListener('DOMContentLoaded', async () => {
            if (mode === 'create') {
                // Admin bypasses the knocking phase entirely
                window.location.replace('chats.html');
            } else {
                const loungeRef = doc(db, "lounges", loungeId);
                const loungeSnap = await getDoc(loungeRef);

                if (!loungeSnap.exists()) {
                    alert("Lounge not found.");
                    window.location.replace('page.html');
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('knocking').style.display = 'block';

                // CREATE A UNIQUE REQUEST FOR THIS USER
                const myReqRef = doc(db, "lounges", loungeId, "requests", userUid);
                await setDoc(myReqRef, {
                    name: userName,
                    uid: userUid,
                    status: 'pending',
                    timestamp: serverTimestamp()
                });

                // LISTEN ONLY TO MY OWN REQUEST STATUS
                onSnapshot(myReqRef, (snap) => {
                    if (snap.exists()) {
                        const status = snap.data().status;
                        if (status === 'accepted') window.location.replace('chats.html');
                        if (status === 'rejected') {
                            alert("Entry denied by Admin.");
                            window.location.replace('page.html');
                        }
                    }
                });
            }
        });
    </script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #161b22; border-top-color: #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">Validating...</div>
    <div id="knocking" style="display:none;">
        <div class="spinner"></div>
        <h2>Knocking...</h2>
        <p>Waiting for the Admin to let you in.</p>
    </div>
</body>
</html>
