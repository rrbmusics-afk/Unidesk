<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Pro | Secure Enterprise Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --aether-bg: #0c0f14;
            --aether-surface: #161b22;
            --aether-accent: #00d2ff;
            --aether-accent-glow: rgba(0, 210, 255, 0.3);
            --aether-text: #e6edf3;
            --aether-admin: #ff3e3e;
            --bubble-me: #005c4b;
            --bubble-them: #202c33;
        }

        body { 
            background: var(--aether-bg); color: var(--aether-text); 
            height: 100vh; overflow: hidden; margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* 5) Aethercore Unique Doodle Background */
        .chat-canvas {
            background-color: #0b141a;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm76-26c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM31 35c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1z' fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 15px; gap: 8px;
        }

        /* 11) Aesthetically Designed Boxes */
        .premium-container {
            background: var(--aether-surface);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--aether-bg); z-index: 10; }
        .screen-active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* 6) Static Keyboard Fix */
        .input-area {
            background: var(--aether-surface); padding: 12px 16px;
            display: flex; align-items: flex-end; gap: 10px;
            position: sticky; bottom: 0; padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .bubble {
            max-width: 80%; padding: 10px 14px; border-radius: 18px; position: relative;
            font-size: 15px; line-height: 1.4; transition: all 0.2s;
        }
        .bubble-me { align-self: flex-end; background: var(--bubble-me); border-bottom-right-radius: 4px; }
        .bubble-them { align-self: flex-start; background: var(--bubble-them); border-bottom-left-radius: 4px; }

        /* 12) Action Button Morphing */
        .action-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--aether-accent); color: #000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s, background 0.3s;
        }
        .recording-active { background: #ff3e3e; color: white; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #ctx-menu {
            display: none; position: fixed; background: #232d36; border-radius: 12px;
            z-index: 9999; min-width: 200px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }
        .ctx-item { padding: 14px 20px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ctx-item:hover { background: #2a3742; }

    </style>
</head>
<body>

    <!-- 1) HOME SCREEN WITH TABS -->
    <div id="screen-home" class="screen screen-active items-center justify-center p-6">
        <div class="w-full max-w-md premium-container p-8">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-3xl bg-cyan-500/10 mb-4">
                    <i class="fa-solid fa-shield-halved text-4xl text-cyan-500"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tight">AETHERCORE</h1>
                <p class="text-gray-500 text-sm mt-1">First-Preference Secure Node</p>
            </div>

            <!-- Tab Switcher -->
            <div class="flex bg-black/40 p-1.5 rounded-2xl mb-8">
                <button id="tab-create-btn" onclick="switchTab('create')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-cyan-500 text-black">Create Room</button>
                <button id="tab-join-btn" onclick="switchTab('join')" class="flex-1 py-3 rounded-xl font-bold transition-all text-gray-400">Join Room</button>
            </div>

            <!-- Forms -->
            <div id="form-create" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-4">Admin Name</label>
                    <input type="text" id="c-name" oninput="checkHomeValidity()" placeholder="Your Identity" class="w-full bg-black/20 p-4 rounded-2xl border border-white/5 outline-none focus:border-cyan-500/50">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold text-gray-500 ml-4">Group Subject</label>
                    <input type="text" id="c-subject" oninput="checkHomeValidity()" placeholder="Project X" class="w-full bg-black/20 p-4 rounded-2xl border border-white/5 outline-none focus:border-cyan-500/50">
                </div>
                <button id="main-create-btn" onclick="createRoom()" class="w-full py-4 rounded-2xl font-black bg-cyan-900/30 text-gray-600 cursor-not-allowed transition-all">ESTABLISH CHANNEL</button>
            </div>

            <div id="form-join" class="hidden space-y-4">
                <input type="text" id="j-name" oninput="checkHomeValidity()" placeholder="Your Identity" class="w-full bg-black/20 p-4 rounded-2xl border border-white/5 outline-none">
                <input type="text" id="j-code" oninput="checkHomeValidity()" placeholder="6-Digit Entry Code" class="w-full bg-black/20 p-4 rounded-2xl border border-white/5 outline-none text-center font-mono tracking-widest uppercase">
                <button id="main-join-btn" onclick="knockToJoin()" class="w-full py-4 rounded-2xl font-black bg-cyan-900/30 text-gray-600 cursor-not-allowed transition-all">REQUEST ACCESS</button>
            </div>
        </div>
    </div>

    <!-- 4) CHAT SCREEN -->
    <div id="screen-chat" class="screen">
        <!-- Persistent Approval Header (Admin Only) -->
        <div id="admin-approval-bar" class="bg-cyan-600 p-3 text-center text-[11px] font-black tracking-widest hidden cursor-pointer hover:bg-cyan-500 transition-colors" onclick="openApprovalPopup()">
            <i class="fa-solid fa-user-plus mr-2"></i> PENDING ACCESS REQUESTS
        </div>

        <nav class="h-16 bg-[#161b22] flex items-center px-4 gap-3 border-b border-white/5 shadow-xl">
            <div class="relative">
                <img id="chat-pfp" src="" class="w-10 h-10 rounded-full object-cover cursor-pointer hover:opacity-80" onclick="viewPfpFull()">
            </div>
            <div class="flex-1 overflow-hidden" onclick="showGroupInfo()">
                <h2 id="room-title" class="font-bold truncate text-[16px]">--</h2>
                <p id="room-subtitle" class="text-[10px] text-cyan-400 font-bold uppercase tracking-tighter">E2EE Protected</p>
            </div>
            <div class="flex gap-4 text-gray-400 text-lg">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </div>
        </nav>

        <div id="chat-flow" class="chat-canvas"></div>

        <!-- 12) Dynamic Input Bar -->
        <div class="input-area">
            <div class="flex-1 bg-black/30 rounded-[24px] flex items-end p-2 gap-2 border border-white/5">
                <button class="p-2 text-cyan-500 hover:scale-110 transition-transform" onclick="document.getElementById('doc-input').click()">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="doc-input" multiple class="hidden" onchange="handleBulkFiles(this.files)">
                
                <textarea id="msg-input" rows="1" oninput="syncInput(this)" placeholder="Aether Message..." class="flex-1 bg-transparent py-2 outline-none text-[15px] resize-none max-h-32"></textarea>
            </div>
            
            <button id="action-btn" class="action-btn" onmousedown="startVoice()" onmouseup="endVoice()" ontouchstart="startVoice()" ontouchend="endVoice()">
                <i id="btn-icon" class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>

    <!-- 7) INFO SCREEN -->
    <div id="screen-info" class="screen overflow-y-auto">
        <div class="p-4 flex items-center gap-4 bg-[#161b22]">
            <i class="fa-solid fa-arrow-left text-xl" onclick="hideGroupInfo()"></i>
            <span class="font-bold">Group Info</span>
        </div>
        <div class="p-6 flex flex-col items-center">
            <div class="relative group">
                <img id="info-pfp" class="w-44 h-44 rounded-full object-cover border-4 border-cyan-500/20">
                <button id="admin-pfp-btn" onclick="document.getElementById('pfp-upload').click()" class="absolute bottom-2 right-2 w-10 h-10 bg-cyan-500 rounded-full items-center justify-center hidden">
                    <i class="fa-solid fa-camera text-black"></i>
                </button>
                <input type="file" id="pfp-upload" accept="image/*" class="hidden" onchange="updateGroupPfp(this.files[0])">
            </div>
            
            <div class="w-full mt-8 space-y-6">
                <!-- 3) Admin Rename -->
                <div id="admin-rename-section" class="hidden">
                    <label class="text-xs font-bold text-gray-500">RENAME GROUP</label>
                    <div class="flex gap-2 mt-2">
                        <input type="text" id="new-name-input" class="flex-1 bg-white/5 p-3 rounded-xl border border-white/10 outline-none">
                        <button onclick="commitRename()" class="bg-cyan-500 text-black font-bold px-4 rounded-xl">SAVE</button>
                    </div>
                </div>

                <div class="bg-white/5 p-4 rounded-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <span id="member-count" class="text-xs font-bold text-gray-500">MEMBERS</span>
                    </div>
                    <div id="member-list" class="space-y-4"></div>
                </div>

                <button onclick="leaveRoom()" class="w-full py-4 text-red-500 font-bold bg-red-500/10 rounded-2xl border border-red-500/20">LEAVE GROUP</button>
                <button id="admin-delete-btn" onclick="deleteRoomForever()" class="w-full py-4 text-white font-bold bg-red-600 rounded-2xl hidden">DELETE GROUP FOR EVERYONE</button>
            </div>
        </div>
    </div>

    <!-- MODALS & POPUPS -->
    <div id="modal-approvals" class="fixed inset-0 bg-black/90 z-[9999] hidden items-center justify-center p-6 backdrop-blur-sm">
        <div class="w-full max-w-sm premium-container overflow-hidden">
            <div class="p-5 bg-cyan-600 text-black font-black flex justify-between">
                <span>PENDING ADMISSIONS</span>
                <i class="fa-solid fa-xmark" onclick="closeApprovalPopup()"></i>
            </div>
            <div id="approval-list" class="p-6 space-y-4 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <div id="viewer-full" class="fixed inset-0 bg-black z-[10000] hidden flex-col" onclick="this.style.display='none'">
        <div class="p-6 flex justify-between">
            <i class="fa-solid fa-arrow-left text-2xl"></i>
            <a id="download-link" href="#" download class="text-cyan-500 font-bold">DOWNLOAD</a>
        </div>
        <div class="flex-1 flex items-center justify-center">
            <img id="viewer-img" class="max-w-full max-h-[80vh] object-contain">
        </div>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item" onclick="startEdit()"><i class="fa-solid fa-pen mr-3 opacity-50"></i> Edit Message</div>
        <div class="ctx-item" onclick="deleteLogic('me')"><i class="fa-solid fa-trash mr-3 opacity-50"></i> Delete for Me</div>
        <div class="ctx-item text-red-500" onclick="deleteLogic('all')"><i class="fa-solid fa-users-slash mr-3 opacity-50"></i> Delete for Everyone</div>
        <div class="ctx-item text-gray-500 text-xs" id="seen-by-label"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Production Database)
        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = localStorage.getItem('ae_uid') || "U-"+Math.random().toString(36).substr(2,7).toUpperCase();
        localStorage.setItem('ae_uid', currentUser);

        let activeRoom = null;
        let selectedMsgId = null;
        let isAdminMode = false;
        let recorder, audioChunks = [];
        let isRecording = false;

        // 10) E2EE Engine
        async function crypt(text, key, mode = 'enc') {
            const enc = new TextEncoder();
            const hash = await crypto.subtle.digest('SHA-256', enc.encode(key));
            const cKey = await crypto.subtle.importKey('raw', hash, {name: 'AES-GCM'}, false, [mode === 'enc' ? 'encrypt' : 'decrypt']);
            if (mode === 'enc') {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const res = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, cKey, enc.encode(text));
                return { d: btoa(String.fromCharCode(...new Uint8Array(res))), i: btoa(String.fromCharCode(...iv)) };
            } else {
                const iv = new Uint8Array(atob(text.i).split("").map(c => c.charCodeAt(0)));
                const d = new Uint8Array(atob(text.d).split("").map(c => c.charCodeAt(0)));
                const res = await crypto.subtle.decrypt({name: 'AES-GCM', iv}, cKey, d);
                return new TextDecoder().decode(res);
            }
        }

        // TABS LOGIC
        window.switchTab = (t) => {
            const isC = t === 'create';
            document.getElementById('form-create').classList.toggle('hidden', !isC);
            document.getElementById('form-join').classList.toggle('hidden', isC);
            document.getElementById('tab-create-btn').className = isC ? "flex-1 py-3 rounded-xl font-bold bg-cyan-500 text-black" : "flex-1 py-3 rounded-xl font-bold text-gray-400";
            document.getElementById('tab-join-btn').className = !isC ? "flex-1 py-3 rounded-xl font-bold bg-cyan-500 text-black" : "flex-1 py-3 rounded-xl font-bold text-gray-400";
            checkHomeValidity();
        };

        window.checkHomeValidity = () => {
            const isCreateTab = !document.getElementById('form-create').classList.contains('hidden');
            if(isCreateTab) {
                const valid = document.getElementById('c-name').value.trim() && document.getElementById('c-subject').value.trim();
                const btn = document.getElementById('main-create-btn');
                btn.className = valid ? "w-full py-4 rounded-2xl font-black bg-cyan-500 text-black shadow-lg shadow-cyan-500/20" : "w-full py-4 rounded-2xl font-black bg-cyan-900/30 text-gray-600 cursor-not-allowed";
            } else {
                const valid = document.getElementById('j-name').value.trim() && document.getElementById('j-code').value.length === 6;
                const btn = document.getElementById('main-join-btn');
                btn.className = valid ? "w-full py-4 rounded-2xl font-black bg-cyan-500 text-black shadow-lg shadow-cyan-500/20" : "w-full py-4 rounded-2xl font-black bg-cyan-900/30 text-gray-600 cursor-not-allowed";
            }
        };

        // ROOM OPERATIONS
        window.createRoom = async () => {
            const name = document.getElementById('c-name').value;
            const subject = document.getElementById('c-subject').value;
            const code = Math.random().toString(36).substr(2,6).toUpperCase();
            
            localStorage.setItem('ae_alias', name);
            await setDoc(doc(db, "rooms", code), {
                id: code, title: subject, admin: currentUser,
                pfp: `https://ui-avatars.com/api/?name=${subject}&background=00d2ff&color=fff`,
                members: [{id: currentUser, name}], mIDs: [currentUser], knocks: [], msgs: []
            });
            openChat(code);
        };

        window.knockToJoin = async () => {
            const code = document.getElementById('j-code').value.toUpperCase();
            const name = document.getElementById('j-name').value;
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if(!snap.exists()) return alert("Room does not exist.");
            
            localStorage.setItem('ae_alias', name);
            await updateDoc(ref, { knocks: arrayUnion({id: currentUser, name}) });
            alert("Request sent to Admin. Please wait for approval.");
            
            // Listen for approval
            const unsub = onSnapshot(ref, (s) => {
                if(s.data().mIDs.includes(currentUser)) { unsub(); openChat(code); }
            });
        };

        function openChat(code) {
            activeRoom = code;
            document.getElementById('screen-home').classList.remove('screen-active');
            document.getElementById('screen-chat').classList.add('screen-active');
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                if(!s.exists()) { alert("Group has been deleted by Admin."); location.reload(); return; }
                const data = s.data();
                isAdminMode = data.admin === currentUser;

                document.getElementById('room-title').innerText = data.title;
                document.getElementById('chat-pfp').src = data.pfp;
                document.getElementById('info-pfp').src = data.pfp;
                
                // 4) Admin Approvals UI
                if(isAdminMode && data.knocks.length > 0) {
                    document.getElementById('admin-approval-bar').classList.remove('hidden');
                    renderApprovals(data.knocks);
                } else {
                    document.getElementById('admin-approval-bar').classList.add('hidden');
                }

                // Admin Rights
                document.getElementById('admin-pfp-btn').style.display = isAdminMode ? 'flex' : 'none';
                document.getElementById('admin-delete-btn').style.display = isAdminMode ? 'block' : 'none';
                document.getElementById('admin-rename-section').style.display = isAdminMode ? 'blo
