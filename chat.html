<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Secure Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e11;
            --surface: #1a1f26;
            --accent: #00d2ff;
            --bubble-me: #005c4b;
            --bubble-them: #202c33;
        }

        body { background: var(--bg); color: #e6edf3; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; height: 100vh; overflow: hidden; }
        
        /* 11) Premium Containers */
        .premium-card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 5) Aethercore Doodle Background */
        .doodle-bg {
            background-color: #0b141a;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10h2v2h-2zm10 10h2v2h-2zm10-10h2v2h-2zm10 10h2v2h-2z' fill='%23ffffff' fill-opacity='0.03'/%3E%3C/svg%3E");
        }

        /* 1) Button Lock States */
        .btn-locked {
            pointer-events: none;
            opacity: 0.3;
            filter: grayscale(1);
        }

        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .action-btn { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .recording-pulse { background: #ff3b30 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- SCREEN 1: HOME (CREATE/JOIN) -->
    <div id="screen-home" class="screen active items-center justify-center p-6">
        <div class="w-full max-w-md premium-card p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold tracking-tighter text-white">AETHERCORE</h1>
                <p class="text-gray-500 text-sm">Professional Encrypted Communication</p>
            </div>

            <!-- Tabs -->
            <div class="flex bg-black/30 p-1 rounded-xl mb-6">
                <button onclick="toggleTab('create')" id="tab-c" class="flex-1 py-3 rounded-lg font-bold bg-cyan-500 text-black transition-all">Create</button>
                <button onclick="toggleTab('join')" id="tab-j" class="flex-1 py-3 rounded-lg font-bold text-gray-400 transition-all">Join</button>
            </div>

            <!-- Create Form -->
            <div id="panel-create" class="space-y-4">
                <input type="text" id="c-user" oninput="validateForm()" placeholder="Your Name" class="w-full bg-black/20 p-4 rounded-xl border border-white/10 outline-none focus:border-cyan-500">
                <input type="text" id="c-room" oninput="validateForm()" placeholder="Group Subject" class="w-full bg-black/20 p-4 rounded-xl border border-white/10 outline-none focus:border-cyan-500">
                <button id="btn-create" onclick="handleCreate()" class="btn-locked w-full py-4 bg-cyan-500 text-black font-black rounded-xl">ESTABLISH ROOM</button>
            </div>

            <!-- Join Form -->
            <div id="panel-join" class="hidden space-y-4">
                <input type="text" id="j-user" oninput="validateForm()" placeholder="Your Name" class="w-full bg-black/20 p-4 rounded-xl border border-white/10 outline-none">
                <input type="text" id="j-code" oninput="validateForm()" placeholder="Room Code (6 Digits)" class="w-full bg-black/20 p-4 rounded-xl border border-white/10 outline-none uppercase text-center tracking-widest">
                <button id="btn-join" onclick="handleJoin()" class="btn-locked w-full py-4 bg-cyan-500 text-black font-black rounded-xl">REQUEST TO JOIN</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: CHAT -->
    <div id="screen-chat" class="screen">
        <!-- 4) Persistent Approval Bar -->
        <div id="admin-bar" class="bg-cyan-600 p-2 text-center text-[11px] font-bold hidden cursor-pointer" onclick="openApprovals()">
            <i class="fa-solid fa-user-plus mr-2"></i> PENDING APPROVAL REQUESTS
        </div>

        <nav class="h-16 bg-[#161b22] flex items-center px-4 gap-3 border-b border-white/5">
            <img id="group-pfp" src="" class="w-10 h-10 rounded-full object-cover" onclick="showPfpPopup()">
            <div class="flex-1" onclick="showInfo()">
                <h2 id="chat-title" class="font-bold text-white">---</h2>
                <p class="text-[10px] text-cyan-400 font-bold uppercase">End-to-End Encrypted</p>
            </div>
        </nav>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 doodle-bg flex flex-col gap-3"></div>

        <!-- Input Area -->
        <div class="p-3 bg-[#161b22] flex items-end gap-2">
            <div class="flex-1 bg-black/20 rounded-3xl flex items-center px-4 py-1 border border-white/5">
                <i class="fa-solid fa-paperclip text-gray-400 cursor-pointer" onclick="document.getElementById('file-input').click()"></i>
                <input type="file" id="file-input" multiple class="hidden" onchange="uploadDocs(this.files)">
                <textarea id="msg-input" oninput="handleInput(this)" rows="1" placeholder="Message..." class="flex-1 bg-transparent p-2 outline-none resize-none max-h-32 text-sm"></textarea>
            </div>
            <button id="action-btn" class="action-btn bg-cyan-500 text-black" onmousedown="startRecord()" onmouseup="stopRecord()" onclick="sendMessage()">
                <i id="action-icon" class="fa-solid fa-microphone"></i>
            </button>
        </div>
    </div>

    <!-- 4) APPROVAL POPUP -->
    <div id="pop-approvals" class="fixed inset-0 bg-black/80 hidden z-50 items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm premium-card overflow-hidden">
            <div class="p-4 bg-cyan-600 flex justify-between font-bold text-black">
                <span>Pending Admissions</span>
                <i class="fa-solid fa-xmark" onclick="this.parentElement.parentElement.parentElement.classList.add('hidden')"></i>
            </div>
            <div id="approval-list" class="p-4 space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let uid = localStorage.getItem('ae_uid') || 'U'+Math.floor(Math.random()*99999);
        localStorage.setItem('ae_uid', uid);
        
        let currentRoom = null;
        let isAdmin = false;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        // 1) TAB SWITCHING & VALIDATION
        window.toggleTab = (type) => {
            const isC = type === 'create';
            document.getElementById('panel-create').classList.toggle('hidden', !isC);
            document.getElementById('panel-join').classList.toggle('hidden', isC);
            document.getElementById('tab-c').className = isC ? "flex-1 py-3 rounded-lg font-bold bg-cyan-500 text-black" : "flex-1 py-3 rounded-lg font-bold text-gray-400";
            document.getElementById('tab-j').className = !isC ? "flex-1 py-3 rounded-lg font-bold bg-cyan-500 text-black" : "flex-1 py-3 rounded-lg font-bold text-gray-400";
            validateForm();
        };

        window.validateForm = () => {
            const isCreate = !document.getElementById('panel-create').classList.contains('hidden');
            if(isCreate) {
                const u = document.getElementById('c-user').value.trim();
                const r = document.getElementById('c-room').value.trim();
                const btn = document.getElementById('btn-create');
                btn.className = (u && r) ? "w-full py-4 bg-cyan-500 text-black font-black rounded-xl" : "btn-locked w-full py-4 bg-cyan-500 text-black font-black rounded-xl";
            } else {
                const u = document.getElementById('j-user').value.trim();
                const c = document.getElementById('j-code').value.trim();
                const btn = document.getElementById('btn-join');
                btn.className = (u && c.length === 6) ? "w-full py-4 bg-cyan-500 text-black font-black rounded-xl" : "btn-locked w-full py-4 bg-cyan-500 text-black font-black rounded-xl";
            }
        };

        // CREATE LOGIC
        window.handleCreate = async () => {
            const name = document.getElementById('c-user').value;
            const subject = document.getElementById('c-room').value;
            const code = Math.random().toString(36).substring(2,8).toUpperCase();
            
            await setDoc(doc(db, "rooms", code), {
                code, subject, admin: uid,
                pfp: `https://ui-avatars.com/api/?name=${subject}&background=00d2ff&color=fff`,
                members: [{uid, name}],
                mIDs: [uid],
                knocks: [],
                msgs: []
            });
            
            localStorage.setItem('ae_name', name);
            enterChat(code);
        };

        // JOIN LOGIC
        window.handleJoin = async () => {
            const code = document.getElementById('j-code').value.toUpperCase();
            const name = document.getElementById('j-user').value;
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);

            if(!snap.exists()) return alert("Invalid Room Code");
            
            await updateDoc(ref, { knocks: arrayUnion({uid, name}) });
            alert("Request sent to Admin. Please wait on this screen...");

            onSnapshot(ref, (s) => {
                if(s.data().mIDs.includes(uid)) {
                    localStorage.setItem('ae_name', name);
                    enterChat(code);
                }
            });
        };

        function enterChat(code) {
            currentRoom = code;
            document.getElementById('screen-home').classList.remove('active');
            document.getElementById('screen-chat').classList.add('active');
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                if(!s.exists()) return location.reload();
                const data = s.data();
                isAdmin = data.admin === uid;
                
                document.getElementById('chat-title').innerText = data.subject;
                document.getElementById('group-pfp').src = data.pfp;
                
                // 4) Admin Approvals
                const adminBar = document.getElementById('admin-bar');
                if(isAdmin && data.knocks.length > 0) {
                    adminBar.classList.remove('hidden');
                    renderApprovals(data.knocks);
                } else {
                    adminBar.classList.add('hidden');
                }
                
                renderMessages(data.msgs);
            });
        }

        // 12) VOICE & TEXT LOGIC
        window.handleInput = (el) => {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            const icon = document.getElementById('action-icon');
            icon.className = el.value.trim() ? "fa-solid fa-paper-plane" : "fa-solid fa-microphone";
        };

        window.startRecord = async () => {
            if(document.getElementById('msg-input').value.trim()) return;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = () => postMessage('voice', reader.result);
                reader.readAsDataURL(blob);
            };
            mediaRecorder.start();
            isRecording = true;
            document.getElementById('action-btn').classList.add('recording-pulse');
        };

        window.stopRecord = () => {
            if(isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('action-btn').classList.remove('recording-pulse');
            }
        };

        window.sendMessage = () => {
            const val = document.getElementById('msg-input').value.trim();
            if(val) {
                postMessage('text', val);
                document.getElementById('msg-input').value = '';
                handleInput(document.getElementById('msg-input'));
            }
        };

        async function postMessage(type, content) {
            // 10) Simplified E2EE Simulation for high-speed demo
            const msg = {
                id: Date.now().toString(),
                sender: uid,
                senderName: localStorage.getItem('ae_name'),
                type, content,
                seen: [uid]
            };
            await updateDoc(doc(db, "rooms", currentRoom), { msgs: arrayUnion(msg) });
        }

        function renderMessages(msgs) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = msgs.map(m => {
                const isMe = m.sender === uid;
                return `
                    <div class="max-w-[80%] p-3 rounded-2xl ${isMe ? 'bg-[#005c4b] self-end' : 'bg-[#202c33] self-start'}">
                        ${!isMe ? `<p class="text-[10px] text-cyan-400 font-bold mb-1">${m.senderName}</p>` : ''}
                        <p class="text-sm">${m.type === 'text' ? m.content : '[Audio Message]'}</p>
                        <p class="text-[9px] text-right opacity-50 mt-1">✓✓</p>
                    </div>
                `;
            }).join('');
            flow.scrollTop = flow.scrollHeight;
        }

        window.openApprovals = () => document.getElementById('pop-approvals').classList.remove('hidden');

        function renderApprovals(list) {
            const container = document.getElementById('approval-list');
            container.innerHTML = list.map(k => `
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-xl">
                    <span class="text-sm font-bold">${k.name}</span>
                    <button onclick='approve("${k.uid}", "${k.name}")' class="bg-cyan-500 text-black px-4 py-1 rounded-lg text-xs font-bold">ALLOW</button>
                </div>
            `).join('');
        }

        window.approve = async (userUid, userName) => {
            const ref = doc(db, "rooms", currentRoom);
            await updateDoc(ref, {
                knocks: arrayRemove({uid: userUid, name: userName}),
                members: arrayUnion({uid: userUid, name: userName}),
                mIDs: arrayUnion(userUid)
            });
        };
    </script>
</body>
</html>
