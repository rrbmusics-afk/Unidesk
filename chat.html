<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Lounge | Aethercore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --ac-blue: #4A90E2;
            --ac-dark: #0B141B;
            --ac-card: #FFFFFF;
            --ac-bg: #F0F2F5;
            --ac-gray: #667781;
            --ac-mine: #D9FDD3;
            --ac-theirs: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--ac-bg); height: 100vh; overflow: hidden; }

        .hidden { display: none !important; }

        /* --- DOODLE BACKGROUND --- */
        .doodle-bg {
            background-color: #e5ddd5;
            background-image: url("https://web.whatsapp.com/img/bg-chat-tile-dark_a4be512e71a7b32e17e29d05c504bac5.png");
            background-repeat: repeat;
            opacity: 0.4;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- HOME SCREEN --- */
        .entrance-container {
            display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px;
        }
        .ac-card {
            background: var(--ac-card); padding: 40px 30px; border-radius: 28px;
            width: 100%; max-width: 400px; box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            text-align: center; position: relative; z-index: 10;
        }
        .brand-logo { font-weight: 800; font-size: 32px; letter-spacing: -1px; margin: 0; }
        .brand-sub { font-size: 12px; letter-spacing: 2px; color: var(--ac-gray); margin-bottom: 30px; }

        .tab-wrapper { display: flex; background: #eee; border-radius: 12px; padding: 4px; margin-bottom: 25px; }
        .tab-btn { flex: 1; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; color: #555; background: transparent; transition: 0.3s; }
        .tab-btn.active { background: white; color: black; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #ddd; border-radius: 14px; font-size: 15px; outline: none;
        }
        .primary-btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px; background: black; color: white;
            font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .primary-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- CHAT INTERFACE --- */
        #chat-view { height: 100vh; display: flex; flex-direction: column; position: relative; }
        header { 
            background: white; padding: 12px 16px; display: flex; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 20; cursor: pointer;
        }
        .group-avatar { width: 45px; height: 45px; border-radius: 50%; background: #ddd; object-fit: cover; margin-right: 12px; }
        .header-info { flex: 1; }
        .header-info h3 { margin: 0; font-size: 16px; }
        .header-info span { font-size: 12px; color: var(--ac-gray); }

        .approval-bar {
            background: #fff9c4; padding: 10px 16px; display: flex; justify-content: space-between;
            align-items: center; font-size: 13px; font-weight: 600; border-bottom: 1px solid #eee;
        }

        #messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; position: relative; }
        .msg { 
            padding: 8px 12px; border-radius: 12px; max-width: 75%; position: relative; font-size: 14px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4;
        }
        .msg.mine { align-self: flex-end; background: var(--ac-mine); border-top-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: var(--ac-theirs); border-top-left-radius: 2px; }

        /* --- INPUT BAR --- */
        .bottom-bar { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-pill { 
            background: white; flex: 1; border-radius: 25px; padding: 5px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .input-pill input { border: none; flex: 1; padding: 10px 0; font-size: 15px; outline: none; }
        .action-icon { color: var(--ac-gray); font-size: 20px; cursor: pointer; }
        .record-btn { 
            width: 45px; height: 45px; border-radius: 50%; background: var(--ac-blue);
            display: flex; justify-content: center; align-items: center; color: white; border: none;
        }

        /* --- POPUPS --- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            z-index: 100; transition: 0.3s;
        }
        .popup { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 25px; }

    </style>
</head>
<body>

    <div id="app">
        <section id="entrance-view" class="entrance-container">
            <div class="ac-card">
                <h1 class="brand-logo">UNIDESK</h1>
                <p class="brand-sub">STUDENT UTILITY SUITE</p>
                
                <div class="tab-wrapper">
                    <button id="tab-create" class="tab-btn active" onclick="setMode('create')">Create Lounge</button>
                    <button id="tab-join" class="tab-btn" onclick="setMode('join')">Join Lounge</button>
                </div>

                <div id="form-body">
                    <input type="text" id="user-name" placeholder="Your Display Name" oninput="checkInputs()">
                    <input type="text" id="room-name" placeholder="Lounge Name" oninput="checkInputs()">
                    <div id="admin-only-fields">
                        <label style="font-size: 12px; color: gray;">Group Icon (1:1)</label>
                        <input type="file" id="group-icon" accept="image/*" onchange="checkInputs()">
                    </div>
                    <input type="text" id="room-code-input" class="hidden" placeholder="Enter Room Code" oninput="checkInputs()">
                    
                    <button id="submit-btn" class="primary-btn" disabled onclick="initLounge()">CONTINUE</button>
                </div>
            </div>
        </section>

        <section id="chat-view" class="hidden">
            <div class="doodle-bg"></div>
            <header onclick="showGroupInfo()">
                <img id="header-img" class="group-avatar" src="" alt="">
                <div class="header-info">
                    <h3 id="header-name">Lounge Name</h3>
                    <span id="header-code-sub">Code: #0000</span>
                </div>
            </header>

            <div id="admin-approval-banner" class="approval-bar hidden" onclick="showApprovalList()">
                <span>New Approval Requests</span>
                <i class="fas fa-chevron-right"></i>
            </div>

            <div id="messages-area">
                </div>

            <div class="bottom-bar">
                <div class="input-pill">
                    <i class="fas fa-paperclip action-icon" onclick="triggerDocs()"></i>
                    <input type="text" id="msg-input" placeholder="Message" oninput="toggleInputMode()">
                    <i class="fas fa-camera action-icon"></i>
                </div>
                <button id="mic-send-btn" class="record-btn" onmousedown="startRecording()" onmouseup="stopRecording()">
                    <i id="btn-icon" class="fas fa-microphone"></i>
                </button>
            </div>
        </section>

        <div id="popup-overlay" class="overlay hidden">
            <div id="approval-popup" class="popup">
                <h3 style="margin-top: 0;">Pending Requests</h3>
                <div id="request-list"></div>
                <button class="primary-btn" onclick="closePopup()">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentMode = 'create';
        let currentUser = null;
        let activeLounge = null;
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        // Logic: Tab Switching
        window.setMode = (mode) => {
            currentMode = mode;
            document.getElementById('tab-create').classList.toggle('active', mode === 'create');
            document.getElementById('tab-join').classList.toggle('active', mode === 'join');
            document.getElementById('admin-only-fields').classList.toggle('hidden', mode === 'join');
            document.getElementById('room-name').classList.toggle('hidden', mode === 'join');
            document.getElementById('room-code-input').classList.toggle('hidden', mode === 'create');
            checkInputs();
        };

        window.checkInputs = () => {
            const name = document.getElementById('user-name').value;
            const rName = document.getElementById('room-name').value;
            const code = document.getElementById('room-code-input').value;
            const btn = document.getElementById('submit-btn');

            if(currentMode === 'create') {
                btn.disabled = !(name && rName);
            } else {
                btn.disabled = !(name && code);
            }
        };

        // Logic: Initialization
        window.initLounge = async () => {
            const name = document.getElementById('user-name').value;
            const rName = document.getElementById('room-name').value;
            const codeInput = document.getElementById('room-code-input').value;
            const uid = 'user_' + Date.now();

            if(currentMode === 'create') {
                const newCode = Math.floor(100000 + Math.random() * 900000).toString();
                const loungeData = {
                    name: rName,
                    code: newCode,
                    admin: uid,
                    avatar: 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png',
                    members: [uid],
                    pending: []
                };
                await setDoc(doc(db, "lounges", newCode), loungeData);
                enterChat(loungeData, {uid, name, role: 'admin'});
            } else {
                const docRef = doc(db, "lounges", codeInput);
                const docSnap = await getDoc(docRef);
                if(docSnap.exists()){
                    const data = docSnap.data();
                    await updateDoc(docRef, {
                        pending: [...data.pending, {uid, name}]
                    });
                    alert("Knocking... Wait for admin approval.");
                } else {
                    alert("Invalid Lounge Code");
                }
            }
        };

        function enterChat(lounge, user) {
            currentUser = user;
            activeLounge = lounge;
            document.getElementById('entrance-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('header-name').innerText = lounge.name;
            document.getElementById('header-code-sub').innerText = "Code: #" + lounge.code;
            document.getElementById('header-img').src = lounge.avatar;
            
            if(user.role === 'admin') {
                listenForRequests(lounge.code);
            }
            listenForMessages(lounge.code);
        }

        // Real-time Listeners
        function listenForMessages(code) {
            onSnapshot(collection(db, "lounges", code, "messages"), (querySnapshot) => {
                const area = document.getElementById('messages-area');
                area.innerHTML = '';
                querySnapshot.docs.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.senderId === currentUser.uid ? 'mine' : 'theirs'}`;
                    div.innerText = `${m.senderName}: ${m.text}`;
                    area.appendChild(div);
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        function listenForRequests(code) {
            onSnapshot(doc(db, "lounges", code), (doc) => {
                const data = doc.data();
                if(data.pending.length > 0) {
                    document.getElementById('admin-approval-banner').classList.remove('hidden');
                    updateRequestList(data.pending);
                } else {
                    document.getElementById('admin-approval-banner').classList.add('hidden');
                }
            });
        }

        // Audio Logic
        window.startRecording = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = sendAudio;
            audioChunks = [];
            mediaRecorder.start();
            document.getElementById('btn-icon').className = "fas fa-circle-notch fa-spin";
        };

        window.stopRecording = () => {
            if(mediaRecorder) {
                mediaRecorder.stop();
                document.getElementById('btn-icon').className = "fas fa-microphone";
            }
        };

        async function sendAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            // Upload to storage then addDoc to messages
            console.log("Audio ready to send:", audioBlob);
        }

        window.toggleInputMode = () => {
            const input = document.getElementById('msg-input').value;
            const btn = document.getElementById('mic-send-btn');
            const icon = document.getElementById('btn-icon');
            if(input.length > 0) {
                icon.className = "fas fa-paper-plane";
                btn.onmousedown = null;
                btn.onclick = sendMessage;
            } else {
                icon.className = "fas fa-microphone";
                btn.onclick = null;
                btn.onmousedown = startRecording;
            }
        };

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            await addDoc(collection(db, "lounges", activeLounge.code, "messages"), {
                text: input.value,
                senderId: currentUser.uid,
                senderName: currentUser.name,
                timestamp: Date.now()
            });
            input.value = '';
            toggleInputMode();
        };

        // Approval Management
        function updateRequestList(pending) {
            const list = document.getElementById('request-list');
            list.innerHTML = '';
            pending.forEach(p => {
                const item = document.createElement('div');
                item.style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;";
                item.innerHTML = `<span>${p.name}</span> <button onclick="approveUser('${p.uid}')" style="background:green; color:white; border:none; padding:5px 10px; border-radius:5px;">Approve</button>`;
                list.appendChild(item);
            });
        }

        window.showApprovalList = () => {
            document.getElementById('popup-overlay').classList.remove('hidden');
        };
        window.closePopup = () => {
            document.getElementById('popup-overlay').classList.add('hidden');
        };
    </script>
</body>
</html>
