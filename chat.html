<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Routing</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, mode, uid: userUid } = session;

        document.addEventListener('DOMContentLoaded', async () => {
            if (mode === 'create') {
                // --- INSTANT CREATION: BYPASS VERIFICATION ---
                window.location.replace('chats.html');
            } else {
                // --- JOINER: MUST VERIFY & KNOCK ---
                const loungeSnap = await getDoc(doc(db, "lounges", loungeId));
                if (!loungeSnap.exists()) {
                    alert("Lounge Not Found. Returning to lobby.");
                    window.location.replace('page.html');
                    return;
                }

                document.getElementById('wait-ui').style.display = 'block';
                
                // Send Request
                const reqRef = doc(db, "lounges", loungeId, "requests", userUid);
                await setDoc(reqRef, { name: userName, uid: userUid, status: 'pending', timestamp: serverTimestamp() });

                // Listen for Admin
                onSnapshot(reqRef, (snap) => {
                    if (snap.exists() && snap.data().status === 'accepted') window.location.replace('chats.html');
                    if (snap.exists() && snap.data().status === 'rejected') {
                        alert("Your request was declined.");
                        window.location.replace('page.html');
                    }
                });
            }
        });
    </script>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #wait-ui { display: none; text-align: center; }
        .loader { width: 30px; height: 30px; border: 3px solid #2a3942; border-top-color: #00a884; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="wait-ui">
        <div class="loader"></div>
        <p>Knocking on the Lounge door...</p>
    </div>
</body>
</html>
