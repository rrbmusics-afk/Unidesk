<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Secure Infrastructure</title>
    
    <link rel="stylesheet" href="chat.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="app-container">
        <section id="auth-screen" class="screen active">
            <div class="brand-hero">
                <div class="logo-animation"></div>
                <h1>Aethercore</h1>
                <div class="security-tag">
                    <span class="material-symbols-rounded">verified_user</span>
                    <span>END-TO-END ENCRYPTED HUB</span>
                </div>
            </div>

            <div class="auth-module">
                <div class="tab-system">
                    <button id="t-create" class="tab-trigger active" onclick="ui.tab('create')">Create Room</button>
                    <button id="t-join" class="tab-trigger" onclick="ui.tab('join')">Join Room</button>
                </div>

                <div class="form-container">
                    <div id="p-create" class="panel active">
                        <div class="input-architect">
                            <label>Master Admin Name</label>
                            <input type="text" id="admin-name" placeholder="E.g. Alexander Pierce" autocomplete="off">
                        </div>
                        <div class="input-architect">
                            <label>Group Identity</label>
                            <input type="text" id="group-name" placeholder="E.g. Project Aether" autocomplete="off">
                        </div>
                        <button id="btn-create" class="prime-action" disabled onclick="core.initRoom()">
                            <span>Initialize Secure Room</span>
                            <span class="material-symbols-rounded">chevron_right</span>
                        </button>
                    </div>

                    <div id="p-join" class="panel">
                        <div class="input-architect">
                            <label>Your Identity</label>
                            <input type="text" id="user-name" placeholder="Your Full Name" autocomplete="off">
                        </div>
                        <div class="input-architect">
                            <label>Secure Room Code</label>
                            <input type="text" id="room-code" placeholder="6-Digit Alpha Code" autocomplete="off">
                        </div>
                        <button id="btn-join" class="prime-action" disabled onclick="core.requestEntry()">
                            <span>Request Access</span>
                            <span class="material-symbols-rounded">lock_open</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <footer class="legal-footer">
                By entering, you agree to Aethercore's Enterprise Security Protocols.
            </footer>
        </section>

        <section id="chat-screen" class="screen">
            </section>
    </div>

    <script src="chat.js"></script>
</body>
</html>
