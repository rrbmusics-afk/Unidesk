<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AetherCore | Gateway</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';

        const { user: userName, lounge: loungeId, mode, uid: userUid } = session;

        async function startGateway() {
            const loungeRef = doc(db, "lounges", loungeId);
            const loungeSnap = await getDoc(loungeRef);

            // 1. Admin Bypass
            if (mode === 'create') {
                // If creating, ensure admin data is set then go to lounge
                await setDoc(loungeRef, { 
                    admin: userName,
                    adminUid: userUid,
                    loungeName: session.loungeName || "New Lounge" 
                }, { merge: true });
                
                window.location.replace('chats.html');
                return;
            }

            // 2. Member Knocking
            const myReqRef = doc(db, "lounges", loungeId, "requests", userUid);
            
            // Create the request
            await setDoc(myReqRef, {
                name: userName,
                uid: userUid,
                status: 'pending',
                timestamp: serverTimestamp()
            });

            // Update UI to show waiting state
            document.getElementById('gate-ui').innerHTML = `
                <div class="container">
                    <div class="radar">
                        <div class="circle"></div>
                        <div class="circle"></div>
                        <div class="circle"></div>
                    </div>
                    <h2>Request Sent</h2>
                    <p>Waiting for the Admin to grant access to <strong>${loungeId}</strong></p>
                    <div class="user-badge">${userName}</div>
                </div>
            `;

            // 3. Listen for approval/rejection
            onSnapshot(myReqRef, (snap) => {
                if (snap.exists()) {
                    const status = snap.data().status;
                    if (status === 'accepted') {
                        window.location.replace('chats.html');
                    } else if (status === 'rejected') {
                        window.location.href = 'decline.html';
                    }
                }
            });
        }

        window.onload = startGateway;
    </script>

    <style>
        :root { --bg: #0b141a; --accent: #58a6ff; }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container { text-align: center; width: 90%; max-width: 400px; }
        
        /* Pulse Animation */
        .radar { position: relative; width: 100px; height: 100px; margin: 0 auto 30px; }
        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: pulse 2s infinite;
        }
        .circle:nth-child(2) { animation-delay: 0.6s; }
        .circle:nth-child(3) { animation-delay: 1.2s; }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        h2 { font-weight: 700; font-size: 1.5rem; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: #8696a0; font-size: 0.95rem; line-height: 1.5; }
        strong { color: var(--accent); }

        .user-badge {
            margin-top: 40px;
            display: inline-block;
            background: rgba(88, 166, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.2);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="gate-ui">
        <p>Connecting to AetherCore...</p>
    </div>
</body>
</html>
