<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Secure Lounge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <!-- Header: Corporate Branding & Info Trigger -->
    <header class="main-header" onclick="toggleInfo()">
        <div class="h-content">
            <div class="pfp-mini-wrapper">
                <img id="header-pfp" src="https://api.dicebear.com/7.x/bottts/svg?seed=Aether" class="pfp-circle">
                <div class="status-dot"></div>
            </div>
            <div class="h-meta">
                <h3 id="room-name-display">Aethercore Hub</h3>
                <span id="room-status">Encrypted Lounge</span>
            </div>
        </div>
        <div class="h-actions">
            <i class="fas fa-shield-halved"></i>
        </div>
    </header>

    <!-- Admin Notification: Real-time "Knock" Management -->
    <div id="admin-banner" class="admin-banner hidden" onclick="openApprovals()">
        <div class="banner-flex">
            <i class="fas fa-user-plus"></i>
            <span><b id="req-count">0</b> Pending Entry Requests</span>
        </div>
        <i class="fas fa-chevron-right"></i>
    </div>

    <!-- The Message Theatre -->
    <main id="chat-scroller" class="doodle-surface">
        <div class="e2ee-notice">
            <i class="fas fa-lock"></i>
            Messages are secured via Aethercore End-to-End protocols. No one outside this lounge can read them.
        </div>
        <div id="message-container"></div>
    </main>

    <!-- Professional Input Bar -->
    <footer class="input-bar">
        <div class="input-container">
            <button class="tool-btn"><i class="fas fa-plus"></i></button>
            <input type="text" id="msg-input" placeholder="Message..." autocomplete="off" oninput="toggleInputState()">
            <button id="send-btn" class="action-btn circle-mode" onclick="handleSend()">
                <i id="action-icon" class="fas fa-microphone"></i>
            </button>
        </div>
    </footer>

    <!-- Approval Modal (Managed by Admin) -->
    <div id="approval-modal" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Entry Requests</h3>
                <button onclick="closeApprovals()">&times;</button>
            </div>
            <div id="req-list" class="modal-list"></div>
        </div>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
