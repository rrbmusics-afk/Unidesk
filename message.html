<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Secure Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; --bg: #050608; --surface: #0F1116; --border: rgba(255,255,255,0.06); 
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; 
            height: 100vh; overflow: hidden; margin: 0;
        }

        /* 5. Unique Doodle Background */
        #chat-flow {
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Placeholder for your company doodle */
            background-color: var(--bg);
            background-blend-mode: overlay;
        }

        /* 4. Knocking Animation */
        .knocking-pulse {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 6. Static Keyboard Buffer */
        .input-dock {
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--surface);
        }

        /* WhatsApp-style Context Menu */
        .context-menu {
            position: absolute; background: #1c1e26; border: 1px solid var(--border);
            border-radius: 12px; display: none; z-index: 1000; width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .context-menu button {
            width: 100%; padding: 12px; text-align: left; font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- HEADER SYSTEM -->
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
        <header onclick="openGroupInfo()" class="h-16 flex items-center px-5 gap-4 active:bg-white/5 transition-all">
            <img id="group-pfp-header" src="https://ui-avatars.com/api/?name=Lounge&background=2D7FF9&color=fff" class="w-10 h-10 rounded-full object-cover">
            <div class="flex-1">
                <h1 id="group-name-header" class="text-sm font-bold tracking-tight">Student Lounge</h1>
                <p id="group-status" class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">End-to-End Encrypted</p>
            </div>
            <i class="fa-solid fa-chevron-right text-[10px] opacity-30"></i>
        </header>
        
        <!-- 4. Join Code & Pending Requests Bar -->
        <div class="bg-blue-600/10 h-10 flex items-center justify-between px-5 border-t border-white/5">
            <div class="flex items-center gap-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase">Access:</span>
                <span id="display-key" class="text-[10px] text-blue-500 font-black tracking-widest">------</span>
            </div>
            <button id="admin-req-trigger" onclick="openRequestPopup()" class="hidden bg-blue-600 text-[9px] px-3 py-1 rounded-full font-black animate-bounce">
                PENDING REQUESTS
            </button>
        </div>
    </div>

    <!-- MAIN CHAT FLOW -->
    <main id="chat-flow" class="absolute top-28 bottom-20 left-0 right-0 overflow-y-auto p-5 flex flex-direction-column gap-4"></main>

    <!-- 12. INPUT DOCK (Voice & Docs) -->
    <footer class="fixed bottom-0 left-0 right-0 z-50 input-dock">
        <div class="flex items-center gap-3 p-3">
            <div class="flex-1 bg-white/5 rounded-2xl flex items-center px-4 border border-white/5">
                <button onclick="document.getElementById('doc-upload').click()">
                    <i class="fa-solid fa-paperclip text-gray-400"></i>
                </button>
                <input type="file" id="doc-upload" multiple class="hidden">
                <input type="text" id="main-input" class="flex-1 bg-transparent py-3 px-3 text-sm outline-none" placeholder="Message...">
            </div>
            
            <!-- Dynamic Voice/Send Button -->
            <button id="action-btn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i id="action-icon" class="fa-solid fa-microphone text-sm"></i>
            </button>
        </div>
    </footer>

    <!-- POPUPS (Group Info, Request List, Image View) -->
    <div id="overlay" class="fixed inset-0 bg-black/90 z-[100] hidden overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-8">
            <button onclick="closePopups()" class="text-xs font-bold tracking-widest text-gray-500">CLOSE</button>
            <h2 id="popup-title" class="text-xs font-black uppercase tracking-[0.2em]">Group Info</h2>
            <div class="w-8"></div>
        </div>
        <div id="popup-content" class="flex flex-col items-center"></div>
    </div>

    <div id="context-menu" class="context-menu">
        <button onclick="editMsg()">Edit</button>
        <button onclick="deleteForMe()">Delete for me</button>
        <button onclick="deleteForEveryone()" class="text-red-500">Delete for everyone</button>
        <button onclick="viewSeenBy()">Seen by...</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Configuration
        const firebaseConfig = { /* ... Use existing config from summary ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let myRole = localStorage.getItem('user_role'); // 'admin' or 'member'
        let roomCode = localStorage.getItem('lounge_code');
        let myName = localStorage.getItem('user_name');

        // 12. Voice Recorder Logic
        let mediaRecorder;
        let audioChunks = [];
        const actionBtn = document.getElementById('action-btn');
        const actionIcon = document.getElementById('action-icon');
        const mainInput = document.getElementById('main-input');

        // Switch between Microphone and Send
        mainInput.oninput = (e) => {
            if(e.target.value.trim() !== "") {
                actionIcon.className = "fa-solid fa-paper-plane text-sm";
            } else {
                actionIcon.className = "fa-solid fa-microphone text-sm";
            }
        };

        // Long Press to Record
        let pressTimer;
        actionBtn.onmousedown = actionBtn.ontouchstart = (e) => {
            if(mainInput.value.trim() !== "") return; // Send text instead
            pressTimer = setTimeout(() => {
                startRecording();
                actionBtn.classList.add('bg-red-500', 'scale-110');
            }, 200);
        };

        actionBtn.onmouseup = actionBtn.ontouchend = () => {
            clearTimeout(pressTimer);
            if(mediaRecorder && mediaRecorder.state === "recording") {
                stopAndSendAudio();
                actionBtn.classList.remove('bg-red-500', 'scale-110');
            } else if(mainInput.value.trim() !== "") {
                sendMessage(mainInput.value);
                mainInput.value = "";
                actionIcon.className = "fa-solid fa-microphone text-sm";
            }
        };

        // 3. Group Info & Admin Actions
        window.openGroupInfo = () => {
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('popup-content');
            overlay.classList.remove('hidden');
            
            content.innerHTML = `
                <div class="relative mb-6">
                    <img id="info-pfp" src="${localStorage.getItem('group_pfp')}" class="w-40 h-40 rounded-full border-4 border-white/5 object-cover">
                    ${myRole === 'admin' ? `
                        <button onclick="document.getElementById('pfp-input').click()" class="absolute bottom-2 right-2 bg-blue-600 w-10 h-10 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-camera text-xs"></i>
                        </button>
                        <input type="file" id="pfp-input" class="hidden" onchange="uploadPFP(this)">
                    ` : ''}
                </div>
                <h2 class="text-xl font-bold mb-1">${localStorage.getItem('group_name')}</h2>
                <p class="text-xs text-gray-500 mb-8 tracking-widest uppercase">Room Code: ${roomCode}</p>
                
                <div class="w-full flex flex-col gap-2">
                    ${myRole === 'admin' ? `
                        <button onclick="renameGroup()" class="w-full p-4 bg-white/5 rounded-xl text-left text-sm font-bold">Rename Group</button>
                        <button onclick="deleteGroup()" class="w-full p-4 bg-red-900/20 text-red-500 rounded-xl text-left text-sm font-bold">Delete Group</button>
                    ` : ''}
                    <button onclick="leaveGroup()" class="w-full p-4 bg-white/5 rounded-xl text-left text-sm font-bold">Leave Group</button>
                </div>
                
                <div class="w-full mt-10">
                    <h3 class="text-[10px] font-black uppercase text-gray-500 mb-4 tracking-widest">Members</h3>
                    <div id="member-list" class="flex flex-col gap-4"></div>
                </div>
            `;
            loadMembers();
        };

        // Real-time Member Sync
        function loadMembers() {
            onValue(ref(db, `rooms/${roomCode}/members`), (snap) => {
                const list = document.getElementById('member-list');
                if(!list) return;
                list.innerHTML = '';
                snap.forEach(child => {
                    const m = child.val();
                    list.innerHTML += `
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold">${m.name[0]}</div>
                            <span class="text-sm font-medium">${m.name}</span>
                            ${m.role === 'admin' ? '<span class="text-[8px] bg-blue-600/20 text-blue-500 px-2 py-0.5 rounded ml-auto uppercase font-bold">Admin</span>' : ''}
                        </div>
                    `;
                });
            });
        }

        // Encryption Layer (Simple AES Implementation)
        async function encrypt(text) {
            // Real implementation would use SubtleCrypto with room-specific keys
            return btoa(text); 
        }

        async function sendMessage(text, type = "text") {
            const encrypted = await encrypt(text);
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: encrypted,
                type: type,
                timestamp: Date.now(),
                seenBy: { [myName]: true }
            });
        }
    </script>
</body>
</html>
