<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --surface: #0F1116; --me: #005c4b; --them: #202c33; }
        * { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); margin: 0; height: 100dvh; display: flex; flex-direction: column; }
        
        header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        main {
            flex: 1; overflow-y: auto; padding: 15px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-size: 450px; background-color: var(--bg);
            display: flex; flex-direction: column; gap: 6px;
        }

        .bubble { max-width: 82%; padding: 8px 12px; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .me { align-self: flex-end; background: var(--me); border-radius: 12px 0 12px 12px; color: #e9edef; }
        .them { align-self: flex-start; background: var(--them); border-radius: 0 12px 12px 12px; color: #e9edef; }
        
        footer { background: #111b21; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
        .input-pill { flex: 1; background: #2a3942; border-radius: 25px; padding: 9px 15px; display: flex; items-center; }
        input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 15px; }
        
        .action-btn { 
            width: 45px; height: 45px; border-radius: 50%; background: #00a884; 
            display: flex; items-center; justify-content: center; border: none; color: #fff; 
        }
        .action-btn.send { background: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3">
            <i class="fas fa-arrow-left text-gray-500" onclick="history.back()"></i>
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Strategy" class="w-10 h-10 rounded-full bg-gray-900 border border-white/10">
            <div>
                <h3 class="text-sm font-bold">Strategy Hub</h3>
                <span class="text-[10px] text-green-500 font-bold uppercase">Online</span>
            </div>
        </div>
        <i class="fas fa-ellipsis-v text-gray-500"></i>
    </header>

    <main id="chat">
        <div class="flex justify-center my-4">
            <span class="bg-black/40 text-[10px] text-amber-200/50 px-3 py-1 rounded-md uppercase font-bold tracking-tighter">
                <i class="fas fa-lock mr-1"></i> Aethercore Encryption Active
            </span>
        </div>

        <div class="bubble them">
            <span class="text-[10px] font-bold text-blue-400 block mb-1 uppercase">Admin</span>
            The project files have been uploaded to the cloud.
            <div class="text-[9px] text-right opacity-40 mt-1">11:02 PM</div>
        </div>

        <div class="bubble me">
            Awesome! I'll start the review now.
            <div class="text-[9px] text-right opacity-40 mt-1">11:03 PM <i class="fas fa-check-double ml-1 text-blue-400"></i></div>
        </div>
    </main>

    <footer>
        <i class="fas fa-plus text-gray-500 text-xl"></i>
        <div class="input-pill">
            <input type="text" id="msg-in" placeholder="Message..." oninput="t()">
        </div>
        <button id="btn" class="action-btn"><i id="ico" class="fas fa-microphone"></i></button>
    </footer>

    <script>
        function t() {
            const v = document.getElementById('msg-in').value.trim();
            const b = document.getElementById('btn');
            const i = document.getElementById('ico');
            if(v) { b.classList.add('send'); i.className = 'fas fa-paper-plane ml-0.5'; }
            else { b.classList.remove('send'); i.className = 'fas fa-microphone'; }
        }
        const c = document.getElementById('chat');
        c.scrollTop = c.scrollHeight;
    </script>
</body>
</html>
