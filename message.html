<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116; 
            --border: rgba(255,255,255,0.1); 
        }

        * { 
            font-family: 'Space Grotesk', sans-serif; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        /* 1. Prevent body from scrolling/moving when keyboard opens */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: var(--bg);
            position: fixed; /* Fixes body to viewport */
            width: 100%;
        }

        /* 2. Fixed Header - Never moves */
        header { 
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(15, 17, 22, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 50;
            display: flex;
            align-items: center;
            padding: 0 20px;
            padding-top: env(safe-area-inset-top);
        }

        /* 3. Independent Scrollable Chat Flow */
        main { 
            position: absolute;
            top: 70px; /* Header height */
            bottom: 85px; /* Footer height */
            left: 0; right: 0;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* 4. Fixed Input Dock - Stays above keyboard */
        footer { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
            z-index: 50;
        }

        /* Bubble Styles */
        .bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; border: 1px solid var(--border); position: relative; }
        .me { align-self: flex-end; background: #12141C; border-color: rgba(45, 127, 249, 0.3); border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #181A20; border-bottom-left-radius: 4px; }
        .sender-tag { font-size: 10px; font-weight: 800; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }

        /* Request Pop-up Style */
        #req-bar {
            display: none;
            background: #12141C;
            border: 1px solid var(--accent);
            border-radius: 16px;
            margin: 0 10px 15px 10px;
            padding: 12px;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-approve { background: var(--accent); color: #fff; font-weight: 700; border-radius: 8px; padding: 6px 12px; font-size: 11px; }
        
        .text-box { 
            flex: 1; background: #000; border: 1px solid var(--border); border-radius: 12px; 
            padding: 12px; color: #fff; font-size: 16px; 
        }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-4 w-full">
            <img id="h-pfp" class="w-10 h-10 rounded-xl bg-gray-800 border border-white/10 object-cover">
            <div class="flex-1">
                <h3 id="h-title" class="text-sm font-bold tracking-tight">Lounge</h3>
                <span id="h-code" class="text-[9px] text-blue-500 font-bold tracking-widest uppercase">#------</span>
            </div>
            <div id="admin-badge" class="hidden"><i class="fas fa-crown text-amber-500 text-xs"></i></div>
        </div>
    </header>

    <main id="chat-flow"></main>

    <footer>
        <!-- Request Notification: Only appears when needed -->
        <div id="req-bar">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold uppercase tracking-tight text-gray-400">Join Request</span>
                </div>
                <div id="req-actions" class="flex gap-2"></div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <input type="text" id="msg-input" class="text-box" placeholder="Message..." autocomplete="off">
            <button id="send-btn" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');

        // Initial UI Setup
        document.getElementById('h-title').innerText = localStorage.getItem('lounge_title');
        document.getElementById('h-code').innerText = "#" + roomCode;
        document.getElementById('h-pfp').src = localStorage.getItem('user_pfp');
        if(role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');

        // Admin Request Handling
        if (role === 'admin') {
            onValue(ref(db, `rooms/${roomCode}/requests`), (snap) => {
                const reqs = snap.val();
                const bar = document.getElementById('req-bar');
                const actions = document.getElementById('req-actions');
                actions.innerHTML = '';
                
                if (reqs) {
                    const pending = Object.entries(reqs).filter(([id, data]) => data.status === 'pending');
                    if (pending.length > 0) {
                        bar.style.display = 'block';
                        const [name, data] = pending[0]; // Show first pending request
                        actions.innerHTML = `
                            <span class="text-[11px] font-bold self-center mr-2">${name}</span>
                            <button onclick="respond('${name}', 'approved')" class="btn-approve">ACCEPT</button>
                            <button onclick="respond('${name}', 'denied')" class="text-xs px-2 text-gray-500">×</button>
                        `;
                    } else { bar.style.display = 'none'; }
                } else { bar.style.display = 'none'; }
            });
        }

        window.respond = (name, status) => {
            if (status === 'approved') set(ref(db, `rooms/${roomCode}/requests/${name}/status`), 'approved');
            else remove(ref(db, `rooms/${roomCode}/requests/${name}`));
        };

        // Chat Logic
        const chatFlow = document.getElementById('chat-flow');
        const sendBtn = document.getElementById('send-btn');
        const msgIn = document.getElementById('msg-input');

        sendBtn.onclick = () => {
            if (!msgIn.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: msgIn.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            msgIn.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const msg = snap.val();
            const isMe = msg.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="sender-tag">${msg.sender}</div>` : ''}
                <div>${msg.text}</div>
                <div class="text-[8px] opacity-20 text-right mt-1">${msg.time}</div>
            `;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        });

        // Mobile Soft-Keyboard Optimization
        msgIn.addEventListener('focus', () => {
            setTimeout(() => { chatFlow.scrollTop = chatFlow.scrollHeight; }, 300);
        });
    </script>
</body>
</html>
