<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge | Secure Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116;
            --bubble-me: #161B22; /* Deep Blue-Grey */
            --bubble-them: #1C2128; 
            --border: rgba(255,255,255,0.06);
        }

        * { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; margin: 0; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* High-Fidelity Header */
        header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-top: env(safe-area-inset-top);
        }

        /* Chat Scroller with Subtle Doodle */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: soft-light;
            background-size: 400px;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Themed Bubbles (No Green) */
        .bubble {
            max-width: 82%;
            padding: 10px 14px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            border: 1px solid var(--border);
        }
        
        .me {
            align-self: flex-end;
            background: var(--bubble-me);
            border-radius: 18px 18px 4px 18px;
            border-color: rgba(45, 127, 249, 0.2); /* Slight Blue Tint */
        }

        .them {
            align-self: flex-start;
            background: var(--bubble-them);
            border-radius: 18px 18px 18px 4px;
        }

        .meta {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 6px;
            opacity: 0.4;
            display: flex;
            justify-content: flex-end;
            gap: 4px;
        }

        /* Themed Input Bar */
        footer {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--border);
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
        }

        .input-pill {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 15px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 15px; /* Squircle style */
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 16px rgba(45, 127, 249, 0.2);
        }

        .action-btn:active { transform: scale(0.9); opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <div class="flex items-center gap-3">
            <i class="fas fa-chevron-left text-gray-500 text-lg" onclick="history.back()"></i>
            <img id="head-pfp" src="" class="w-10 h-10 rounded-2xl border border-white/10 bg-gray-900 object-cover">
            <div>
                <h3 id="head-title" class="text-[15px] font-bold tracking-tight text-white leading-none">Lounge</h3>
                <span id="head-code" class="text-[10px] text-[#2D7FF9] font-black uppercase tracking-[0.2em] mt-1 block">#000000</span>
            </div>
        </div>
        <div class="flex gap-5 text-gray-500">
            <i class="fas fa-shield-halved text-sm"></i>
            <i class="fas fa-ellipsis-vertical text-sm"></i>
        </div>
    </header>

    <main id="chat-flow">
        <div class="flex justify-center my-4">
            <span class="bg-blue-500/5 text-[9px] text-[#2D7FF9] px-4 py-1.5 rounded-full border border-blue-500/20 font-bold uppercase tracking-widest">
                <i class="fas fa-bolt-lightning mr-2"></i> Encrypted Session Active
            </span>
        </div>

        <div class="bubble them">
            <span class="text-[9px] font-black text-[#2D7FF9] block mb-1 uppercase tracking-wider">Lounge Bot</span>
            Authentication successful. Welcome to the Student Lounge.
            <div class="meta">Connected</div>
        </div>

        <div class="bubble me">
            Initialize secure data transfer.
            <div class="meta">
                12:45 PM <i class="fas fa-check-double text-[#2D7FF9]"></i>
            </div>
        </div>
    </main>

    <footer>
        <button class="text-gray-500 text-xl"><i class="fas fa-plus"></i></button>
        <div class="input-pill">
            <input type="text" id="user-msg" placeholder="Type a message..." oninput="syncUI()">
            <i class="far fa-face-smile text-gray-600 ml-2"></i>
        </div>
        <button id="send-btn" class="action-btn">
            <i id="send-icon" class="fas fa-microphone"></i>
        </button>
    </footer>

    <script>
        window.onload = () => {
            const pfp = localStorage.getItem('user_pfp');
            const name = localStorage.getItem('user_name');
            const title = localStorage.getItem('lounge_title');
            
            // Generate a random code for display if none exists
            const code = localStorage.getItem('lounge_code') || Math.floor(100000 + Math.random() * 900000);

            if(pfp) document.getElementById('head-pfp').src = pfp;
            if(title) document.getElementById('head-title').innerText = title;
            document.getElementById('head-code').innerText = "#" + code;

            const chat = document.getElementById('chat-flow');
            chat.scrollTop = chat.scrollHeight;
        };

        function syncUI() {
            const input = document.getElementById('user-msg');
            const icon = document.getElementById('send-icon');
            
            if(input.value.trim().length > 0) {
                icon.className = 'fas fa-paper-plane';
            } else {
                icon.className = 'fas fa-microphone';
            }
        }
    </script>
</body>
</html>
