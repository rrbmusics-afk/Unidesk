<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Student Lounge | Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --surface: #0F1116; --border: rgba(255,255,255,0.06); }
        * { font-family: 'Space Grotesk', sans-serif; outline: none; }
        body { background: var(--bg); color: #fff; margin: 0; height: 100dvh; overflow: hidden; }

        /* Knocking Overlay */
        #waiting-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #050608 100%);
        }

        .pulse-logo {
            font-size: 3rem; font-weight: 900; font-style: italic; color: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }

        /* Admin Requests Pop-up */
        #req-popup {
            position: absolute; top: 70px; left: 10px; right: 10px; 
            background: #14171C; border: 1px solid var(--accent); border-radius: 20px;
            padding: 15px; z-index: 50; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .req-card {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; margin-bottom: 8px;
        }

        /* Re-using previous Chat Styles */
        header { background: var(--surface); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: soft-light; background-size: 400px; }
        .bubble { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; border: 1px solid var(--border); }
        .me { align-self: flex-end; background: #161B22; border-radius: 18px 18px 4px 18px; border-color: #2D7FF944; }
        .them { align-self: flex-start; background: #1C2128; border-radius: 18px 18px 18px 4px; }
        footer { background: var(--surface); padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .input-pill { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; }
        input { background: transparent; border: none; color: #fff; width: 100%; }
        .action-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="waiting-screen" class="hidden">
        <div class="pulse-logo uppercase">Knocking...</div>
        <p class="text-gray-500 text-xs tracking-widest mt-4">WAITING FOR ADMIN APPROVAL</p>
        <div class="mt-10 flex gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.4s]"></div>
        </div>
    </div>

    <div id="req-popup">
        <div class="flex justify-between items-center mb-4">
            <h4 class="text-[10px] font-black text-blue-500 tracking-[0.2em] uppercase">Entry Requests</h4>
            <i class="fas fa-times text-gray-500" onclick="toggleReqs()"></i>
        </div>
        <div id="req-list">
            </div>
    </div>

    <header>
        <div class="flex items-center gap-3">
            <i class="fas fa-chevron-left text-gray-500" onclick="history.back()"></i>
            <img id="h-pfp" class="w-10 h-10 rounded-2xl border border-white/10 bg-gray-900 object-cover">
            <div>
                <h3 id="h-title" class="text-[15px] font-bold leading-none">Lounge</h3>
                <span id="h-code" class="text-[10px] text-blue-500 font-black mt-1 block">#000000</span>
            </div>
        </div>
        <div id="admin-tools" class="hidden relative" onclick="toggleReqs()">
            <i class="fas fa-user-plus text-gray-400"></i>
            <div id="req-count" class="absolute -top-2 -right-2 bg-red-600 text-[8px] w-4 h-4 rounded-full hidden flex items-center justify-center font-bold">0</div>
        </div>
    </header>

    <main id="chat-flow"></main>

    <footer>
        <button class="text-gray-500"><i class="fas fa-plus"></i></button>
        <div class="input-pill"><input type="text" id="msg-input" placeholder="Message..."></div>
        <button id="send-btn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');

        // Initial UI Setup
        document.getElementById('h-title').innerText = localStorage.getItem('lounge_title') || "Lounge";
        document.getElementById('h-code').innerText = "#" + roomCode;
        document.getElementById('h-pfp').src = localStorage.getItem('user_pfp') || '';

        // --- JOINER LOGIC ---
        if (role === 'joiner') {
            document.getElementById('waiting-screen').classList.remove('hidden');
            // Listen for Approval
            onValue(ref(db, `rooms/${roomCode}/requests/${myName}`), (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === 'approved') {
                    document.getElementById('waiting-screen').classList.add('hidden');
                }
            });
        }

        // --- ADMIN LOGIC ---
        if (role === 'admin') {
            document.getElementById('admin-tools').classList.remove('hidden');
            // Watch for Requests
            onValue(ref(db, `rooms/${roomCode}/requests`), (snapshot) => {
                const reqs = snapshot.val();
                const list = document.getElementById('req-list');
                const badge = document.getElementById('req-count');
                list.innerHTML = '';
                
                if (reqs) {
                    const pending = Object.values(reqs).filter(r => r.status === 'pending');
                    badge.innerText = pending.length;
                    badge.classList.toggle('hidden', pending.length === 0);

                    pending.forEach(req => {
                        const div = document.createElement('div');
                        div.className = 'req-card';
                        div.innerHTML = `
                            <div class="flex items-center gap-2">
                                <img src="${req.pfp}" class="w-8 h-8 rounded-lg object-cover">
                                <span class="text-xs font-bold">${req.name}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approve('${req.name}')" class="bg-blue-600 text-[10px] px-3 py-1 rounded-lg">ACCEPT</button>
                                <button onclick="reject('${req.name}')" class="bg-red-900/50 text-[10px] px-3 py-1 rounded-lg">DENY</button>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            });
        }

        window.approve = (name) => {
            set(ref(db, `rooms/${roomCode}/requests/${name}/status`), 'approved');
        };
        window.reject = (name) => {
            remove(ref(db, `rooms/${roomCode}/requests/${name}`));
        };
        window.toggleReqs = () => {
            const p = document.getElementById('req-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };

        // --- CHAT LOGIC ---
        const sendBtn = document.getElementById('send-btn');
        const msgIn = document.getElementById('msg-input');
        
        sendBtn.onclick = () => {
            if (!msgIn.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: msgIn.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            msgIn.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const msg = snap.val();
            const isMe = msg.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="text-[9px] font-black text-blue-500 uppercase mb-1">${msg.sender}</div>` : ''}
                <div>${msg.text}</div>
                <div class="text-[8px] opacity-40 text-right mt-1">${msg.time}</div>
            `;
            document.getElementById('chat-flow').appendChild(div);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        });
    </script>
</body>
</html>
