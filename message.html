<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Student Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116; 
            --border: rgba(255,255,255,0.08); 
            --me-bubble: #12141C; /* Dark Slate Blue */
            --them-bubble: #181A20; /* Deep Charcoal */
        }
        * { font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

        /* 1. Knocking Screen - Architecturally Minimal */
        #waiting-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .knock-loader { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 2. Premium Header */
        header { 
            background: var(--surface); padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid var(--border); padding-top: env(safe-area-inset-top); 
        }
        .header-pfp { width: 42px; height: 42px; border-radius: 14px; border: 1px solid var(--border); object-cover: cover; }

        /* 3. Chat Area - Optimized Scannability */
        main { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(circle at center, #0B0D12 0%, #050608 100%);
        }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; border: 1px solid var(--border); }
        .me { align-self: flex-end; background: var(--me-bubble); border-bottom-right-radius: 4px; border-color: rgba(45, 127, 249, 0.2); }
        .them { align-self: flex-start; background: var(--them-bubble); border-bottom-left-radius: 4px; }
        .sender { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 4. Mobile-First Input Dock */
        footer { 
            background: var(--surface); padding: 12px 16px; border-top: 1px solid var(--border);
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
        }
        .input-wrapper { display: flex; align-items: center; gap: 10px; }
        .text-box { 
            flex: 1; background: #000; border: 1px solid var(--border); border-radius: 16px; 
            padding: 12px 16px; color: #fff; font-size: 16px; transition: border 0.3s;
        }
        .text-box:focus { border-color: var(--accent); }
        .btn-action { 
            width: 48px; height: 48px; background: var(--accent); color: #fff; 
            border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(45, 127, 249, 0.3);
        }

        /* 5. Request Pop-up - Corporate Standard */
        #req-popup {
            position: absolute; top: 80px; left: 16px; right: 16px; 
            background: var(--surface); border: 1px solid var(--accent); border-radius: 24px;
            padding: 20px; z-index: 50; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .req-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="waiting-screen" class="hidden">
        <div class="knock-loader mb-6"></div>
        <h2 class="text-xl font-bold tracking-tighter italic">KNOCKING...</h2>
        <p class="text-[10px] text-gray-500 tracking-[0.3em] uppercase mt-2">Awaiting Admin Response</p>
    </div>

    <div id="req-popup">
        <div class="flex justify-between items-center mb-4">
            <span class="text-[10px] font-black text-blue-500 tracking-widest uppercase">Entry Requests</span>
            <i class="fas fa-times opacity-40" onclick="toggleReqs()"></i>
        </div>
        <div id="req-list"></div>
    </div>

    <header>
        <div class="flex items-center gap-4">
            <i class="fas fa-arrow-left opacity-30" onclick="history.back()"></i>
            <img id="h-pfp" class="header-pfp bg-gray-900">
            <div>
                <h3 id="h-title" class="text-sm font-bold leading-none tracking-tight">Lounge</h3>
                <span id="h-code" class="text-[9px] text-blue-500 font-bold tracking-widest mt-1 block uppercase">#000000</span>
            </div>
        </div>
        <div id="admin-notif" class="hidden relative p-2" onclick="toggleReqs()">
            <i class="fas fa-shield-halved text-blue-500"></i>
            <div id="badge" class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        </div>
    </header>

    <main id="chat-flow"></main>

    <footer>
        <div class="input-wrapper">
            <button class="w-10 text-gray-600"><i class="fas fa-plus"></i></button>
            <input type="text" id="msg-input" class="text-box" placeholder="Write a message...">
            <button id="send-btn" class="btn-action"><i class="fas fa-paper-plane"></i></button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');

        document.getElementById('h-title').innerText = localStorage.getItem('lounge_title') || "Student Lounge";
        document.getElementById('h-code').innerText = "#" + roomCode;
        document.getElementById('h-pfp').src = localStorage.getItem('user_pfp') || '';

        if (role === 'joiner') {
            document.getElementById('waiting-screen').classList.remove('hidden');
            onValue(ref(db, `rooms/${roomCode}/requests/${myName}`), (snap) => {
                if (snap.val()?.status === 'approved') document.getElementById('waiting-screen').classList.add('hidden');
            });
        } else {
            document.getElementById('admin-notif').classList.remove('hidden');
            onValue(ref(db, `rooms/${roomCode}/requests`), (snap) => {
                const reqs = snap.val();
                const list = document.getElementById('req-list');
                const badge = document.getElementById('badge');
                list.innerHTML = '';
                if (reqs) {
                    const pending = Object.values(reqs).filter(r => r.status === 'pending');
                    badge.classList.toggle('hidden', pending.length === 0);
                    pending.forEach(req => {
                        const item = document.createElement('div');
                        item.className = 'req-item';
                        item.innerHTML = `
                            <div class="flex items-center gap-3">
                                <img src="${req.pfp}" class="w-8 h-8 rounded-lg">
                                <span class="text-xs font-bold uppercase">${req.name}</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approve('${req.name}')" class="text-[9px] font-bold text-blue-500 border border-blue-500/30 px-3 py-1.5 rounded-lg">APPROVE</button>
                                <button onclick="reject('${req.name}')" class="text-[9px] font-bold text-red-500 px-3 py-1.5">DENY</button>
                            </div>`;
                        list.appendChild(item);
                    });
                }
            });
        }

        window.approve = (name) => set(ref(db, `rooms/${roomCode}/requests/${name}/status`), 'approved');
        window.reject = (name) => remove(ref(db, `rooms/${roomCode}/requests/${name}`));
        window.toggleReqs = () => {
            const p = document.getElementById('req-popup');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        };

        const sendBtn = document.getElementById('send-btn');
        const msgIn = document.getElementById('msg-input');
        sendBtn.onclick = () => {
            if (!msgIn.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: msgIn.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            msgIn.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const msg = snap.val();
            const isMe = msg.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="sender">${msg.sender}</div>` : ''}
                <div>${msg.text}</div>
                <div class="text-[8px] opacity-30 text-right mt-2">${msg.time}</div>`;
            document.getElementById('chat-flow').appendChild(div);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        });
    </script>
</body>
</html>
