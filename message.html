<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Secure Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --surface: #0F1116; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        #chat-window { background-color: var(--bg); background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); background-blend-mode: overlay; }
        .input-dock { padding-bottom: env(safe-area-inset-bottom); background: var(--surface); z-index: 100; border-top: 1px solid var(--border); }
        .message-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; position: relative; font-size: 14px; line-height: 1.5; }
        .sent { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: #1c1e26; border-bottom-left-radius: 4px; }
        .context-menu { position: absolute; background: #1c1e26; border: 1px solid var(--border); border-radius: 14px; display: none; z-index: 2000; width: 200px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); overflow: hidden; }
        .context-menu button { width: 100%; padding: 14px 18px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- 1. PREMIUM HEADER -->
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-2xl border-b border-white/5">
        <header onclick="toggleGroupInfo()" class="h-16 flex items-center px-5 gap-4 active:bg-white/5">
            <img id="header-pfp" src="https://ui-avatars.com/api/?name=Lounge&background=2D7FF9&color=fff" class="w-10 h-10 rounded-full object-cover">
            <div class="flex-1">
                <h1 id="header-group-name" class="text-sm font-bold tracking-tight">Student Lounge</h1>
                <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">End-to-End Encrypted</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical opacity-30"></i>
        </header>
        <div id="admin-header-bar" class="bg-blue-600/10 h-11 flex items-center justify-between px-5 border-t border-white/5">
            <div class="flex items-center gap-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase">Code:</span>
                <span id="header-code" class="text-[10px] text-blue-500 font-black tracking-widest">---</span>
            </div>
            <button id="admin-notif" onclick="showApprovalPopup()" class="hidden bg-blue-600 text-white text-[9px] px-3 py-1.5 rounded-full font-black animate-pulse">PENDING REQUESTS</button>
        </div>
    </div>

    <!-- 2. CHAT SURFACE -->
    <main id="chat-window" class="absolute top-[108px] bottom-[80px] left-0 right-0 overflow-y-auto p-5 flex flex-col gap-4"></main>

    <!-- 3. INPUT SYSTEM -->
    <footer class="fixed bottom-0 left-0 right-0 input-dock">
        <div class="flex items-center gap-3 p-3">
            <div class="flex-1 bg-white/5 rounded-2xl flex items-center px-4 border border-white/5">
                <button onclick="document.getElementById('attach-file').click()" class="text-gray-400 p-1">
                    <i class="fa-solid fa-paperclip"></i>
                </button>
                <input type="file" id="attach-file" multiple class="hidden">
                <input type="text" id="chat-input" class="flex-1 bg-transparent py-3 px-3 text-sm outline-none" placeholder="Message...">
            </div>
            <button id="action-btn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg transition-transform active:scale-90">
                <i id="action-icon" class="fa-solid fa-microphone text-sm"></i>
            </button>
        </div>
    </footer>

    <div id="context-menu" class="context-menu">
        <button onclick="deleteForEveryone()" class="text-red-500 font-bold">Delete for everyone</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let currentRoom = "LOUNGE_001"; 
        let myId = "USER_" + Math.floor(Math.random() * 1000);
        let myName = "Dev User";

        const encrypt = (text) => btoa(text);
        const decrypt = (text) => atob(text);

        // --- 12. MESSAGE SYNC & RENDERING ---
        function syncMessages() {
            const q = query(collection(db, `rooms/${currentRoom}/messages`), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-window');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    renderMessage(data, doc.id);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        function renderMessage(data, id) {
            const container = document.getElementById('chat-window');
            const isMe = data.senderId === myId;
            const content = decrypt(data.content);
            const div = document.createElement('div');
            div.className = `message-bubble ${isMe ? 'sent' : 'received'}`;
            
            if (data.type === 'image') {
                div.innerHTML = `<img src="${content}" class="w-48 h-48 object-cover rounded-lg" onclick="window.open('${content}')">`;
            } else if (data.type === 'voice') {
                div.innerHTML = `<audio controls class="h-8 w-40"><source src="${content}" type="audio/mpeg"></audio>`;
            } else if (data.type === 'doc') {
                div.innerHTML = `<a href="${content}" target="_blank" class="flex items-center gap-2 text-[10px] font-bold underline"><i class="fa-solid fa-file"></i> DOWNLOAD DOCUMENT</a>`;
            } else {
                div.innerText = content;
            }
            
            div.oncontextmenu = (e) => {
                e.preventDefault();
                showMenu(e, id);
            };
            container.appendChild(div);
        }

        // --- 12. MEDIA & VOICE LOGIC ---
        let mediaRecorder;
        let audioChunks = [];
        const actionBtn = document.getElementById('action-btn');

        async function sendPayload(content, type = 'text') {
            await addDoc(collection(db, `rooms/${currentRoom}/messages`), {
                senderId: myId, content: encrypt(content), type: type, timestamp: serverTimestamp()
            });
        }

        document.getElementById('attach-file').onchange = async (e) => {
            const file = e.target.files[0];
            const type = file.type.startsWith('image') ? 'image' : 'doc';
            const fileRef = sRef(storage, `rooms/${currentRoom}/${Date.now()}`);
            const upload = await uploadBytes(fileRef, file);
            const url = await getDownloadURL(upload.ref);
            await sendPayload(url, type);
        };

        actionBtn.onmousedown = async () => {
            if (document.getElementById('chat-input').value) return;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                const fileRef = sRef(storage, `rooms/${currentRoom}/voice/${Date.now()}.mp3`);
                const upload = await uploadBytes(fileRef, blob);
                const url = await getDownloadURL(upload.ref);
                await sendPayload(url, 'voice');
            };
            mediaRecorder.start();
            actionBtn.classList.add('bg-red-500');
        };

        actionBtn.onmouseup = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                actionBtn.classList.remove('bg-red-500');
            } else if (document.getElementById('chat-input').value) {
                sendPayload(document.getElementById('chat-input').value);
                document.getElementById('chat-input').value = "";
            }
        };

        syncMessages();
    </script>
</body>
</html>
