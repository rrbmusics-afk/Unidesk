<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Student Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116; 
            --border: rgba(255,255,255,0.06); 
        }

        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); position: fixed; width: 100%; font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }

        /* Architectural Header */
        .header-system {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(5, 6, 8, 0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border);
        }

        header { 
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; padding-top: env(safe-area-inset-top);
        }

        /* The Access Key: Aesthetic Sub-bar */
        .access-key-bar {
            height: 38px; background: rgba(255,255,255,0.02); display: flex; 
            align-items: center; justify-content: center; gap: 12px;
            border-top: 1px solid var(--border);
        }

        /* Chat Layout Management */
        main { 
            position: absolute; 
            top: calc(98px + env(safe-area-inset-top)); 
            bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
            -webkit-overflow-scrolling: touch;
        }

        /* Static Footer */
        footer { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 14px 20px; padding-bottom: calc(env(safe-area-inset-bottom) + 14px);
        }

        /* Message Componentry */
        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 14px; border: 1px solid var(--border); line-height: 1.5; }
        .me { align-self: flex-end; background: #111319; border-color: rgba(45, 127, 249, 0.15); border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #16181D; border-bottom-left-radius: 4px; }
        
        /* Professional Request Interaction */
        #request-notification {
            display: none; background: var(--accent); border-radius: 14px;
            margin-bottom: 14px; padding: 14px; animation: entry 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes entry { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .input-field { 
            flex: 1; background: #000; border: 1px solid var(--border); border-radius: 16px; 
            padding: 14px; color: #fff; font-size: 16px; outline: none;
        }
    </style>
</head>
<body>

    <div class="header-system">
        <header>
            <span class="text-[10px] font-bold tracking-[0.3em] uppercase opacity-40">Aethercore</span>
            <h1 class="text-xs font-bold tracking-[0.1em] uppercase">Student Lounge</h1>
            <div id="status-dot" class="w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.5)]"></div>
        </header>
        <div class="access-key-bar">
            <span class="text-[8px] text-gray-500 font-bold tracking-[0.4em] uppercase">Access Key</span>
            <span id="lounge-key" class="text-[10px] text-blue-500 font-black tracking-[0.3em]">------</span>
        </div>
    </div>

    <main id="conversation-flow"></main>

    <footer>
        <div id="request-notification">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-user-plus text-[10px]"></i>
                    <span id="requester-id" class="text-[10px] font-black uppercase tracking-widest">Entry Request</span>
                </div>
                <div class="flex gap-5">
                    <button onclick="processEntry('approved')" class="text-[10px] font-black underline underline-offset-4">GRANT ACCESS</button>
                    <button onclick="processEntry('denied')" class="text-[10px] font-bold opacity-50">DENY</button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <input type="text" id="chat-input" class="input-field" placeholder="Share a thought..." autocomplete="off">
            <button id="send-action" class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center transition-transform active:scale-90">
                <i class="fas fa-paper-plane text-[13px]"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');
        let currentApplicant = null;

        document.getElementById('lounge-key').innerText = roomCode;

        // Secure Entry Management (Admin Only)
        if (role === 'admin') {
            onValue(ref(db, `rooms/${roomCode}/requests`), (snap) => {
                const requests = snap.val();
                const notify = document.getElementById('request-notification');
                if (requests) {
                    const pending = Object.entries(requests).find(([_, data]) => data.status === 'pending');
                    if (pending) {
                        currentApplicant = pending[0];
                        document.getElementById('requester-id').innerText = `${currentApplicant} REQUESTING ENTRY`;
                        notify.style.display = 'block';
                    } else { notify.style.display = 'none'; }
                } else { notify.style.display = 'none'; }
            });
        }

        window.processEntry = (status) => {
            if (status === 'approved') set(ref(db, `rooms/${roomCode}/requests/${currentApplicant}/status`), 'approved');
            else remove(ref(db, `rooms/${roomCode}/requests/${currentApplicant}`));
        };

        // Real-time Chat Engine
        const chatFlow = document.getElementById('conversation-flow');
        const input = document.getElementById('chat-input');

        document.getElementById('send-action').onclick = () => {
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: input.value,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            input.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const data = snap.val();
            const isMe = data.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="text-[9px] font-black text-blue-500 mb-1.5 uppercase tracking-[0.1em]">${data.sender}</div>` : ''}
                <div class="font-medium">${data.text}</div>
                <div class="text-[8px] opacity-20 text-right mt-1.5">${data.timestamp}</div>
            `;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        });

        // Fixed Viewport Logic for Mobile Keyboards
        input.addEventListener('focus', () => {
            setTimeout(() => { chatFlow.scrollTop = chatFlow.scrollHeight; }, 300);
        });
    </script>
</body>
</html>
