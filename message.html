<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Lounge | Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --surface: #0F1116; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        
        #chat-window { 
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); 
            background-blend-mode: overlay; 
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
        .sent { background: var(--accent); border-bottom-right-radius: 4px; }
        .received { background: #1c1e26; border-bottom-left-radius: 4px; }

        .input-dock { 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: rgba(15, 17, 22, 0.9);
            backdrop-blur: 20px;
            border-top: 1px solid var(--border);
        }

        /* Container for Admin Requests */
        #admin-request-well {
            position: fixed;
            top: 105px; /* Directly below the header */
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 16px;
            pointer-events: none; /* Allows clicking through to chat if empty */
        }
        #admin-request-well > div { pointer-events: auto; }
    </style>
</head>
<body>

    <!-- 1. CORPORATE HEADER -->
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-2xl border-b border-white/5">
        <header class="h-16 flex items-center px-5 gap-4">
            <!-- PROFILE PICTURE FIX -->
            <img id="header-pfp" src="" class="w-10 h-10 rounded-full object-cover border border-white/10 hidden">
            <div id="pfp-fallback" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-xs border border-white/10">?</div>
            
            <div class="flex-1">
                <h1 id="header-lounge-name" class="text-sm font-bold tracking-tight">Loading...</h1>
                <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Secured Connection</p>
            </div>
            <button onclick="copyCode()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-link text-xs"></i>
            </button>
        </header>
        
        <div class="bg-blue-600/10 h-9 flex items-center justify-between px-5 border-t border-white/5">
            <span class="text-[10px] text-blue-500 font-black tracking-widest uppercase" id="display-code">------</span>
            <div class="flex items-center gap-2">
                <span class="text-[8px] text-gray-500 font-bold">STATUS:</span>
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
            </div>
        </div>
    </div>

    <!-- 2. ADMIN REQUEST AREA -->
    <div id="admin-request-well"></div>

    <!-- 3. MESSAGE STREAM -->
    <main id="chat-window" class="absolute top-[100px] bottom-[85px] left-0 right-0 overflow-y-auto p-5 flex flex-col gap-5"></main>

    <!-- 4. ACTION BAR -->
    <footer class="fixed bottom-0 left-0 right-0 input-dock px-4 py-3">
        <div class="flex items-center gap-3 max-w-4xl mx-auto">
            <div class="flex-1 bg-white/5 rounded-2xl flex items-center px-4 border border-white/5 focus-within:border-blue-500/50 transition-all">
                <button onclick="document.getElementById('file-input').click()" class="text-gray-500 hover:text-blue-500 transition-colors">
                    <i class="fa-solid fa-paperclip text-sm"></i>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <input type="text" id="chat-msg" class="flex-1 bg-transparent py-3.5 px-3 text-sm outline-none placeholder:text-gray-600" placeholder="Type message...">
            </div>
            <button id="send-btn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all">
                <i id="send-icon" class="fa-solid fa-microphone text-sm"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fs = getFirestore(app);

        // --- SESSION DATA ---
        const myName = localStorage.getItem('user_name');
        const myPfp = localStorage.getItem('user_pfp');
        const loungeCode = localStorage.getItem('lounge_code');
        const loungeTitle = localStorage.getItem('lounge_title');
        const myRole = localStorage.getItem('user_role');
        const myId = "UID_" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // --- HEADER SETUP ---
        document.getElementById('header-lounge-name').innerText = loungeTitle;
        document.getElementById('display-code').innerText = loungeCode;
        
        // Load PFP into Header
        if(myPfp) {
            const pfpEl = document.getElementById('header-pfp');
            pfpEl.src = myPfp;
            pfpEl.classList.remove('hidden');
            document.getElementById('pfp-fallback').classList.add('hidden');
        } else {
            document.getElementById('pfp-fallback').innerText = myName ? myName[0].toUpperCase() : "?";
        }

        // --- 1. ADMIN APPROVAL ENGINE ---
        if (myRole === 'admin') {
            const reqRef = ref(db, `rooms/${loungeCode}/requests`);
            onValue(reqRef, (snap) => {
                const data = snap.val();
                if (data) {
                    Object.keys(data).forEach(uName => {
                        if (data[uName].status === 'pending') {
                            showBanner(uName, data[uName]);
                        }
                    });
                }
            });
        }

        function showBanner(name, info) {
            const bId = `banner-${name.replace(/\s+/g, '')}`;
            if (document.getElementById(bId)) return;

            const banner = document.createElement('div');
            banner.id = bId;
            banner.className = "bg-[#2D7FF9] p-4 rounded-3xl flex items-center justify-between shadow-2xl border border-white/20";
            banner.innerHTML = `
                <div class="flex items-center gap-3">
                    <img src="${info.pfp || 'https://ui-avatars.com/api/?name='+name}" class="w-10 h-10 rounded-full object-cover border-2 border-white/20">
                    <div>
                        <p class="text-[9px] font-black uppercase opacity-70">Entry Request</p>
                        <p class="text-sm font-bold text-white">${name}</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="approveUser('${name}')" class="bg-white text-black px-5 py-2.5 rounded-2xl text-[10px] font-black">ALLOW</button>
                    <button onclick="this.parentElement.parentElement.remove()" class="bg-black/20 text-white px-3 rounded-2xl"><i class="fas fa-x"></i></button>
                </div>
            `;
            document.getElementById('admin-request-well').appendChild(banner);
        }

        // Make approveUser global for the button
        window.approveUser = async (name) => {
            await update(ref(db, `rooms/${loungeCode}/requests/${name}`), { status: 'approved' });
            document.getElementById(`banner-${name.replace(/\s+/g, '')}`)?.remove();
        };

        // --- 2. MESSAGING ENGINE ---
        const input = document.getElementById('chat-msg');
        const sendBtn = document.getElementById('send-btn');
        const sendIcon = document.getElementById('send-icon');

        input.oninput = () => {
            const hasVal = input.value.trim().length > 0;
            sendIcon.className = hasVal ? "fa-solid fa-paper-plane text-sm" : "fa-solid fa-microphone text-sm";
        };

        sendBtn.onclick = async () => {
            if (input.value.trim()) {
                await sendMessage(input.value.trim(), 'text');
                input.value = "";
                input.oninput();
            }
        };

        async function sendMessage(payload, type) {
            await addDoc(collection(fs, `rooms/${loungeCode}/chats`), {
                uid: myId,
                uName: myName,
                uPfp: myPfp, 
                msg: btoa(payload),
                type: type,
                time: serverTimestamp()
            });
        }

        // --- 3. LIVE STREAM LISTENER ---
        const q = query(collection(fs, `rooms/${loungeCode}/chats`), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.uid === myId;
                const body = atob(d.msg);

                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                div.innerHTML = `
                    <div class="flex items-end gap-2 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                        <img src="${d.uPfp || 'https://ui-avatars.com/api/?name='+d.uName}" class="w-8 h-8 rounded-full object-cover border border-white/5">
                        <div class="msg ${isMe ? 'sent' : 'received'}">
                            ${d.type === 'image' ? `<img src="${body}" class="rounded-xl w-full">` : body}
                        </div>
                    </div>
                    <span class="text-[8px] text-gray-600 mt-1 uppercase font-bold tracking-widest mx-10">${d.uName}</span>
                `;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });

        window.copyCode = () => {
            navigator.clipboard.writeText(loungeCode);
            alert("Lounge Code Copied!");
        };
    </script>
</body>
</html>
