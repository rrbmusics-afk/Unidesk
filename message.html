<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --accent: #2D7FF9; --bg: #050608; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        
        #chat-window { 
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png"); 
            background-blend-mode: overlay; 
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
        .sent { background: var(--accent); border-bottom-right-radius: 4px; }
        .received { background: #1c1e26; border-bottom-left-radius: 4px; }

        /* Admin Request Area - Below Header */
        #admin-request-well {
            position: fixed; top: 105px; left: 0; right: 0; z-index: 100;
            display: flex; flex-direction: column; gap: 10px; padding: 0 16px; pointer-events: none;
        }
        #admin-request-well > div { pointer-events: auto; }

        .input-dock { 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            background: rgba(15, 17, 22, 0.9); backdrop-blur: 20px; border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <!-- 1. WHATSAPP STYLE HEADER -->
    <div class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-2xl border-b border-white/5">
        <header class="h-16 flex items-center px-5 gap-4">
            <!-- Group/Profile Icon -->
            <div class="relative w-10 h-10 flex-shrink-0">
                <img id="header-pfp" src="" class="w-10 h-10 rounded-full object-cover border border-white/10 hidden">
                <div id="pfp-fallback" class="w-10 h-10 rounded-full bg-[#2D7FF9] flex items-center justify-center font-bold text-white border border-white/10">
                    <i class="fa-solid fa-user-group text-xs"></i>
                </div>
            </div>
            
            <div class="flex-1 min-w-0">
                <h1 id="header-lounge-name" class="text-sm font-bold tracking-tight truncate">Aethercore Lounge</h1>
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_5px_#22c55e]"></div>
                    <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active Connection</p>
                </div>
            </div>

            <button onclick="copyCode()" class="w-9 h-9 rounded-full bg-white/5 flex items-center justify-center active:scale-90 transition-transform">
                <i class="fa-solid fa-link text-[10px]"></i>
            </button>
        </header>
        
        <div class="bg-blue-600/10 h-9 flex items-center justify-between px-5 border-t border-white/5">
            <span class="text-[10px] text-blue-500 font-black tracking-widest uppercase" id="display-code">------</span>
            <span class="text-[8px] text-gray-500 font-bold uppercase">End-to-End Encrypted</span>
        </div>
    </div>

    <!-- 2. ADMIN APPROVAL SLOTS -->
    <div id="admin-request-well"></div>

    <!-- 3. MESSAGE STREAM -->
    <main id="chat-window" class="absolute top-[100px] bottom-[85px] left-0 right-0 overflow-y-auto p-5 flex flex-col gap-5"></main>

    <!-- 4. ACTION BAR -->
    <footer class="fixed bottom-0 left-0 right-0 input-dock px-4 py-3">
        <div class="flex items-center gap-3 max-w-4xl mx-auto">
            <div class="flex-1 bg-white/5 rounded-2xl flex items-center px-4 border border-white/5">
                <button onclick="document.getElementById('file-input').click()" class="text-gray-500 hover:text-blue-500">
                    <i class="fa-solid fa-camera text-sm"></i>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <input type="text" id="chat-msg" class="flex-1 bg-transparent py-3.5 px-3 text-sm outline-none placeholder:text-gray-600" placeholder="Type message...">
            </div>
            <button id="send-btn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all">
                <i id="send-icon" class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const fs = getFirestore(app);

        // --- IDENTITY & DATA ---
        const myName = localStorage.getItem('user_name');
        const myPfp = localStorage.getItem('user_pfp');
        const lCode = localStorage.getItem('lounge_code');
        const lTitle = localStorage.getItem('lounge_title');
        const myRole = localStorage.getItem('user_role');
        const myId = "USR_" + Math.random().toString(36).substr(2, 4).toUpperCase();

        // --- UI INITIALIZATION ---
        document.getElementById('header-lounge-name').innerText = lTitle || "Aethercore Lounge";
        document.getElementById('display-code').innerText = lCode;

        // LOAD HEADER PROFILE (WHATSAPP STYLE)
        if(myPfp && myPfp.length > 10) {
            const hPfp = document.getElementById('header-pfp');
            hPfp.src = myPfp;
            hPfp.classList.remove('hidden');
            document.getElementById('pfp-fallback').classList.add('hidden');
        }

        // --- 1. ADMIN LISTENER ---
        if (myRole === 'admin') {
            onValue(ref(db, `rooms/${lCode}/requests`), (snap) => {
                const data = snap.val();
                if (data) {
                    Object.keys(data).forEach(uName => {
                        if (data[uName].status === 'pending') renderBanner(uName, data[uName]);
                    });
                }
            });
        }

        function renderBanner(name, info) {
            const id = `req-${name.replace(/\s+/g, '')}`;
            if (document.getElementById(id)) return;

            const banner = document.createElement('div');
            banner.id = id;
            banner.className = "bg-[#2D7FF9] p-4 rounded-3xl flex items-center justify-between shadow-2xl border border-white/20 animate-pulse";
            banner.innerHTML = `
                <div class="flex items-center gap-3">
                    <img src="${info.pfp || 'https://ui-avatars.com/api/?name='+name}" class="w-10 h-10 rounded-full object-cover border-2 border-white/20">
                    <div>
                        <p class="text-[9px] font-black uppercase opacity-70">New Request</p>
                        <p class="text-sm font-bold text-white">${name}</p>
                    </div>
                </div>
                <button onclick="approve('${name}')" class="bg-white text-black px-5 py-2.5 rounded-2xl text-[10px] font-black">ALLOW</button>
            `;
            document.getElementById('admin-request-well').appendChild(banner);
        }

        window.approve = async (name) => {
            await update(ref(db, `rooms/${lCode}/requests/${name}`), { status: 'approved' });
            document.getElementById(`req-${name.replace(/\s+/g, '')}`)?.remove();
        };

        // --- 2. CHAT LOGIC ---
        const input = document.getElementById('chat-msg');
        const sendBtn = document.getElementById('send-btn');

        sendBtn.onclick = async () => {
            const val = input.value.trim();
            if (val) {
                await addDoc(collection(fs, `rooms/${lCode}/chats`), {
                    uid: myId, uName: myName, uPfp: myPfp,
                    msg: btoa(val), type: 'text', time: serverTimestamp()
                });
                input.value = "";
            }
        };

        onSnapshot(query(collection(fs, `rooms/${lCode}/chats`), orderBy("time", "asc")), (snap) => {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.uid === myId;
                const body = atob(d.msg);
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                div.innerHTML = `
                    <div class="flex items-end gap-2 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                        <img src="${d.uPfp || 'https://ui-avatars.com/api/?name='+d.uName}" class="w-8 h-8 rounded-full object-cover border border-white/10">
                        <div class="msg ${isMe ? 'sent' : 'received'}">${body}</div>
                    </div>
                `;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });

        window.copyCode = () => { navigator.clipboard.writeText(lCode); alert("Code Copied!"); };
    </script>
</body>
</html>
