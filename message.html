<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116; 
            --border: rgba(255,255,255,0.08); 
        }

        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); position: fixed; width: 100%; font-family: 'Space Grotesk', sans-serif;
        }

        /* 1. Static Header Group */
        .header-wrapper {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: var(--bg);
        }

        header { 
            height: 65px; display: flex; align-items: center; padding: 0 20px;
            padding-top: env(safe-area-inset-top); border-bottom: 1px solid var(--border);
        }

        /* The Dedicated Code Bar */
        .code-bar {
            height: 35px; background: #0A0C10; display: flex; align-items: center; 
            justify-content: center; border-bottom: 1px solid var(--border);
        }

        /* 2. Scrollable Chat - Offset by Header + Code Bar height */
        main { 
            position: absolute; top: calc(65px + 35px + env(safe-area-inset-top)); 
            bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* 3. Footer / Input Dock */
        footer { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 12px 16px; padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
        }

        /* Professional UI Elements */
        .bubble { max-width: 82%; padding: 12px 16px; border-radius: 20px; font-size: 14px; border: 1px solid var(--border); }
        .me { align-self: flex-end; background: #12141C; border-color: rgba(45, 127, 249, 0.2); border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #181A20; border-bottom-left-radius: 4px; }
        
        #req-toast {
            display: none; background: var(--accent); color: #fff; border-radius: 12px;
            margin-bottom: 12px; padding: 10px 15px; animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .text-box { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 14px; padding: 12px; color: #fff; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header>
            <div class="flex items-center gap-4 w-full">
                <img id="h-pfp" class="w-9 h-9 rounded-xl border border-white/10 object-cover bg-gray-900">
                <h3 id="h-title" class="text-sm font-bold tracking-tight flex-1">Lounge</h3>
                <div id="admin-icon" class="hidden"><i class="fas fa-shield-check text-blue-500 text-xs"></i></div>
            </div>
        </header>
        <div class="code-bar">
            <span class="text-[10px] text-gray-500 font-bold tracking-[0.4em] uppercase">Join Code: </span>
            <span id="display-code" class="text-[10px] text-blue-500 font-black tracking-[0.2em] ml-2">------</span>
        </div>
    </div>

    <main id="chat-flow"></main>

    <footer>
        <!-- Professional Request Alert: Only visible when someone knocks -->
        <div id="req-toast">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 bg-white rounded-full animate-ping"></div>
                    <span id="req-name" class="text-[11px] font-black uppercase">User is Knocking</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="respond('approved')" class="text-[11px] font-black underline decoration-2">APPROVE</button>
                    <button onclick="respond('denied')" class="text-[11px] font-bold opacity-70">DECLINE</button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <input type="text" id="msg-input" class="text-box" placeholder="Write a message..." autocomplete="off">
            <button id="send-btn" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/20">
                <i class="fas fa-paper-plane text-sm"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');
        let currentKnocker = null;

        // UI Initialization
        document.getElementById('h-title').innerText = localStorage.getItem('lounge_title');
        document.getElementById('display-code').innerText = roomCode;
        document.getElementById('h-pfp').src = localStorage.getItem('user_pfp');
        if(role === 'admin') document.getElementById('admin-icon').classList.remove('hidden');

        // Request Monitoring
        if (role === 'admin') {
            onValue(ref(db, `rooms/${roomCode}/requests`), (snap) => {
                const reqs = snap.val();
                const toast = document.getElementById('req-toast');
                if (reqs) {
                    const pending = Object.entries(reqs).find(([id, data]) => data.status === 'pending');
                    if (pending) {
                        currentKnocker = pending[0];
                        document.getElementById('req-name').innerText = `${currentKnocker} IS KNOCKING`;
                        toast.style.display = 'block';
                    } else { toast.style.display = 'none'; }
                } else { toast.style.display = 'none'; }
            });
        }

        window.respond = (status) => {
            if (status === 'approved') set(ref(db, `rooms/${roomCode}/requests/${currentKnocker}/status`), 'approved');
            else remove(ref(db, `rooms/${roomCode}/requests/${currentKnocker}`));
        };

        // Chat Logic
        const chatFlow = document.getElementById('chat-flow');
        const msgIn = document.getElementById('msg-input');

        document.getElementById('send-btn').onclick = () => {
            if (!msgIn.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: msgIn.value,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            msgIn.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const msg = snap.val();
            const isMe = msg.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="text-[9px] font-bold text-blue-500 mb-1 uppercase tracking-tighter">${msg.sender}</div>` : ''}
                <div>${msg.text}</div>
                <div class="text-[8px] opacity-20 text-right mt-1">${msg.time}</div>
            `;
            chatFlow.appendChild(div);
            chatFlow.scrollTop = chatFlow.scrollHeight;
        });

        // Ensure chat area stays synced with keyboard
        msgIn.addEventListener('focus', () => {
            setTimeout(() => { chatFlow.scrollTop = chatFlow.scrollHeight; }, 300);
        });
    </script>
</body>
</html>
