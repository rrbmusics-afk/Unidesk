<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aethercore | Student Lounge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root { 
            --accent: #2D7FF9; 
            --bg: #050608; 
            --surface: #0F1116; 
            --border: rgba(255,255,255,0.08); 
        }

        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); position: fixed; width: 100%; font-family: 'Space Grotesk', sans-serif;
            color: #fff;
        }

        /* Fixed Header & Code Bar */
        .navigation-dock {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(5, 6, 8, 0.9); backdrop-filter: blur(20px);
        }

        header { 
            height: 60px; display: flex; align-items: center; justify-content: center;
            padding-top: env(safe-area-inset-top); border-bottom: 1px solid var(--border);
        }

        .code-display-bar {
            height: 40px; background: #0A0C10; display: flex; align-items: center; 
            justify-content: center; border-bottom: 1px solid var(--border);
        }

        /* Scrollable Message Area */
        main { 
            position: absolute; 
            top: calc(100px + env(safe-area-inset-top)); 
            bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* Mobile Keyboard Optimized Footer */
        footer { 
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 12px 16px; padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
        }

        /* Premium Components */
        .bubble { max-width: 82%; padding: 12px 16px; border-radius: 20px; font-size: 14px; border: 1px solid var(--border); }
        .me { align-self: flex-end; background: #12141C; border-color: rgba(45, 127, 249, 0.2); border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #181A20; border-bottom-left-radius: 4px; }
        
        #admin-toast {
            display: none; background: var(--accent); border-radius: 12px;
            margin-bottom: 12px; padding: 12px; animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .text-input { 
            flex: 1; background: #000; border: 1px solid var(--border); border-radius: 14px; 
            padding: 12px; color: #fff; font-size: 16px; /* Prevents iOS auto-zoom */
        }
    </style>
</head>
<body>

    <div class="navigation-dock">
        <header>
            <h1 class="text-sm font-bold tracking-[0.2em] uppercase">Student Lounge</h1>
        </header>
        <div class="code-display-bar">
            <span class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">Lounge Code:</span>
            <span id="lounge-id" class="text-[10px] text-blue-500 font-black tracking-[0.2em] ml-2">------</span>
        </div>
    </div>

    <main id="chat-window"></main>

    <footer>
        <!-- Admin Approval Notification -->
        <div id="admin-toast">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div>
                    <span id="knocker-name" class="text-[10px] font-black uppercase tracking-tighter">New Request</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="handleRequest('approved')" class="text-[10px] font-black underline">APPROVE</button>
                    <button onclick="handleRequest('denied')" class="text-[10px] font-bold opacity-60">DECLINE</button>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <input type="text" id="chat-input" class="text-input" placeholder="Enter message..." autocomplete="off">
            <button id="send-trigger" class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-paper-plane text-xs"></i>
            </button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, onChildAdded, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            databaseURL: "https://unidesk-a70ac-default-rtdb.firebaseio.com",
            projectId: "unidesk-a70ac",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myName = localStorage.getItem('user_name');
        const role = localStorage.getItem('user_role');
        const roomCode = localStorage.getItem('lounge_code');
        let currentRequester = null;

        // Display Lounge Info
        document.getElementById('lounge-id').innerText = roomCode;

        // Admin-Specific Logic: Handle Approvals
        if (role === 'admin') {
            onValue(ref(db, `rooms/${roomCode}/requests`), (snap) => {
                const requests = snap.val();
                const toast = document.getElementById('admin-toast');
                if (requests) {
                    const pending = Object.entries(requests).find(([_, data]) => data.status === 'pending');
                    if (pending) {
                        currentRequester = pending[0];
                        document.getElementById('knocker-name').innerText = `${currentRequester} wants to join`;
                        toast.style.display = 'block';
                    } else { toast.style.display = 'none'; }
                } else { toast.style.display = 'none'; }
            });
        }

        window.handleRequest = (status) => {
            if (status === 'approved') set(ref(db, `rooms/${roomCode}/requests/${currentRequester}/status`), 'approved');
            else remove(ref(db, `rooms/${roomCode}/requests/${currentRequester}`));
        };

        // Chat Messaging Logic
        const chatWindow = document.getElementById('chat-window');
        const input = document.getElementById('chat-input');

        document.getElementById('send-trigger').onclick = () => {
            if (!input.value.trim()) return;
            push(ref(db, `rooms/${roomCode}/messages`), {
                sender: myName,
                text: input.value,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            input.value = '';
        };

        onChildAdded(ref(db, `rooms/${roomCode}/messages`), (snap) => {
            const data = snap.val();
            const isMe = data.sender === myName;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `
                ${!isMe ? `<div class="text-[9px] font-black text-blue-500 mb-1 uppercase tracking-tighter">${data.sender}</div>` : ''}
                <div>${data.text}</div>
                <div class="text-[8px] opacity-20 text-right mt-1">${data.timestamp}</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // Fixed UI handling for mobile keyboards
        input.addEventListener('focus', () => {
            setTimeout(() => { chatWindow.scrollTop = chatWindow.scrollHeight; }, 300);
        });
    </script>
</body>
</html>
