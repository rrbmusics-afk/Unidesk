<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidesk UI</title>
    <style>
        :root {
            --bg-color: #0b141a;
            --accent-blue: #4086f4;
            --card-dark: #121b22;
            --border-color: #1d2a35;
            --text-gray: #717e88;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        .brand-title {
            font-size: 58px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent-blue);
            letter-spacing: -2px;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 11px;
            letter-spacing: 4.5px;
            color: var(--text-gray);
            font-weight: 600;
            margin-bottom: 60px;
        }

        .container {
            width: 340px;
        }

        /* Featured Card: Student Lounge */
        .featured-card {
            border: 1.5px solid #1a4b8c;
            background: linear-gradient(180deg, rgba(64,134,244,0.05) 0%, rgba(11,20,26,0) 100%);
            border-radius: 45px;
            padding: 24px;
            display: flex;
            align-items: center;
            margin-bottom: 45px;
        }

        .blue-icon {
            width: 58px;
            height: 58px;
            background: linear-gradient(135deg, #4086f4 0%, #1a56b8 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* Toolkit Section */
        .toolkit-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-gray);
            font-weight: 700;
            margin-bottom: 18px;
            padding-left: 8px;
            text-transform: uppercase;
        }

        .tool-card {
            background-color: var(--card-dark);
            border-radius: 28px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            border: 1px solid transparent;
        }

        .dark-icon {
            width: 48px;
            height: 48px;
            background-color: #1c252c;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
        }

        /* Text Styles */
        .main-label {
            font-size: 17px;
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .sub-label {
            font-size: 11px;
            color: var(--text-gray);
            display: block;
        }

        .lounge-sub {
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #5a6b79;
        }

        .chevron {
            margin-left: auto;
            color: #2b579a;
            font-size: 20px;
            font-weight: 300;
        }

        /* Footer */
        footer {
            margin-top: 80px;
            font-size: 9px;
            letter-spacing: 4px;
            color: #3d4a54;
            font-weight: 600;
        }

        /* SVG Replacements for Pixel Accuracy */
        .icon-svg { width: 22px; height: 22px; fill: white; }
        .icon-resume { fill: #c59b48; }
    </style>
</head>
<body>

    <div class="brand-title">UNIDESK</div>
    <div class="brand-subtitle">STUDENT UTILITY SUITE</div>

    <div class="container">
        <!-- Student Lounge -->
        <div class="featured-card">
            <div class="blue-icon">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM4 4h16v12H5.17L4 17.17V4z"/></svg>
            </div>
            <div>
                <span class="main-label">Student Lounge</span>
                <span class="sub-label lounge-sub">Secure Communication</span>
            </div>
            <div class="chevron">›</div>
        </div>

        <div class="toolkit-label">Toolkit</div>

        <!-- Page Forge -->
        <div class="tool-card">
            <div class="dark-icon">
                <svg class="icon-svg" style="fill: #717e88;" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            </div>
            <div>
                <span class="main-label">Page Forge</span>
                <span class="sub-label">Images to PDF Converter</span>
            </div>
        </div>

        <!-- Resume Maker -->
        <div class="tool-card" style="opacity: 0.6;">
            <div class="dark-icon">
                <svg class="icon-svg icon-resume" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div>
                <span class="main-label">Resume Maker</span>
                <span class="sub-label">Professional CV Builder</span>
            </div>
        </div>
    </div>

    <footer>© 2026 AETHERCORE INTERACTIVE</footer>

</body>
</html>
