<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethercore Secure Chat</title>
    <link rel="stylesheet" href="chat.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        /* Critical fix for the stacking issue seen in your screenshot */
        .auth-form { display: none; }
        .auth-form.active { display: flex; flex-direction: column; }
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="brand-header">
                <h1>Aethercore</h1>
                <p>End-to-End Encrypted</p>
            </div>

            <div class="tabs">
                <button id="tab-create" class="tab-btn active" onclick="switchTab('create')">Create Room</button>
                <button id="tab-join" class="tab-btn" onclick="switchTab('join')">Join Room</button>
            </div>

            <div class="tab-content">
                <form id="create-form" class="auth-form active" onsubmit="return false;">
                    <div class="input-group">
                        <label>Admin Name</label>
                        <input type="text" id="admin-name" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label>Group Name</label>
                        <input type="text" id="group-name" placeholder="e.g. Project Alpha" required>
                    </div>
                    <button type="button" id="btn-create" class="primary-btn" onclick="handleCreate()" disabled>Create Experience</button>
                </form>

                <form id="join-form" class="auth-form" onsubmit="return false;">
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" id="user-name" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label>Room Code</label>
                        <input type="text" id="room-code-input" placeholder="Paste code here" required>
                    </div>
                    <button type="button" id="btn-join" class="primary-btn" onclick="handleJoin()" disabled>Knock to Join</button>
                </form>
            </div>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <header class="chat-header" onclick="openGroupInfo()">
            <div class="header-left">
                <div class="header-avatar">
                    <img id="header-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                </div>
                <div class="header-text">
                    <h2 id="chat-title">Group Name</h2>
                    <span id="chat-subtitle">Code: -----</span>
                </div>
            </div>
            <div class="header-right">
                <span class="material-icons-round">more_vert</span>
            </div>
        </header>

        <div id="admin-approval-banner" class="approval-banner hidden">
            <p><b id="req-count">0</b> Pending Requests</p>
            <button onclick="showApprovalPopup()">View</button>
        </div>

        <main id="chat-window" class="chat-main">
            </main>

        <footer class="chat-footer">
            <div class="input-area">
                <button class="action-icon" id="attach-btn" onclick="document.getElementById('doc-input').click()">
                    <span class="material-icons-round">attach_file</span>
                </button>
                <textarea id="message-input" placeholder="Message" rows="1"></textarea>
                <button class="voice-send-btn" id="voice-send-wrapper">
                    <span class="material-icons-round" id="mic-icon">mic</span>
                    <span class="material-icons-round hidden" id="send-icon">send</span>
                </button>
            </div>
        </footer>
    </div>

    <div id="group-info-overlay" class="overlay">
        <div class="overlay-card">
            <div class="overlay-header">
                <span class="material-icons-round" onclick="closeOverlay('group-info-overlay')">close</span>
                <h3>Group Info</h3>
            </div>
            <div class="info-content">
                <div class="profile-display">
                    <img id="info-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" onclick="zoomImage(this.src)">
                    <button class="admin-only hidden" onclick="document.getElementById('img-input').click()">
                        <span class="material-icons-round">photo_camera</span>
                    </button>
                </div>
                <h2 id="info-name">Group Name</h2>
                <p id="info-code" class="code-text">Code: </p>
                
                <div class="info-menu">
                    <button class="menu-item admin-only hidden" onclick="renameGroup()">Rename Group</button>
                    <button class="menu-item admin-only hidden text-red" onclick="deleteGroup()">Delete Group</button>
                    <button class="menu-item text-red" onclick="leaveGroup()">Leave Group</button>
                </div>
            </div>
        </div>
    </div>

    <div id="zoom-overlay" class="overlay" onclick="closeOverlay('zoom-overlay')">
        <div class="zoom-container">
            <img id="zoomed-image">
            <div class="zoom-actions">
                <button id="download-btn">Download</button>
            </div>
        </div>
    </div>

    <div id="approval-overlay" class="overlay">
        <div class="overlay-card">
            <h3>Pending Members</h3>
            <div id="approval-list"></div>
            <button class="close-btn" onclick="closeOverlay('approval-overlay')">Close</button>
        </div>
    </div>

    <input type="file" id="img-input" accept="image/*" hidden>
    <input type="file" id="doc-input" multiple hidden>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    </script>
    <script src="chat.js"></script>
</body>
</html>
