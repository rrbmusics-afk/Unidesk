<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Force the body to be exactly the height of the visible screen */
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        
        /* The Chat area expands to fill space, but leaves room for header/footer */
        #chatBox { 
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* The Footer is locked to the bottom and respects the "Home Bar" on iPhones/Androids */
        .footer-fit {
            padding: 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: #0a0a0a;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-blue { background: #007AFF; transition: 0.2s; }
        .btn-blue:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <nav class="h-14 flex justify-between items-center px-5 glass shrink-0">
        <div class="text-[10px] font-black tracking-widest opacity-40 uppercase">UniDesk Pro</div>
        <div id="status-dot" class="w-1.5 h-1.5 bg-white/10 rounded-full"></div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-6 bg-black">
        <div onclick="createRoom()" class="glass w-full max-w-xs p-10 rounded-[2.5rem] text-center mb-4 active:scale-95 transition-all">
            <span class="text-xs font-bold tracking-widest uppercase">Create Room</span>
        </div>
        <div class="glass w-full max-w-xs p-8 rounded-[2.5rem] space-y-3">
            <input type="text" id="roomCodeInput" placeholder="CODE" class="w-full bg-white/5 p-4 rounded-xl text-center font-mono text-blue-400 outline-none">
            <button onclick="joinRoom()" class="w-full btn-blue p-4 rounded-xl font-bold text-xs uppercase">Join</button>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-col h-full w-full">
        <div id="chatBox"></div>
        
        <div class="footer-fit">
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-xl text-white/40"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></button>
                <button id="micBtn" onclick="toggleRecording()" class="p-3 bg-white/5 rounded-xl text-white/40"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg></button>
                <input type="text" id="chatInput" placeholder="Message..." class="flex-grow bg-white/5 p-3 rounded-xl border border-white/5 text-sm outline-none">
                <button onclick="sendMessage()" class="btn-blue p-3 px-5 rounded-xl shrink-0">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999), mediaRecorder, chunks = [];

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "rooms", code), { members: ["Admin"], messages: [], status: "live", time: Date.now() });
                isAdmin = true; myId = "Admin";
                openWorkspace(code);
            } catch (e) { alert("Database Error: Check your Firebase Rules!"); }
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) {
                await updateDoc(doc(db, "rooms", code), { requests: arrayUnion(myId) });
                onSnapshot(doc(db, "rooms", code), s => { if(s.data()?.members?.includes(myId)) openWorkspace(code); });
            }
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            const sRef = ref(storage, `rooms/${currentRoom}/${file.name}`);
            const snap = await uploadBytes(sRef, file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, "rooms", currentRoom), {
                messages: arrayUnion({ user: myId, text: file.name, file: url, type: 'file', time: Date.now() })
            });
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const sRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.webm`);
                    const snap = await uploadBytes(sRef, blob);
                    const url = await getDownloadURL(snap.ref);
                    await updateDoc(doc(db, "rooms", currentRoom), {
                        messages: arrayUnion({ user: myId, text: "Voice", file: url, type: 'audio', time: Date.now() })
                    });
                    btn.classList.remove('bg-red-500/20');
                };
                mediaRecorder.start();
                btn.classList.add('bg-red-500/20');
            } else { mediaRecorder.stop(); }
        };

        function openWorkspace(code) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            currentRoom = code;
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'} mb-4">
                        <div class="${m.user === myId ? 'bg-blue-600' : 'bg-white/10'} px-4 py-2 rounded-2xl text-sm max-w-[85%]">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="underline">📄 ${m.text}</a>` : 
                              m.type === 'audio' ? `<audio controls class="w-40 h-8 scale-90 origin-left"><source src="${m.file}"></audio>` : m.text}
                        </div>
                    </div>
                `).join('');
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text: i.value, type: 'text', time: Date.now() }) });
            i.value = "";
        };
    </script>
</body>
</html>
