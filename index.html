<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Aethercore Interactive</title>
    <style>
        :root {
            --bg: #090e12;
            --accent: #3e81f1;
            --accent-glow: rgba(62, 129, 241, 0.35);
            --card-surface: #12181f;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #7a8691;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Hero Header */
        .header-group {
            text-align: center;
            margin-bottom: 54px;
            animation: fadeInDown 0.8s var(--transition);
        }

        .brand-logo {
            font-size: 64px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -3px;
            line-height: 1;
            margin: 0;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .brand-tagline {
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 12px;
            opacity: 0.8;
        }

        /* Layout Container */
        .wrapper {
            width: 360px;
            perspective: 1000px;
        }

        /* Premium Featured Card */
        .lounge-card {
            position: relative;
            background: linear-gradient(165deg, rgba(62, 129, 241, 0.12) 0%, rgba(9, 14, 18, 0) 100%);
            border: 1px solid rgba(62, 129, 241, 0.4);
            border-radius: 42px;
            padding: 26px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 48px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .lounge-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .icon-accent {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, #4c8cf5 0%, #2563eb 100%);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        /* Toolkit Grid */
        .toolkit-header {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-secondary);
            font-weight: 800;
            text-transform: uppercase;
            margin: 0 0 20px 12px;
        }

        .standard-card {
            background: var(--card-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 30px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            cursor: pointer;
            transition: var(--transition);
        }

        .standard-card:hover {
            background: #1a222a;
            border-color: #30363d;
            transform: translateX(6px);
        }

        .icon-dark {
            width: 52px;
            height: 52px;
            background: #1c232b;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
        }

        /* Typography Control */
        .lbl-main {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: block;
        }

        .lbl-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            display: block;
        }

        .lbl-caps {
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            font-size: 10px;
            color: #5b6975;
        }

        .chevron {
            margin-left: auto;
            color: #2e3c4a;
            font-size: 24px;
        }

        /* Footer Entity */
        footer {
            margin-top: 60px;
            font-size: 10px;
            letter-spacing: 4px;
            color: #3d4a54;
            font-weight: 600;
            text-align: center;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        svg { width: 24px; height: 24px; fill: white; }
        .gold { fill: #c0a060; }
    </style>
</head>
<body>

    <header class="header-group">
        <h1 class="brand-logo">UNIDESK</h1>
        <div class="brand-tagline">STUDENT UTILITY SUITE</div>
    </header>

    <div class="wrapper">
        <!-- Main Entry: Student Lounge -->
        <div class="lounge-card" onclick="location.href='page.html'">
            <div class="icon-accent">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
                <span class="lbl-main">Student Lounge</span>
                <span class="lbl-sub lbl-caps">Secure Communication</span>
            </div>
            <div class="chevron">›</div>
        </div>

        <div class="toolkit-header">Core Toolkit</div>

        <!-- Tool: Page Forge -->
        <div class="standard-card" onclick="location.href='https://sharanmusician.github.io/Page-Forge/'">
            <div class="icon-dark">
                <svg style="opacity: 0.6;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div>
                <span class="lbl-main">Page Forge</span>
                <span class="lbl-sub">Professional PDF Engine</span>
            </div>
        </div>

        <!-- Tool: Resume Maker -->
        <div class="standard-card" style="opacity: 0.5; cursor: default;">
            <div class="icon-dark">
                <svg class="gold" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
                <span class="lbl-main">Resume Maker</span>
                <span class="lbl-sub">Architectural CV Builder</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 AETHERCORE INTERACTIVE
    </footer>

    <script>
        // Haptic Feedback Simulation for Mobile
        document.querySelectorAll('.standard-card, .lounge-card').forEach(button => {
            button.addEventListener('click', () => {
                if (window.navigator.vibrate) window.navigator.vibrate(10);
            });
        });
    </script>
</body>
</html>
