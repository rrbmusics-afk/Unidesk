<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield | Aethercore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --wa-green: #25D366; --bg-main: #0b141a; --bubble-me: #005c4b; --bubble-them: #202c33; }
        body { background: var(--bg-main); color: #e9edef; font-family: -apple-system, BlinkMacSystemFont, sans-serif; position: fixed; inset: 0; margin: 0; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }
        
        #main-workspace { display: none; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 64px; background: #202c33; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; touch-action: pan-y; }
        
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; }
        .bubble-me { background: var(--bubble-me); align-self: flex-end; border-top-right-radius: 0; }
        .bubble-them { background: var(--bubble-them); align-self: flex-start; border-top-left-radius: 0; }
        
        .footer { background: #202c33; padding: 10px 12px; display: flex; align-items: center; gap: 8px; z-index: 10; }
        .input-pill { background: #2a3942; border-radius: 24px; flex: 1; display: flex; align-items: center; padding: 0 14px; height: 44px; }
        .action-btn { background: var(--wa-green); color: #0b141a; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; shrink: 0; border: none; }
        
        .overlay { position: fixed; inset: 0; background: #0b141a; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* Zoom Viewer */
        #photo-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; display: none; opacity: 0; transition: opacity 0.3s ease; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
        #photo-viewer.active { display: flex; opacity: 1; }
        #viewer-img { max-width: 90vw; max-height: 80vh; object-fit: contain; transform-origin: center; transition: transform 0.1s ease-out; }
        .viewer-close { position: absolute; top: 40px; right: 20px; color: white; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .chat-img { width: 140px; height: 180px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid rgba(255,255,255,0.05); }
        .doc-btn { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #3b82f6; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="home-view" class="overlay">
        <div class="w-full max-w-xs space-y-6 text-center">
            <h1 class="text-4xl font-black text-blue-500 tracking-tighter italic">AETHERCORE</h1>
            <div class="space-y-3">
                <button onclick="createRoom()" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl font-bold uppercase text-xs text-white/70">New Session</button>
                <input type="text" id="roomCodeInput" placeholder="ENTER CODE" class="w-full bg-[#2a3942] p-5 rounded-2xl text-center outline-none text-blue-400 uppercase font-mono tracking-widest border border-white/5">
                <button onclick="joinRoom()" class="w-full bg-blue-600 h-14 rounded-2xl font-bold text-xs uppercase">Connect</button>
            </div>
        </div>
    </div>

    <div id="main-workspace">
        <header class="header">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm">A</div>
                <div class="flex flex-col">
                    <span class="text-[15px] font-bold">UniDesk Shield</span>
                    <span id="status-text" class="text-[11px] text-gray-400">Secure Link</span>
                </div>
            </div>
            <div id="admin-panel" onclick="approveUser()" class="hidden bg-amber-500 text-black px-3 py-1 rounded text-[10px] font-black animate-pulse cursor-pointer uppercase">Approve Request?</div>
        </header>

        <main id="chatBox">
            <div class="self-center bg-white/5 text-gray-500 text-[10px] px-4 py-1 rounded-full mb-4 uppercase tracking-widest">End-to-End Encrypted</div>
        </main>

        <footer class="footer">
            <button onclick="document.getElementById('fileInput').click()" class="text-gray-400"><svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
            <div class="input-pill">
                <input type="text" id="chatInput" placeholder="Message" autocomplete="off" class="w-full bg-transparent outline-none text-sm text-white">
                <div id="recIndicator" class="hidden text-red-500 font-bold text-xs uppercase animate-pulse">● Rec</div>
            </div>
            <button id="mainAction" class="action-btn">
                <svg id="micIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                <svg id="sendIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <!-- Zoomable Photo Viewer -->
    <div id="photo-viewer" onclick="closeViewer()">
        <div class="viewer-close">CLOSE</div>
        <img id="viewer-img" src="" onclick="event.stopPropagation()">
    </div>

    <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf,.doc,.docx,.txt" onchange="processFile(this.files[0])">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*9999);
        let zoomScale = 1, lastTouchDist = 0;

        const chatInput = document.getElementById('chatInput');
        const mainAction = document.getElementById('mainAction');

        chatInput.oninput = () => {
            const hasText = chatInput.value.trim().length > 0;
            document.getElementById('micIcon').classList.toggle('hidden', hasText);
            document.getElementById('sendIcon').classList.toggle('hidden', !hasText);
        };

        mainAction.addEventListener('pointerdown', (e) => { if (chatInput.value.trim().length === 0) startRec(); });
        mainAction.addEventListener('pointerup', (e) => { if (chatInput.value.trim().length > 0) sendMessage(); else stopRec(); });

        window.createRoom = async () => {
            isAdmin = true;
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], pendingReq: null });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            await updateDoc(doc(db, "rooms", code), { pendingReq: myId });
            document.getElementById('home-view').innerHTML = "<div class='text-blue-400 font-bold'>WAITING FOR APPROVAL...</div>";
            onSnapshot(doc(db, "rooms", code), s => { if(s.data()?.pendingReq === 'approved') openWorkspace(code); });
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('main-workspace').style.display = 'flex';
            document.getElementById('status-text').innerText = "ID: " + code;
            onSnapshot(doc(db, "rooms", code), s => {
                const data = s.data();
                if(isAdmin && data?.pendingReq && data.pendingReq !== 'approved') document.getElementById('admin-panel').classList.remove('hidden');
                renderChat(data?.messages || []);
            });
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if(!text) return;
            chatInput.value = ""; chatInput.oninput();
            chatInput.focus(); // Key Fix: Keeps keyboard open
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text, type: 'text', time: Date.now() }) });
        }

        async function uploadMedia(data, type, fileName = "") {
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, data, type, fileName, time: Date.now() }) });
        }

        window.processFile = (file) => {
            const reader = new FileReader();
            const type = file.type.startsWith('image') ? 'image' : 'doc';
            reader.onload = e => uploadMedia(e.target.result, type, file.name);
            reader.readAsDataURL(file);
        };

        // ZOOM LOGIC
        const viewerImg = document.getElementById('viewer-img');
        viewerImg.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (lastTouchDist > 0) {
                    zoomScale *= dist / lastTouchDist;
                    zoomScale = Math.min(Math.max(1, zoomScale), 4);
                    viewerImg.style.transform = `scale(${zoomScale})`;
                }
                lastTouchDist = dist;
            }
        });
        viewerImg.addEventListener('touchend', () => { lastTouchDist = 0; });

        window.openImage = (src) => {
            zoomScale = 1;
            viewerImg.style.transform = `scale(1)`;
            viewerImg.src = src;
            const v = document.getElementById('photo-viewer');
            v.style.display = 'flex';
            setTimeout(() => v.classList.add('active'), 10);
        };

        window.closeViewer = () => {
            const v = document.getElementById('photo-viewer');
            v.classList.remove('active');
            setTimeout(() => v.style.display = 'none', 300);
        };

        function renderChat(messages) {
            const box = document.getElementById('chatBox');
            const top = box.firstElementChild;
            box.innerHTML = ''; box.appendChild(top);
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}`;
                let content = "";
                if(m.type === 'text') content = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">${m.text}</div>`;
                else if(m.type === 'image') content = `<img src="${m.data}" class="chat-img" onclick="openImage('${m.data}')">`;
                else if(m.type === 'doc') content = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                    <span class="text-xs opacity-70">${m.fileName}</span>
                    <a href="${m.data}" download="${m.fileName}" class="doc-btn">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"/></svg>
                        DOWNLOAD
                    </a>
                </div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
