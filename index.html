<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        :root { --accent: #007AFF; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; width: 100vw; margin: 0; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 20px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .input-container { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; width: 100%; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; user-select: none; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-img { border-radius: 12px; margin: 4px 0; width: 220px; height: 220px; object-fit: cover; display: block; transition: opacity 0.2s; }
        
        .pswp__bg { background: rgba(0, 0, 0, 0.6) !important; backdrop-filter: blur(15px) !important; -webkit-backdrop-filter: blur(15px) !important; }
        
        #incomingCall { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; background: #1c1c1e; border: 1px solid #333;
            border-radius: 20px; padding: 20px; z-index: 3000; display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        #callOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 2px solid #fff; object-fit: cover; }
    </style>
</head>
<body>

    <div id="incomingCall" class="glass">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center animate-pulse">
                    <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M21 10.76v2.48c0 4.38-3.56 7.94-7.94 7.94-4.38 0-7.94-3.56-7.94-7.94v-2.48c-1.21-.48-2.12-1.65-2.12-3.01 0-1.8 1.46-3.26 3.26-3.26s3.26 1.46 3.26 3.26c0 1.36-.91 2.53-2.12 3.01v2.48c0 2.6 2.12 4.72 4.72 4.72s4.72-2.12 4.72-4.72v-2.48c-1.21-.48-2.12-1.65-2.12-3.01 0-1.8 1.46-3.26 3.26-3.26s3.26 1.46 3.26 3.26c0 1.36-.91 2.53-2.12 3.01z"/></svg>
                </div>
                <div>
                    <p class="text-xs font-bold text-blue-400 uppercase tracking-tighter">Incoming Call</p>
                    <p class="text-sm text-white">Partner is calling...</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="declineCall()" class="bg-red-600 p-3 rounded-full"><svg class="w-5 h-5" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.3 3.53-.09a1 1 0 011.04 1.04v3.59a1 1 0 01-1.04 1.04C10.51 22 2 13.49 2 3.04A1 1 0 013.04 2h3.59a1 1 0 011.04 1.04c-.39 1.2-.41 2.41-.09 3.53.1.35.01.75-.26 1.02l-2.2 2.2z"/></svg></button>
                <button onclick="acceptCall()" class="bg-green-600 p-3 rounded-full"><svg class="w-5 h-5" fill="white" viewBox="0 0 24 24"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57a1.02 1.02 0 00-1.01.24l-2.2 2.2a15.05 15.05 0 01-6.59-6.59l2.2-2.21a.99.99 0 00.23-1c-.36-1.13-.56-2.32-.56-3.57 0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z"/></svg></button>
            </div>
        </div>
    </div>

    <div id="callOverlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <button onclick="endCall()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 p-5 rounded-full"><svg class="w-8 h-8" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.3 3.53-.09a1 1 0 011.04 1.04v3.59a1 1 0 01-1.04 1.04C10.51 22 2 13.49 2 3.04A1 1 0 013.04 2h3.59a1 1 0 011.04 1.04c-.39 1.2-.41 2.41-.09 3.53.1.35.01.75-.26 1.02l-2.2 2.2z"/></svg></button>
    </div>

    <nav class="h-14 flex items-center justify-between px-5 glass shrink-0">
        <div class="flex flex-col">
            <span class="text-[10px] font-black tracking-widest uppercase text-blue-500">UniDesk OS</span>
            <span id="room-code-display" class="text-[11px] font-mono font-bold text-white tracking-widest"></span>
        </div>
        <div id="call-controls" class="hidden flex items-center gap-5">
            <button onclick="triggerCall('audio')" class="text-white/60 active:text-blue-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"/></svg></button>
            <button onclick="triggerCall('video')" class="text-white/60 active:text-blue-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"/></svg></button>
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8 bg-black z-50">
        <div class="w-full max-w-xs space-y-4 text-center">
            <div onclick="createRoom()" class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] cursor-pointer"><span class="text-[11px] font-bold uppercase tracking-widest text-white/80">Initialize Room</span></div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] space-y-4">
                <input type="text" id="roomCodeInput" placeholder="ENTER CODE" class="w-full bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 outline-none">
                <button onclick="joinRoom()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xs uppercase tracking-widest">Connect</button>
            </div>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full relative overflow-hidden">
        <div id="chatBox"></div>
        <div class="input-container">
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-full text-white/40"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></button>
                <div class="flex-grow bg-white/5 border border-white/10 rounded-full px-4 py-1 flex items-center">
                    <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent py-2.5 text-sm outline-none">
                </div>
                <button onclick="sendMessage()" class="p-3.5 bg-blue-600 rounded-full text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg></button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), allMessages = [], localStream;

        if(window.visualViewport) window.visualViewport.addEventListener('resize', () => { document.body.style.height = window.visualViewport.height + 'px'; document.getElementById('chatBox').scrollTop = 999999; });

        window.triggerCall = async (type) => {
            const callDoc = doc(db, "rooms", currentRoom, "calls", "active_call");
            await setDoc(callDoc, { callerId: myId, type: type, status: 'ringing', time: Date.now() });
            startMedia(type);
        };

        window.acceptCall = async () => {
            const callDoc = doc(db, "rooms", currentRoom, "calls", "active_call");
            const snap = await getDoc(callDoc);
            await updateDoc(callDoc, { status: 'accepted' });
            document.getElementById('incomingCall').style.display = 'none';
            startMedia(snap.data().type);
        };

        window.declineCall = async () => {
            await deleteDoc(doc(db, "rooms", currentRoom, "calls", "active_call"));
            document.getElementById('incomingCall').style.display = 'none';
        };

        async function startMedia(type) {
            document.getElementById('callOverlay').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        }

        window.endCall = async () => {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('callOverlay').style.display = 'none';
            await deleteDoc(doc(db, "rooms", currentRoom, "calls", "active_call"));
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('room-code-display').innerText = code;
            
            // SHOW CALL CONTROLS ONLY NOW
            document.getElementById('call-controls').classList.remove('hidden');
            
            onSnapshot(doc(db, "rooms", code, "calls", "active_call"), (s) => {
                const data = s.data();
                const callUI = document.getElementById('incomingCall');
                if (data && data.callerId !== myId && data.status === 'ringing') {
                    callUI.style.display = 'block';
                } else if (!data) {
                    callUI.style.display = 'none';
                    if(document.getElementById('callOverlay').style.display === 'flex') endCall();
                }
            });

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data(); if(!data) return;
                allMessages = data.messages || [];
                document.getElementById('chatBox').innerHTML = allMessages.map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div id="msg-${m.id}" class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                            ${m.type === 'image' ? `<a href="${m.data}" class="pswp-link" data-pswp-width="1200" data-pswp-height="1600"><img src="${m.data}" class="chat-img"></a>` : `<div>${m.text}</div>`}
                        </div>
                    </div>
                `).join('');
                document.getElementById('chatBox').scrollTop = 999999;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput'); if(!i.value) return;
            allMessages.push({ id: Date.now().toString(), user: myId, text: i.value, type: 'text', time: Date.now() });
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            i.value = ""; i.focus();
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            myId = "Admin"; openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };

        const lightbox = new PhotoSwipeLightbox({ 
            gallery: '#chatBox', children: 'a.pswp-link', 
            pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js'),
            showHideAnimationType: 'zoom', bgOpacity: 0 
        });
        lightbox.init();
    </script>
</body>
</html>
