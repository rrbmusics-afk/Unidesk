<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aethercore | Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b141a; color: white; font-family: -apple-system, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md space-y-8">
        <header class="text-center">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter italic">AETHERCORE</h1>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em] mt-2">Professional Suite</p>
        </header>

        <div class="grid grid-cols-1 gap-4">
            <!-- Chat Option -->
            <a href="chat.html" class="glass-card p-6 rounded-3xl flex items-center justify-between hover:bg-white/5 transition-all group">
                <div>
                    <h3 class="text-lg font-bold">UniDesk Shield</h3>
                    <p class="text-gray-400 text-xs">Secure P2P Encrypted Chat</p>
                </div>
                <div class="bg-blue-600 p-3 rounded-full group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
            </a>

            <!-- Placeholder for future tools -->
            <div class="glass-card p-6 rounded-3xl opacity-50 flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-bold">Page Forge</h3>
                    <p class="text-gray-400 text-xs">Coming Soon</p>
                </div>
                <div class="bg-gray-700 p-3 rounded-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
