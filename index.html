<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNIDESK Premium | Aethercore</title>
    <style>
        :root {
            --bg: #080c10;
            --accent: #4a90e2;
            --card-surface: #12181f;
            --text-p: #ffffff;
            --text-s: #7a8691;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-p);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            min-height: 100vh;
            padding: calc(var(--safe-top) + 40px) 24px var(--safe-bottom);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Branding */
        .brand-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .brand-logo {
            font-size: 64px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -3px;
            line-height: 0.9;
        }

        .brand-tag {
            font-size: 10px;
            letter-spacing: 5px;
            font-weight: 700;
            color: var(--text-s);
            text-transform: uppercase;
            margin-top: 12px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Student Lounge Card */
        .lounge-card {
            background: linear-gradient(165deg, rgba(74, 144, 226, 0.15) 0%, rgba(8, 12, 16, 0) 100%);
            border: 1.5px solid var(--accent);
            border-radius: 40px;
            padding: 24px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 40px;
            transition: transform 0.2s var(--bezier);
        }

        .lounge-card:active { transform: scale(0.97); }

        .icon-blue {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
        }

        /* Toolkit Interactive Section */
        .toolkit-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .toolkit-label {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-s);
            font-weight: 800;
            text-transform: uppercase;
        }

        .toggle-icon {
            color: var(--text-s);
            transition: transform 0.4s var(--bezier);
            font-size: 18px;
        }

        .is-active .toggle-icon { transform: rotate(90deg); }

        /* Pop-up Tool Grid */
        .tool-drawer {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s var(--bezier);
        }

        .is-active + .tool-drawer {
            max-height: 400px;
            opacity: 1;
            transform: translateY(0);
        }

        .tool-card {
            background: var(--card-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .tool-card:active { background: #1a222a; }

        .icon-dark {
            width: 50px;
            height: 50px;
            background: #1c232b;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
        }

        /* Typography */
        .title { font-size: 18px; font-weight: 600; }
        .subtitle-text { font-size: 13px; color: var(--text-s); margin-top: 2px; }
        .chevron { margin-left: auto; color: #2e3c4a; font-size: 24px; }

        footer {
            margin-top: auto;
            font-size: 10px;
            letter-spacing: 4px;
            color: #3d4a54;
            font-weight: 700;
            padding-bottom: 20px;
        }

        svg { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>

    <header class="brand-header">
        <h1 class="brand-logo">UNIDESK</h1>
        <div class="brand-tag">Student Utility Suite</div>
    </header>

    <div class="container">
        <!-- Student Lounge -->
        <div class="lounge-card" onclick="window.location.href='page.html'">
            <div class="icon-blue">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
                <span class="title">Student Lounge</span>
                <span class="subtitle-text" style="text-transform: uppercase; letter-spacing: 1px; font-size: 10px; font-weight: 700;">Secure Network</span>
            </div>
            <div class="chevron">›</div>
        </div>

        <!-- Toolkit Interactive Trigger -->
        <div class="toolkit-trigger" onclick="toggleToolkit(this)">
            <span class="toolkit-label">Toolkit</span>
            <span class="toggle-icon">▶</span>
        </div>

        <!-- Pop-up Drawer -->
        <div class="tool-drawer" id="toolkitDrawer">
            <!-- Page Forge -->
            <div class="tool-card" onclick="window.location.href='https://sharanmusician.github.io/Page-Forge/'">
                <div class="icon-dark">
                    <svg style="opacity: 0.6;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                    <span class="title">Page Forge</span>
                    <span class="subtitle-text">Images to PDF Converter</span>
                </div>
            </div>

            <!-- Resume Maker -->
            <div class="tool-card" style="opacity: 0.5;">
                <div class="icon-dark">
                    <svg style="fill: #c59b48;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                    <span class="title">Resume Maker</span>
                    <span class="subtitle-text">Professional CV Builder</span>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 AETHERCORE INTERACTIVE</footer>

    <script>
        function toggleToolkit(element) {
            element.classList.toggle('is-active');
            // Premium haptic feedback
            if ('vibrate' in navigator) navigator.vibrate(10);
        }
    </script>
</body>
</html>
