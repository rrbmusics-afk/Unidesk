<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniDesk | Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .btn-blue { background: #007AFF; transition: all 0.2s ease; }
        .btn-blue:active { transform: scale(0.96); opacity: 0.8; }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
        input, button { -webkit-appearance: none; border-radius: 12px; }
    </style>
</head>
<body class="flex flex-col h-full">

    <div id="toast-container" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-[90%]"></div>

    <nav class="p-4 border-b border-white/5 flex justify-between items-center glass z-50">
        <div class="flex items-center gap-3">
            <button id="menu-btn" onclick="toggleSidebar()" class="hidden p-2 -ml-2 text-white/50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-xs font-black tracking-[0.2em] uppercase">UniDesk</h1>
        </div>
        <div id="status-dot" class="w-2 h-2 bg-white/10 rounded-full"></div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4 relative overflow-hidden">
        <div id="home-view" class="flex flex-col gap-4 w-full max-w-sm">
            <div onclick="createRoom()" class="glass p-8 rounded-[2rem] text-center active:bg-white/5 transition-colors">
                <div class="text-blue-500 flex justify-center mb-4"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></div>
                <h3 class="text-xl font-medium text-white mb-1">Create Desk</h3>
                <p class="text-white/30 text-xs uppercase tracking-tighter">New Encrypted Session</p>
            </div>
            <div class="glass p-8 rounded-[2rem]">
                <input type="text" id="roomCodeInput" maxlength="6" placeholder="ENTER CODE" class="w-full bg-white/[0.04] p-4 rounded-xl border border-white/10 mb-3 text-center font-mono tracking-[0.3em] text-blue-400 focus:outline-none">
                <button onclick="joinRoom()" class="w-full btn-blue p-4 rounded-xl font-bold text-[10px] uppercase tracking-widest text-white">Join Workspace</button>
            </div>
        </div>

        <div id="sidebar" class="fixed inset-0 z-40 sidebar-hidden transition-transform duration-300 pointer-events-none">
            <div class="w-72 h-full glass border-r border-white/10 p-6 pointer-events-auto flex flex-col gap-6">
                <div>
                    <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-4">Workspace Code</span>
                    <div id="roomID" class="text-2xl font-mono text-blue-400 tracking-widest bg-white/5 p-4 rounded-2xl text-center">------</div>
                </div>
                <div id="adminControls" class="hidden flex-grow overflow-hidden flex flex-col">
                    <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-4">Requests</span>
                    <div id="requestList" class="space-y-2 overflow-y-auto"></div>
                </div>
                <button onclick="location.reload()" class="w-full p-4 text-[10px] uppercase font-bold text-red-500/50 border border-red-500/10 rounded-xl mt-auto">Terminate Session</button>
            </div>
            <div onclick="toggleSidebar()" class="flex-grow h-full pointer-events-auto"></div>
        </div>

        <div id="workspace-view" class="hidden fixed inset-0 top-[65px] bg-[#050505] flex flex-col">
            <div id="chatBox" class="flex-grow p-4 overflow-y-auto space-y-4 pb-32"></div>
            
            <div class="fixed bottom-0 left-0 right-0 p-4 pb-8 glass border-t border-white/5 flex flex-col gap-3">
                <div class="flex gap-2 items-center">
                    <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-xl border border-white/10 text-white/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                    <button id="micBtn" onclick="toggleRecording()" class="p-3 bg-white/5 rounded-xl border border-white/10 text-white/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                    <input type="text" id="chatInput" placeholder="Message..." class="flex-grow bg-white/5 p-4 rounded-xl border border-white/10 focus:outline-none text-sm">
                    <button onclick="sendMessage()" class="btn-blue px-5 rounded-xl flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </button>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999);
        let mediaRecorder, audioChunks = [];

        window.toggleSidebar = () => {
            const s = document.getElementById('sidebar');
            s.classList.toggle('sidebar-hidden');
            s.classList.toggle('sidebar-visible');
        };

        window.notify = (m) => {
            const t = document.createElement('div');
            t.className = "glass px-6 py-3 rounded-2xl text-[10px] uppercase text-center border border-blue-500/30 text-white";
            t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            isAdmin = true; myId = "Admin";
            await setDoc(doc(db, "rooms", code), { status: "active", requests: [], members: ["Admin"], messages: [] });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const docRef = doc(db, "rooms", code);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                await updateDoc(docRef, { requests: arrayUnion(myId) });
                notify("Request Sent");
                onSnapshot(docRef, (s) => { if(s.data().members.includes(myId)) openWorkspace(code); });
            } else notify("Invalid Code");
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            notify("Uploading...");
            const fileRef = ref(storage, `rooms/${currentRoom}/${file.name}`);
            const snap = await uploadBytes(fileRef, file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, "rooms", currentRoom), {
                messages: arrayUnion({ user: myId, text: `Shared a file: ${file.name}`, file: url, type: 'file' })
            });
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    notify("Sending Audio...");
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const fileRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.mp3`);
                    const snap = await uploadBytes(fileRef, blob);
                    const url = await getDownloadURL(snap.ref);
                    await updateDoc(doc(db, "rooms", currentRoom), {
                        messages: arrayUnion({ user: myId, text: "Voice Message", file: url, type: 'audio' })
                    });
                    btn.classList.remove('bg-red-500');
                };
                mediaRecorder.start();
                btn.classList.add('bg-red-500');
                notify("Recording...");
            } else {
                mediaRecorder.stop();
            }
        };

        window.approveUser = async (uid) => {
            await updateDoc(doc(db, "rooms", currentRoom), { members: arrayUnion(uid), requests: arrayRemove(uid) });
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('menu-btn').classList.remove('hidden');
            document.getElementById('roomID').innerText = code;
            if(isAdmin) document.getElementById('adminControls').classList.remove('hidden');

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(isAdmin) {
                    document.getElementById('requestList').innerHTML = data.requests.map(r => `
                        <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                            <span class="text-[9px] font-mono">${r}</span>
                            <button onclick="approveUser('${r}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[8px] font-bold uppercase">Allow</button>
                        </div>
                    `).join('');
                }
                document.getElementById('chatBox').innerHTML = data.messages.map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="${m.user === myId ? 'bg-blue-600' : 'bg-white/[0.08]'} px-4 py-3 rounded-2xl text-sm max-w-[85%] text-white">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="underline text-xs">📎 ${m.text}</a>` : 
                              m.type === 'audio' ? `<audio controls class="w-48 h-8"><source src="${m.file}" type="audio/mp3"></audio>` : m.text}
                        </div>
                        <span class="text-[7px] uppercase mt-1 opacity-20 tracking-widest">${m.user}</span>
                    </div>
                `).join('');
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text: i.value, type: 'text' }) });
            i.value = "";
        };
    </script>
</body>
</html>
