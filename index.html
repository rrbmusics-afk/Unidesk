<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniDesk | Private Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .btn-blue { background: #007AFF; transition: all 0.2s ease; }
        .btn-blue:hover { background: #0056b3; transform: translateY(-1px); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-5 border-b border-white/10 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-bold tracking-tight text-white">UniDesk <span class="text-[10px] text-blue-400 border border-blue-400/30 px-2 py-0.5 rounded-full ml-1 uppercase">Aethercore</span></h1>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-4" id="app">
        
        <div id="home-view" class="grid md:grid-cols-2 gap-6 max-w-4xl w-full">
            <div onclick="createRoom()" class="glass p-10 rounded-[2rem] cursor-pointer hover:border-white/20 transition-all group">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </div>
                <h3 class="text-2xl font-semibold mb-2 text-white">Create Workspace</h3>
                <p class="text-white/40 leading-relaxed">Start a new private session with a 6-digit code.</p>
            </div>
            
            <div class="glass p-10 rounded-[2rem]">
                <h3 class="text-2xl font-semibold mb-4 text-white">Join Workspace</h3>
                <input type="text" id="roomCodeInput" maxlength="6" placeholder="CODE" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 mb-4 text-center text-2xl font-mono tracking-widest uppercase text-blue-400 focus:outline-none focus:border-blue-500">
                <button onclick="joinRoom()" class="w-full btn-blue p-4 rounded-2xl font-bold text-white shadow-lg shadow-blue-500/20">Request Entry</button>
            </div>
        </div>

        <div id="workspace-view" class="hidden w-full max-w-6xl">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="w-full md:w-72">
                    <div class="glass p-6 rounded-[2rem] mb-4">
                        <h4 class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4">Code</h4>
                        <div id="roomID" class="bg-blue-500/10 p-4 rounded-2xl text-blue-400 font-mono text-center text-2xl font-bold border border-blue-500/20">------</div>
                    </div>
                    <div id="adminControls" class="hidden glass p-6 rounded-[2rem]">
                        <h4 class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4">Requests</h4>
                        <div id="requestList" class="space-y-3"></div>
                    </div>
                </div>
                <div class="flex-grow glass p-10 rounded-[2rem] min-h-[50vh]">
                    <h2 class="text-3xl font-bold text-white mb-6">Private Desk Active</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/5 italic text-white/40">Secure workspace ready...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35",
            measurementId: "G-M26R027F70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { status: "active", requests: [] });
            openWorkspace(code, true);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const roomRef = doc(db, "rooms", code);
            const snap = await getDoc(roomRef);
            if (snap.exists()) {
                await updateDoc(roomRef, { requests: arrayUnion(`User-${Math.floor(Math.random()*999)}`) });
                alert("Knock sent!");
            } else { alert("Code not found."); }
        };

        function openWorkspace(code, isAdmin) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('roomID').innerText = code;
            if(isAdmin) {
                document.getElementById('adminControls').classList.remove('hidden');
                onSnapshot(doc(db, "rooms", code), (s) => {
                    const data = s.data();
                    const list = document.getElementById('requestList');
                    list.innerHTML = "";
                    if(data.requests?.length) {
                        data.requests.forEach(r => {
                            list.innerHTML += `<div class="bg-blue-600/20 p-3 rounded-xl flex justify-between items-center text-xs border border-blue-500/30">
                                <span>${r}</span>
                                <button onclick="alert('Accepted')" class="bg-blue-600 px-2 py-1 rounded-lg">Allow</button>
                            </div>`;
                        });
                    } else { list.innerHTML = "<p class='text-white/20 text-center text-xs'>No knocks yet</p>"; }
                });
            }
        }
    </script>
</body>
</html>
