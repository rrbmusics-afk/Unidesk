<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNIDESK | Aethercore Interactive</title>
    <style>
        :root {
            --bg: #080c10;
            --accent: #4a90e2;
            --surface: #12181f;
            --text-p: #ffffff;
            --text-s: #7a8691;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-p);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            min-height: 100vh;
            padding: calc(var(--safe-top) + 40px) 24px var(--safe-bottom);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Branding Layer */
        .brand-core {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 68px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -3px;
            line-height: 0.9;
        }

        .tagline {
            font-size: 10px;
            letter-spacing: 5px;
            font-weight: 700;
            color: var(--text-s);
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* Primary Actions */
        .main-stack {
            width: 100%;
            max-width: 380px;
        }

        .btn-lounge {
            background: linear-gradient(165deg, rgba(74, 144, 226, 0.18) 0%, rgba(8, 12, 16, 0) 100%);
            border: 1.5px solid var(--accent);
            border-radius: 40px;
            padding: 26px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 30px;
            transition: var(--transition);
        }

        .btn-lounge:active { transform: scale(0.96); }

        .icon-blue {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            box-shadow: 0 10px 20px rgba(74, 144, 226, 0.3);
        }

        /* Toolkit Trigger Button */
        .toolkit-trigger {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .toolkit-trigger:active { transform: scale(0.98); background: #1a222a; }

        .toolkit-text {
            font-size: 12px;
            letter-spacing: 4px;
            font-weight: 800;
            color: var(--text-s);
            text-transform: uppercase;
        }

        /* Modal Architecture */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 90%;
            max-width: 360px;
            background: #11181e;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px;
            padding: 30px;
            transform: scale(0.8) translateY(40px);
            transition: var(--transition);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-s);
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Tool Cards inside Modal */
        .tool-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .tool-card:active { background: rgba(255, 255, 255, 0.08); }

        .icon-dark {
            width: 50px;
            height: 50px;
            background: #1c232b;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 18px;
        }

        .title { font-size: 18px; font-weight: 600; }
        .sub { font-size: 13px; color: var(--text-s); margin-top: 2px; }

        .close-btn {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-s);
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        footer {
            margin-top: auto;
            font-size: 10px;
            letter-spacing: 4px;
            color: #3d4a54;
            font-weight: 700;
            padding-bottom: 20px;
        }

        svg { width: 24px; height: 24px; fill: white; }
    </style>
</head>
<body>

    <header class="brand-core">
        <h1 class="logo">UNIDESK</h1>
        <div class="tagline">Student Utility Suite</div>
    </header>

    <div class="main-stack">
        <!-- Student Lounge -->
        <div class="btn-lounge" onclick="window.location.href='page.html'">
            <div class="icon-blue">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
                <span class="title">Student Lounge</span>
                <span class="sub" style="text-transform: uppercase; letter-spacing: 1px; font-size: 10px; font-weight: 700;">Secure Network</span>
            </div>
        </div>

        <!-- Toolkit Trigger -->
        <div class="toolkit-trigger" onclick="openToolkit()">
            <span class="toolkit-text">Open Toolkit</span>
        </div>
    </div>

    <!-- The Dialogue Box (Modal) -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeToolkit(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">Systems Toolkit</div>
            
            <!-- Page Forge -->
            <div class="tool-card" onclick="window.location.href='https://sharanmusician.github.io/Page-Forge/'">
                <div class="icon-dark">
                    <svg style="opacity: 0.6;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                    <span class="title">Page Forge</span>
                    <span class="sub">Images to PDF Converter</span>
                </div>
            </div>

            <!-- Resume Maker -->
            <div class="tool-card" style="opacity: 0.5;">
                <div class="icon-dark">
                    <svg style="fill: #c59b48;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                    <span class="title">Resume Maker</span>
                    <span class="sub">Professional CV Builder</span>
                </div>
            </div>

            <div class="close-btn" onclick="closeToolkit(null)">Dismiss</div>
        </div>
    </div>

    <footer>&copy; 2026 AETHERCORE INTERACTIVE</footer>

    <script>
        const overlay = document.getElementById('modalOverlay');

        function openToolkit() {
            overlay.classList.add('active');
            if ('vibrate' in navigator) navigator.vibrate(15);
        }

        function closeToolkit(event) {
            overlay.classList.remove('active');
            if ('vibrate' in navigator) navigator.vibrate(5);
        }
    </script>
</body>
</html>
