<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --wa-bg: #0b141a; --wa-input: #2a3942; --wa-green: #00a884; --wa-mic: #ff2d55; }
        body { background: var(--wa-bg); color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        
        /* WhatsApp Bubbles */
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bubble-me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble-them { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }

        /* Smooth Document Expansion */
        .doc-card { background: rgba(0,0,0,0.15); border-radius: 8px; display: flex; align-items: center; gap: 10px; padding: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .doc-expanded { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; padding: 20px; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Recording Interface */
        .input-bar-container { background: #111b21; padding: 8px 12px; display: flex; align-items: center; gap: 8px; min-height: 60px; position: relative; }
        .recording-ui { position: absolute; left: 0; top: 0; width: 100%; height: 100%; background: #111b21; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; }
        .red-dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Audio Controls Styling */
        audio::-webkit-media-controls-panel { background-color: #202c33; }
        audio::-webkit-media-controls-current-time-display, 
        audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="h-16 flex items-center justify-between px-5 bg-[#202c33] shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center font-bold">U</div>
            <div>
                <p id="room-code-display" class="font-bold text-sm">Waiting...</p>
                <p class="text-[10px] text-green-500">online</p>
            </div>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8">
        <button onclick="createRoom()" class="bg-wa-green px-8 py-4 rounded-full font-bold mb-4">Create Secure Room</button>
        <div class="flex gap-2">
            <input type="text" id="roomCodeInput" placeholder="Code" class="bg-wa-input p-3 rounded-lg outline-none">
            <button onclick="joinRoom()" class="bg-blue-600 px-6 rounded-lg">Join</button>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full overflow-hidden">
        <div id="chatBox"></div>

        <div class="input-bar-container">
            <div id="recordingUI" class="recording-ui">
                <div class="flex items-center gap-3">
                    <div class="red-dot"></div>
                    <span id="recordTimer" class="font-mono text-white">0:00</span>
                </div>
                <div class="text-white/50 text-sm animate-pulse">Slide to cancel < </div>
            </div>

            <button onclick="document.getElementById('fileInput').click()" class="text-white/60">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </button>
            
            <div class="flex-grow bg-[#2a3942] rounded-full px-4 flex items-center h-11">
                <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent outline-none text-white text-[15px]">
            </div>

            <div id="actionArea">
                <button id="micBtn" class="bg-[#00a884] text-white rounded-full w-12 h-12 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4z"/><path d="M4 8a1 1 0 011 1 5 5 0 0010 0 1 1 0 112 0 7 7 0 01-6 6.92V18a1 1 0 11-2 0v-2.08A7 7 0 013 9a1 1 0 011-1z"/></svg>
                </button>
                <button id="sendBtn" onclick="sendMessage()" class="hidden bg-[#00a884] text-white rounded-full w-12 h-12 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
                </button>
            </div>
        </div>
        <input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), allMessages = [];
        let mediaRecorder, audioChunks = [], recordInterval;

        const chatInput = document.getElementById('chatInput');
        const micBtn = document.getElementById('micBtn');
        const sendBtn = document.getElementById('sendBtn');
        const recordingUI = document.getElementById('recordingUI');

        // Logic: Switch Mic to Send
        chatInput.addEventListener('input', () => {
            const hasText = chatInput.value.trim().length > 0;
            micBtn.classList.toggle('hidden', hasText);
            sendBtn.classList.toggle('hidden', !hasText);
        });

        // WhatsApp Style Recording Logic
        micBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.onstart = () => {
                    recordingUI.style.display = 'flex';
                    startTimer();
                };

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    recordingUI.style.display = 'none';
                    stopTimer();
                    const blob = new Blob(audioChunks, { type: 'audio/ogg' });
                    const reader = new FileReader();
                    reader.onloadend = () => sendMedia(reader.result, 'audio');
                    reader.readAsDataURL(blob);
                };

                mediaRecorder.start();
            } else {
                mediaRecorder.stop();
            }
        };

        function startTimer() {
            let sec = 0;
            const timerEl = document.getElementById('recordTimer');
            recordInterval = setInterval(() => {
                sec++;
                let m = Math.floor(sec/60);
                let s = sec % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(recordInterval); document.getElementById('recordTimer').innerText = "0:00"; }

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => sendMedia(e.target.result, 'doc', file.name);
            reader.readAsDataURL(file);
        };

        async function sendMedia(data, type, fileName = "") {
            const msg = { id: Date.now().toString(), user: myId, data, type, name: fileName, time: Date.now() };
            allMessages.push(msg);
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
        }

        window.toggleDoc = (data) => {
            const viewer = document.createElement('div');
            viewer.className = 'doc-expanded';
            viewer.innerHTML = data.includes('image') ? `<img src="${data}" class="max-w-full max-h-full">` : `<div class="bg-white p-8 text-black rounded-lg">Document Preview Not Available</div>`;
            viewer.onclick = () => viewer.remove();
            document.body.appendChild(viewer);
        };

        // UI Builder
        window.openWorkspace = (code) => {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = `Room: ${code}`;

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data(); if(!data) return;
                allMessages = data.messages || [];
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '';
                
                allMessages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}`;
                    
                    if(m.type === 'text') div.innerText = m.text;
                    else if(m.type === 'audio') div.innerHTML = `<audio controls class="w-full h-8"><source src="${m.data}"></audio>`;
                    else if(m.type === 'doc') {
                        div.innerHTML = `
                            <div class="doc-card" onclick="toggleDoc('${m.data}')">
                                <div class="w-10 h-10 bg-white/10 rounded flex items-center justify-center">📄</div>
                                <div class="text-xs truncate w-32">${m.name}</div>
                            </div>`;
                    }
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        };

        window.sendMessage = async () => {
            if(!chatInput.value.trim()) return;
            allMessages.push({ id: Date.now().toString(), user: myId, text: chatInput.value, type: 'text', time: Date.now() });
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            chatInput.value = ""; chatInput.dispatchEvent(new Event('input'));
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };
    </script>
</body>
</html>
