<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        :root { --accent: #007AFF; }
        body { 
            background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            height: 100dvh; width: 100vw; margin: 0; display: flex; flex-direction: column; 
            overflow: hidden; position: fixed; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 20px; 
            display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; 
        }

        .input-container { 
            background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); 
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; 
            width: 100%;
        }

        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .chat-img { 
            border-radius: 12px; margin: 4px 0; width: 220px; height: 220px; 
            object-fit: cover; display: block; cursor: pointer;
        }

        /* Prevent stretching in the zoom view */
        .pswp__img { object-fit: contain !important; }

        audio { height: 35px; width: 210px; filter: invert(1); margin-top: 5px; }
        .btn-active:active { transform: scale(0.92); opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="h-14 flex items-center justify-between px-5 glass shrink-0">
        <div class="flex flex-col">
            <span class="text-[10px] font-black tracking-widest uppercase text-blue-500">UniDesk OS</span>
            <span id="status-text" class="text-[8px] opacity-30 font-mono uppercase">System Ready</span>
        </div>
        <div class="flex items-center gap-3">
            <span id="room-code-display" class="text-[11px] font-mono font-bold text-blue-400 tracking-widest"></span>
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8 bg-black z-50">
        <div class="w-full max-w-xs space-y-4 text-center">
            <div onclick="createRoom()" class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] btn-active cursor-pointer">
                <div class="w-10 h-10 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2.5"/></svg>
                </div>
                <span class="text-[11px] font-bold uppercase tracking-widest text-white/80">Initialize Room</span>
            </div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] space-y-4">
                <input type="text" id="roomCodeInput" placeholder="ENTER CODE" class="w-full bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 border border-white/5 outline-none tracking-[0.2em]">
                <button onclick="joinRoom()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xs uppercase tracking-widest btn-active">Connect</button>
            </div>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full relative overflow-hidden">
        <div id="chatBox"></div>
        <div class="input-container">
            <div class="flex items-center gap-2">
                <button onmousedown="event.preventDefault()" onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-full text-white/40 btn-active">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                </button>
                <div class="flex-grow bg-white/5 border border-white/10 rounded-full px-4 py-1 flex items-center">
                    <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent py-2.5 text-sm outline-none">
                    <button id="micBtn" onmousedown="event.preventDefault()" onclick="toggleRecording()" class="ml-2 text-white/40 btn-active">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg>
                    </button>
                </div>
                <button onmousedown="event.preventDefault()" onclick="sendMessage()" class="p-3.5 bg-blue-600 rounded-full text-white shadow-lg btn-active">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), mediaRecorder, chunks = [];

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            });
        }

        const lightbox = new PhotoSwipeLightbox({
          gallery: '#chatBox',
          children: 'a.pswp-link',
          pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js'),
          initialZoomLevel: 'fit',
          secondaryZoomLevel: 2,
          maxZoomLevel: 4
        });
        lightbox.init();

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
                myId = "Admin"; openWorkspace(code);
            } catch (e) { alert("DATABASE ERROR: " + e.message); }
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
            else alert("Room not found.");
        };

        window.processFile = (file) => {
            if(!file) return;
            const reader = new FileReader();
            reader.onloadend = async () => {
                await updateDoc(doc(db, "rooms", currentRoom), {
                    messages: arrayUnion({ user: myId, data: reader.result, type: 'image', time: Date.now() })
                });
            };
            reader.readAsDataURL(file);
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/mp4' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        await updateDoc(doc(db, "rooms", currentRoom), {
                            messages: arrayUnion({ user: myId, data: reader.result, type: 'audio', time: Date.now() })
                        });
                        btn.classList.remove('text-red-500');
                    };
                    reader.readAsDataURL(blob);
                };
                mediaRecorder.start();
                btn.classList.add('text-red-500');
            } else { mediaRecorder.stop(); }
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('room-code-display').innerText = code;
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(!data || !data.messages) return;
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}" style="${m.type === 'image' ? 'padding: 4px;' : ''}">
                            ${m.type === 'image' ? `
                                <a href="${m.data}" class="pswp-link" data-pswp-width="1200" data-pswp-height="1600" target="_blank">
                                   <img src="${m.data}" class="chat-img">
                                </a>
                            ` : 
                              m.type === 'audio' ? `<audio controls src="${m.data}"></audio>` : 
                              `<div>${m.text}</div>`}
                        </div>
                    </div>
                `).join('');
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value || !currentRoom) return;
            const text = i.value;
            i.value = "";
            i.focus();
            await updateDoc(doc(db, "rooms", currentRoom), { 
                messages: arrayUnion({ user: myId, text: text, type: 'text', time: Date.now() }) 
            });
        };
    </script>
</body>
</html>
