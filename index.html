<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniDesk | Private Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .accent { color: #007AFF; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 border-b border-white/10 flex justify-between items-center glass">
        <h1 class="text-xl font-bold tracking-tight">UniDesk<span class="text-xs ml-2 bg-blue-600 px-2 py-0.5 rounded-full uppercase">Private</span></h1>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-6" id="app">
        <div id="home-view" class="grid md:grid-cols-2 gap-6 max-w-4xl w-full">
            <div onclick="createRoom()" class="glass p-8 rounded-3xl cursor-pointer hover:border-white/20 transition-all">
                <h3 class="text-2xl font-semibold mb-2">Create Workspace</h3>
                <p class="text-white/50">Start a private session. Only friends with your code can enter.</p>
            </div>
            
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-2xl font-semibold mb-2">Join Friend</h3>
                <input type="text" id="roomCodeInput" placeholder="Enter 6-Digit Code" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 mb-4 text-center text-xl tracking-widest uppercase">
                <button onclick="joinRoom()" class="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-500 transition">Request Entry</button>
            </div>
        </div>

        <div id="workspace-view" class="hidden w-full max-w-6xl">
            <div class="flex gap-6">
                <div class="w-64 glass p-6 rounded-3xl h-[80vh]">
                    <h2 class="font-bold mb-4">Workspace Info</h2>
                    <div id="roomID" class="bg-black/40 p-3 rounded-xl text-blue-400 font-mono mb-6 text-center text-lg"></div>
                    <div id="adminControls" class="hidden">
                        <h4 class="text-sm font-bold text-white/40 mb-2 uppercase">Requests</h4>
                        <div id="requestList" class="space-y-2"></div>
                    </div>
                </div>
                <div class="flex-grow glass p-10 rounded-3xl">
                    <h2 class="text-3xl font-bold mb-8">Your Private Workspace</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/5">Focus Timer: 25:00</div>
                        <div class="bg-white/5 p-6 rounded-2xl border border-white/5">Group Notes</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- PASTE YOUR FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            // Your API key, etc.
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

                // --- THIS PART MAKES THE "KNOCKING" WORK ---
        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            const roomRef = doc(db, "rooms", code);
            await setDoc(roomRef, {
                status: "active",
                requests: []
            });
            openWorkspace(code, true);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return alert("Please enter a 6-digit code!");
            
            const roomRef = doc(db, "rooms", code);
            // This sends a "Knock" to your database so you can see it
            await updateDoc(roomRef, {
                requests: arrayUnion("New Friend Request")
            });
            alert("Knock sent! Your friend needs to click 'Approve' on their screen.");
        };

        function openWorkspace(code, isAdmin) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('roomID').innerText = code;

            if(isAdmin) {
                document.getElementById('adminControls').classList.remove('hidden');
                // This 'Listens' for your friends knocking in real-time
                onSnapshot(doc(db, "rooms", code), (snapshot) => {
                    const data = snapshot.data();
                    const list = document.getElementById('requestList');
                    list.innerHTML = ""; 
                    if(data.requests) {
                        data.requests.forEach(req => {
                            list.innerHTML += `
                                <div class="bg-blue-600/20 p-2 rounded flex justify-between items-center text-xs border border-blue-500/30">
                                    <span>${req}</span>
                                    <button onclick="alert('Access Granted!')" class="bg-blue-600 px-2 py-1 rounded font-bold">Approve</button>
                                </div>`;
                        });
                    }
                });
            }
        }
    </script>
</body>
</html>
