<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNIDESK | Aethercore</title>
    <style>
        :root {
            --bg: #080c10;
            --accent: #4a90e2;
            --surface: #12181f;
            --text-p: #ffffff;
            --text-s: #636e7b;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* HARD-CORE UI LOCK PROTOCOL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            
            /* Disable Selection & Long-Press Callouts */
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            
            /* SILENCE BLUE SELECTION HIGHLIGHT */
            -webkit-tap-highlight-color: transparent;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
        }

        body {
            color: var(--text-p);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 40px) 30px calc(var(--safe-bottom) + 20px);
        }

        .brand-core {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -2px;
            line-height: 1;
        }

        .tagline {
            font-size: 8px;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--text-s);
            text-transform: uppercase;
            margin-top: 8px;
        }

        .main-stack {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
        }

        .btn-lounge {
            background: linear-gradient(165deg, rgba(74, 144, 226, 0.12) 0%, rgba(8, 12, 16, 0) 100%);
            border: 1px solid rgba(74, 144, 226, 0.4);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .btn-lounge:active { transform: scale(0.97); opacity: 0.8; }

        .icon-blue {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            box-shadow: 0 8px 15px rgba(74, 144, 226, 0.25);
        }

        .toolkit-trigger {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .toolkit-trigger:active { background: #1a222a; transform: scale(0.98); }

        .toolkit-text {
            font-size: 10px;
            letter-spacing: 3px;
            font-weight: 700;
            color: var(--text-s);
            text-transform: uppercase;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-content {
            width: 85%;
            max-width: 320px;
            background: #11181e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 35px;
            padding: 25px;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition);
        }

        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .tool-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 22px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .icon-dark {
            width: 40px; height: 40px;
            background: #1c232b;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
        }

        .title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
        .sub { font-size: 11px; color: var(--text-s); margin-top: 1px; }
        .close-label {
            font-size: 10px;
            text-align: center;
            margin-top: 15px;
            color: var(--text-s);
            letter-spacing: 1px;
            font-weight: 600;
        }

        footer {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 15px);
            width: 100%;
            left: 0;
            text-align: center;
            font-size: 7.5px;
            letter-spacing: 3.5px;
            color: #313a43;
            font-weight: 600;
            text-transform: uppercase;
        }

        svg { width: 20px; height: 20px; fill: white; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header class="brand-core">
        <h1 class="logo">UNIDESK</h1>
        <div class="tagline">Student Utility Suite</div>
    </header>

    <div class="main-stack">
        <div class="btn-lounge" onclick="location.href='page.html'">
            <div class="icon-blue">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
                <p class="title">Student Lounge</p>
                <p class="sub" style="text-transform: uppercase; letter-spacing: 0.5px; font-size: 9px;">Secure Network</p>
            </div>
        </div>

        <div class="toolkit-trigger" onclick="openModal()" style="margin-bottom: 20px;">
            <span class="toolkit-text">Toolkit</span>
        </div>

        <div class="toolkit-trigger" onclick="openUtilitiesModal()">
            <span class="toolkit-text">Student Utilities</span>
        </div>
    </div>

    <div class="modal-overlay" id="overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="tool-card" onclick="location.href='https://sharanmusician.github.io/Page-Forge/'">
                <div class="icon-dark"><svg style="opacity: 0.5;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                <div><p class="title">Page Forge</p><p class="sub">Image to PDF</p></div>
            </div>
            <div class="tool-card" style="opacity: 0.4;">
                <div class="icon-dark"><svg style="fill: #b5924d;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <div><p class="title">Resume Maker</p><p class="sub">CV Builder</p></div>
            </div>
            <p class="close-label" onclick="closeModal()">DISMISS</p>
        </div>
    </div>

    <div class="modal-overlay" id="utilities-overlay" onclick="closeUtilitiesModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="tool-card" onclick="location.href='https://sharanmusician.com/Scientific-calculator-/'">
                <div class="icon-dark"><svg style="opacity: 0.5;" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2zm0-4H7V7h10v2z"/></svg></div>
                <div><p class="title">Scientific Calculator</p><p class="sub">Calculator Tool</p></div>
            </div>
            <div class="tool-card" style="opacity: 0.4;">
                <div class="icon-dark"><svg style="fill: #b5924d;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg></div>
                <div><p class="title">CGPA Calculator</p><p class="sub">Grading Suite</p></div>
            </div>
            <p class="close-label" onclick="closeUtilitiesModal()">DISMISS</p>
        </div>
    </div>

    <footer>&copy; 2026 Aethercore Interactive</footer>

    <script>
        const overlay = document.getElementById('overlay');
        const utilitiesOverlay = document.getElementById('utilities-overlay');
        
        // Suppress browser dialogues & context menus
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('touchstart', function(e) {
            // Silence potential long-press select/copy triggers
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});

        function openModal() {
            overlay.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function closeModal() {
            overlay.classList.remove('active');
        }

        function openUtilitiesModal() {
            utilitiesOverlay.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(10);
        }

        function closeModalUtilities() {
            utilitiesOverlay.classList.remove('active');
        }
        
        function closeUtilitiesModal() {
            utilitiesOverlay.classList.remove('active');
        }
    </script>
</body>
</html>
