<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniDesk | Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e5e5e5; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        .btn-blue { background: #007AFF; }
        .sidebar-hidden { transform: translateX(-100%); }
        .sidebar-visible { transform: translateX(0); }
        /* Fix for audio player styling in dark mode */
        audio::-webkit-media-controls-panel { background-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col">

    <div id="toast-container" class="fixed top-16 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 w-[90%]"></div>

    <nav class="h-16 border-b border-white/5 flex justify-between items-center px-4 glass z-50">
        <div class="flex items-center gap-3">
            <button id="menu-btn" onclick="toggleSidebar()" class="hidden p-2 text-white/50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
            </button>
            <h1 class="text-xs font-black tracking-widest uppercase">UniDesk</h1>
        </div>
        <div id="status-dot" class="w-2 h-2 bg-white/10 rounded-full"></div>
    </nav>

    <main class="flex-grow relative overflow-hidden flex flex-col">
        <div id="home-view" class="flex flex-col gap-4 w-full max-w-sm m-auto p-6">
            <div onclick="createRoom()" class="glass p-8 rounded-[2rem] text-center active:scale-95 transition-transform">
                <div class="text-blue-500 flex justify-center mb-4"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></div>
                <h3 class="text-xl font-medium text-white">Create Desk</h3>
            </div>
            <div class="glass p-8 rounded-[2rem]">
                <input type="text" id="roomCodeInput" maxlength="6" placeholder="CODE" class="w-full bg-white/[0.04] p-4 rounded-xl border border-white/10 mb-3 text-center font-mono tracking-widest text-blue-400">
                <button onclick="joinRoom()" class="w-full btn-blue p-4 rounded-xl font-bold text-xs uppercase text-white">Join</button>
            </div>
        </div>

        <div id="sidebar" class="fixed inset-0 z-[60] sidebar-hidden transition-transform duration-300 flex">
            <div class="w-72 h-full glass border-r border-white/10 p-6 flex flex-col gap-6 shadow-2xl bg-black">
                <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest">Workspace Code</span>
                <div id="roomID" class="text-2xl font-mono text-blue-400 bg-white/5 p-4 rounded-2xl text-center">------</div>
                <div id="adminControls" class="hidden flex-grow overflow-hidden flex flex-col">
                    <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest mb-4">Requests</span>
                    <div id="requestList" class="space-y-2 overflow-y-auto"></div>
                </div>
                <button onclick="location.reload()" class="w-full p-4 text-xs font-bold text-red-500 border border-red-500/10 rounded-xl">Exit</button>
            </div>
            <div onclick="toggleSidebar()" class="flex-grow"></div>
        </div>

        <div id="workspace-view" class="hidden flex-col h-full w-full bg-[#050505]">
            <div id="chatBox" class="flex-grow p-4 overflow-y-auto space-y-4 pb-20"></div>
            
            <div class="p-3 pb-6 glass border-t border-white/5 flex items-center gap-2">
                <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-xl border border-white/10 text-white/50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                </button>
                <button id="micBtn" onclick="toggleRecording()" class="p-3 bg-white/5 rounded-xl border border-white/10 text-white/50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg>
                </button>
                <input type="text" id="chatInput" placeholder="Message..." class="flex-grow bg-white/5 p-3 rounded-xl border border-white/10 text-sm focus:outline-none">
                <button onclick="sendMessage()" class="btn-blue p-3 px-4 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                </button>
                <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999);
        let mediaRecorder, audioChunks = [];

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('sidebar-hidden');

        window.notify = (m) => {
            const t = document.createElement('div');
            t.className = "glass px-6 py-3 rounded-2xl text-[10px] uppercase text-center border border-blue-500/30 text-white shadow-2xl";
            t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            isAdmin = true; myId = "Admin";
            await setDoc(doc(db, "rooms", code), { status: "active", requests: [], members: ["Admin"], messages: [] });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                await updateDoc(ref, { requests: arrayUnion(myId) });
                notify("Request Sent");
                onSnapshot(ref, (s) => { if(s.data().members.includes(myId)) openWorkspace(code); });
            } else notify("Invalid Code");
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            notify("Uploading Document...");
            const fileRef = ref(storage, `rooms/${currentRoom}/${Date.now()}_${file.name}`);
            try {
                const snap = await uploadBytes(fileRef, file);
                const url = await getDownloadURL(snap.ref);
                await updateDoc(doc(db, "rooms", currentRoom), {
                    messages: arrayUnion({ user: myId, text: file.name, file: url, type: 'file', time: Date.now() })
                });
            } catch(e) { notify("Upload Failed"); }
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    notify("Sending Audio...");
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const fileRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.webm`);
                    const snap = await uploadBytes(fileRef, blob);
                    const url = await getDownloadURL(snap.ref);
                    await updateDoc(doc(db, "rooms", currentRoom), {
                        messages: arrayUnion({ user: myId, text: "Audio Note", file: url, type: 'audio', time: Date.now() })
                    });
                    btn.classList.remove('bg-red-600');
                };
                mediaRecorder.start();
                btn.classList.add('bg-red-600');
                notify("Recording...");
            } else { mediaRecorder.stop(); }
        };

        window.approveUser = async (uid) => {
            await updateDoc(doc(db, "rooms", currentRoom), { members: arrayUnion(uid), requests: arrayRemove(uid) });
            notify("Authorized");
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('menu-btn').classList.remove('hidden');
            document.getElementById('status-dot').classList.replace('bg-white/10', 'bg-blue-500');
            document.getElementById('roomID').innerText = code;
            if(isAdmin) document.getElementById('adminControls').classList.remove('hidden');

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(isAdmin && data.requests) {
                    document.getElementById('requestList').innerHTML = data.requests.map(r => `
                        <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                            <span class="text-[9px] font-mono">${r}</span>
                            <button onclick="approveUser('${r}')" class="bg-blue-600 px-3 py-1 rounded-lg text-[8px] font-black uppercase">Allow</button>
                        </div>
                    `).join('');
                }
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="${m.user === myId ? 'bg-blue-600' : 'bg-white/[0.08]'} px-4 py-3 rounded-2xl text-sm max-w-[85%] text-white">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="flex items-center gap-2 underline text-xs"><span>📄</span> ${m.text}</a>` : 
                              m.type === 'audio' ? `<audio controls class="max-w-[200px] h-8"><source src="${m.file}"></audio>` : m.text}
                        </div>
                        <span class="text-[7px] uppercase mt-1 opacity-20 tracking-widest">${m.user}</span>
                    </div>
                `).join('');
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { 
                messages: arrayUnion({ user: myId, text: i.value, type: 'text', time: Date.now() }) 
            });
            i.value = "";
        };
    </script>
</body>
</html>
