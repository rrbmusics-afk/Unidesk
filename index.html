<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .input-area { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
        #chatBox { height: calc(100dvh - 145px); overflow-y: auto; padding-bottom: 30px; -webkit-overflow-scrolling: touch; }
        .btn-blue { background: #007AFF; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }
        .btn-blue:active { transform: scale(0.92); }
        audio::-webkit-media-controls-panel { background: #1a1a1a; }
    </style>
</head>
<body class="flex flex-col">

    <div id="toast-container" class="fixed top-16 left-4 right-4 z-[110] flex flex-col gap-2"></div>

    <nav class="h-14 flex justify-between items-center px-5 glass z-50">
        <div class="text-[10px] font-black tracking-widest uppercase opacity-40">UniDesk OS</div>
        <div id="status-dot" class="w-1.5 h-1.5 bg-white/10 rounded-full"></div>
    </nav>

    <main class="flex-grow relative">
        <div id="home-view" class="absolute inset-0 flex flex-col items-center justify-center p-8 z-10 bg-black">
            <div onclick="createRoom()" class="glass w-full max-w-xs p-12 rounded-[2.5rem] text-center mb-4 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                </div>
                <div class="text-sm font-bold tracking-widest uppercase">Initialize</div>
            </div>
            <div class="glass w-full max-w-xs p-8 rounded-[2.5rem] space-y-4">
                <input type="text" id="roomCodeInput" maxlength="6" placeholder="ACCESS CODE" class="w-full bg-white/5 p-4 rounded-xl text-center font-mono tracking-widest text-blue-400 border border-white/5 outline-none">
                <button onclick="joinRoom()" class="w-full btn-blue p-4 rounded-xl font-bold text-xs uppercase tracking-widest">Request Access</button>
            </div>
        </div>

        <div id="workspace-view" class="hidden flex-col h-full w-full bg-black">
            <div id="chatBox" class="p-5 space-y-5"></div>
            
            <div class="input-area">
                <div class="flex items-center gap-2 p-4">
                    <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-xl text-white/40 border border-white/5"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></button>
                    <button id="micBtn" onclick="toggleRecording()" class="p-3 bg-white/5 rounded-xl text-white/40 border border-white/5"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg></button>
                    <input type="text" id="chatInput" placeholder="Message..." class="flex-grow bg-white/5 p-3.5 rounded-xl border border-white/5 text-sm outline-none">
                    <button onclick="sendMessage()" id="sendBtn" class="btn-blue p-3.5 px-5 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                    </button>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999), mediaRecorder, chunks = [];

        window.notify = (m) => {
            const t = document.createElement('div');
            t.className = "glass px-6 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-center border-l-4 border-blue-600 shadow-2xl";
            t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "rooms", code), { members: ["Admin"], messages: [], status: "live", createdAt: Date.now() });
                isAdmin = true; myId = "Admin";
                openWorkspace(code);
                notify("Workspace: " + code);
            } catch (e) { 
                console.error(e);
                notify("Initialization Failed. Check Firebase Settings.");
            }
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const rRef = doc(db, "rooms", code);
            const snap = await getDoc(rRef);
            if(snap.exists()) {
                await updateDoc(rRef, { requests: arrayUnion(myId) });
                notify("Awaiting Admin Approval...");
                onSnapshot(rRef, s => { if(s.data()?.members?.includes(myId)) openWorkspace(code); });
            } else notify("Code Not Recognized");
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            notify("Uploading File...");
            const sRef = ref(storage, `rooms/${currentRoom}/${Date.now()}_${file.name}`);
            try {
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                await updateDoc(doc(db, "rooms", currentRoom), {
                    messages: arrayUnion({ user: myId, text: file.name, file: url, type: 'file', time: Date.now() })
                });
            } catch(e) { notify("Upload Blocked by Rules"); }
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    chunks = [];
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        notify("Processing Audio...");
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const sRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.webm`);
                        const snap = await uploadBytes(sRef, blob);
                        const url = await getDownloadURL(snap.ref);
                        await updateDoc(doc(db, "rooms", currentRoom), {
                            messages: arrayUnion({ user: myId, text: "Voice Message", file: url, type: 'audio', time: Date.now() })
                        });
                        btn.classList.remove('bg-red-500/20');
                    };
                    mediaRecorder.start();
                    btn.classList.add('bg-red-500/20');
                    notify("Recording...");
                } catch(e) { notify("Mic Permission Denied"); }
            } else { mediaRecorder.stop(); }
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('status-dot').classList.replace('bg-white/10', 'bg-blue-500');
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(!data) return;
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="${m.user === myId ? 'bg-blue-600' : 'bg-white/10'} px-4 py-3 rounded-2xl text-sm max-w-[85%] shadow-lg">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="flex items-center gap-2">📄 <span class="underline">${m.text}</span></a>` : 
                              m.type === 'audio' ? `<audio controls class="w-48 h-8 scale-90 origin-left"><source src="${m.file}"></audio>` : m.text}
                        </div>
                        <span class="text-[7px] uppercase mt-1 opacity-20 tracking-tighter">${m.user}</span>
                    </div>
                `).join('');
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text: i.value, type: 'text', time: Date.now() }) });
            i.value = "";
        };
    </script>
</body>
</html>
