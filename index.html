<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethercore | Unidesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --accent: #007AFF; }
        body { 
            background: var(--bg); 
            color: #e9edef; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
        }
        .tool-sub-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md space-y-8">
        <!-- Branding Header -->
        <header class="text-center">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter italic">AETHERCORE</h1>
            <p class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-bold mt-2">Student Utility Suite</p>
        </header>

        <!-- Main Navigation -->
        <div class="space-y-6">
            
            <!-- UniDesk Shield (Primary Chat) -->
            <a href="chat.html" class="glass-card p-6 rounded-[2rem] flex items-center justify-between group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-600/20">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">Student Lounge</h3>
                        <p class="text-gray-500 text-xs uppercase tracking-widest font-semibold">Secure Communication</p>
                    </div>
                </div>
                <svg class="w-5 h-5 text-gray-600 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </a>

            <!-- TOOLS SECTION -->
            <div class="space-y-3">
                <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-600 font-black ml-4">Toolkit</h2>
                
                <div class="grid grid-cols-1 gap-3">
                    <!-- Page Forge -->
                    <a href="https://sharanmusician.github.io/Page-Forge/" class="tool-sub-card p-4 rounded-3xl flex items-center gap-4 hover:border-blue-500/50 transition-all">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-blue-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm">Page Forge</h4>
                            <p class="text-gray-500 text-[11px]">Images to PDF Converter</p>
                        </div>
                    </a>

                    <!-- Resume Maker -->
                    <div class="tool-sub-card p-4 rounded-3xl flex items-center gap-4 cursor-pointer opacity-60 hover:opacity-100 transition-all">
                        <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-amber-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-gray-300">Resume Maker</h4>
                            <p class="text-gray-500 text-[11px]">Professional CV Builder</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <footer class="pt-8 text-center">
            <p class="text-[9px] text-gray-700 uppercase font-bold tracking-[0.4em]">&copy; 2026 Aethercore Interactive</p>
        </footer>
    </div>

</body>
</html>
