<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNIDESK | Aethercore Interactive</title>
    <style>
        :root {
            /* 40Cr Grade Palette */
            --bg: #080c10;
            --accent: #4a90e2;
            --accent-gradient: linear-gradient(135deg, #4a90e2 0%, #2159a3 100%);
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-p: #ffffff;
            --text-s: #7a8691;
            
            /* Ergonomics */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --easing: cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-p);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: calc(var(--safe-top) + 40px) 24px calc(var(--safe-bottom) + 30px);
            overflow-x: hidden;
        }

        /* High-End Branding */
        .branding-core {
            text-align: center;
            margin-bottom: 50px;
            pointer-events: none;
        }

        .brand-logo {
            font-size: clamp(54px, 15vw, 72px);
            font-weight: 900;
            font-style: italic;
            color: var(--accent);
            letter-spacing: -3px;
            line-height: 0.85;
            text-shadow: 0 10px 40px rgba(74, 144, 226, 0.3);
        }

        .brand-tag {
            font-size: 11px;
            letter-spacing: 5px;
            font-weight: 800;
            color: var(--text-s);
            text-transform: uppercase;
            margin-top: 15px;
            opacity: 0.7;
        }

        /* Grid Container */
        .portal-layout {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
        }

        /* Premium Highlight Card */
        .lounge-gate {
            background: linear-gradient(165deg, rgba(74, 144, 226, 0.15) 0%, rgba(8, 12, 16, 0) 100%);
            border: 1.5px solid var(--accent);
            border-radius: 40px;
            padding: 28px;
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 45px;
            transition: transform 0.3s var(--easing);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }

        .lounge-gate:active { transform: scale(0.96); }

        .icon-prime {
            width: 64px;
            height: 64px;
            background: var(--accent-gradient);
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 22px;
            flex-shrink: 0;
            box-shadow: 0 10px 25px rgba(74, 144, 226, 0.4);
        }

        /* Toolkit Section */
        .toolkit-label {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-s);
            font-weight: 800;
            text-transform: uppercase;
            margin: 0 0 20px 10px;
        }

        .utility-tile {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 22px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s var(--easing);
        }

        .utility-tile:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.98);
        }

        .icon-mono {
            width: 54px;
            height: 54px;
            background: #151a1f;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0;
        }

        /* Typography Hierarchy */
        .txt-title { font-size: 19px; font-weight: 600; letter-spacing: -0.4px; }
        .txt-sub { font-size: 14px; color: var(--text-s); margin-top: 3px; }
        .txt-caps { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; color: #5a6571; }
        
        .nav-arrow { margin-left: auto; color: #2c343c; font-size: 26px; }

        /* Global Footer */
        footer {
            margin-top: auto;
            text-align: center;
            font-size: 10px;
            letter-spacing: 4px;
            color: #404b57;
            font-weight: 700;
            padding-top: 30px;
        }

        svg { width: 26px; height: 26px; fill: white; }
    </style>
</head>
<body>

    <header class="branding-core">
        <h1 class="brand-logo">UNIDESK</h1>
        <div class="brand-tag">Student Utility Suite</div>
    </header>

    <main class="portal-layout">
        <!-- Entry 01: Student Lounge -->
        <section class="lounge-gate" onclick="window.location.href='page.html'">
            <div class="icon-prime">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="meta">
                <span class="txt-title">Student Lounge</span>
                <span class="txt-sub txt-caps">Secure Network</span>
            </div>
            <div class="nav-arrow">›</div>
        </section>

        <h2 class="toolkit-label">Ecosystem</h2>

        <!-- Entry 02: Page Forge -->
        <section class="utility-tile" onclick="window.location.href='https://sharanmusician.github.io/Page-Forge/'">
            <div class="icon-mono">
                <svg style="opacity: 0.6;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="meta">
                <span class="txt-title">Page Forge</span>
                <span class="txt-sub">Industrial PDF Engine</span>
            </div>
        </section>

        <!-- Entry 03: Resume Maker -->
        <section class="utility-tile" style="opacity: 0.4; pointer-events: none;">
            <div class="icon-mono">
                <svg style="fill: #b18e4d;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="meta">
                <span class="txt-title">Resume Maker</span>
                <span class="txt-sub">Curated Professionalism</span>
            </div>
        </section>
    </main>

    <footer>
        &copy; 2026 AETHERCORE INTERACTIVE
    </footer>

    <script>
        // Immersive Haptics for Professional Feel
        document.querySelectorAll('section').forEach(el => {
            el.addEventListener('click', () => {
                if ('vibrate' in navigator) navigator.vibrate(8);
            });
        });
    </script>
</body>
</html>
