<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.min.css">
    <style>
        :root { --accent: #007AFF; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; width: 100vw; margin: 0; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 20px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        .input-container { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.1); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; width: 100%; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; user-select: none; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-img { border-radius: 12px; margin: 4px 0; width: 220px; height: 220px; object-fit: cover; display: block; }
        .pswp__img { object-fit: contain !important; }
        
        /* Action Menu */
        #actionMenu { position: fixed; background: #1c1c1e; border: 1px solid #38383a; border-radius: 12px; display: none; z-index: 1000; overflow: hidden; min-width: 150px; }
        .menu-item { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #38383a; cursor: pointer; }
        .menu-item:last-child { border: none; }
        .menu-item:active { background: #2c2c2e; }

        /* Video Call Overlay */
        #callOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 2px solid #fff; object-fit: cover; }
    </style>
</head>
<body>

    <div id="callOverlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <button onclick="endCall()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 p-5 rounded-full">
            <svg class="w-8 h-8" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.3 3.53-.09a1 1 0 011.04 1.04v3.59a1 1 0 01-1.04 1.04C10.51 22 2 13.49 2 3.04A1 1 0 013.04 2h3.59a1 1 0 011.04 1.04c-.39 1.2-.41 2.41-.09 3.53.1.35.01.75-.26 1.02l-2.2 2.2z"/></svg>
        </button>
    </div>

    <div id="actionMenu">
        <div class="menu-item text-blue-400" id="editOption">Edit Message</div>
        <div class="menu-item text-red-500" id="deleteOption">Delete for Everyone</div>
    </div>

    <nav class="h-14 flex items-center justify-between px-5 glass shrink-0">
        <div class="flex flex-col">
            <span class="text-[10px] font-black tracking-widest uppercase text-blue-500">UniDesk OS</span>
            <span id="room-code-display" class="text-[11px] font-mono font-bold text-white tracking-widest"></span>
        </div>
        <div class="flex items-center gap-5">
            <button onclick="startCall('audio')" class="text-white/60 active:text-blue-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-width="2"/></svg>
            </button>
            <button onclick="startCall('video')" class="text-white/60 active:text-blue-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" stroke-width="2"/></svg>
            </button>
            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8 bg-black z-50">
        <div class="w-full max-w-xs space-y-4 text-center">
            <div onclick="createRoom()" class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] btn-active cursor-pointer">
                <span class="text-[11px] font-bold uppercase tracking-widest text-white/80">Initialize Room</span>
            </div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] space-y-4">
                <input type="text" id="roomCodeInput" placeholder="ENTER CODE" class="w-full bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 border border-white/5 outline-none tracking-[0.2em]">
                <button onclick="joinRoom()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xs uppercase tracking-widest btn-active">Connect</button>
            </div>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full relative overflow-hidden">
        <div id="chatBox"></div>
        <div class="input-container">
            <div class="flex items-center gap-2">
                <button onmousedown="event.preventDefault()" onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-full text-white/40"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg></button>
                <div class="flex-grow bg-white/5 border border-white/10 rounded-full px-4 py-1 flex items-center">
                    <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent py-2.5 text-sm outline-none">
                </div>
                <button id="sendBtn" onmousedown="event.preventDefault()" onclick="sendMessage()" class="p-3.5 bg-blue-600 rounded-full text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg></button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import PhotoSwipeLightbox from 'https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe-lightbox.esm.min.js';

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), pc, localStream, allMessages = [], editingId = null;

        // Visual Viewport Handling
        if(window.visualViewport) window.visualViewport.addEventListener('resize', () => { document.body.style.height = window.visualViewport.height + 'px'; document.getElementById('chatBox').scrollTop = 999999; });

        // Long Press Logic
        let pressTimer;
        function setupLongPress(el, msgId) {
            el.onmousedown = el.ontouchstart = (e) => {
                pressTimer = setTimeout(() => showMenu(e, msgId), 600);
            };
            el.onmouseup = el.onmouseleave = el.ontouchend = () => clearTimeout(pressTimer);
        }

        function showMenu(e, msgId) {
            const menu = document.getElementById('actionMenu');
            const touch = e.touches ? e.touches[0] : e;
            menu.style.display = 'block';
            menu.style.top = touch.clientY + 'px';
            menu.style.left = Math.min(touch.clientX, window.innerWidth - 160) + 'px';
            
            document.getElementById('deleteOption').onclick = () => deleteMessage(msgId);
            document.getElementById('editOption').onclick = () => startEdit(msgId);
            
            window.onclick = () => menu.style.display = 'none';
        }

        async function deleteMessage(id) {
            const filtered = allMessages.filter(m => m.id !== id);
            await updateDoc(doc(db, "rooms", currentRoom), { messages: filtered });
        }

        function startEdit(id) {
            const msg = allMessages.find(m => m.id === id);
            if(msg.type !== 'text') return alert("Only text can be edited");
            editingId = id;
            document.getElementById('chatInput').value = msg.text;
            document.getElementById('chatInput').focus();
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            
            if(editingId) {
                const index = allMessages.findIndex(m => m.id === editingId);
                allMessages[index].text = i.value;
                allMessages[index].edited = true;
                editingId = null;
            } else {
                allMessages.push({ id: Date.now().toString(), user: myId, text: i.value, type: 'text', time: Date.now() });
            }
            
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            i.value = ""; i.focus();
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            myId = "Admin"; openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('room-code-display').innerText = code;
            
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(!data) return;
                allMessages = data.messages || [];
                document.getElementById('chatBox').innerHTML = allMessages.map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div id="msg-${m.id}" class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                            ${m.type === 'image' ? `<a href="${m.data}" class="pswp-link" data-pswp-width="1200" data-pswp-height="1600"><img src="${m.data}" class="chat-img"></a>` : `<div>${m.text} ${m.edited ? '<span class="opacity-40 text-[9px]">(edited)</span>':''}</div>`}
                        </div>
                    </div>
                `).join('');
                allMessages.forEach(m => setupLongPress(document.getElementById(`msg-${m.id}`), m.id));
                document.getElementById('chatBox').scrollTop = 999999;
            });
        }

        // Call Logic
        window.startCall = async (type) => {
            document.getElementById('callOverlay').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: type === 'video', audio: true });
            document.getElementById('localVideo').srcObject = localStream;
        };

        window.endCall = () => {
            localStream.getTracks().forEach(t => t.stop());
            document.getElementById('callOverlay').style.display = 'none';
        };

        const lightbox = new PhotoSwipeLightbox({ gallery: '#chatBox', children: 'a.pswp-link', pswpModule: () => import('https://cdnjs.cloudflare.com/ajax/libs/photoswipe/5.4.2/photoswipe.esm.min.js') });
        lightbox.init();
    </script>
</body>
</html>
