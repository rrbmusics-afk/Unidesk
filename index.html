<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", 
        authDomain: "unidesk-a70ac.firebaseapp.com", 
        projectId: "unidesk-a70ac" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let currentRoom, myId = "User-" + Math.floor(Math.random()*9999), allMessages = [];
    let mediaRecorder, audioChunks = [];

    // --- Core Session Fix ---
    window.createRoom = async () => {
        const btn = event.currentTarget;
        const originalText = btn.innerText;
        btn.innerText = "INITIALIZING...";
        btn.disabled = true;

        try {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            const roomRef = doc(db, "rooms", code);
            
            // Initializing the document with an empty message array and metadata
            await setDoc(roomRef, { 
                messages: [], 
                createdAt: Date.now(),
                active: true 
            });
            
            console.log("Room Created:", code);
            openWorkspace(code);
        } catch (error) {
            console.error("Setup Error:", error);
            alert("Connection Failed. Ensure Firestore is in Test Mode.");
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    window.joinRoom = async () => {
        const codeInput = document.getElementById('roomCodeInput');
        const code = codeInput.value.trim().toUpperCase();
        if(!code) return;

        const snap = await getDoc(doc(db, "rooms", code));
        if(snap.exists()) {
            openWorkspace(code);
        } else {
            alert("Invalid Access Code");
        }
    };

    function openWorkspace(code) {
        currentRoom = code;
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('status-text').innerText = "Online - " + code;

        // Real-time listener
        onSnapshot(doc(db, "rooms", code), (s) => {
            const data = s.data(); 
            if(!data) return;
            
            allMessages = data.messages || [];
            renderMessages();
        });
    }

    function renderMessages() {
        const chatBox = document.getElementById('chatBox');
        // Keep the E2EE banner
        const banner = `<div class="self-center bg-[#182229] text-[#8696a0] text-[11px] px-3 py-1 rounded-md mb-4 border border-gray-800">Messages are end-to-end encrypted.</div>`;
        chatBox.innerHTML = banner;
        
        allMessages.forEach(m => {
            const div = document.createElement('div');
            div.className = `flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}`;
            
            let inner = '';
            if (m.type === 'text') {
                inner = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">${m.text}</div>`;
            } else if (m.type === 'image' || m.type === 'doc') {
                inner = `<img src="${m.data}" class="media-content" onclick="this.classList.toggle('expanded')">`;
            } else if (m.type === 'audio') {
                inner = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                            <audio controls class="h-8 w-40 brightness-90 invert"><source src="${m.data}"></audio>
                         </div>`;
            }
            
            div.innerHTML = inner;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    window.sendMessage = async () => {
        const chatInput = document.getElementById('chatInput');
        const val = chatInput.value.trim(); 
        if(!val || !currentRoom) return;

        const newMessage = { 
            id: Date.now().toString(), 
            user: myId, 
            text: val, 
            type: 'text', 
            time: Date.now() 
        };

        allMessages.push(newMessage);
        await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
        
        chatInput.value = ""; 
        chatInput.dispatchEvent(new Event('input')); // Reset icons
    }
</script>
