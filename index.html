<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; }
        body { background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100dvh; width: 100vw; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input, button { outline: none !important; -webkit-tap-highlight-color: transparent; }
        #chatBox { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .sidebar-transition { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        audio::-webkit-media-controls-panel { background: #1a1a1a; }
    </style>
</head>
<body class="flex flex-col">

    <div id="toast-container" class="fixed top-20 left-4 right-4 z-[100] flex flex-col gap-2"></div>

    <nav class="h-14 flex justify-between items-center px-5 glass border-b border-white/5 z-50">
        <button id="menu-btn" onclick="toggleSidebar()" class="hidden p-2 -ml-2 text-white/40 active:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg>
        </button>
        <div class="text-[10px] font-black tracking-[0.3em] uppercase opacity-40">UniDesk</div>
        <div id="status-dot" class="w-1.5 h-1.5 bg-white/10 rounded-full"></div>
    </nav>

    <main class="flex-grow relative overflow-hidden flex flex-col">
        
        <div id="home-view" class="absolute inset-0 flex flex-col items-center justify-center p-8 z-10 bg-black">
            <div class="w-full max-w-xs space-y-4">
                <div onclick="createRoom()" class="glass p-10 rounded-[2.5rem] text-center active:scale-95 transition-all">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                    </div>
                    <span class="text-sm font-semibold">Initialize Desk</span>
                </div>
                <div class="glass p-8 rounded-[2.5rem] space-y-4">
                    <input type="text" id="roomCodeInput" maxlength="6" placeholder="CODE" class="w-full bg-white/5 p-4 rounded-2xl text-center font-mono tracking-widest text-blue-400 border border-white/5">
                    <button onclick="joinRoom()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Request Access</button>
                </div>
            </div>
        </div>

        <div id="sidebar" class="fixed inset-0 z-[60] -translate-x-full sidebar-transition flex">
            <div class="w-[80%] h-full glass border-r border-white/10 p-6 flex flex-col gap-8 bg-[#080808]">
                <div class="pt-8">
                    <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest block mb-4">Workspace Code</span>
                    <div id="roomID" class="text-3xl font-mono text-blue-400 bg-white/5 p-5 rounded-2xl text-center border border-blue-500/10">------</div>
                </div>
                <div id="adminControls" class="hidden flex-grow overflow-hidden flex flex-col">
                    <span class="text-[10px] font-bold text-white/20 uppercase tracking-widest mb-4">Requests</span>
                    <div id="requestList" class="space-y-3 overflow-y-auto pr-2"></div>
                </div>
                <button onclick="location.reload()" class="w-full p-4 text-[10px] font-black uppercase text-red-500/40 border border-red-500/10 rounded-2xl mb-8">Terminate Session</button>
            </div>
            <div onclick="toggleSidebar()" class="flex-grow bg-black/40 backdrop-blur-sm"></div>
        </div>

        <div id="workspace-view" class="hidden flex-col h-full w-full bg-black">
            <div id="chatBox" class="flex-grow p-5 overflow-y-auto space-y-6 pb-24 pt-4"></div>
            
            <div class="fixed bottom-0 left-0 right-0 p-4 safe-bottom glass border-t border-white/5">
                <div class="flex items-center gap-3">
                    <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-2xl border border-white/10 active:bg-white/10 transition-colors">
                        <svg class="w-5 h-5 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                    </button>
                    <button id="micBtn" onclick="toggleRecording()" class="p-3 bg-white/5 rounded-2xl border border-white/10 active:bg-red-500/20 transition-all">
                        <svg class="w-5 h-5 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg>
                    </button>
                    <input type="text" id="chatInput" placeholder="Message..." class="flex-grow bg-white/5 p-4 rounded-2xl text-sm border border-white/5">
                    <button onclick="sendMessage()" class="bg-blue-600 p-4 rounded-2xl shadow-lg shadow-blue-500/20 active:scale-90 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                    </button>
                </div>
                <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999);
        let mediaRecorder, audioChunks = [];

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('-translate-x-full');

        window.notify = (m) => {
            const t = document.createElement('div');
            t.className = "glass px-6 py-3 rounded-2xl text-[10px] font-bold uppercase tracking-widest text-center border-l-4 border-blue-600 shadow-2xl";
            t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 2500);
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            isAdmin = true; myId = "Admin";
            await setDoc(doc(db, "rooms", code), { status: "active", requests: [], members: ["Admin"], messages: [] });
            openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const ref = doc(db, "rooms", code);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                await updateDoc(ref, { requests: arrayUnion(myId) });
                notify("Request Dispatched");
                onSnapshot(ref, (s) => { if(s.data()?.members.includes(myId)) openWorkspace(code); });
            } else notify("Code Not Found");
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            notify("Uploading Data...");
            const fileRef = ref(storage, `rooms/${currentRoom}/${Date.now()}_${file.name}`);
            try {
                const snap = await uploadBytes(fileRef, file);
                const url = await getDownloadURL(snap.ref);
                await updateDoc(doc(db, "rooms", currentRoom), {
                    messages: arrayUnion({ user: myId, text: file.name, file: url, type: 'file', time: Date.now() })
                });
            } catch(e) { notify("Upload Blocked"); }
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const fileRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.webm`);
                    const snap = await uploadBytes(fileRef, blob);
                    const url = await getDownloadURL(snap.ref);
                    await updateDoc(doc(db, "rooms", currentRoom), {
                        messages: arrayUnion({ user: myId, text: "Audio Log", file: url, type: 'audio', time: Date.now() })
                    });
                    btn.classList.remove('bg-red-500/20');
                };
                mediaRecorder.start();
                btn.classList.add('bg-red-500/20');
                notify("Capturing Audio...");
            } else { mediaRecorder.stop(); }
        };

        window.approveUser = async (uid) => {
            await updateDoc(doc(db, "rooms", currentRoom), { members: arrayUnion(uid), requests: arrayRemove(uid) });
            notify("Access Granted");
        };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('menu-btn').classList.remove('hidden');
            document.getElementById('status-dot').classList.replace('bg-white/10', 'bg-blue-600');
            document.getElementById('roomID').innerText = code;
            if(isAdmin) document.getElementById('adminControls').classList.remove('hidden');

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                if(isAdmin && data.requests) {
                    document.getElementById('requestList').innerHTML = data.requests.map(r => `
                        <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                            <span class="text-[10px] font-mono opacity-50">${r}</span>
                            <button onclick="approveUser('${r}')" class="bg-blue-600 text-[8px] font-black px-4 py-2 rounded-xl uppercase">Allow</button>
                        </div>
                    `).join('');
                }
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="${m.user === myId ? 'bg-blue-600 shadow-lg shadow-blue-500/10' : 'bg-white/[0.06] border border-white/5'} px-5 py-3 rounded-[1.4rem] text-[13px] leading-relaxed max-w-[85%] text-white">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="flex items-center gap-2 underline italic opacity-90">📄 ${m.text}</a>` : 
                              m.type === 'audio' ? `<audio controls class="max-w-[200px] h-8 opacity-80"><source src="${m.file}"></audio>` : m.text}
                        </div>
                        <span class="text-[7px] uppercase mt-2 opacity-20 tracking-widest font-bold">${m.user}</span>
                    </div>
                `).join('');
                const cb = document.getElementById('chatBox');
                cb.scrollTop = cb.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text: i.value, type: 'text', time: Date.now() }) });
            i.value = "";
        };
    </script>
</body>
</html>
