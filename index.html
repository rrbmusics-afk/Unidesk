<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --e2ee-gold: #FFD700; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100vw; }
        
        /* Smooth Photo Animation */
        .chat-img { 
            border-radius: 12px; width: 120px; height: 120px; object-fit: cover; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .chat-img.expanded { 
            width: 280px; height: auto; border-radius: 8px; 
        }

        /* Audio Recorder UI */
        .recording-active { color: #ff3b30; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; position: relative; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .input-container { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 12px calc(12px + env(safe-area-inset-bottom)) 12px; }
        
        /* Nav & Overlays */
        #callOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.2); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); }
    </style>
</head>
<body>

    <nav class="h-16 flex items-center justify-between px-5 glass border-b border-white/10">
        <div class="flex flex-col">
            <span class="text-[9px] font-black tracking-widest uppercase text-blue-500">UniDesk OS</span>
            <span id="room-code-display" class="text-[13px] font-mono font-bold text-white tracking-widest mt-0.5"></span>
        </div>
        <div id="call-controls" class="hidden flex items-center gap-3">
            <button onclick="triggerCall('audio')" class="p-2 text-white/40"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></button>
            <button onclick="triggerCall('video')" class="p-2 text-white/40"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8">
        <div class="w-full max-w-xs space-y-6">
            <button onclick="createRoom()" class="w-full bg-white/5 border border-white/10 py-10 rounded-[2rem] font-bold text-xs tracking-widest uppercase">Create Room</button>
            <div class="bg-white/5 border border-white/10 p-6 rounded-[2rem] space-y-4">
                <input type="text" id="roomCodeInput" placeholder="ENTER CODE" class="w-full bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 outline-none">
                <button onclick="joinRoom()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-xs uppercase">Connect</button>
            </div>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full relative">
        <div id="chatBox"></div>
        
        <div class="input-container">
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('fileInput').click()" class="bg-white/5 rounded-full w-10 h-10 text-white/40"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
                
                <div class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-4 flex items-center h-11">
                    <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent py-2 text-sm outline-none">
                    <div id="recIndicator" class="hidden text-[10px] font-bold text-red-500 uppercase tracking-tighter items-center gap-1"><span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span> REC</div>
                </div>

                <button id="actionBtn" 
                        onmousedown="startRecording()" onmouseup="stopRecording()"
                        ontouchstart="startRecording()" ontouchend="stopRecording()"
                        class="bg-blue-600 rounded-full w-11 h-11 text-white shadow-lg">
                    <svg id="micIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4m-4 0h8"/></svg>
                    <svg id="sendIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), allMessages = [];
        let mediaRecorder, audioChunks = [];

        // UI Logic for Input
        const chatInput = document.getElementById('chatInput');
        chatInput.oninput = () => {
            const hasText = chatInput.value.length > 0;
            document.getElementById('micIcon').classList.toggle('hidden', hasText);
            document.getElementById('sendIcon').classList.toggle('hidden', !hasText);
        };

        // WhatsApp Style Recording
        window.startRecording = async () => {
            if (chatInput.value.length > 0) return; // Don't record if typing
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = async () => {
                    allMessages.push({ user: myId, data: reader.result, type: 'audio', time: Date.now() });
                    await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
                };
                stream.getTracks().forEach(t => t.stop());
            };
            
            mediaRecorder.start();
            document.getElementById('recIndicator').classList.remove('hidden');
            chatInput.classList.add('hidden');
        };

        window.stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recIndicator').classList.add('hidden');
                chatInput.classList.remove('hidden');
            }
        };

        // Photo Handling with Animation
        window.processFile = async (file) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                allMessages.push({ user: myId, data: e.target.result, type: 'image', time: Date.now() });
                await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            };
            reader.readAsDataURL(file);
        };

        window.toggleImg = (el) => el.classList.toggle('expanded');

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.remove('hidden');
            document.getElementById('room-code-display').innerText = code;
            document.getElementById('call-controls').classList.remove('hidden');

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data(); if(!data) return;
                allMessages = data.messages || [];
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '';
                
                allMessages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}`;
                    
                    let content = '';
                    if (m.type === 'image') {
                        content = `<img src="${m.data}" class="chat-img" onclick="toggleImg(this)">`;
                    } else if (m.type === 'audio') {
                        content = `<audio controls class="h-8 w-48 scale-90 origin-left brightness-90"><source src="${m.data}"></audio>`;
                    } else {
                        content = `<span>${m.text}</span>`;
                    }
                    
                    div.innerHTML = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">${content}</div>`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            if (!chatInput.value) return;
            allMessages.push({ user: myId, text: chatInput.value, type: 'text', time: Date.now() });
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            chatInput.value = ""; chatInput.oninput();
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            myId = "Admin"; openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };
    </script>
</body>
</html>
