<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* WhatsApp-style locked viewport */
        :root { --whatsapp-blue: #007AFF; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100dvh; 
            width: 100vw;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed; /* Prevents background scrolling/bouncing */
        }
        .glass { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        
        /* Chat area scrolls independently */
        #chatBox { 
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        /* Fixed footer that respects safe areas (iPhone/Android bars) */
        .input-container {
            background: #0a0a0a;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px;
            flex-shrink: 0;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
        }
        .bubble-me { background: var(--whatsapp-blue); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        audio::-webkit-media-controls-panel { background: #1a1a1a; }
        .btn-blue:active { transform: scale(0.92); opacity: 0.8; }
    </style>
</head>
<body>

    <nav class="h-14 flex items-center px-4 glass shrink-0">
        <div class="flex flex-col">
            <span class="text-[10px] font-black tracking-widest uppercase text-blue-500">UniDesk Console</span>
            <span id="room-display" class="text-[9px] opacity-40 font-mono tracking-tighter">OFFLINE</span>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8 bg-black z-50">
        <div class="w-full max-w-xs space-y-4">
            <div onclick="createRoom()" class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] text-center active:bg-white/10 transition-all">
                <span class="text-xs font-bold tracking-widest uppercase">Start New Session</span>
            </div>
            <div class="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] space-y-4">
                <input type="text" id="roomCodeInput" placeholder="JOIN CODE" class="w-full bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 outline-none border border-white/5">
                <button onclick="joinRoom()" class="w-full bg-blue-600 p-4 rounded-xl font-bold text-xs uppercase tracking-widest text-white shadow-lg active:scale-95 transition-all">Connect</button>
            </div>
        </div>
    </div>

    <div id="workspace-view" class="hidden flex-col h-full w-full">
        <div id="chatBox"></div>
        
        <div class="input-container">
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('fileInput').click()" class="p-3 bg-white/5 rounded-full text-white/40 active:text-blue-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2"/></svg>
                </button>
                <div class="flex-grow bg-white/5 border border-white/10 rounded-[24px] px-4 py-1 flex items-center">
                    <input type="text" id="chatInput" placeholder="Message..." class="w-full bg-transparent py-2.5 text-sm outline-none">
                    <button id="micBtn" onclick="toggleRecording()" class="ml-2 text-white/40 active:text-red-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" stroke-width="2"/></svg>
                    </button>
                </div>
                <button onclick="sendMessage()" class="p-3.5 bg-blue-600 rounded-full text-white shadow-lg shadow-blue-500/20 active:scale-90 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3"/></svg>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let currentRoom, isAdmin = false, myId = "User-" + Math.floor(Math.random()*999), mediaRecorder, chunks = [];

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            try {
                await setDoc(doc(db, "rooms", code), { members: ["Admin"], messages: [], status: "live", time: Date.now() });
                isAdmin = true; myId = "Admin";
                openWorkspace(code);
            } catch (e) { alert("Check Firebase Rules!"); }
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            if(!code) return;
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) {
                await updateDoc(doc(db, "rooms", code), { requests: arrayUnion(myId) });
                alert("Request Sent. Wait for Admin.");
                onSnapshot(doc(db, "rooms", code), s => { if(s.data()?.members?.includes(myId)) openWorkspace(code); });
            }
        };

        window.uploadFile = async (file) => {
            if(!file) return;
            const sRef = ref(storage, `rooms/${currentRoom}/${Date.now()}_${file.name}`);
            const snap = await uploadBytes(sRef, file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, "rooms", currentRoom), {
                messages: arrayUnion({ user: myId, text: file.name, file: url, type: 'file', time: Date.now() })
            });
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('micBtn');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const sRef = ref(storage, `rooms/${currentRoom}/audio_${Date.now()}.webm`);
                    const snap = await uploadBytes(sRef, blob);
                    const url = await getDownloadURL(snap.ref);
                    await updateDoc(doc(db, "rooms", currentRoom), {
                        messages: arrayUnion({ user: myId, text: "Audio Note", file: url, type: 'audio', time: Date.now() })
                    });
                    btn.classList.remove('text-red-500');
                };
                mediaRecorder.start();
                btn.classList.add('text-red-500');
            } else { mediaRecorder.stop(); }
        };

        function openWorkspace(code) {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('room-display').innerText = "SESSION: " + code;
            currentRoom = code;
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data();
                document.getElementById('chatBox').innerHTML = data.messages.sort((a,b)=>a.time-b.time).map(m => `
                    <div class="flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}">
                        <div class="chat-bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                            ${m.type === 'file' ? `<a href="${m.file}" target="_blank" class="flex items-center gap-2">📎 <span class="underline text-xs">${m.text}</span></a>` : 
                              m.type === 'audio' ? `<audio controls class="w-40 h-8 scale-90 origin-left"><source src="${m.file}"></audio>` : m.text}
                        </div>
                        <span class="text-[7px] uppercase mt-1 opacity-20 tracking-tighter px-2">${m.user}</span>
                    </div>
                `).join('');
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            await updateDoc(doc(db, "rooms", currentRoom), { messages: arrayUnion({ user: myId, text: i.value, type: 'text', time: Date.now() }) });
            i.value = "";
        };
    </script>
</body>
</html>
