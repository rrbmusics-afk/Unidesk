<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethercore | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0b141a; --card: #1c272e; --accent: #007AFF; }
        body { 
            background: var(--bg); 
            color: #e9edef; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md space-y-10">
        <!-- Branding Header -->
        <header class="text-center space-y-2">
            <h1 class="text-5xl font-black text-blue-500 tracking-tighter italic italic">AETHERCORE</h1>
            <p class="text-[10px] uppercase tracking-[0.5em] text-gray-500 font-bold">Integrated Workspace v3.0</p>
        </header>

        <!-- Tools Grid -->
        <div class="grid grid-cols-1 gap-4">
            
            <!-- TOOL 1: UniDesk Shield (Chat) -->
            <a href="chat.html" class="glass-card p-5 rounded-[2rem] flex items-center gap-4 group">
                <div class="icon-box bg-blue-600/20 text-blue-500 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h3 class="font-bold text-lg">UniDesk Shield</h3>
                        <span class="bg-green-500/20 text-green-400 text-[9px] px-2 py-0.5 rounded-full font-black">ENCRYPTED</span>
                    </div>
                    <p class="text-gray-500 text-xs">Secure P2P communication tunnel.</p>
                </div>
            </a>

            <!-- TOOL 2: Page Forge (PDF Maker) -->
            <a href="https://sharanmusician.github.io/Page-Forge/" class="glass-card p-5 rounded-[2rem] flex items-center gap-4 group">
                <div class="icon-box bg-purple-600/20 text-purple-500 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h3 class="font-bold text-lg">Page Forge</h3>
                        <span class="bg-blue-500/20 text-blue-400 text-[9px] px-2 py-0.5 rounded-full font-black">STABLE</span>
                    </div>
                    <p class="text-gray-500 text-xs">High-fidelity Image-to-PDF engine.</p>
                </div>
            </a>

            <!-- TOOL 3: Resume Dashboard (Canva-style) -->
            <div class="glass-card p-5 rounded-[2rem] flex items-center gap-4 group cursor-pointer opacity-70 hover:opacity-100">
                <div class="icon-box bg-amber-600/20 text-amber-500 group-hover:bg-amber-600 group-hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </div>
                <div class="flex-1">
                    <div class="flex items-center gap-2">
                        <h3 class="font-bold text-lg text-gray-300">Resume Editor</h3>
                        <span class="bg-gray-500/20 text-gray-500 text-[9px] px-2 py-0.5 rounded-full font-black">DEV</span>
                    </div>
                    <p class="text-gray-500 text-xs">Canva-inspired layout builder.</p>
                </div>
            </a>

        </div>

        <!-- Footer Info -->
        <footer class="pt-10 text-center">
            <p class="text-[10px] text-gray-600 uppercase font-bold tracking-widest">&copy; 2026 Aethercore Interactive</p>
        </footer>
    </div>

</body>
</html>
