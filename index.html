<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --e2ee-gold: #FFD700; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100dvh; width: 100vw; margin: 0; display: flex; flex-direction: column; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
        
        .bubble { max-width: 85%; padding: 10px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .e2ee-banner { background: rgba(255, 215, 0, 0.05); color: #ffd700; border: 1px solid rgba(255,215,0,0.15); border-radius: 10px; padding: 10px 14px; margin: 10px auto 20px auto; font-size: 11px; text-align: center; max-width: 85%; display: flex; align-items: center; gap: 8px; justify-content: center; }

        .input-container { background: #0a0a0a; border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 12px calc(12px + env(safe-area-inset-bottom)) 12px; }
        
        /* Expandable Document/Image Style */
        .doc-thumb { border-radius: 12px; width: 120px; height: 120px; object-fit: cover; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .doc-thumb.expanded { width: 85vw; height: auto; border-radius: 8px; z-index: 100; }

        /* Voice Recorder UI */
        #recIndicator { display: none; color: #ff3b30; font-weight: bold; font-size: 12px; letter-spacing: 1px; flex-grow: 1; text-align: center; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #callOverlay { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.2); object-fit: cover; }
        
        button:active { transform: scale(0.92); opacity: 0.8; }
    </style>
</head>
<body>

    <div id="callOverlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <button onclick="endCall()" class="absolute bottom-12 left-1/2 -translate-x-1/2 bg-red-600 w-16 h-16 rounded-full shadow-2xl border-4 border-black/20"><svg class="w-8 h-8" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.3 3.53-.09a1 1 0 011.04 1.04v3.59a1 1 0 01-1.04 1.04C10.51 22 2 13.49 2 3.04A1 1 0 013.04 2h3.59a1 1 0 011.04 1.04c-.39 1.2-.41 2.41-.09 3.53.1.35.01.75-.26 1.02l-2.2 2.2z"/></svg></button>
    </div>

    <nav class="h-16 flex items-center justify-between px-5 glass shrink-0">
        <div class="flex flex-col justify-center">
            <span class="text-[9px] font-black tracking-[0.15em] uppercase text-blue-500 leading-tight">UniDesk OS</span>
            <span id="room-code-display" class="text-[13px] font-mono font-bold text-white tracking-widest leading-tight mt-0.5"></span>
        </div>
        <div id="call-controls" class="hidden flex items-center gap-2">
            <button onclick="triggerCall('audio')" class="text-white/40 w-10 h-10"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></button>
            <button onclick="triggerCall('video')" class="text-white/40 w-10 h-10"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
        </div>
    </nav>

    <div id="home-view" class="flex-grow flex flex-col items-center justify-center p-8 bg-black">
        <div onclick="createRoom()" class="bg-white/5 border border-white/10 p-12 rounded-[2.5rem] cursor-pointer mb-6"><span class="text-[11px] font-bold uppercase tracking-widest text-white/60">Initialize Room</span></div>
        <input type="text" id="roomCodeInput" placeholder="CODE" class="w-full max-w-xs bg-black/40 p-4 rounded-xl text-center font-mono text-blue-400 border border-white/5 outline-none mb-4">
        <button onclick="joinRoom()" class="w-full max-w-xs bg-blue-600 h-12 rounded-xl font-bold text-xs uppercase tracking-widest">Connect</button>
    </div>

    <div id="workspace-view" class="hidden flex-grow flex flex-col w-full relative overflow-hidden">
        <div id="chatBox">
            <div class="e2ee-banner">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"/></svg>
                <span>Encrypted Session Active</span>
            </div>
        </div>

        <div class="input-container">
            <div class="flex items-center gap-2 max-w-4xl mx-auto">
                <button onclick="document.getElementById('fileInput').click()" class="bg-white/5 rounded-full w-10 h-10 text-white/40"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
                
                <div class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-4 flex items-center h-11">
                    <input type="text" id="chatInput" placeholder="Message" class="w-full bg-transparent py-2 text-[14px] outline-none text-white/90">
                    <div id="recIndicator" class="pulse">● RECORDING</div>
                </div>

                <button id="voiceBtn" class="bg-blue-600 rounded-full w-11 h-11 text-white shadow-md shadow-blue-600/20">
                    <svg id="micIcon" class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4m-4 0h8"/></svg>
                    <svg id="sendIcon" class="w-5 h-5 mx-auto hidden" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                </button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*,application/pdf" onchange="processFile(this.files[0])">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), allMessages = [];
        let mediaRecorder, audioChunks = [];

        // --- Voice Recorder Logic ---
        const voiceBtn = document.getElementById('voiceBtn');
        const chatInput = document.getElementById('chatInput');
        const micIcon = document.getElementById('micIcon');
        const sendIcon = document.getElementById('sendIcon');

        chatInput.oninput = () => {
            const hasValue = chatInput.value.trim().length > 0;
            micIcon.classList.toggle('hidden', hasValue);
            sendIcon.classList.toggle('hidden', !hasValue);
        };

        const startRecording = async () => {
            if (chatInput.value.length > 0) return;
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                const reader = new FileReader();
                reader.readAsDataURL(audioBlob);
                reader.onloadend = () => sendMedia(reader.result, 'audio');
            };
            mediaRecorder.start();
            document.getElementById('recIndicator').style.display = 'block';
            chatInput.style.display = 'none';
        };

        const stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recIndicator').style.display = 'none';
                chatInput.style.display = 'block';
            }
        };

        voiceBtn.onmousedown = startRecording;
        voiceBtn.onmouseup = stopRecording;
        voiceBtn.ontouchstart = (e) => { e.preventDefault(); startRecording(); };
        voiceBtn.ontouchend = (e) => { e.preventDefault(); stopRecording(); };
        voiceBtn.onclick = () => { if(chatInput.value.length > 0) sendMessage(); };

        // --- Document & Image Logic ---
        window.processFile = async (file) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => sendMedia(e.target.result, file.type.startsWith('image') ? 'image' : 'doc');
            reader.readAsDataURL(file);
        };

        async function sendMedia(data, type) {
            allMessages.push({ id: Date.now().toString(), user: myId, data: data, type: type, time: Date.now() });
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
        }

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('workspace-view').classList.replace('hidden', 'flex');
            document.getElementById('room-code-display').innerText = code;
            document.getElementById('call-controls').classList.remove('hidden');

            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data(); if(!data) return;
                allMessages = data.messages || [];
                const chatBox = document.getElementById('chatBox');
                const banner = chatBox.querySelector('.e2ee-banner').outerHTML;
                chatBox.innerHTML = banner;
                
                allMessages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}`;
                    
                    let content = '';
                    if (m.type === 'text') content = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">${m.text}</div>`;
                    else if (m.type === 'image' || m.type === 'doc') {
                        content = `<img src="${m.data}" class="doc-thumb" onclick="this.classList.toggle('expanded')">`;
                    } else if (m.type === 'audio') {
                        content = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}">
                            <audio controls class="h-8 w-40 scale-90 origin-left brightness-90"><source src="${m.data}"></audio>
                        </div>`;
                    }
                    
                    div.innerHTML = content;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const i = document.getElementById('chatInput'); if(!i.value) return;
            allMessages.push({ id: Date.now().toString(), user: myId, text: i.value, type: 'text', time: Date.now() });
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            i.value = ""; chatInput.oninput();
        };

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            myId = "Admin"; openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };
    </script>
</body>
</html>
