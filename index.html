<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UniDesk Shield OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #007AFF; --premium-bg: #0a0a0a; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100vw; display: flex; flex-direction: column; }
        
        .header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255, 255, 255, 0.04); z-index: 1000; shrink: 0; }
        #chatBox { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }

        /* Media & Bubbles */
        .chat-img { border-radius: 14px; width: 110px; height: 110px; object-fit: cover; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.08); }
        .chat-img.expanded { width: 88vw; height: auto; border-radius: 10px; transform: scale(1.02); z-index: 50; }
        .bubble { max-width: 82%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; user-select: none; -webkit-user-select: none; }
        .bubble-me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble-them { background: #262626; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .footer { background: var(--premium-bg); border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 16px calc(12px + env(safe-area-inset-bottom)); z-index: 1000; shrink: 0; }

        /* Context Menu (Long Press Only) */
        #contextMenu { position: fixed; background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: none; flex-direction: column; z-index: 10001; width: 190px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); overflow: hidden; }
        .menu-item { padding: 15px 20px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .menu-item.delete { color: #ff3b30; font-weight: 700; border-bottom: none; }

        /* Call Overlay */
        #callOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; top: 40px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); object-fit: cover; }
    </style>
</head>
<body>

    <header class="header">
        <div class="flex items-center gap-4">
            <button onclick="exitTyping()" id="backBtn" class="hidden text-white/40"><svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
            <div class="flex flex-col">
                <span class="text-[8px] font-black tracking-[0.3em] uppercase text-blue-500">Aethercore OS</span>
                <span id="room-code-display" class="text-[14px] font-mono font-bold tracking-widest text-white/90"></span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="startCall('audio')" class="text-white/40 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></button>
            <button onclick="startCall('video')" class="text-white/40 p-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
        </div>
    </header>

    <main id="chatBox"></main>

    <footer class="footer">
        <div class="flex items-center gap-3 max-w-5xl mx-auto">
            <button onclick="document.getElementById('fileInput').click()" class="bg-white/5 rounded-full w-10 h-10 flex items-center justify-center text-white/40 shrink-0"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
            <div class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-4 flex items-center h-12">
                <input type="text" id="chatInput" placeholder="Message" onfocus="document.getElementById('backBtn').classList.remove('hidden')" class="w-full bg-transparent py-2 text-sm outline-none text-white">
                <div id="recIndicator" class="hidden flex items-center gap-2 text-red-500 font-bold text-[10px] tracking-widest"><span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> REC</div>
            </div>
            <button id="actionBtn" class="bg-blue-600 rounded-full w-12 h-12 text-white flex items-center justify-center shrink-0 shadow-lg">
                <svg id="micIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4m-4 0h8"/></svg>
                <svg id="sendIcon" class="hidden w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
            </button>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(this.files[0])">
    </footer>

    <div id="contextMenu">
        <div id="editBtn" class="menu-item" onclick="initEdit()">Edit Message</div>
        <div class="menu-item delete" onclick="deleteForEveryone()">Delete for Everyone</div>
    </div>

    <div id="callOverlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
        <button onclick="endCall()" class="absolute bottom-12 bg-red-600 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl">
            <svg class="w-8 h-8" fill="white" viewBox="0 0 24 24"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.26 1.12.32 2.33.3 3.53-.09a1 1 0 011.04 1.04v3.59a1 1 0 01-1.04 1.04C10.51 22 2 13.49 2 3.04A1 1 0 013.04 2h3.59a1 1 0 011.04 1.04c-.39 1.2-.41 2.41-.09 3.53.1.35.01.75-.26 1.02l-2.2 2.2z"/></svg>
        </button>
    </div>

    <div id="home-view" class="fixed inset-0 bg-black z-[2000] flex flex-col items-center justify-center p-10">
         <button onclick="createRoom()" class="w-72 bg-white/5 border border-white/10 py-16 rounded-[3rem] font-bold text-[10px] tracking-widest uppercase mb-8">New Session</button>
         <input type="text" id="roomCodeInput" placeholder="CODE" class="w-72 bg-white/5 p-5 rounded-2xl text-center font-mono text-blue-400 outline-none mb-4">
         <button onclick="joinRoom()" class="w-72 bg-blue-600 h-14 rounded-2xl font-bold text-xs uppercase tracking-widest">Connect</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg", authDomain: "unidesk-a70ac.firebaseapp.com", projectId: "unidesk-a70ac" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentRoom, myId = "User-" + Math.floor(Math.random()*999), allMessages = [];
        let pressTimer, selectedMsgId = null, mediaRecorder, audioChunks = [];

        // 1. CALLING LOGIC
        window.startCall = async (type) => {
            const callDoc = doc(db, "rooms", currentRoom, "calls", "active");
            await setDoc(callDoc, { type, caller: myId, status: 'ringing' });
            document.getElementById('callOverlay').style.display = 'flex';
            const stream = await navigator.mediaDevices.getUserMedia({ video: type==='video', audio: true });
            document.getElementById('localVideo').srcObject = stream;
        };

        window.endCall = async () => {
            const lv = document.getElementById('localVideo');
            if(lv.srcObject) lv.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('callOverlay').style.display = 'none';
            await deleteDoc(doc(db, "rooms", currentRoom, "calls", "active"));
        };

        // 2. LONG PRESS CONTEXT MENU
        window.handlePress = (id, user, type, isStart) => {
            if (user !== myId) return;
            if (isStart) {
                pressTimer = setTimeout(() => {
                    selectedMsgId = id;
                    const menu = document.getElementById('contextMenu');
                    document.getElementById('editBtn').style.display = (type === 'text') ? 'block' : 'none';
                    menu.style.display = 'flex';
                    menu.style.left = '50%'; menu.style.top = '50%';
                    menu.style.transform = 'translate(-50%, -50%)';
                }, 800);
            } else clearTimeout(pressTimer);
        };

        window.deleteForEveryone = async () => {
            allMessages = allMessages.filter(m => m.id !== selectedMsgId);
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            document.getElementById('contextMenu').style.display = 'none';
        };

        window.initEdit = () => {
            const msg = allMessages.find(m => m.id === selectedMsgId);
            if(msg && msg.type === 'text') {
                const input = document.getElementById('chatInput');
                input.value = msg.text;
                input.dataset.editId = selectedMsgId;
                input.focus();
            }
            document.getElementById('contextMenu').style.display = 'none';
        };

        // 3. MESSAGING
        const actionBtn = document.getElementById('actionBtn');
        const chatInput = document.getElementById('chatInput');

        window.sendMessage = async () => {
            const val = chatInput.value.trim();
            if (!val) return;
            
            if(chatInput.dataset.editId) {
                const idx = allMessages.findIndex(m => m.id === chatInput.dataset.editId);
                allMessages[idx].text = val;
                delete chatInput.dataset.editId;
            } else {
                allMessages.push({ id: Date.now().toString(), user: myId, text: val, type: 'text', time: Date.now() });
            }
            
            await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
            chatInput.value = ""; chatInput.focus();
        };

        // WhatsApp Audio Logic remains integrated
        actionBtn.addEventListener('touchstart', async (e) => {
            if (chatInput.value.length > 0) return;
            e.preventDefault();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const reader = new FileReader();
                reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/mp4' }));
                reader.onloadend = async () => {
                    allMessages.push({ id: Date.now().toString(), user: myId, data: reader.result, type: 'audio', time: Date.now() });
                    await updateDoc(doc(db, "rooms", currentRoom), { messages: allMessages });
                };
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            document.getElementById('recIndicator').classList.remove('hidden');
            chatInput.classList.add('hidden');
        });

        actionBtn.addEventListener('touchend', () => {
            if (mediaRecorder?.state === "recording") {
                mediaRecorder.stop();
                document.getElementById('recIndicator').classList.add('hidden');
                chatInput.classList.remove('hidden');
            } else if(chatInput.value.length > 0) { sendMessage(); }
        });

        window.exitTyping = () => { chatInput.blur(); document.getElementById('backBtn').classList.add('hidden'); };

        function openWorkspace(code) {
            currentRoom = code;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('room-code-display').innerText = code;
            onSnapshot(doc(db, "rooms", code), (s) => {
                const data = s.data(); if(!data) return;
                allMessages = data.messages || [];
                const chatBox = document.getElementById('chatBox');
                chatBox.innerHTML = '';
                allMessages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `flex flex-col ${m.user === myId ? 'items-end' : 'items-start'}`;
                    let body = (m.type === 'image') ? `<img src="${m.data}" class="chat-img" onclick="this.classList.toggle('expanded')">` : 
                               (m.type === 'audio') ? `<audio controls class="h-8 w-48 scale-90 origin-left invert"><source src="${m.data}"></audio>` : `<span>${m.text}</span>`;
                    div.innerHTML = `<div class="bubble ${m.user === myId ? 'bubble-me' : 'bubble-them'}" 
                                     onmousedown="handlePress('${m.id}', '${m.user}', '${m.type}', true)" onmouseup="handlePress(null, null, null, false)"
                                     ontouchstart="handlePress('${m.id}', '${m.user}', '${m.type}', true)" ontouchend="handlePress(null, null, null, false)">${body}</div>`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.createRoom = async () => {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await setDoc(doc(db, "rooms", code), { messages: [], time: Date.now() });
            myId = "Admin"; openWorkspace(code);
        };

        window.joinRoom = async () => {
            const code = document.getElementById('roomCodeInput').value.toUpperCase();
            const snap = await getDoc(doc(db, "rooms", code));
            if(snap.exists()) openWorkspace(code);
        };
    </script>
</body>
</html>
