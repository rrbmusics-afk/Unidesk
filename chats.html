<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Lounge</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let isAdmin = false;
        let mediaRecorder;
        let audioChunks = [];

        document.addEventListener('DOMContentLoaded', () => {
            syncLounge();
            listenMessages();
        });

        // --- 1. CORE DATA SYNC ---
        function syncLounge() {
            onSnapshot(doc(db, "lounges", loungeId), (snap) => {
                if (!snap.exists()) {
                    alert("Lounge has been disbanded by the admin.");
                    window.location.href = 'page.html';
                    return;
                }
                const data = snap.data();
                isAdmin = (data.admin === userName);
                
                // Update UI with AetherCore Theme
                document.getElementById('header-title').innerText = data.loungeName || "Student Lounge";
                document.getElementById('header-pfp').src = data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('id-sub').innerText = `ID: ${loungeId}`;

                if(isAdmin) {
                    document.getElementById('admin-request-bar').style.display = 'flex';
                    listenRequests();
                }
            });
        }

        // --- 2. MESSAGE LOGIC (TEXT, VOICE, MEDIA) ---
        window.sendMsg = async (type, content, fileName = "") => {
            try {
                const data = {
                    sender: userName,
                    type,
                    timestamp: serverTimestamp(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                if(type === 'text') data.text = content;
                else data.url = content;
                if(fileName) data.fileName = fileName;

                await addDoc(collection(db, "lounges", loungeId, "messages"), data);
            } catch (e) {
                console.error("Critical Send Error:", e);
                alert("Connection Interrupted. Check Firebase Rules.");
            }
        };

        function listenMessages() {
            const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snap.forEach(d => renderMsg(d.data(), d.id));
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderMsg(msg, id) {
            const isMe = msg.sender === userName;
            const div = document.createElement('div');
            div.className = `msg-row ${isMe ? 'me' : 'them'}`;
            
            let html = `<div class="bubble">`;
            if(!isMe) html += `<span class="sender-tag">${msg.sender}</span>`;
            
            if(msg.type === 'text') html += `<p>${msg.text}</p>`;
            else if(msg.type === 'image') html += `<img src="${msg.url}" class="chat-img" onclick="openFS('${msg.url}')">`;
            else if(msg.type === 'audio') html += `<audio controls src="${msg.url}"></audio>`;
            else if(msg.type === 'doc') html += `<a href="${msg.url}" target="_blank" class="doc-file">📄 ${msg.fileName}</a>`;
            
            html += `<span class="time-tag">${msg.time}</span></div>`;
            div.innerHTML = html;
            document.getElementById('chat-box').appendChild(div);
        }

        // --- 3. VOICE RECORDING (WA STYLE) ---
        window.startVoice = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const fileRef = ref(storage, `lounges/${loungeId}/audio/${Date.now()}.webm`);
                    await uploadBytes(fileRef, blob);
                    const url = await getDownloadURL(fileRef);
                    sendMsg('audio', url);
                };
                mediaRecorder.start();
                document.getElementById('mic-btn').classList.add('recording');
            } catch (e) { alert("Mic Permission Denied"); }
        };

        window.stopVoice = () => {
            if(mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                document.getElementById('mic-btn').classList.remove('recording');
            }
        };

        // --- 4. ADMIN & INFO PANEL ---
        window.openLoungeInfo = () => {
            document.getElementById('info-modal').style.display = 'flex';
            document.getElementById('modal-name').innerText = document.getElementById('header-title').innerText;
            document.getElementById('modal-code').innerText = `Lounge Code: ${loungeId}`;
            if(isAdmin) document.getElementById('admin-tools').style.display = 'block';
        };

        window.deleteLounge = async () => {
            if(confirm("Disband this lounge permanently?")) {
                await deleteDoc(doc(db, "lounges", loungeId));
            }
        };
    </script>

    <style>
        :root { --bg: #05070a; --card: #0d1117; --accent: #58a6ff; --me: #005c4b; --them: #202c33; --text: #ffffff; --dim: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--card); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #30363d; cursor: pointer; }
        .pfp-h { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
        .h-meta { flex: 1; }
        .h-meta h2 { font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .h-meta p { font-size: 0.7rem; color: var(--dim); }

        #admin-request-bar { background: rgba(88, 166, 255, 0.1); padding: 10px 16px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); color: var(--accent); font-size: 0.8rem; font-weight: bold; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: radial-gradient(#161b22 1px, transparent 1px); background-size: 20px 20px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .sender-tag { color: var(--accent); font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 4px; }
        .time-tag { font-size: 0.6rem; color: var(--dim); float: right; margin-top: 6px; margin-left: 10px; }

        footer { background: var(--card); padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #30363d; }
        .input-pill { flex: 1; background: #161b22; border-radius: 25px; padding: 0 15px; display: flex; align-items: center; border: 1px solid #30363d; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        
        .footer-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .recording { background: #ff4d4d !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-img { width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .doc-file { color: var(--accent); text-decoration: none; font-size: 0.9rem; display: block; padding: 5px 0; }
    </style>
</head>
<body>

    <header onclick="openLoungeInfo()">
        <img id="header-pfp" src="" class="pfp-h">
        <div class="h-meta">
            <h2 id="header-title">Loading...</h2>
            <p id="id-sub">ID: 000000</p>
        </div>
    </header>

    <div id="admin-request-bar" onclick="alert('Checking Requests...')">
        <span>PENDING APPROVALS</span>
        <span id="req-count">0</span>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-pill">
            <span onclick="document.getElementById('doc-up').click()" style="margin-right:12px; cursor:pointer">📎</span>
            <input type="file" id="doc-up" multiple hidden onchange="handleFiles(this, 'doc')">
            <input type="text" id="msg-input" placeholder="Type message..." oninput="handleIcons()">
            <span onclick="document.getElementById('img-up').click()" style="cursor:pointer">📷</span>
            <input type="file" id="img-up" accept="image/*" hidden onchange="handleFiles(this, 'image')">
        </div>

        <button id="mic-btn" class="footer-btn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
        <button id="send-btn" class="footer-btn" style="display:none;" onclick="handleSendText()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </footer>

    <div id="info-modal" class="modal">
        <div style="padding:15px; background:var(--card); display:flex; align-items:center; gap:20px;">
            <span onclick="document.getElementById('info-modal').style.display='none'" style="font-size:1.5rem">←</span>
            <h2>Lounge Info</h2>
        </div>
        <div style="padding:20px; text-align:center;">
            <h1 id="modal-name"></h1>
            <p id="modal-code" style="color:var(--dim);"></p>
            <hr style="margin:20px 0; border:0; border-top:1px solid #333;">
            <div id="admin-tools" style="display:none;">
                <button onclick="deleteLounge()" style="color:#ff4d4d; background:none; border:none; font-size:1.1rem; cursor:pointer;">Disband Lounge</button>
            </div>
            <button onclick="window.location.href='page.html'" style="color:var(--accent); background:none; border:none; font-size:1.1rem; cursor:pointer; margin-top:20px;">Exit Lounge</button>
        </div>
    </div>

    <script>
        window.handleIcons = () => {
            const input = document.getElementById('msg-input');
            const hasVal = input.value.trim().length > 0;
            document.getElementById('mic-btn').style.display = hasVal ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = hasVal ? 'flex' : 'none';
        };

        window.handleSendText = () => {
            const el = document.getElementById('msg-input');
            if(el.value.trim()) {
                sendMsg('text', el.value.trim());
                el.value = '';
                handleIcons();
            }
        };

        window.handleFiles = async (el, type) => {
            if(!el.files[0]) return;
            const files = Array.from(el.files).slice(0, 10);
            for(let f of files) {
                const refPath = `lounges/${loungeId}/${type}/${Date.now()}_${f.name}`;
                const fRef = ref(storage, refPath);
                await uploadBytes(fRef, f);
                const url = await getDownloadURL(fRef);
                sendMsg(type, url, f.name);
            }
        };
    </script>
</body>
</html>
