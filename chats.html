<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Mobile Final</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // SYNC LOUNGE & ADMIN DATA
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            document.getElementById('lounge-name').innerText = data.loungeName;
            document.getElementById('lounge-code').innerText = "Lounge Code: " + loungeId;
            document.getElementById('header-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // ADMIN APPROVAL BAR LOGIC
            const adminBar = document.getElementById('admin-action-bar');
            if (data.admin === userName && data.pending && data.pending.length > 0) {
                adminBar.style.display = 'flex';
                document.getElementById('req-count').innerText = `${data.pending.length} User(s) knocking...`;
                
                window.openApprovals = () => {
                    const list = document.getElementById('approval-list');
                    list.innerHTML = '';
                    data.pending.forEach(user => {
                        const div = document.createElement('div');
                        div.className = 'approval-item';
                        div.innerHTML = `<span>${user}</span> <button onclick="accept('${user}')">Accept</button>`;
                        list.appendChild(div);
                    });
                    document.getElementById('approval-modal').style.display = 'flex';
                };
            } else {
                adminBar.style.display = 'none';
            }
        });

        window.accept = async (u) => {
            await updateDoc(doc(db, "lounges", loungeId), {
                members: arrayUnion(u),
                pending: arrayRemove(u)
            });
            if (document.getElementById('approval-list').children.length === 1) closeModals();
        };

        // MESSAGE LISTENER
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-container');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `
                    <div class="bubble">
                        ${!isMe ? `<div class="sender">${m.sender}</div>` : ''}
                        ${m.type === 'text' ? `<p>${m.text}</p>` : `<img src="${m.url}" class="chat-img" onclick="window.open('${m.url}')">`}
                        <div class="time">${m.time || ''}</div>
                    </div>`;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.sendText = () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type: 'text', text: inp.value.trim(), timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            inp.value = '';
            toggle(false);
        };

        window.toggle = (typing) => {
            document.getElementById('mic-btn').style.display = typing ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = typing ? 'flex' : 'none';
        };

        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');

        // KEYBOARD OPTIMIZATION
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
            });
        }
    </script>

    <style>
        :root { --bg: #0b141a; --header: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            position: fixed; width: 100%;
        }

        /* HEADER */
        header { 
            background: var(--header); padding: 10px 16px; display: flex; align-items: center; 
            gap: 12px; border-bottom: 1px solid #333; flex-shrink: 0;
        }
        .pfp-img { width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid var(--accent); object-fit: cover; }
        .h-txt h2 { font-size: 1rem; color: white; }
        .h-txt p { font-size: 0.75rem; color: var(--accent); }

        /* ADMIN APPROVAL NOTIFICATION */
        #admin-action-bar { 
            background: #1a1d21; padding: 12px 16px; display: none; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--accent); flex-shrink: 0;
        }
        #req-count { font-size: 0.85rem; font-weight: bold; color: var(--accent); }
        .approve-btn { background: var(--accent); color: white; border: none; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }

        /* CHAT BOX */
        #chat-container { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l2 2' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.05'/%3E%3C/svg%3E");
        }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .sender { font-size: 0.75rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: #888; text-align: right; margin-top: 4px; }

        /* FOOTER - MOBILE OPTIMIZED */
        footer { 
            background: var(--header); padding: 8px 8px 24px 8px; /* Extra bottom padding for iPhone bar */
            display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
        }
        .input-pill { 
            flex: 1; background: #2a3942; border-radius: 24px; padding: 0 12px; 
            display: flex; align-items: center; min-height: 48px; border: 1px solid #444;
        }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .ico { padding: 8px; color: #8696a0; font-size: 1.3rem; cursor: pointer; }

        .circle-btn { 
            width: 48px; height: 48px; border-radius: 50%; background: var(--accent); 
            border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            color: white; font-size: 1.2rem;
        }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #1e1e1e; width: 100%; max-width: 350px; border-radius: 12px; padding: 20px; border: 1px solid var(--accent); }
        .approval-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <img id="header-pfp" class="pfp-img">
        <div class="h-txt">
            <h2 id="lounge-name">Syncing...</h2>
            <p id="lounge-code">Lounge Code: 000000</p>
        </div>
    </header>

    <div id="admin-action-bar">
        <span id="req-count">0 Requests</span>
        <button class="approve-btn" onclick="openApprovals()">ACCEPT ALL</button>
    </div>

    <div id="chat-container"></div>

    <footer>
        <div class="input-pill">
            <span class="ico">📎</span>
            <input type="text" id="msg-input" placeholder="Aether Message" autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
            <label for="img-up" class="ico">📷</label>
            <input type="file" id="img-up" hidden accept="image/*">
        </div>
        
        <button id="mic-btn" class="circle-btn">🎤</button>
        <button id="send-btn" class="circle-btn" style="display:none" onclick="sendText()">➤</button>
    </footer>

    <div id="approval-modal" class="modal-overlay" onclick="closeModals()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 15px; color: var(--accent);">Lounge Requests</h3>
            <div id="approval-list"></div>
            <button onclick="closeModals()" style="width:100%; margin-top:20px; padding:10px; background:#444; color:white; border:none; border-radius:8px">Close</button>
        </div>
    </div>

</body>
</html>
