<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Secure Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // Dynamic Data Binding
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('display-name').innerText = data.loungeName || "Secure Lounge";
            document.getElementById('display-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('display-id').innerText = `ID: ${loungeId}`;
        });

        // Chat Engine
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('chat-box');
            container.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="sender-tag">${m.sender}</div>`;
                if(m.type === 'text') content += `<p>${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="chat-img" onclick="window.open('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                content += `<div class="msg-time">${m.time || ''}</div></div>`;
                
                row.innerHTML = content;
                container.appendChild(row);
            });
            container.scrollTo(0, container.scrollHeight);
        });

        async function push(type, val) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...(type === 'text' ? {text: val} : {url: val})
            });
        }

        window.sendTxt = () => {
            const el = document.getElementById('msg-input');
            if(el.value.trim()){ push('text', el.value.trim()); el.value = ''; toggle(false); }
        };

        window.upImg = async (el) => {
            const f = el.files[0]; if(!f) return;
            const r = ref(storage, `media/${loungeId}/${Date.now()}`);
            const s = await uploadBytes(r, f);
            push('image', await getDownloadURL(s.ref));
        };

        window.startRec = async () => {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const b = new Blob(audioChunks, { type: 'audio/webm' });
                const r = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                const snap = await uploadBytes(r, b);
                push('audio', await getDownloadURL(snap.ref));
            };
            mediaRecorder.start();
            document.getElementById('mic').classList.add('rec');
        };

        window.stopRec = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('rec'); } };
        window.toggle = (typing) => {
            document.getElementById('mic').style.display = typing ? 'none' : 'flex';
            document.getElementById('send').style.display = typing ? 'flex' : 'none';
        };
    </script>

    <style>
        :root { --bg: #05070a; --panel: #0d1117; --accent: #58a6ff; --me: #005c4b; --them: #21262d; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: var(--bg); font-family: sans-serif; 
            height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; 
        }

        /* HEADER - REDIRECTS TO INFO.HTML */
        header { 
            background: var(--panel); padding: 12px 16px; display: flex; align-items: center; 
            gap: 12px; border-bottom: 1px solid #30363d; cursor: pointer; z-index: 10;
        }
        .pfp { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--accent); object-fit: cover; }
        .h-text h2 { font-size: 1rem; color: var(--accent); }
        .h-text p { font-size: 0.7rem; color: #8b949e; }

        /* DOODLE BACKGROUND */
        #chat-box { 
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            background-color: var(--bg);
            background-image: 
                radial-gradient(var(--accent) 0.5px, transparent 0.5px), 
                linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; box-shadow: 0 1px 2px #000; position: relative; color: white; }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        
        .sender-tag { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
        .msg-time { font-size: 0.6rem; color: #8b949e; text-align: right; margin-top: 4px; }
        .chat-img { width: 100%; border-radius: 8px; margin: 4px 0; }
        audio { height: 35px; width: 200px; filter: invert(1); }

        footer { background: var(--panel); padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #30363d; }
        .input-box { flex: 1; background: #161b22; border-radius: 24px; padding: 0 15px; display: flex; align-items: center; border: 1px solid #30363d; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        
        .btn { width: 46px; height: 46px; background: var(--accent); border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; }
        .rec { background: #ff3b30 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header onclick="window.location.href='info.html'">
        <img id="display-pfp" src="" class="pfp">
        <div class="h-text">
            <h2 id="display-name">Loading...</h2>
            <p id="display-id">ID: 000000</p>
        </div>
    </header>

    <div id="chat-box"></div>

    <footer>
        <div class="input-box">
            <label for="img" style="margin-right:10px; cursor:pointer">📷</label>
            <input type="file" id="img" hidden accept="image/*" onchange="upImg(this)">
            <input type="text" id="msg-input" placeholder="Message" oninput="toggle(this.value.trim().length > 0)">
        </div>
        <button id="mic" class="btn" ontouchstart="startRec()" ontouchend="stopRec()" onmousedown="startRec()" onmouseup="stopRec()">🎤</button>
        <button id="send" class="btn" style="display:none" onclick="sendTxt()">➤</button>
    </footer>

</body>
</html>
