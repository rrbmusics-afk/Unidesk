<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Chat</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Admin & Header Sync ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('dn').innerText = data.loungeName || "Aether Lounge";
            document.getElementById('dp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('di').innerText = "Lounge Code: " + loungeId;

            // Admin Logic: Show Accept Button if user is Admin and there are pending requests
            const adminPanel = document.getElementById('admin-req-panel');
            if (data.admin === userName && data.pending && data.pending.length > 0) {
                adminPanel.style.display = 'flex';
                document.getElementById('req-count').innerText = `${data.pending.length} Join Request(s)`;
                
                window.acceptAll = async () => {
                    const loungeRef = doc(db, "lounges", loungeId);
                    await updateDoc(loungeRef, {
                        members: arrayUnion(...data.pending),
                        pending: [] 
                    });
                };
            } else {
                adminPanel.style.display = 'none';
            }
        });

        // --- Chat Listener ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let html = `<div class="bubble">`;
                if(!isMe) html += `<div class="st">${m.sender}</div>`;
                if(m.type === 'text') html += `<p class="msg-txt">${m.text}</p>`;
                else if(m.type === 'image') html += `<img src="${m.url}" class="ci" onclick="window.open('${m.url}')">`;
                else if(m.type === 'audio') html += `<audio controls src="${m.url}"></audio>`;
                html += `<div class="mt">${m.time || ''}</div></div>`;
                
                row.innerHTML = html;
                box.appendChild(row);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Input Actions ---
        window.sendTxt = (e) => {
            if(e) e.preventDefault(); 
            const el = document.getElementById('msg-input');
            const val = el.value.trim();
            if(val){
                addDoc(collection(db, "lounges", loungeId, "messages"), {
                    sender: userName, type: 'text', text: val, timestamp: serverTimestamp(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                el.value = '';
                toggleIcons(false);
                el.focus(); 
            }
        };

        window.upImg = async (el) => {
            const f = el.files[0]; if(!f) return;
            const r = ref(storage, `media/${loungeId}/${Date.now()}`);
            const s = await uploadBytes(r, f);
            const url = await getDownloadURL(s.ref);
            addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type: 'image', url, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.startRec = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const b = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                    const snap = await uploadBytes(r, b);
                    const url = await getDownloadURL(snap.ref);
                    addDoc(collection(db, "lounges", loungeId, "messages"), {
                        sender: userName, type: 'audio', url, timestamp: serverTimestamp(),
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                };
                mediaRecorder.start();
                document.getElementById('mic').classList.add('rec');
            } catch (e) { alert("Mic access denied"); }
        };

        window.stopRec = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('rec'); } };
        window.toggleIcons = (typing) => {
            document.getElementById('mic').style.display = typing ? 'none' : 'flex';
            document.getElementById('send').style.display = typing ? 'flex' : 'none';
        };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0,0);
            });
        }
    </script>

    <style>
        :root { 
            --bg: #0a0a0a; 
            --panel: #141414; 
            --accent: #58a6ff; 
            --me-bubble: #004d40; 
            --them-bubble: #1f1f1f; 
            --text: #ffffff;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body { 
            background: var(--bg); font-family: -apple-system, sans-serif; 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            position: fixed; width: 100%; color: var(--text);
        }

        header { 
            background: var(--panel); padding: 10px 16px; display: flex; align-items: center; 
            gap: 12px; border-bottom: 1px solid #222; cursor: pointer; flex-shrink: 0;
        }
        .pfp { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--accent); object-fit: cover; }
        .ht h2 { font-size: 0.95rem; color: var(--accent); font-weight: 600; }
        .ht p { font-size: 0.65rem; color: #777; }

        /* Admin Request Panel */
        #admin-req-panel {
            background: #1c1c1c; padding: 8px 16px; display: none; 
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--accent);
        }
        #admin-req-panel span { font-size: 0.8rem; color: var(--accent); }
        #admin-req-panel button { 
            background: var(--accent); color: white; border: none; 
            padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
        }

        #chat-box { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px;
            background-color: var(--bg);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2358a6ff' fill-opacity='0.04'%3E%3Cpath d='M5 5l2 2m20 0h4m10 10l-2 2m-30 20h3m20 20l2 2' stroke='%2358a6ff' stroke-width='0.5'/%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/svg%3E");
        }

        .msg-row { display: flex; width: 100%; margin-bottom: 2px; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 6px 10px 4px 10px; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
        .me .bubble { background: var(--me-bubble); border-top-right-radius: 0; }
        .them .bubble { background: var(--them-bubble); border-top-left-radius: 0; }
        
        .st { font-size: 0.72rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .msg-txt { font-size: 0.92rem; }
        .mt { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 3px; }
        
        .ci { width: 100%; border-radius: 8px; margin: 4px 0; border: 1px solid #333; }
        audio { height: 32px; width: 200px; filter: invert(1) opacity(0.8); }

        footer { background: var(--panel); padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #222; flex-shrink: 0; }
        .ib { flex: 1; background: #1c1c1c; border-radius: 22px; padding: 0 14px; display: flex; align-items: center; border: 1px solid #333; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 0.95rem; }
        
        .btn { width: 42px; height: 42px; background: var(--accent); border-radius: 50%; border: none; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .rec { background: #ff4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header onclick="window.location.href='info.html'">
        <img id="dp" src="" class="pfp">
        <div class="ht">
            <h2 id="dn">Lounge</h2>
            <p id="di">Lounge Code: 000000</p>
        </div>
    </header>

    <div id="admin-req-panel">
        <span id="req-count">0 Join Request(s)</span>
        <button onclick="acceptAll()">ACCEPT ALL</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="ib">
            <label for="img" style="margin-right:10px; cursor:pointer; font-size: 1.1rem; opacity: 0.8;">📷</label>
            <input type="file" id="img" hidden accept="image/*" onchange="upImg(this)">
            <input type="text" id="msg-input" placeholder="Message..." autocomplete="off" oninput="toggleIcons(this.value.trim().length > 0)">
        </div>
        
        <button id="mic" class="btn" 
                ontouchstart="startRec()" ontouchend="stopRec()" 
                onmousedown="startRec()" onmouseup="stopRec()">🎤</button>
        
        <button id="send" class="btn" style="display:none" onmousedown="sendTxt(event)">➤</button>
    </footer>

</body>
</html>
