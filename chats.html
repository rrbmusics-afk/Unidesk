<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, uid: userUid, mode } = session;

        // --- 1. SESSION INITIALIZATION ---
        async function startSession() {
            const loungeRef = doc(db, "lounges", loungeId);
            
            if (mode === 'create') {
                // INSTANTLY CREATE NEW LOUNGE DATA
                await setDoc(loungeRef, {
                    admin: userName,
                    adminUid: userUid,
                    loungeName: "Global Lounge",
                    createdAt: serverTimestamp()
                }, { merge: true });
            }

            // Sync Header
            onSnapshot(loungeRef, (snap) => {
                if (!snap.exists()) return;
                document.getElementById('l-name').innerText = snap.data().loungeName;
                document.getElementById('l-id').innerText = "#" + loungeId;
                
                if (userUid === snap.data().adminUid) {
                    document.getElementById('admin-badge').style.display = 'block';
                    listenForKnocks();
                }
            });
        }

        // --- 2. ADMIN ONLY: LOBBY LISTENER ---
        function listenForKnocks() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const count = snap.size;
                const btn = document.getElementById('lobby-btn');
                btn.style.display = count > 0 ? 'block' : 'none';
                btn.innerText = `Lobby (${count})`;

                window.openLobby = () => {
                    let html = '<h3>Entry Requests</h3>';
                    snap.forEach(d => {
                        html += `<div class="req-row">
                            <span>${d.data().name}</span>
                            <button onclick="respond('${d.id}', 'accepted')">✓</button>
                            <button onclick="respond('${d.id}', 'rejected')">×</button>
                        </div>`;
                    });
                    document.getElementById('modal-body').innerHTML = html;
                    document.getElementById('modal').style.display = 'flex';
                };
            });
        }

        window.respond = async (id, status) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", id), { status });
        };

        // --- 3. CHAT LOGIC ---
        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === userUid;
                box.innerHTML += `<div class="msg ${isMe ? 'me' : 'them'}">
                    <div class="bubble"><small>${m.sender}</small><p>${m.text}</p></div>
                </div>`;
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.send = async () => {
            const inp = document.getElementById('inp');
            if (!inp.value.trim()) return;
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, uid: userUid, text: inp.value, timestamp: serverTimestamp()
            });
            inp.value = '';
        };

        startSession();
    </script>
    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #00a884; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { display: flex; width: 100%; }
        .msg.me { justify-content: flex-end; }
        .bubble { background: #232d36; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .me .bubble { background: #005c4b; }
        .bubble small { color: #ffd700; font-size: 0.7rem; }
        .bubble p { margin: 5px 0 0; }
        footer { background: var(--panel); padding: 10px; display: flex; gap: 10px; padding-bottom: 30px; }
        input { flex: 1; background: #2a3942; border: none; color: white; padding: 10px 15px; border-radius: 20px; outline: none; }
        #lobby-btn { display: none; background: #f44336; border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
        .req-row { display: flex; align-items: center; justify-content: space-between; width: 250px; background: #2a3942; padding: 10px; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <div><h2 id="l-name" style="margin:0">Lounge</h2><span id="l-id" style="font-size:0.7rem; color:var(--accent)"></span></div>
        <div>
            <span id="admin-badge" style="display:none; font-size:0.6rem; background:var(--accent); padding:2px 5px; border-radius:3px; margin-right:5px;">ADMIN</span>
            <button id="lobby-btn" onclick="openLobby()"></button>
        </div>
    </header>
    <div id="chat-box"></div>
    <footer>
        <input id="inp" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()" style="border:none; background:var(--accent); color:white; padding:10px 20px; border-radius:20px;">➤</button>
    </footer>
    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div id="modal-body" style="background:#1e2a32; padding:20px; border-radius:15px;" onclick="event.stopPropagation()"></div>
    </div>
</body>
</html>
