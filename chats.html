<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Professional Lounge</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- Core Session Logic ---
        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let isAdmin = false;
        let mediaRecorder;
        let audioChunks = [];
        let longPressTimer;

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            syncLoungeData();
            listenForMessages();
            setupInputLogic();
        });

        // 1. Sync Lounge, Members, and Admin Status
        function syncLoungeData() {
            onSnapshot(doc(db, "lounges", loungeId), (snap) => {
                if (!snap.exists()) {
                    alert("Lounge deleted by Admin.");
                    window.location.href = 'page.html';
                    return;
                }
                const data = snap.data();
                isAdmin = (data.admin === userName);
                
                // Header UI Updates
                document.getElementById('header-title').innerText = data.loungeName || "Student Lounge";
                document.getElementById('header-pfp').src = data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('display-id').innerText = `ID: ${loungeId}`;
                
                // Update Group Info UI
                updateGroupInfo(data);
                if(isAdmin) syncRequests();
                syncMembers(data.members || []);
            });
        }

        // 2. Real Media: Voice Recording (WhatsApp Style)
        async function startVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const fileRef = ref(storage, `lounges/${loungeId}/audio/${Date.now()}.webm`);
                await uploadBytes(fileRef, blob);
                const url = await getDownloadURL(fileRef);
                sendMediaMessage('audio', url);
            };
            mediaRecorder.start();
            document.getElementById('mic-btn').style.color = '#ff4d4d';
        }

        function stopVoice() {
            if(mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                document.getElementById('mic-btn').style.color = 'var(--wa-dim)';
            }
        }

        // 3. Message Handling & Long Press
        async function sendTextMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, text, type: 'text', timestamp: serverTimestamp()
            });
            input.value = '';
            toggleInputIcons();
        }

        async function sendMediaMessage(type, url, fileName = "") {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type, url, fileName, timestamp: serverTimestamp()
            });
        }

        function listenForMessages() {
            const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snapshot.forEach(d => {
                    const msg = d.data();
                    renderMessage(msg, d.id);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- UI Rendering ---
        function renderMessage(msg, id) {
            const box = document.getElementById('chat-box');
            const isMe = msg.sender === userName;
            const div = document.createElement('div');
            div.className = `msg-row ${isMe ? 'me' : 'them'}`;
            
            // Long press logic for Edit/Delete
            div.oncontextmenu = (e) => { e.preventDefault(); showMessageOptions(id, msg, isMe); };

            let html = `<div class="bubble">`;
            if(!isMe) html += `<span class="sender-tag">${msg.sender}</span>`;
            
            if(msg.type === 'text') html += `<p>${msg.text}</p>`;
            else if(msg.type === 'image') html += `<img src="${msg.url}" class="msg-img" onclick="openFullscreen('${msg.url}')">`;
            else if(msg.type === 'audio') html += `<audio controls src="${msg.url}" class="msg-audio"></audio>`;
            else if(msg.type === 'doc') html += `<a href="${msg.url}" target="_blank" class="msg-doc">📄 ${msg.fileName}</a>`;
            
            html += `<span class="msg-time">10:00 AM</span></div>`;
            div.innerHTML = html;
            box.appendChild(div);
        }

        // --- Admin Functions ---
        window.handleJoinRequest = async (reqId, status) => {
            if(status === 'accepted') {
                const reqSnap = await getDoc(doc(db, "lounges", loungeId, "requests", reqId));
                const newMember = reqSnap.data().name;
                await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(newMember) });
            }
            await deleteDoc(doc(db, "lounges", loungeId, "requests", reqId));
        };

        window.updateLoungePfp = async (input) => {
            if(!isAdmin || !input.files[0]) return;
            const fileRef = ref(storage, `lounges/${loungeId}/pfp.jpg`);
            await uploadBytes(fileRef, input.files[0]);
            const url = await getDownloadURL(fileRef);
            await updateDoc(doc(db, "lounges", loungeId), { photo: url });
        };
    </script>

    <style>
        :root {
            --wa-bg: #0b141a;
            --wa-header: #202c33;
            --wa-me: #005c4b;
            --wa-them: #202c33;
            --wa-accent: #00a884;
            --wa-text: #e9edef;
            --wa-dim: #8696a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--wa-bg); color: var(--wa-text); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Info Bar */
        header { background: var(--wa-header); padding: 10px 16px; display: flex; align-items: center; gap: 12px; z-index: 10; }
        .pfp-main { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .header-info { flex: 1; cursor: pointer; }
        .header-info h2 { font-size: 1.1rem; font-weight: 500; }
        .header-info p { font-size: 0.75rem; color: var(--wa-accent); font-weight: bold; }

        /* Admin Request Bar */
        #admin-request-bar {
            background: #182229; color: var(--wa-accent); padding: 10px 16px; font-size: 0.85rem;
            display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a3942;
        }

        /* Chat Area with Custom Doodle */
        #chat-box {
            flex: 1; overflow-y: auto; padding: 15px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px; display: flex; flex-direction: column; gap: 6px;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 6px 10px; border-radius: 8px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .me .bubble { background: var(--wa-me); border-top-right-radius: 0; }
        .them .bubble { background: var(--wa-them); border-top-left-radius: 0; }
        .sender-tag { color: #f1c40f; font-size: 0.75rem; font-weight: bold; display: block; margin-bottom: 2px; }
        .msg-time { font-size: 0.65rem; color: var(--wa-dim); float: right; margin-top: 4px; margin-left: 8px; }

        /* Footer Input Area */
        footer { background: var(--wa-header); padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
        .input-pill { flex: 1; background: #2a3942; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .footer-btn { background: var(--wa-accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Fullscreen Modals */
        .full-modal { position: fixed; inset: 0; background: var(--wa-bg); z-index: 1000; display: none; flex-direction: column; }
        .modal-header { background: var(--wa-header); padding: 15px; display: flex; align-items: center; gap: 20px; }
        .member-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #202c33; }
    </style>
</head>
<body>

    <header>
        <img id="header-pfp" onclick="openPfpPopup()" src="" class="pfp-main">
        <div class="header-info" onclick="openLoungeInfo()">
            <h2 id="header-title">Lounge</h2>
            <p id="display-id">ID: 000000</p>
        </div>
    </header>

    <!-- Admin Approval Bar (Only shows for admin if requests > 0) -->
    <div id="admin-request-bar" onclick="openRequestPopup()">
        <span>Pending Approval Requests</span>
        <span id="request-badge">0</span>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-pill">
            <span onclick="document.getElementById('doc-input').click()" style="margin-right:12px; cursor:pointer">📎</span>
            <input type="file" id="doc-input" multiple hidden onchange="uploadDocs(this)">
            
            <input type="text" id="msg-input" placeholder="Message" oninput="toggleInputIcons()">
            
            <span onclick="document.getElementById('img-input').click()" style="cursor:pointer">📷</span>
            <input type="file" id="img-input" accept="image/*" hidden onchange="uploadImage(this)">
        </div>

        <!-- Voice / Send Button Logic -->
        <button id="mic-btn" class="footer-btn" 
                onmousedown="startVoice()" onmouseup="stopVoice()"
                ontouchstart="startVoice()" ontouchend="stopVoice()">
            🎤
        </button>
        <button id="send-btn" class="footer-btn" style="display:none;" onclick="sendTextMessage()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </footer>

    <!-- Lounge Info Modal -->
    <div id="info-modal" class="full-modal">
        <div class="modal-header">
            <span onclick="closeAllModals()" style="font-size:1.5rem">←</span>
            <h2>Lounge Info</h2>
        </div>
        <div style="overflow-y:auto; flex:1">
            <div style="text-align:center; padding: 20px; background: #111b21;">
                <div style="position:relative; display:inline-block">
                    <img id="info-pfp" src="" style="width:150px; height:150px; border-radius:50%; object-fit:cover">
                    <button id="edit-pfp-icon" onclick="document.getElementById('pfp-change').click()" style="position:absolute; bottom:0; right:0; background:var(--wa-accent); border:none; padding:10px; border-radius:50%; display:none">✏️</button>
                    <input type="file" id="pfp-change" hidden onchange="updateLoungePfp(this)">
                </div>
                <h1 id="info-name" style="margin-top:10px">Lounge Name</h1>
                <p id="info-code" style="color:var(--wa-dim)"></p>
            </div>

            <div id="admin-actions" style="display:none; padding:15px; border-bottom: 8px solid #000">
                <button onclick="renameLounge()" style="color:var(--wa-accent); background:none; border:none; display:block; padding:10px 0; font-size:1rem">Rename Lounge</button>
                <button onclick="deleteLounge()" style="color:#ff4b4b; background:none; border:none; display:block; padding:10px 0; font-size:1rem">Delete Lounge</button>
            </div>
            
            <div style="padding:15px">
                <button onclick="leaveLounge()" style="color:#ff4b4b; background:none; border:none; font-size:1rem">Exit Lounge</button>
            </div>

            <div id="member-list-container" style="padding:15px">
                <p style="color:var(--wa-accent); font-weight:bold">MEMBERS</p>
                <div id="member-list"></div>
            </div>
        </div>
    </div>

    <!-- Fullscreen Image View -->
    <div id="fs-image-view" class="full-modal" style="background:#000; justify-content:center">
        <div class="modal-header" style="background:transparent; position:absolute; top:0; width:100%">
            <span onclick="closeAllModals()" style="font-size:1.5rem">←</span>
            <a id="download-link" href="#" download style="color:white; margin-left:auto; text-decoration:none">Download</a>
        </div>
        <img id="fs-img-tag" style="width:100%; max-height:80vh; object-fit:contain">
    </div>

    <script>
        // UI Helpers
        function toggleInputIcons() {
            const input = document.getElementById('msg-input');
            const mic = document.getElementById('mic-btn');
            const send = document.getElementById('send-btn');
            if(input.value.trim().length > 0) {
                mic.style.display = 'none';
                send.style.display = 'flex';
            } else {
                mic.style.display = 'flex';
                send.style.display = 'none';
            }
        }

        function openLoungeInfo() {
            document.getElementById('info-modal').style.display = 'flex';
            document.getElementById('info-pfp').src = document.getElementById('header-pfp').src;
            document.getElementById('info-name').innerText = document.getElementById('header-title').innerText;
            document.getElementById('info-code').innerText = document.getElementById('display-id').innerText;
            if(isAdmin) {
                document.getElementById('admin-actions').style.display = 'block';
                document.getElementById('edit-pfp-icon').style.display = 'block';
            }
        }

        function closeAllModals() {
            document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none');
        }

        function openFullscreen(url) {
            document.getElementById('fs-image-view').style.display = 'flex';
            document.getElementById('fs-img-tag').src = url;
            document.getElementById('download-link').href = url;
        }
    </script>
</body>
</html>
