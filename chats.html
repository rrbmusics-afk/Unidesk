<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        // --- 1. CORE SYNC & IDENTITY ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            const isAdmin = (data.admin === userName);

            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            if (isAdmin) {
                document.getElementById('admin-nav-btn').classList.add('visible');
                setupAdminPanel();
            } else {
                // ONLY GUESTS listen for rejection. This prevents the Admin refresh bug.
                setupRejectionListener();
            }
        });

        // --- 2. ADMIN RECEPTION LOGIC ---
        function setupAdminPanel() {
            const reqQuery = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(reqQuery, (reqSnap) => {
                const badge = document.getElementById('req-badge');
                badge.innerText = reqSnap.size;
                badge.style.transform = reqSnap.size > 0 ? "scale(1)" : "scale(0)";

                window.viewPending = () => {
                    const list = document.getElementById('pending-list');
                    list.innerHTML = '';
                    if(reqSnap.empty) list.innerHTML = '<div class="empty-state">No pending requests</div>';
                    
                    reqSnap.forEach(d => {
                        const r = d.data();
                        const div = document.createElement('div');
                        div.id = `req-${d.id}`;
                        div.className = 'req-item anim-slide-in';
                        div.innerHTML = `
                            <span>${r.name}</span>
                            <div class="req-actions">
                                <button class="reject-btn" onclick="handleEntry('${d.id}', 'rejected', '${r.name}')">DECLINE</button>
                                <button class="accept-btn" onclick="handleEntry('${d.id}', 'accepted', '${r.name}')">APPROVE</button>
                            </div>`;
                        list.appendChild(div);
                    });
                    document.getElementById('modal-req').classList.add('active');
                };
            });
        }

        window.handleEntry = async (reqId, status, requesterName) => {
            // Immediate Admin UI feedback
            const el = document.getElementById(`req-${reqId}`);
            if(el) el.style.animation = "slideOut 0.3s forwards";

            const reqRef = doc(db, "lounges", loungeId, "requests", reqId);
            await updateDoc(reqRef, { status: status });
            
            if (status === 'accepted') {
                await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(requesterName) });
            }
        };

        // --- 3. GUEST PROTECTION LOGIC (FIXED) ---
        function setupRejectionListener() {
            const qRejection = query(collection(db, "lounges", loungeId, "requests"), where("name", "==", userName));
            onSnapshot(qRejection, (snap) => {
                snap.forEach(d => {
                    if (d.data().status === 'rejected') {
                        localStorage.removeItem('unidesk_session');
                        window.location.replace('decline.html'); // Use replace to prevent back-button
                    }
                });
            });
        }

        // --- 4. CHAT SYSTEM ---
        const qChat = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(qChat, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'} anim-fade-up`;
                div.innerHTML = `
                    <div class="bubble">
                        ${!isMe ? `<div class="s-name">${m.sender}</div>` : ''}
                        <p>${m.text}</p>
                        <div class="time">${m.time}</div>
                    </div>`;
                box.appendChild(div);
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });

        window.sendText = async () => {
            const inp = document.getElementById('msg-inp');
            const text = inp.value.trim();
            if(!text) return;
            inp.value = ''; toggle(false);
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, text, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.getElementById('modal-req').classList.remove('active'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        
        body { height: 100vh; background: var(--bg); color: white; overflow: hidden; position: fixed; width: 100%; }
        #app-container { display: flex; flex-direction: column; height: 100%; }

        header { background: var(--panel); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); }
        .h-info h2 { font-size: 0.9rem; font-weight: 600; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        #admin-nav-btn { opacity: 0; transform: scale(0.8); transition: var(--trans); pointer-events: none; position: relative; width: 40px; height: 40px; background: rgba(88,166,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        #admin-nav-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        #req-badge { position: absolute; top: -5px; right: -5px; background: var(--error); font-size: 0.6rem; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--panel); transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; width: 100%; opacity: 0; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; position: relative; }
        .me .bubble { background: var(--me); border-bottom-right-radius: 2px; }
        .them .bubble { background: var(--them); border-bottom-left-radius: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: right; margin-top: 4px; }

        footer { background: var(--panel); padding: 10px 12px 30px; display: flex; align-items: center; gap: 10px; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 22px; padding: 0 16px; height: 44px; display: flex; align-items: center; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: var(--trans); z-index: 1000; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .m-box { background: #1e2a32; width: 88%; max-width: 350px; border-radius: 20px; padding: 24px; transform: translateY(20px); transition: var(--trans); }
        .overlay.active .m-box { transform: translateY(0); }
        
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .accept-btn { background: var(--success); border: none; color: white; padding: 8px 14px; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }
        .reject-btn { background: transparent; border: 1px solid var(--error); color: var(--error); padding: 8px 14px; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade-up { animation: fadeUp 0.4s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
        .anim-slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideOut { to { opacity: 0; transform: translateX(40px); } }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="h-pfp-wrap"><img id="h-pfp" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="h-info"><h2 id="h-name">Lounge</h2><p id="h-code">#---</p></div>
            </div>
            <div id="admin-nav-btn" onclick="viewPending()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                <div id="req-badge">0</div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer>
            <div class="input-wrapper"><input type="text" id="msg-inp" placeholder="Message..." oninput="toggle(this.value.trim().length > 0)"></div>
            <button id="mic" class="circle-btn"><svg width="20" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()"><svg width="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
        </footer>
    </div>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size: 0.9rem; text-align: center; text-transform: uppercase;">Entry Queue</h3>
            <div id="pending-list"></div>
        </div>
    </div>

</body>
</html>
