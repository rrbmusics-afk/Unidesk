<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore Pro | Secure Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];
        let longPressTimer;

        // --- 1. Admin & Header Logic ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Lounge Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // Point 5: Admin Approval Bar (Always visible below header if requests exist)
            const adminBar = document.getElementById('admin-req-bar');
            if (data.admin === userName && data.pending?.length > 0) {
                adminBar.style.display = 'flex';
                document.getElementById('req-notif').innerText = `${data.pending.length} New Requests`;
                window.viewPending = () => {
                    const list = document.getElementById('pending-list');
                    list.innerHTML = '';
                    data.pending.forEach(u => {
                        const div = document.createElement('div');
                        div.className = 'req-item';
                        div.innerHTML = `<span>${u}</span><button onclick="approve('${u}')">Approve</button>`;
                        list.appendChild(div);
                    });
                    document.getElementById('modal-req').style.display = 'flex';
                };
            } else {
                adminBar.style.display = 'none';
            }
        });

        window.approve = async (u) => {
            await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(u), pending: arrayRemove(u) });
            if(document.getElementById('pending-list').children.length === 1) closeModals();
        };

        // --- 2. Real-Time Chat & Message Options ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const mid = d.id;
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                div.oncontextmenu = (e) => { e.preventDefault(); showOptions(mid, m, isMe); };
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                if(m.type === 'text') content += `<p>${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="thumb" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                
                content += `<div class="time">${m.time} ${isMe ? '✓✓' : ''}</div></div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- 3. Message Actions (Edit/Delete) ---
        window.showOptions = (id, data, isMe) => {
            const menu = document.getElementById('msg-menu');
            menu.style.display = 'flex';
            window.currentMsgId = id;
            document.getElementById('opt-edit').style.display = isMe ? 'block' : 'none';
            document.getElementById('opt-del-all').style.display = isMe ? 'block' : 'none';
        };

        window.deleteMsg = async (type) => {
            if(type === 'all') await deleteDoc(doc(db, "lounges", loungeId, "messages", window.currentMsgId));
            else document.querySelector(`[oncontextmenu*="${window.currentMsgId}"]`).remove();
            closeModals();
        };

        // --- 4. Multimedia (Audio/Docs) ---
        window.sendDoc = async (el) => {
            const files = Array.from(el.files).slice(0, 10);
            for(let f of files) {
                const r = ref(storage, `docs/${loungeId}/${f.name}`);
                const s = await uploadBytes(r, f);
                pushMsg({ type: 'doc', url: await getDownloadURL(s.ref), fileName: f.name });
            }
        };

        window.startAudio = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const r = ref(storage, `audio/${loungeId}/${Date.now()}`);
                const snap = await uploadBytes(r, blob);
                pushMsg({ type: 'audio', url: await getDownloadURL(snap.ref) });
            };
            mediaRecorder.start();
            document.getElementById('mic').classList.add('recording');
        };

        window.stopAudio = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('recording'); } };

        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            pushMsg({ type: 'text', text: inp.value.trim() });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').style.display='flex'; };

    </script>

    <style>
        :root { --wa-bg: #0b141a; --wa-panel: #202c33; --wa-accent: #58a6ff; --wa-me: #005c4b; --wa-them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--wa-bg); color: white; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* HEADER */
        header { background: var(--wa-panel); padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 100; }
        .h-pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--wa-accent); flex-shrink: 0; }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 1rem; font-weight: 600; }
        .h-info p { font-size: 0.72rem; color: var(--wa-accent); }

        /* ADMIN REQ STRIP */
        #admin-req-bar { background: #1a1d21; padding: 10px 16px; display: none; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--wa-accent); flex-shrink: 0; }
        #req-notif { font-size: 0.85rem; font-weight: bold; color: var(--wa-accent); }
        .btn-approve { background: var(--wa-accent); border: none; color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }

        /* CHAT DOODLE BACKGROUND */
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px;
            background-color: #0b141a;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l5 5m20 0h10m20 20l-5 5m30 10h-10' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.07'/%3E%3C/svg%3E");
        }
        .msg-row { display: flex; width: 100%; margin: 2px 0; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 6px 10px; border-radius: 8px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .me .bubble { background: var(--wa-me); border-top-right-radius: 0; }
        .them .bubble { background: var(--wa-them); border-top-left-radius: 0; }
        .s-name { font-size: 0.75rem; font-weight: bold; color: var(--wa-accent); margin-bottom: 2px; }
        .time { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
        .thumb { width: 100%; border-radius: 6px; margin: 4px 0; }
        .doc-file { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; font-size: 0.85rem; }

        /* FOOTER PIXEL PERFECT */
        footer { background: var(--wa-panel); padding: 8px 10px 28px 10px; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
        .input-pill { flex: 1; background: #2a3942; border-radius: 25px; padding: 0 12px; display: flex; align-items: center; min-height: 48px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .btn-ico { padding: 10px; color: #8696a0; cursor: pointer; }
        .btn-ico svg { width: 24px; height: 24px; fill: currentColor; }
        .circle-act { width: 48px; height: 48px; border-radius: 50%; background: var(--wa-accent); border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .circle-act svg { width: 24px; height: 24px; fill: white; }
        .recording { background: #ff3b30 !important; animation: pulse 1s infinite; }

        /* MODALS & OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .m-box { background: #1e1e1e; width: 90%; border-radius: 15px; padding: 20px; }
        .req-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #333; }
        .full-pfp { width: 80vw; height: 80vw; object-fit: cover; border-radius: 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap" onclick="document.getElementById('pfp-view').style.display='flex'">
            <img id="h-pfp" src="">
        </div>
        <div class="h-info" onclick="window.location.href='info.html'">
            <h2 id="h-name">...</h2>
            <p id="h-code">Lounge Code: ...</p>
        </div>
    </header>

    <div id="admin-req-bar">
        <span id="req-notif">Pending Requests</span>
        <button class="btn-approve" onclick="viewPending()">VIEW ALL</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-pill">
            <label for="doc-up" class="btn-ico">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/></svg>
            </label>
            <input type="file" id="doc-up" hidden multiple onchange="sendDoc(this)">

            <input type="text" id="msg-inp" placeholder="Aether Message" autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
            
            <label for="img-up" class="btn-ico">
                <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H4V7h16v12zM12 9c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
            </label>
            <input type="file" id="img-up" hidden accept="image/*" onchange="upImg(this)">
        </div>

        <button id="mic" class="circle-act" onmousedown="startAudio()" onmouseup="stopAudio()" ontouchstart="startAudio()" ontouchend="stopAudio()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <button id="send" class="circle-act" style="display:none" onclick="sendText()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <div id="pfp-view" class="overlay" onclick="closeModals()">
        <img class="full-pfp" id="full-pfp-src" src="">
    </div>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--wa-accent); margin-bottom:15px">Lounge Requests</h3>
            <div id="pending-list"></div>
        </div>
    </div>

    <div id="msg-menu" class="overlay" onclick="closeModals()">
        <div class="m-box" style="max-width:250px" onclick="event.stopPropagation()">
            <button class="btn-approve" id="opt-edit" style="width:100%; margin-bottom:10px">Edit Message</button>
            <button class="btn-approve" id="opt-del-all" style="width:100%; margin-bottom:10px; background:#ff3b30" onclick="deleteMsg('all')">Delete for Everyone</button>
            <button class="btn-approve" style="width:100%; background:#444" onclick="deleteMsg('me')">Delete for Me</button>
        </div>
    </div>

    <div id="media-viewer" class="overlay" onclick="closeModals()">
        <img id="full-img" style="max-width:95%; max-height:80%; border-radius:10px">
        <button class="btn-approve" style="margin-top:20px" onclick="window.open(document.getElementById('full-img').src)">Download</button>
    </div>

</body>
</html>
