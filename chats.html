<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Mobile Elite</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Real-time Sync ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('h-title').innerText = data.loungeName || "Lounge";
            document.getElementById('h-img').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('h-code').innerText = "Code: " + loungeId;

            const adminBar = document.getElementById('admin-bar');
            if (data.admin === userName && data.pending?.length > 0) {
                adminBar.style.display = 'flex';
                document.getElementById('req-notif').innerText = `${data.pending.length} Join Requests`;
                window.manageReqs = () => {
                    const box = document.getElementById('req-list');
                    box.innerHTML = '';
                    data.pending.forEach(u => {
                        const item = document.createElement('div');
                        item.className = 'req-row';
                        item.innerHTML = `<span>${u}</span><button onclick="acceptUser('${u}')">Accept</button>`;
                        box.appendChild(item);
                    });
                    document.getElementById('modal-req').style.display = 'flex';
                };
            } else {
                adminBar.style.display = 'none';
            }
        });

        window.acceptUser = async (u) => {
            await updateDoc(doc(db, "lounges", loungeId), {
                members: arrayUnion(u),
                pending: arrayRemove(u)
            });
            if(document.getElementById('req-list').children.length === 1) closeAll();
        };

        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-scroll');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<div class="bubble">
                    ${!isMe ? `<div class="s-name">${m.sender}</div>` : ''}
                    ${m.type==='text'?`<p>${m.text}</p>`: m.type==='image'?`<img src="${m.url}" class="chat-img" onclick="view('${m.url}')">` : `<audio controls src="${m.url}"></audio>`}
                    <div class="time">${m.time || ''}</div>
                </div>`;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.send = () => {
            const val = document.getElementById('msg-in').value.trim();
            if(!val) return;
            addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type: 'text', text: val, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            document.getElementById('msg-in').value = '';
            toggle(false);
        };

        window.upMedia = async (el) => {
            const file = el.files[0]; if(!file) return;
            const refM = ref(storage, `media/${loungeId}/${Date.now()}`);
            const s = await uploadBytes(refM, file);
            addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type: 'image', url: await getDownloadURL(s.ref),
                timestamp: serverTimestamp(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.startRec = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const r = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                const snap = await uploadBytes(r, blob);
                addDoc(collection(db, "lounges", loungeId, "messages"), {
                    sender: userName, type: 'audio', url: await getDownloadURL(snap.ref),
                    timestamp: serverTimestamp(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
            };
            mediaRecorder.start();
            document.getElementById('mic').classList.add('active-rec');
        };

        window.stopRec = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('active-rec'); }};
        window.toggle = (typing) => {
            document.getElementById('mic').style.display = typing ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = typing ? 'flex' : 'none';
        };
        window.closeAll = () => document.querySelectorAll('.overlay').forEach(o => o.style.display='none');
        window.view = (u) => { document.getElementById('f-img').src=u; document.getElementById('modal-img').style.display='flex'; };

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
            });
        }
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* HEADER */
        header { background: var(--panel); padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-bottom: 1px solid #30363d; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--accent); }
        .h-txt h2 { font-size: 0.95rem; font-weight: 600; }
        .h-txt p { font-size: 0.65rem; color: var(--accent); }

        /* ADMIN BAR */
        #admin-bar { background: #1a1a1a; padding: 10px 15px; display: none; justify-content: space-between; align-items: center; border-bottom: 1.5px solid var(--accent); flex-shrink: 0; }
        #req-notif { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .btn-mng { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; }

        /* CHAT BOX */
        #chat-scroll { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l2 2m20 0h4m10 10l-2 2' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.05'/%3E%3C/svg%3E"); }
        .msg-wrap { display: flex; width: 100%; }
        .msg-wrap.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 10px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); line-height: 1.4; }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .s-name { font-size: 0.7rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
        .chat-img { width: 100%; border-radius: 8px; border: 1px solid #444; }
        audio { filter: invert(1); height: 35px; width: 190px; }

        /* FOOTER - FIXED OVERLAP ISSUE */
        footer { background: var(--panel); padding: 8px; display: flex; align-items: flex-end; gap: 6px; flex-shrink: 0; }
        .input-bar { flex: 1; background: #2a3942; border-radius: 24px; display: flex; align-items: center; padding: 0 12px; min-height: 48px; }
        #msg-in { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 1rem; max-height: 100px; overflow-y: auto; }
        
        .ico { padding: 8px; color: #8696a0; display: flex; align-items: center; cursor: pointer; }
        .ico svg { width: 22px; height: 22px; fill: currentColor; }
        
        .act-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .act-btn svg { width: 24px; height: 24px; fill: white; }
        .active-rec { background: #ff3b30 !important; animation: pulse 1s infinite; }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #1e1e1e; width: 100%; max-width: 340px; border-radius: 12px; padding: 20px; border: 1px solid #333; }
        .req-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .req-row span { font-weight: bold; color: var(--accent); }
        .req-row button { background: var(--accent); border: none; color: white; padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <img id="h-img" class="pfp" onclick="view(this.src)">
        <div class="h-txt" onclick="window.location.href='info.html'">
            <h2 id="h-title">Syncing...</h2>
            <p id="h-code">Lounge Code: ...</p>
        </div>
    </header>

    <div id="admin-bar">
        <span id="req-notif">0 Requests</span>
        <button class="btn-mng" onclick="manageReqs()">APPROVE</button>
    </div>

    <div id="chat-scroll"></div>

    <footer>
        <div class="input-bar">
            <label for="f-doc" class="ico">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/></svg>
            </label>
            <input type="file" id="f-doc" hidden multiple>

            <input type="text" id="msg-in" placeholder="Message" autocomplete="off" oninput="toggle(this.value.trim().length > 0)">

            <label for="f-img" class="ico">
                <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H4V7h16v12zM12 9c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
            </label>
            <input type="file" id="f-img" hidden accept="image/*" onchange="upMedia(this)">
        </div>

        <button id="mic" class="act-btn" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <button id="send-btn" class="act-btn" style="display:none" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <div id="modal-req" class="overlay" onclick="closeAll()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:10px">Requests</h3>
            <div id="req-list"></div>
        </div>
    </div>

    <div id="modal-img" class="overlay" onclick="closeAll()">
        <img id="f-img" src="" style="max-width:95%; max-height:80%; border-radius:10px">
        <button class="btn-mng" style="margin-top:20px" onclick="window.open(document.getElementById('f-img').src)">Download</button>
    </div>

</body>
</html>
