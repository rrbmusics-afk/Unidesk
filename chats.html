<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Secure Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];
        let pressTimer;

        // --- Core State Logic ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('header-name').innerText = data.loungeName;
            document.getElementById('header-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('lounge-code-text').innerText = "Lounge Code: " + loungeId;

            // Admin Approval Bar
            const approvalBar = document.getElementById('approval-bar');
            if (data.admin === userName && data.pending?.length > 0) {
                approvalBar.style.display = 'flex';
                document.getElementById('req-text').innerText = `${data.pending.length} Pending Requests`;
                window.showRequests = () => renderRequestPopup(data.pending);
            } else {
                approvalBar.style.display = 'none';
            }
        });

        // --- Chat & Message Logic ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = { id: d.id, ...d.data() };
                const isMe = m.sender === userName;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'them'}`;
                row.oncontextmenu = (e) => { e.preventDefault(); showMsgMenu(m, isMe); };
                row.ontouchstart = () => pressTimer = setTimeout(() => showMsgMenu(m, isMe), 600);
                row.ontouchend = () => clearTimeout(pressTimer);

                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="sender-name">${m.sender}</div>`;
                
                if(m.type === 'text') content += `<p class="txt">${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="chat-img" onclick="viewImage('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') content += `<a href="${m.url}" target="_blank" class="doc-link">📄 ${m.fileName}</a>`;

                content += `<div class="msg-meta"><span>${m.time || ''}</span>${isMe ? '<span class="status">✓✓</span>' : ''}</div></div>`;
                row.innerHTML = content;
                box.appendChild(row);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Functional Actions ---
        window.sendText = (e) => {
            if(e) e.preventDefault();
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            pushMessage({ type: 'text', text: input.value.trim() });
            input.value = '';
            toggleInput(false);
            input.focus();
        };

        async function pushMessage(payload) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName,
                ...payload,
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                seenBy: [userName]
            });
        }

        // --- Voice Recording Logic ---
        window.startVoice = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const fileRef = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                const snap = await uploadBytes(fileRef, blob);
                pushMessage({ type: 'audio', url: await getDownloadURL(snap.ref) });
            };
            mediaRecorder.start();
            document.getElementById('mic-btn').classList.add('recording');
        };

        window.stopVoice = () => {
            if(mediaRecorder) {
                mediaRecorder.stop();
                document.getElementById('mic-btn').classList.remove('recording');
            }
        };

        // --- Multi-Document Upload (Up to 10) ---
        window.uploadDocs = async (el) => {
            const files = Array.from(el.files).slice(0, 10);
            for (let f of files) {
                const r = ref(storage, `docs/${loungeId}/${Date.now()}_${f.name}`);
                const s = await uploadBytes(r, f);
                pushMessage({ type: 'doc', url: await getDownloadURL(s.ref), fileName: f.name });
            }
        };

        // --- Message Menu Logic ---
        window.showMsgMenu = (m, isMe) => {
            const menu = document.getElementById('msg-menu');
            menu.style.display = 'flex';
            window.currentMsg = m;
            document.getElementById('delete-everyone').style.display = isMe ? 'block' : 'none';
            document.getElementById('edit-opt').style.display = (isMe && m.type === 'text') ? 'block' : 'none';
        };

        window.deleteMsg = async (type) => {
            const m = window.currentMsg;
            if(type === 'everyone') await deleteDoc(doc(db, "lounges", loungeId, "messages", m.id));
            // 'For me' logic would involve local storage filter or user-specific sub-collection
            closePopups();
        };

        // --- UI Utilities ---
        window.toggleInput = (typing) => {
            document.getElementById('mic-btn').style.display = typing ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = typing ? 'flex' : 'none';
        };

        window.closePopups = () => {
            document.querySelectorAll('.popup-overlay').forEach(p => p.style.display = 'none');
        };

        window.viewImage = (url) => {
            const v = document.getElementById('image-viewer');
            v.style.display = 'flex';
            document.getElementById('full-img').src = url;
        };

        window.scalePFP = () => {
            const url = document.getElementById('header-pfp').src;
            viewImage(url);
        };
    </script>

    <style>
        :root { --bg: #0a0a0a; --panel: #121212; --accent: #58a6ff; --me: #005c4b; --them: #202c33; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        /* Header & Profile */
        header { background: var(--panel); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; z-index: 100; cursor: pointer; }
        .pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); }
        .pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 1rem; color: var(--accent); }
        .h-info p { font-size: 0.65rem; color: #888; }

        /* Admin Approval Bar */
        #approval-bar { background: #1a1a1a; padding: 8px 16px; display: none; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); animation: slideDown 0.3s; }
        #approval-bar span { font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        #approval-bar button { background: var(--accent); border: none; padding: 4px 12px; border-radius: 4px; color: white; font-size: 0.75rem; cursor: pointer; }

        /* Chat Background Doodle */
        #chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l2 2m20 0h4m20 10l-2 2m-40 20h3m40 20l2 2' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.05'/%3E%3C/svg%3E"); }

        /* Bubbles */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .sender-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .txt { font-size: 0.95rem; line-height: 1.4; }
        .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 4px; font-size: 0.6rem; color: rgba(255,255,255,0.6); }
        .chat-img { width: 100%; border-radius: 8px; margin: 4px 0; }
        .doc-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; display: block; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 6px; }

        /* Footer */
        footer { background: var(--panel); padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #222; }
        .input-pill { flex: 1; background: #1e1e1e; border-radius: 24px; padding: 0 12px; display: flex; align-items: center; border: 1px solid #333; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1rem; }
        .icon-btn { font-size: 1.3rem; color: #888; cursor: pointer; padding: 5px; }
        .send-pill { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }
        .recording { background: #ff3b30 !important; transform: scale(1.1); animation: pulse 1s infinite; }

        /* Popups */
        .popup-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .menu-card { background: #1e1e1e; width: 80%; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .menu-opt { padding: 15px; border-bottom: 1px solid #333; color: white; text-align: center; cursor: pointer; }
        .menu-opt.danger { color: #ff3b30; }

        #full-img { max-width: 95%; max-height: 80%; border-radius: 8px; }
        .close-btn { position: absolute; top: 40px; left: 20px; font-size: 1.5rem; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="pfp-wrap" onclick="scalePFP()">
            <img id="header-pfp" src="">
        </div>
        <div class="h-info" onclick="window.location.href='info.html'">
            <h2 id="header-name">Lounge</h2>
            <p id="lounge-code-text">Lounge Code: ...</p>
        </div>
    </header>

    <div id="approval-bar">
        <span id="req-text">Pending Requests</span>
        <button onclick="showRequests()">MANAGE</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-pill">
            <label for="doc-upload" class="icon-btn">📎</label>
            <input type="file" id="doc-upload" hidden multiple onchange="uploadDocs(this)">
            <input type="text" id="msg-input" placeholder="Message" autocomplete="off" oninput="toggleInput(this.value.trim().length > 0)">
            <label for="img-upload" class="icon-btn">📷</label>
            <input type="file" id="img-upload" hidden accept="image/*" onchange="upImg(this)">
        </div>
        
        <button id="mic-btn" class="send-pill" 
                onmousedown="startVoice()" onmouseup="stopVoice()"
                ontouchstart="startVoice()" ontouchend="stopVoice()">🎤</button>
        
        <button id="send-btn" class="send-pill" style="display:none" onmousedown="sendText(event)">➤</button>
    </footer>

    <div id="msg-menu" class="popup-overlay" onclick="closePopups()">
        <div class="menu-card" onclick="event.stopPropagation()">
            <div class="menu-opt" id="edit-opt">Edit Message</div>
            <div class="menu-opt danger" id="delete-everyone" onclick="deleteMsg('everyone')">Delete for Everyone</div>
            <div class="menu-opt danger" onclick="deleteMsg('me')">Delete for Me</div>
            <div class="menu-opt" onclick="closePopups()">Cancel</div>
        </div>
    </div>

    <div id="image-viewer" class="popup-overlay">
        <span class="close-btn" onclick="closePopups()">✕</span>
        <img id="full-img" src="">
        <button style="margin-top:20px; padding: 10px 20px; background: var(--accent); border:none; border-radius:5px; color:white;" onclick="window.open(document.getElementById('full-img').src)">Download</button>
    </div>

</body>
</html>
