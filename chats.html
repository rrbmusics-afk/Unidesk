<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Secure Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Header & Admin Logic ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('header-name').innerText = data.loungeName || "Aether Lounge";
            document.getElementById('header-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('lounge-code-label').innerText = "Lounge Code: " + loungeId;

            const adminBar = document.getElementById('admin-req-bar');
            if (data.admin === userName && data.pending && data.pending.length > 0) {
                adminBar.style.display = 'flex';
                document.getElementById('req-stat').innerText = `${data.pending.length} New Requests`;
                
                window.openRequestList = () => {
                    const container = document.getElementById('req-container');
                    container.innerHTML = '';
                    data.pending.forEach(u => {
                        const item = document.createElement('div');
                        item.className = 'req-card';
                        item.innerHTML = `<span>${u}</span><button onclick="approveUser('${u}')">Approve</button>`;
                        container.appendChild(item);
                    });
                    document.getElementById('req-overlay').style.display = 'flex';
                };
            } else {
                adminBar.style.display = 'none';
            }
        });

        window.approveUser = async (u) => {
            await updateDoc(doc(db, "lounges", loungeId), {
                members: arrayUnion(u),
                pending: arrayRemove(u)
            });
            if(document.getElementById('req-container').children.length === 1) closeOverlays();
        };

        // --- Chat System ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let html = `<div class="bubble">`;
                if(!isMe) html += `<div class="sender-tag">${m.sender}</div>`;
                if(m.type === 'text') html += `<p>${m.text}</p>`;
                else if(m.type === 'image') html += `<img src="${m.url}" class="chat-media" onclick="viewMedia('${m.url}')">`;
                else if(m.type === 'audio') html += `<audio controls src="${m.url}"></audio>`;
                
                html += `<div class="meta">${m.time || ''}</div></div>`;
                row.innerHTML = html;
                box.appendChild(row);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Media Handlers ---
        window.sendTxt = () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;
            addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, type: 'text', text: input.value.trim(), 
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            input.value = '';
            toggleInputMode(false);
            input.focus();
        };

        window.startVoice = async () => {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(s);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const b = new Blob(audioChunks, { type: 'audio/webm' });
                const r = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                const snap = await uploadBytes(r, b);
                addDoc(collection(db, "lounges", loungeId, "messages"), {
                    sender: userName, type: 'audio', url: await getDownloadURL(snap.ref),
                    timestamp: serverTimestamp(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
            };
            mediaRecorder.start();
            document.getElementById('mic-btn').classList.add('recording');
        };

        window.stopVoice = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic-btn').classList.remove('recording'); } };

        window.toggleInputMode = (typing) => {
            document.getElementById('mic-btn').style.display = typing ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = typing ? 'flex' : 'none';
        };

        window.closeOverlays = () => document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        window.viewMedia = (url) => { document.getElementById('full-img').src = url; document.getElementById('media-overlay').style.display = 'flex'; };

        // Keyboard Staticity
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                window.scrollTo(0,0);
            });
        }
    </script>

    <style>
        :root { --bg: #0b0d0f; --panel: #161a1d; --accent: #58a6ff; --me: #005c4b; --them: #202c33; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); font-family: -apple-system, sans-serif; color: white;
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            position: fixed; width: 100%;
        }

        /* HEADER */
        header { 
            background: var(--panel); padding: 10px 16px; display: flex; align-items: center; 
            gap: 12px; border-bottom: 1px solid #222; z-index: 50; flex-shrink: 0;
        }
        .pfp-h { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .h-content h2 { font-size: 1.05rem; font-weight: 600; color: white; }
        .h-content p { font-size: 0.7rem; color: var(--accent); opacity: 0.8; }

        /* ADMIN REQ BAR */
        #admin-req-bar { 
            background: rgba(88, 166, 255, 0.1); padding: 10px 16px; display: none; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent);
            backdrop-filter: blur(5px);
        }
        #req-stat { color: var(--accent); font-weight: 600; font-size: 0.85rem; }
        .req-btn { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }

        /* CHAT */
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l2 2m20 0h4m20 10l-2 2m-40 20h3' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.06'/%3E%3C/svg%3E");
        }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 82%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.3); }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .sender-tag { font-size: 0.75rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .meta { font-size: 0.62rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
        .chat-media { width: 100%; border-radius: 8px; margin: 4px 0; border: 1px solid #333; }
        audio { filter: invert(1) hue-rotate(180deg); height: 32px; width: 200px; opacity: 0.8; }

        /* FOOTER AESTHETICS */
        footer { background: var(--panel); padding: 8px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; border-top: 1px solid #222; }
        .input-container { flex: 1; background: #232d36; border-radius: 25px; padding: 0 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 1.05rem; }
        
        .action-icon { font-size: 1.4rem; color: #8696a0; cursor: pointer; display: flex; align-items: center; }
        .action-icon:active { color: var(--accent); }

        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.2s; }
        .circle-btn svg { width: 24px; height: 24px; fill: white; }
        .recording { background: #ff3b30 !important; animation: pulse 1s infinite; }

        /* POPUPS */
        .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.92); display: none; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #1e1e1e; width: 100%; max-width: 350px; border-radius: 16px; padding: 20px; border: 1px solid #333; }
        .req-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .req-card span { font-weight: bold; color: var(--accent); }
        .req-card button { background: var(--accent); border: none; padding: 6px 12px; color: white; border-radius: 5px; font-weight: bold; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <img id="header-pfp" class="pfp-h" onclick="viewMedia(this.src)">
        <div class="h-content" onclick="window.location.href='info.html'">
            <h2 id="header-name">Syncing...</h2>
            <p id="lounge-code-label">Lounge Code: ...</p>
        </div>
    </header>

    <div id="admin-req-bar">
        <span id="req-stat">Pending Members</span>
        <button class="req-btn" onclick="openRequestList()">REVIEW</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-container">
            <label for="doc-up" class="action-icon">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 0 0 3.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-1.055-.553-2.011-1.334-2.693-.782-.681-1.812-1.045-2.9-1.026-1.085.02-2.106.417-2.875 1.185L6.155 13.38c-.356.356-.549.814-.549 1.289s.193.933.549 1.289c.356.356.815.549 1.289.549s.933-.193 1.289-.549l7.747-7.748c.11-.11.29-.11.4 0l.9 1.1c.11.11.11.29 0 .4l-7.747 7.748c-.689.689-1.594 1.069-2.548 1.069s-1.859-.38-2.548-1.069-1.069-1.594-1.069-2.548 1.069-1.859 1.069-2.548l9.547-9.547c.484-.484 1.109-.731 1.764-.741a2.53 2.53 0 0 1 1.83.712c.491.428.788.995.836 1.6s-.188 1.221-.679 1.713l-9.547 9.548c-.964.964-2.247 1.496-3.613 1.496s-2.648-.532-3.612-1.496c-.965-.965-1.497-2.247-1.497-3.613s.532-2.648 1.497-3.613l8.847-8.847c.11-.11.29-.11.4 0l1.1 1.1c.11.11.11.29 0 .4L4.712 11.38c-.768.768-1.192 1.791-1.192 2.883s.424 2.115 1.192 2.883c.768.768 1.791 1.191 2.883 1.191s2.115-.423 2.883-1.191l9.547-9.548c.15-.15.228-.352.217-.557a.74.74 0 0 0-.203-.493.75.75 0 0 0-.496-.201c-.205-.008-.407.072-.556.221L9.61 14.51c-.11.11-.29.11-.4 0l-1.1-1.1c-.11-.11-.11-.29 0-.4l9.547-9.547c.768-.768 1.791-1.191 2.883-1.191s2.115.423 2.883 1.191c.768.768 1.191 1.791 1.191 2.883s-.423 2.115-1.191 2.883l-9.547 9.548c-1.501 1.501-3.498 2.328-5.621 2.328s-4.119-.827-5.621-2.328c-1.501-1.501-2.328-3.497-2.328-5.621s.827-4.119 2.328-5.621l8.847-8.847c.11-.11.29-.11.4 0l1.1 1.1c.11.11.11.29 0 .4L1.816 15.556z"></path></svg>
            </label>
            <input type="file" id="doc-up" hidden multiple>
            
            <input type="text" id="msg-input" placeholder="Aether Message" autocomplete="off" oninput="toggleInputMode(this.value.trim().length > 0)">
            
            <label for="img-up" class="action-icon">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H4V7h16v12zM12 9c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"></path></svg>
            </label>
            <input type="file" id="img-up" hidden accept="image/*" onchange="upImg(this)">
        </div>
        
        <button id="mic-btn" class="circle-btn" 
                ontouchstart="startVoice()" ontouchend="stopVoice()"
                onmousedown="startVoice()" onmouseup="stopVoice()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg>
        </button>
        
        <button id="send-btn" class="circle-btn" style="display:none" onmousedown="sendTxt()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </footer>

    <div id="req-overlay" class="overlay" onclick="closeOverlays()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px">Join Requests</h3>
            <div id="req-container"></div>
            <button onclick="closeOverlays()" style="width:100%; margin-top:20px; padding:10px; background:#333; border:none; color:white; border-radius:8px">Close</button>
        </div>
    </div>

    <div id="media-overlay" class="overlay" onclick="closeOverlays()">
        <img id="full-img" src="" style="max-width: 100%; max-height: 80%; border-radius: 12px;">
        <button onclick="window.open(document.getElementById('full-img').src)" style="margin-top:20px; background:var(--accent); border:none; padding:12px 24px; color:white; border-radius:25px; font-weight:bold;">Download Original</button>
    </div>

</body>
</html>
