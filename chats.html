<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Lounge</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, deleteDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let isAdmin = false;
        let mediaRecorder;
        let audioChunks = [];
        let longPressTimer;

        document.addEventListener('DOMContentLoaded', () => {
            syncLounge();
            listenMessages();
            initInputLogic();
        });

        // 1. DYNAMIC LOUNGE DATA FROM FIREBASE
        function syncLounge() {
            onSnapshot(doc(db, "lounges", loungeId), (snap) => {
                if (!snap.exists()) {
                    alert("Lounge has been disbanded.");
                    window.location.href = 'page.html';
                    return;
                }
                const data = snap.data();
                isAdmin = (data.admin === userName);
                
                // Set Theme-Correct Header
                document.getElementById('header-title').innerText = data.loungeName || "Student Lounge";
                document.getElementById('header-pfp').src = data.photo || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
                document.getElementById('id-sub').innerText = `ID: ${loungeId}`;

                if(isAdmin) syncRequests();
            });
        }

        // 2. REAL VOICE RECORDER (WhatsApp Logic)
        async function startVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const fileRef = ref(storage, `lounges/${loungeId}/voice/${Date.now()}.webm`);
                await uploadBytes(fileRef, blob);
                const url = await getDownloadURL(fileRef);
                sendMsg('audio', url);
            };
            mediaRecorder.start();
            document.getElementById('mic-btn').classList.add('recording');
        }

        function stopVoice() {
            if(mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                document.getElementById('mic-btn').classList.remove('recording');
            }
        }

        async function sendMsg(type, content, fileName = "") {
            const data = {
                sender: userName,
                type,
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            if(type === 'text') data.text = content;
            else data.url = content;
            if(fileName) data.fileName = fileName;

            await addDoc(collection(db, "lounges", loungeId, "messages"), data);
        }

        function listenMessages() {
            const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snap.forEach(d => renderMsg(d.data(), d.id));
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderMsg(msg, id) {
            const isMe = msg.sender === userName;
            const div = document.createElement('div');
            div.className = `msg-row ${isMe ? 'me' : 'them'}`;
            div.oncontextmenu = (e) => { e.preventDefault(); showMenu(id, msg, isMe); };

            let content = `<div class="bubble">`;
            if(!isMe) content += `<span class="sender">${msg.sender}</span>`;
            
            if(msg.type === 'text') content += `<p>${msg.text}</p>`;
            else if(msg.type === 'image') content += `<img src="${msg.url}" class="chat-img" onclick="viewFS('${msg.url}')">`;
            else if(msg.type === 'audio') content += `<audio controls src="${msg.url}"></audio>`;
            else if(msg.type === 'doc') content += `<a href="${msg.url}" target="_blank" class="doc-file">📄 ${msg.fileName}</a>`;
            
            content += `<span class="time">${msg.time}</span></div>`;
            div.innerHTML = content;
            document.getElementById('chat-box').appendChild(div);
        }
    </script>
    <style>
        :root {
            --bg: #05070a;
            --card: #0d1117;
            --accent: #58a6ff;
            --me: #005c4b;
            --them: #202c33;
            --text: #ffffff;
            --dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* AetherCore Styled Header */
        header { background: var(--card); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #30363d; z-index: 100; }
        .pfp-wrap { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--accent); overflow: hidden; }
        .pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .info-wrap { flex: 1; }
        .info-wrap h2 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; }
        .info-wrap p { font-size: 0.7rem; color: var(--dim); }

        /* Request Bar - Aesthetic Float */
        #request-bar { 
            background: rgba(88, 166, 255, 0.1); color: var(--accent); 
            padding: 10px 16px; font-size: 0.8rem; font-weight: 600;
            display: none; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--accent);
        }

        /* Doodle Chat Background */
        #chat-box { 
            flex: 1; overflow-y: auto; padding: 15px; 
            background-image: radial-gradient(#161b22 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .sender { color: var(--accent); font-size: 0.7rem; font-weight: bold; display: block; margin-bottom: 3px; }
        .time { font-size: 0.6rem; color: var(--dim); float: right; margin-top: 5px; margin-left: 10px; }

        /* Footer / Keyboard Persistent */
        footer { background: var(--card); padding: 10px; display: flex; align-items: center; gap: 8px; position: sticky; bottom: 0; }
        .input-pill { flex: 1; background: #161b22; border-radius: 24px; padding: 0 15px; display: flex; align-items: center; border: 1px solid #30363d; }
        #msg-input { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; outline: none; font-size: 0.95rem; -webkit-user-select: text; user-select: text; }
        
        .footer-btn { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .recording { background: #ff4d4d !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Full Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-img { width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header onclick="openLoungeInfo()">
        <div class="pfp-wrap"><img id="header-pfp" src=""></div>
        <div class="info-wrap">
            <h2 id="header-title">Loading...</h2>
            <p id="id-sub">ID: 000000</p>
        </div>
    </header>

    <div id="request-bar" onclick="openReqList()">
        <span>NEW ENTRY REQUESTS</span>
        <span id="req-count">0</span>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-pill">
            <span onclick="document.getElementById('doc-up').click()" style="margin-right:12px; cursor:pointer">📎</span>
            <input type="file" id="doc-up" multiple hidden onchange="upDocs(this)">
            
            <input type="text" id="msg-input" placeholder="Secure Message..." oninput="toggleIcons()">
            
            <span onclick="document.getElementById('img-up').click()" style="cursor:pointer">📷</span>
            <input type="file" id="img-up" accept="image/*" hidden onchange="upImg(this)">
        </div>

        <button id="mic-btn" class="footer-btn" 
                onmousedown="startVoice()" onmouseup="stopVoice()"
                ontouchstart="startVoice()" ontouchend="stopVoice()">
            🎤
        </button>
        <button id="send-btn" class="footer-btn" style="display:none;" onclick="sendText()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </footer>

    <div id="info-modal" class="modal">
        </div>

    <script>
        function toggleIcons() {
            const input = document.getElementById('msg-input');
            const hasText = input.value.trim().length > 0;
            document.getElementById('mic-btn').style.display = hasText ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = hasText ? 'flex' : 'none';
        }

        window.sendText = () => {
            const val = document.getElementById('msg-input').value;
            if(val.trim()) {
                sendMsg('text', val);
                document.getElementById('msg-input').value = '';
                toggleIcons();
            }
        };

        async function upImg(el) {
            if(!el.files[0]) return;
            const fileRef = ref(storage, `lounges/${loungeId}/images/${Date.now()}.jpg`);
            await uploadBytes(fileRef, el.files[0]);
            const url = await getDownloadURL(fileRef);
            sendMsg('image', url);
        }

        async function upDocs(el) {
            const files = Array.from(el.files).slice(0, 10);
            for(let f of files) {
                const fRef = ref(storage, `lounges/${loungeId}/docs/${f.name}`);
                await uploadBytes(fRef, f);
                const url = await getDownloadURL(fRef);
                sendMsg('doc', url, f.name);
            }
        }
    </script>
</body>
</html>
