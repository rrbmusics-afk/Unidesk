<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Header & Admin Logic ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('full-pfp-src').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            if (data.admin === userName) {
                listenForRequests();
            }
        });

        function listenForRequests() {
            const reqQuery = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(reqQuery, (snap) => {
                const adminBar = document.getElementById('admin-req-bar');
                const list = document.getElementById('pending-list');
                
                if (snap.size > 0) {
                    adminBar.style.display = 'flex';
                    document.getElementById('req-notif').innerText = `${snap.size} Join Request(s)`;
                    
                    // Pre-fill the list so it's ready when the modal opens
                    list.innerHTML = '';
                    snap.forEach(docSnap => {
                        const req = docSnap.data();
                        const div = document.createElement('div');
                        div.className = 'req-item';
                        div.innerHTML = `
                            <span class="req-name">${req.name}</span>
                            <div class="req-btns">
                                <button class="btn-action accept" onclick="handleReq('${docSnap.id}', 'accepted')">Accept</button>
                                <button class="btn-action reject" onclick="handleReq('${docSnap.id}', 'rejected')">Reject</button>
                            </div>`;
                        list.appendChild(div);
                    });
                } else {
                    adminBar.style.display = 'none';
                    document.getElementById('modal-req').style.display = 'none';
                }
            });
        }

        window.viewPending = () => {
            document.getElementById('modal-req').style.display = 'flex';
        };

        window.handleReq = async (reqId, newStatus) => {
            try {
                await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status: newStatus });
            } catch (e) { console.error(e); }
        };

        // --- Chat logic ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                if(m.type === 'text') content += `<p>${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="thumb" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                
                content += `<div class="time">${m.time}</div></div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Utility ---
        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            pushMsg({ type: 'text', text: inp.value.trim() });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').style.display='flex'; };

    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); flex-shrink: 0; }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        #admin-req-bar { background: #1a1d21; padding: 10px 15px; display: none; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        #req-notif { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .btn-view { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 7px 11px; border-radius: 10px; position: relative; }
        .me .bubble { background: var(--me); border-top-right-radius: 2px; }
        .them .bubble { background: var(--them); border-top-left-radius: 2px; }
        .s-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 3px; }

        footer { background: var(--panel); padding: 10px 10px 30px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; display: flex; align-items: center; padding: 0 12px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 1rem; }

        .circle-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .circle-btn svg { width: 20px; height: 20px; fill: white; }

        .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .m-box { background: #1e1e1e; width: 90%; border-radius: 12px; padding: 15px; max-height: 70vh; overflow-y: auto; }
        
        /* Fixed Buttons layout for Mobile */
        .req-item { display: flex; flex-direction: column; gap: 10px; padding: 12px 0; border-bottom: 1px solid #333; }
        .req-name { font-size: 0.9rem; font-weight: 500; text-align: center; }
        .req-btns { display: flex; gap: 10px; width: 100%; }
        .btn-action { flex: 1; border: none; padding: 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; color: white; }
        .btn-action.accept { background: var(--success); }
        .btn-action.reject { background: var(--error); }

        @media (min-width: 400px) {
            .req-item { flex-direction: row; justify-content: space-between; align-items: center; }
            .req-btns { width: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap" onclick="document.getElementById('pfp-view').style.display='flex'">
            <img id="h-pfp" src="">
        </div>
        <div class="h-info">
            <h2 id="h-name">Lounge</h2>
            <p id="h-code">Code: ---</p>
        </div>
    </header>

    <div id="admin-req-bar">
        <span id="req-notif">0 Join Request(s)</span>
        <button class="btn-view" onclick="viewPending()">VIEW</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-wrapper">
            <input type="text" id="msg-inp" placeholder="Message..." autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
        </div>
        <div class="action-slot">
            <button id="mic" class="circle-btn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </footer>

    <div id="pfp-view" class="overlay" onclick="closeModals()">
        <img id="full-pfp-src" style="width:70vw; height:70vw; object-fit:cover; border-radius:50%; border:2px solid var(--accent)">
    </div>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:12px; font-size:0.9rem; text-align: center;">PENDING REQUESTS</h3>
            <div id="pending-list"></div>
        </div>
    </div>

    <div id="media-viewer" class="overlay" onclick="closeModals()">
        <img id="full-img" style="max-width:90%; max-height:80%; border-radius:8px">
    </div>

</body>
</html>
