<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- ADMIN & KNOCK LOGIC ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            // Basic UI Update
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Lounge Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // Check if current user is Admin AND there are people knocking
            const adminBar = document.getElementById('admin-req-bar');
            if (data.admin === userName && data.pending?.length > 0) {
                adminBar.style.display = 'flex';
                document.getElementById('req-notif').innerText = `${data.pending.length} New Join Requests`;
                
                // Function to build the request list inside the modal
                window.viewPending = () => {
                    const list = document.getElementById('pending-list');
                    list.innerHTML = '';
                    data.pending.forEach(u => {
                        const div = document.createElement('div');
                        div.className = 'req-item';
                        div.innerHTML = `
                            <span>${u}</span>
                            <button class="approve-action-btn" onclick="approveUser('${u}')">ACCEPT</button>
                        `;
                        list.appendChild(div);
                    });
                    document.getElementById('modal-req').style.display = 'flex';
                };
            } else {
                adminBar.style.display = 'none';
            }
        });

        // Approve Logic: Moves user from pending to members
        window.approveUser = async (u) => {
            await updateDoc(doc(db, "lounges", loungeId), {
                members: arrayUnion(u),
                pending: arrayRemove(u)
            });
            // If it was the last person, close the modal
            const list = document.getElementById('pending-list');
            if (list.children.length <= 1) closeModals();
        };

        // --- Chat logic ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                if(m.type === 'text') content += `<p>${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="thumb" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                
                content += `<div class="time">${m.time}</div></div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Media Handlers ---
        window.upImg = async (el) => {
            const file = el.files[0];
            if(!file) return;
            const r = ref(storage, `images/${loungeId}/${Date.now()}_${file.name}`);
            const s = await uploadBytes(r, file);
            pushMsg({ type: 'image', url: await getDownloadURL(s.ref) });
        };

        window.sendDoc = async (el) => {
            const files = Array.from(el.files).slice(0, 10);
            for(let f of files) {
                const r = ref(storage, `docs/${loungeId}/${Date.now()}_${f.name}`);
                const s = await uploadBytes(r, f);
                pushMsg({ type: 'doc', url: await getDownloadURL(s.ref), fileName: f.name });
            }
        };

        window.startAudio = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const r = ref(storage, `audio/${loungeId}/${Date.now()}`);
                const snap = await uploadBytes(r, blob);
                pushMsg({ type: 'audio', url: await getDownloadURL(snap.ref) });
            };
            mediaRecorder.start();
            document.getElementById('mic').classList.add('recording');
        };

        window.stopAudio = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('recording'); } };

        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            pushMsg({ type: 'text', text: inp.value.trim() });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').style.display='flex'; };

    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        header { background: var(--panel); padding: 8px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 100; border-bottom: 1px solid #2d3941; }
        .h-pfp-wrap { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); flex-shrink: 0; }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 1rem; font-weight: 600; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        /* ADMIN KNOCK STRIP */
        #admin-req-bar { background: #1a1d21; padding: 12px 16px; display: none; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; animation: slideDown 0.3s ease; }
        #req-notif { font-size: 0.85rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-view-req { background: var(--accent); border: none; color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(88, 166, 255, 0.3); }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10l2 2' stroke='%2358a6ff' stroke-width='0.5' fill='none' opacity='0.05'/%3E%3C/svg%3E"); }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 6px 10px; border-radius: 8px; position: relative; }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        .s-name { font-size: 0.72rem; font-weight: bold; color: var(--accent); }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }
        .thumb { width: 100%; border-radius: 6px; margin: 4px 0; }
        .doc-file { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

        footer { background: var(--panel); padding: 8px 8px 25px 8px; display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; width: 100%; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; display: flex; align-items: center; padding: 0 8px; min-height: 48px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; padding: 12px 4px; outline: none; font-size: 1rem; }
        .f-ico { padding: 8px; color: #8696a0; flex-shrink: 0; display: flex; align-items: center; }
        .f-ico svg { width: 22px; height: 22px; fill: currentColor; }

        .action-slot { width: 48px; height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; }
        .circle-btn svg { width: 24px; height: 24px; fill: white; }
        .recording { background: #ff3b30 !important; animation: pulse 1s infinite; }

        /* OVERLAYS & MODAL */
        .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.9); display: none; z-index: 1000; align-items: center; justify-content: center; }
        .m-box { background: #1e1e1e; width: 85%; max-width: 350px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .req-item span { font-weight: 600; color: #eee; }
        .approve-action-btn { background: #00a884; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 900; font-size: 0.7rem; }
        .pfp-scale { width: 85vw; height: 85vw; object-fit: cover; border-radius: 50%; border: 4px solid var(--accent); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap" onclick="document.getElementById('pfp-view').style.display='flex'">
            <img id="h-pfp" src="">
        </div>
        <div class="h-info">
            <h2 id="h-name">Lounge Name</h2>
            <p id="h-code">Code: ---</p>
        </div>
    </header>

    <div id="admin-req-bar">
        <span id="req-notif">0 New Join Requests</span>
        <button class="btn-view-req" onclick="viewPending()">VIEW</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-wrapper">
            <label for="doc-up" class="f-ico">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/></svg>
            </label>
            <input type="file" id="doc-up" hidden multiple onchange="sendDoc(this)">

            <input type="text" id="msg-inp" placeholder="Aether Message" autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
            
            <label for="img-up" class="f-ico">
                <svg viewBox="0 0 24 24"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H4V7h16v12zM12 9c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4z"/></svg>
            </label>
            <input type="file" id="img-up" hidden accept="image/*" onchange="upImg(this)">
        </div>

        <div class="action-slot">
            <button id="mic" class="circle-btn" onmousedown="startAudio()" onmouseup="stopAudio()" ontouchstart="startAudio()" ontouchend="stopAudio()">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </footer>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size: 1.1rem;">Lounge Requests</h3>
            <div id="pending-list"></div>
        </div>
    </div>

    <div id="pfp-view" class="overlay" onclick="closeModals()">
        <img id="full-pfp-src" class="pfp-scale">
    </div>

    <div id="media-viewer" class="overlay" onclick="closeModals()">
        <img id="full-img" style="max-width:95%; max-height:70%; border-radius:10px">
    </div>

</body>
</html>
