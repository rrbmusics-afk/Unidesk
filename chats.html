<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Chat</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        const { user: userName, lounge: loungeId, uid: userUid, mode, loungeName } = session;

        async function init() {
            const loungeRef = doc(db, "lounges", loungeId);
            
            if (mode === 'create') {
                await setDoc(loungeRef, {
                    adminUid: userUid,
                    loungeName: loungeName || "New Lounge"
                }, { merge: true });
            }

            onSnapshot(loungeRef, (snap) => {
                if (!snap.exists()) return;
                document.getElementById('title').innerText = snap.data().loungeName;
                // ONLY SHOW LOBBY IF I AM THE REGISTERED ADMIN
                if (userUid === snap.data().adminUid) {
                    document.getElementById('admin-badge').style.display = 'block';
                    listenForRequests();
                }
            });
        }

        function listenForRequests() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const btn = document.getElementById('lobby-btn');
                btn.style.display = snap.size > 0 ? 'block' : 'none';
                btn.innerText = `Lobby (${snap.size})`;
                
                window.openLobby = () => {
                    let html = '<h3>Requests</h3>';
                    snap.forEach(d => {
                        // Pass the specific document ID (the Guest's UID) to the respond function
                        html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:#161b22; padding:10px; border-radius:8px;">
                            <span>${d.data().name}</span>
                            <div>
                                <button onclick="respond('${d.id}', 'accepted')" style="color:green">Accept</button>
                                <button onclick="respond('${d.id}', 'rejected')" style="color:red">Decline</button>
                            </div>
                        </div>`;
                    });
                    document.getElementById('lobby-ui').innerHTML = html;
                    document.getElementById('modal').style.display = 'flex';
                };
            });
        }

        // TARGETS ONLY THE GUEST'S UID
        window.respond = async (guestUid, status) => {
            const reqRef = doc(db, "lounges", loungeId, "requests", guestUid);
            await updateDoc(reqRef, { status: status });
            if(snap.size === 1) document.getElementById('modal').style.display = 'none';
        };

        // Chat logic
        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('msgs');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                box.innerHTML += `<div class="msg ${m.uid === userUid ? 'me' : ''}"><b>${m.sender}:</b> ${m.text}</div>`;
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.send = async () => {
            const val = document.getElementById('inp').value;
            if (!val) return;
            document.getElementById('inp').value = '';
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, uid: userUid, text: val, timestamp: serverTimestamp()
            });
        };

        init();
    </script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #0d1117; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 10px; padding: 8px; background: #161b22; border-radius: 8px; width: fit-content; }
        .msg.me { margin-left: auto; background: #238636; }
        footer { padding: 15px; background: #0d1117; display: flex; gap: 10px; }
        input { flex: 1; background: #161b22; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header>
        <div><span id="admin-badge" style="display:none; font-size:10px; color:green;">ADMIN</span><h2 id="title" style="margin:0">Lounge</h2></div>
        <button id="lobby-btn" onclick="openLobby()" style="display:none"></button>
    </header>
    <div id="msgs"></div>
    <footer>
        <input id="inp" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </footer>
    <div id="modal" class="modal" onclick="this.style.display='none'">
        <div id="lobby-ui" style="background:#0d1117; padding:20px; border-radius:12px; min-width:250px;" onclick="event.stopPropagation()"></div>
    </div>
</body>
</html>
