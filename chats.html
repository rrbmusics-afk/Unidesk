<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, uid: userUid } = session;

        let userIsAdmin = false;
        let mediaRecorder;
        let audioChunks = [];

        // --- 1. INITIALIZE & ROLE CHECK ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            // Check if current user is admin (using UID for security)
            userIsAdmin = (data.adminUid === userUid || data.admin === userName);

            document.getElementById('h-name').innerText = data.loungeName || "Aether Lounge";
            document.getElementById('h-code').innerText = loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            if (userIsAdmin) {
                setupAdminLobby();
            } else {
                setupGuestSecurity();
            }
        });

        // --- 2. ADMIN ONLY: REQUEST BAR ---
        function setupAdminLobby() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const adminBar = document.getElementById('admin-req-bar');
                if (snap.size > 0) {
                    adminBar.style.display = 'flex';
                    document.getElementById('req-count').innerText = snap.size;
                    
                    window.viewPending = () => {
                        const list = document.getElementById('pending-list');
                        list.innerHTML = '';
                        snap.forEach(d => {
                            const r = d.data();
                            const div = document.createElement('div');
                            div.className = 'req-item';
                            div.innerHTML = `
                                <span>${r.name}</span>
                                <div class="req-actions">
                                    <button class="btn-rej" onclick="respond('${d.id}', 'rejected')">✕</button>
                                    <button class="btn-acc" onclick="respond('${d.id}', 'accepted')">✓</button>
                                </div>`;
                            list.appendChild(div);
                        });
                        document.getElementById('modal-req').classList.add('active');
                    };
                } else {
                    adminBar.style.display = 'none';
                    closeModals();
                }
            });
        }

        window.respond = async (reqId, status) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status });
        };

        // --- 3. SECURITY & CHAT ---
        function setupGuestSecurity() {
            onSnapshot(doc(db, "lounges", loungeId, "requests", userUid), (snap) => {
                if (snap.exists() && snap.data().status === 'rejected') {
                    localStorage.removeItem('unidesk_session');
                    window.location.replace('decline.html');
                }
            });
        }

        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === userUid || m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                if(m.type === 'image') content += `<img src="${m.url}" class="msg-img" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}" class="msg-audio"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                else content += `<p>${m.text}</p>`;
                content += `<div class="time">${m.time}</div></div>`;
                
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- 4. MEDIA ACTIONS ---
        window.upImg = async (el) => {
            const file = el.files[0]; if(!file) return;
            const r = ref(storage, `images/${loungeId}/${Date.now()}`);
            const s = await uploadBytes(r, file);
            pushMsg({ type: 'image', url: await getDownloadURL(s.ref) });
        };

        window.sendDoc = async (el) => {
            for(let f of el.files) {
                const r = ref(storage, `docs/${loungeId}/${Date.now()}_${f.name}`);
                const s = await uploadBytes(r, f);
                pushMsg({ type: 'doc', url: await getDownloadURL(s.ref), fileName: f.name });
            }
        };

        window.startAudio = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const r = ref(storage, `audio/${loungeId}/${Date.now()}`);
                const s = await uploadBytes(r, new Blob(audioChunks));
                pushMsg({ type: 'audio', url: await getDownloadURL(s.ref) });
            };
            mediaRecorder.start();
            document.getElementById('mic').classList.add('recording');
        };

        window.stopAudio = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('recording'); }};

        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, uid: userUid, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            pushMsg({ type: 'text', text: inp.value.trim() });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').classList.add('active'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { height: 100vh; background: var(--bg); color: white; overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }

        header { background: var(--panel); padding: 10px 16px; display: flex; align-items: center; gap: 12px; height: 60px; border-bottom: 1px solid #2d3941; }
        .h-pfp-wrap { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); }
        .h-info { flex: 1; min-width: 0; }
        .h-info h2 { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-info p { font-size: 0.75rem; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; }

        /* ADMIN BAR: DIRECTLY BELOW HEADER */
        #admin-req-bar { background: #1a1d21; padding: 10px 16px; display: none; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent); animation: slideDown 0.3s ease; }
        .req-txt { font-size: 0.8rem; font-weight: 800; color: #fff; }
        .req-txt span { color: var(--accent); }
        .btn-open-lobby { background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 15px; font-size: 0.7rem; font-weight: 900; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: radial-gradient(#ffffff05 1px, transparent 1px); background-size: 20px 20px; }
        .msg-row { display: flex; width: 100%; margin-bottom: 2px; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 0.95rem; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .me .bubble { background: var(--me); border-top-right-radius: 2px; }
        .them .bubble { background: var(--them); border-top-left-radius: 2px; }
        
        .s-name { font-size: 0.72rem; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.62rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }
        .msg-img { width: 100%; border-radius: 8px; margin-top: 4px; }
        .msg-audio { width: 100%; height: 35px; filter: invert(1); margin-top: 5px; }
        .doc-file { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        footer { background: var(--panel); padding: 8px 10px 28px; display: flex; align-items: center; gap: 8px; }
        .input-box { flex: 1; background: #2a3942; border-radius: 22px; padding: 0 12px; height: 44px; display: flex; align-items: center; gap: 10px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .f-ico { color: #8696a0; display: flex; align-items: center; }
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; }
        .recording { background: #ff4b4b; animation: pulse 1s infinite; }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 2000; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .m-box { background: #1e2a32; width: 90%; max-width: 360px; border-radius: 20px; padding: 20px; }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #ffffff10; }
        .req-actions { display: flex; gap: 10px; }
        .btn-rej { background: transparent; border: 1px solid #ff4b4b; color: #ff4b4b; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; }
        .btn-acc { background: #00a884; border: none; color: white; width: 32px; height: 32px; border-radius: 50%; font-weight: bold; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap"><img id="h-pfp" style="width:100%; height:100%; object-fit:cover;"></div>
        <div class="h-info">
            <h2 id="h-name">Lounge</h2>
            <p id="h-code">---</p>
        </div>
    </header>

    <!-- Admin Request Bar (Dynamic) -->
    <div id="admin-req-bar">
        <div class="req-txt"><span id="req-count">0</span> PENDING REQUESTS</div>
        <button class="btn-open-lobby" onclick="viewPending()">REVIEW ALL</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-box">
            <label for="doc-up" class="f-ico">
                <svg width="22" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/></svg>
            </label>
            <input type="file" id="doc-up" hidden multiple onchange="sendDoc(this)">

            <input type="text" id="msg-inp" placeholder="Message" oninput="toggle(this.value.trim().length > 0)">
            
            <label for="img-up" class="f-ico">
                <svg width="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 8.86l-3 3.87L9 13.14 6 17h12l-3.86-5.14z"/></svg>
            </label>
            <input type="file" id="img-up" hidden accept="image/*" onchange="upImg(this)">
        </div>

        <button id="mic" class="circle-btn" onmousedown="startAudio()" onmouseup="stopAudio()" ontouchstart="startAudio()" ontouchend="stopAudio()">
            <svg width="22" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
            <svg width="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <!-- Request Modal -->
    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); font-size: 0.9rem; margin-bottom: 15px; text-align: center;">GATE REQUESTS</h3>
            <div id="pending-list"></div>
        </div>
    </div>

    <!-- Media Viewer -->
    <div id="media-viewer" class="overlay" onclick="closeModals()">
        <img id="full-img" style="max-width:95%; max-height:85%; border-radius:12px;">
    </div>

</body>
</html>
