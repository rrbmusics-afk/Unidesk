<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, arrayUnion, arrayRemove, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Header & Admin Request Logic ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Lounge Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('full-pfp-src').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            if (data.admin === userName) {
                listenForRequests();
            }
        });

        function listenForRequests() {
            const reqQuery = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(reqQuery, (snap) => {
                const adminBar = document.getElementById('admin-req-bar');
                if (snap.size > 0) {
                    adminBar.style.display = 'flex';
                    document.getElementById('req-notif').innerText = `${snap.size} New Join Request(s)`;
                    
                    window.viewPending = () => {
                        const list = document.getElementById('pending-list');
                        list.innerHTML = '';
                        snap.forEach(docSnap => {
                            const req = docSnap.data();
                            const div = document.createElement('div');
                            div.className = 'req-item';
                            div.innerHTML = `
                                <span>${req.name}</span>
                                <div style="display:flex; gap:8px">
                                    <button class="btn-action accept" onclick="handleReq('${docSnap.id}', 'accepted')">Accept</button>
                                    <button class="btn-action reject" onclick="handleReq('${docSnap.id}', 'rejected')">Reject</button>
                                </div>`;
                            list.appendChild(div);
                        });
                        document.getElementById('modal-req').style.display = 'flex';
                    };
                } else {
                    adminBar.style.display = 'none';
                    closeModals();
                }
            });
        }

        // Logic to update the requester's status in Firebase
        window.handleReq = async (reqId, newStatus) => {
            try {
                await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { 
                    status: newStatus 
                });
            } catch (e) {
                console.error("Error handling request:", e);
            }
        };

        // --- Chat logic ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                if(m.type === 'text') content += `<p>${m.text}</p>`;
                else if(m.type === 'image') content += `<img src="${m.url}" class="thumb" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                
                content += `<div class="time">${m.time}</div></div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        // --- Message Push logic ---
        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            pushMsg({ type: 'text', text: inp.value.trim() });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').style.display='flex'; };

    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }

        header { background: var(--panel); padding: 8px 14px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-pfp-wrap { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); flex-shrink: 0; }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 1rem; font-weight: 600; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        #admin-req-bar { background: #1a1d21; padding: 12px 16px; display: none; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        #req-notif { font-size: 0.85rem; font-weight: bold; color: var(--accent); }
        .btn-view { background: var(--accent); border: none; color: white; padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 6px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 6px 10px; border-radius: 8px; position: relative; }
        .me .bubble { background: var(--me); }
        .them .bubble { background: var(--them); }
        .s-name { font-size: 0.72rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }

        footer { background: var(--panel); padding: 10px 10px 25px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; display: flex; align-items: center; padding: 0 10px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 1rem; }

        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; }
        .circle-btn svg { width: 22px; height: 22px; fill: white; }

        .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.85); display: none; z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .m-box { background: #1e1e1e; width: 90%; max-width: 350px; border-radius: 16px; padding: 20px; }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #2a2a2a; }
        .btn-action { border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .btn-action.accept { background: var(--success); color: white; }
        .btn-action.reject { background: var(--error); color: white; }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap" onclick="document.getElementById('pfp-view').style.display='flex'">
            <img id="h-pfp" src="">
        </div>
        <div class="h-info">
            <h2 id="h-name">Loading...</h2>
            <p id="h-code">Lounge Code: ...</p>
        </div>
    </header>

    <div id="admin-req-bar">
        <span id="req-notif">0 New Requests</span>
        <button class="btn-view" onclick="viewPending()">VIEW REQUESTS</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-wrapper">
            <input type="text" id="msg-inp" placeholder="Type a message..." autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
        </div>
        <div class="action-slot">
            <button id="mic" class="circle-btn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </footer>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size:1rem">LOUNGE REQUESTS</h3>
            <div id="pending-list"></div>
        </div>
    </div>

</body>
</html>
