<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UNIDESK | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Note: Using standard modular imports compatible with your config
        import * as fs from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } = fs;

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, uid: userUid } = session;

        // --- 1. CORE DATA & SECURITY CHECK ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) {
                alert("Lounge has been terminated.");
                window.location.href = 'page.html';
                return;
            }
            const data = snap.data();

            document.getElementById('h-name').innerText = data.loungeName || "Active Lounge";
            document.getElementById('h-code').innerText = "Code: " + loungeId;

            // Check if current user is the Admin
            if (userUid === data.adminUid) {
                document.getElementById('admin-nav-btn').classList.add('visible');
                initAdminSystem();
            } else {
                initGuestProtection();
            }
        });

        // --- 2. ADMIN: MANAGE REQUESTS ---
        function initAdminSystem() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('req-badge');
                badge.innerText = snap.size;
                badge.style.transform = snap.size > 0 ? "scale(1)" : "scale(0)";

                window.viewPending = () => {
                    const list = document.getElementById('pending-list');
                    list.innerHTML = '';
                    if(snap.empty) list.innerHTML = '<div class="empty-state">No pending requests</div>';
                    
                    snap.forEach(d => {
                        const r = d.data();
                        const div = document.createElement('div');
                        div.id = `req-${d.id}`;
                        div.className = 'req-item anim-slide-in';
                        div.innerHTML = `
                            <span>${r.name}</span>
                            <div class="req-actions">
                                <button class="reject-btn" onclick="processEntry('${d.id}', 'rejected')">DECLINE</button>
                                <button class="accept-btn" onclick="processEntry('${d.id}', 'accepted')">APPROVE</button>
                            </div>`;
                        list.appendChild(div);
                    });
                    document.getElementById('modal-req').classList.add('active');
                };
            });
        }

        window.processEntry = async (reqId, status) => {
            const row = document.getElementById(`req-${reqId}`);
            if(row) row.style.animation = "slideOut 0.2s forwards";
            await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status: status });
        };

        // --- 3. GUEST: PROTECTION ---
        function initGuestProtection() {
            // Listen to your own request status. If rejected, kick out.
            onSnapshot(doc(db, "lounges", loungeId, "requests", userUid), (snap) => {
                if (snap.exists() && snap.data().status === 'rejected') {
                    localStorage.removeItem('unidesk_session');
                    // Passing a state via URL to show rejection message on page.html
                    window.location.replace('page.html?status=declined');
                }
            });
        }

        // --- 4. CHAT ENGINE ---
        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderUid === userUid;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'} anim-fade-up`;
                div.innerHTML = `
                    <div class="bubble">
                        ${!isMe ? `<div class="s-name">${m.sender}</div>` : ''}
                        <p>${m.text}</p>
                        <div class="time">${m.time}</div>
                    </div>`;
                box.appendChild(div);
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });

        window.sendText = async () => {
            const inp = document.getElementById('msg-inp');
            const text = inp.value.trim();
            if(!text) return;
            inp.value = ''; toggle(false);
            
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName,
                senderUid: userUid,
                text: text,
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.getElementById('modal-req').classList.remove('active'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { height: 100vh; background: var(--bg); color: white; overflow: hidden; position: fixed; width: 100%; }
        #app-container { display: flex; flex-direction: column; height: 100%; }

        header { background: var(--panel); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-info h2 { font-size: 0.95rem; font-weight: 600; color: #e9edef; }
        .h-info p { font-size: 0.75rem; color: var(--accent); font-weight: 500; }

        #admin-nav-btn { opacity: 0; transform: scale(0.8); transition: var(--trans); pointer-events: none; position: relative; width: 42px; height: 42px; background: rgba(88,166,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        #admin-nav-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        #req-badge { position: absolute; top: -5px; right: -5px; background: var(--error); font-size: 0.65rem; min-width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--panel); font-weight: bold; transform: scale(0); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 12px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-opacity: 0.05; }
        .msg-row { display: flex; width: 100%; opacity: 0; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 0.95rem; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .me .bubble { background: var(--me); border-top-right-radius: 2px; color: #e9edef; }
        .them .bubble { background: var(--them); border-top-left-radius: 2px; color: #e9edef; }
        .s-name { font-size: 0.75rem; font-weight: 700; color: #ffd700; margin-bottom: 3px; }
        .time { font-size: 0.65rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }

        footer { background: var(--panel); padding: 10px 12px 35px; display: flex; align-items: center; gap: 10px; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; padding: 0 16px; height: 45px; display: flex; align-items: center; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .circle-btn:active { transform: scale(0.9); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: var(--trans); z-index: 1000; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .m-box { background: #1e2a32; width: 90%; max-width: 380px; border-radius: 24px; padding: 25px; transform: translateY(40px); transition: var(--trans); }
        .overlay.active .m-box { transform: translateY(0); }
        
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .req-item span { font-weight: 500; font-size: 0.95rem; }
        .req-actions { display: flex; gap: 8px; }
        .accept-btn { background: var(--success); border: none; color: white; padding: 8px 15px; border-radius: 10px; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.5px; }
        .reject-btn { background: transparent; border: 1.5px solid var(--error); color: var(--error); padding: 7px 14px; border-radius: 10px; font-weight: 700; font-size: 0.7rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade-up { animation: fadeUp 0.4s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .anim-slide-in { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideOut { to { opacity: 0; transform: translateX(50px); } }
        .empty-state { text-align: center; padding: 40px 20px; opacity: 0.5; font-size: 0.9rem; font-style: italic; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="h-info">
                <h2 id="h-name">Loading Lounge...</h2>
                <p id="h-code">#------</p>
            </div>
            <div id="admin-nav-btn" onclick="viewPending()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                <div id="req-badge">0</div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer>
            <div class="input-wrapper">
                <input type="text" id="msg-inp" placeholder="Message" oninput="toggle(this.value.trim().length > 0)" autocomplete="off">
            </div>
            <button id="mic" class="circle-btn">
                <svg width="22" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg width="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:20px; font-size: 0.85rem; text-align: center; text-transform: uppercase; font-weight: 900; letter-spacing: 1.5px;">Entrance Requests</h3>
            <div id="pending-list"></div>
            <button onclick="closeModals()" style="width:100%; margin-top:20px; background:transparent; border:none; color:rgba(255,255,255,0.4); font-size:0.8rem; font-weight:bold;">CLOSE</button>
        </div>
    </div>

</body>
</html>
