<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        // --- 1. ADMIN REQUEST LOGIC (FIXED) ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // Only Admin listens for Knocks
            if (data.admin === userName) {
                const reqQuery = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
                onSnapshot(reqQuery, (reqSnap) => {
                    const bar = document.getElementById('admin-req-bar');
                    if (reqSnap.size > 0) {
                        bar.style.display = 'flex';
                        document.getElementById('req-count').innerText = reqSnap.size;
                        
                        window.viewPending = () => {
                            const list = document.getElementById('pending-list');
                            list.innerHTML = '';
                            reqSnap.forEach(d => {
                                const r = d.data();
                                const div = document.createElement('div');
                                div.className = 'req-item';
                                div.innerHTML = `
                                    <span>${r.name}</span>
                                    <button class="accept-btn" onclick="approveUser('${d.id}', '${r.name}')">APPROVE</button>
                                `;
                                list.appendChild(div);
                            });
                            document.getElementById('modal-req').style.display = 'flex';
                        };
                    } else {
                        bar.style.display = 'none';
                        closeModals();
                    }
                });
            }
        });

        window.approveUser = async (reqId, name) => {
            // Update request status + add to lounge members array
            await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status: 'accepted' });
            await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(name) });
        };

        // --- 2. CHAT LOGIC ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<div class="bubble">
                    ${!isMe ? `<div class="s-name">${m.sender}</div>` : ''}
                    <p>${m.text}</p>
                    <div class="time">${m.time}</div>
                </div>`;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.sendText = async () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            const text = inp.value;
            inp.value = ''; toggle(false);
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, text, type: 'text', timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; gap: 12px; height: 60px; flex-shrink: 0; }
        .h-pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 0.95rem; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        /* ADMIN BAR */
        #admin-req-bar { background: #1a1d21; padding: 0 15px; height: 45px; display: none; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent); animation: slideDown 0.3s ease; }
        .req-txt { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .view-btn { background: var(--accent); border: none; color: white; padding: 4px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }

        /* CHAT BOX - AUTO GROWTH */
        #chat-box { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 85%; padding: 6px 10px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; }
        .me .bubble { background: var(--me); border-top-right-radius: 2px; }
        .them .bubble { background: var(--them); border-top-left-radius: 2px; }
        .s-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 3px; }

        /* FOOTER - MOBILE FIXED */
        footer { background: var(--panel); padding: 8px 10px calc(8px + env(safe-area-inset-bottom)); display: flex; align-items: center; gap: 8px; width: 100%; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 22px; display: flex; align-items: center; padding: 0 12px; min-height: 44px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; padding: 10px 0; outline: none; font-size: 1rem; width: 100%; }
        
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .circle-btn svg { width: 22px; height: 22px; fill: white; }

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; z-index: 2000; align-items: center; justify-content: center; }
        .m-box { background: #1e1e1e; width: 85%; border-radius: 12px; padding: 20px; max-height: 70vh; overflow-y: auto; }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .accept-btn { background: #2ecc71; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="h-pfp-wrap"><img id="h-pfp" src=""></div>
        <div class="h-info">
            <h2 id="h-name">Lounge</h2>
            <p id="h-code">Code: ---</p>
        </div>
    </header>

    <!-- ADMIN ACTION BAR -->
    <div id="admin-req-bar">
        <span class="req-txt"><span id="req-count">0</span> NEW KNOCKS</span>
        <button class="view-btn" onclick="viewPending()">OPEN REQUESTS</button>
    </div>

    <div id="chat-box"></div>

    <footer>
        <div class="input-wrapper">
            <input type="text" id="msg-inp" placeholder="Aether Message" autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
        </div>
        <button id="mic" class="circle-btn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </footer>

    <!-- REQUEST MODAL -->
    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size: 0.9rem;">ADMISSION REQUESTS</h3>
            <div id="pending-list"></div>
        </div>
    </div>

</body>
</html>
