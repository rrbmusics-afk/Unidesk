<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIDESK | Elite Lounge</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import * as fs from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where } = fs;

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId, uid: userUid, mode } = session;

        // --- 1. IMMEDIATE INITIALIZATION ---
        async function initLounge() {
            const loungeRef = doc(db, "lounges", loungeId);
            
            // If the user is the creator, establish the lounge immediately
            if (mode === 'create') {
                await setDoc(loungeRef, {
                    admin: userName,
                    adminUid: userUid,
                    loungeName: session.loungeName || "Aether Lounge",
                    createdAt: serverTimestamp()
                }, { merge: true });
            }

            // Sync Header & Permissions
            onSnapshot(loungeRef, (snap) => {
                if (!snap.exists()) return;
                const data = snap.data();
                document.getElementById('h-name').innerText = data.loungeName;
                document.getElementById('h-code').innerText = "Lounge ID: " + loungeId;

                if (userUid === data.adminUid) {
                    document.getElementById('admin-ctrl').style.display = 'flex';
                    setupAdminPanel();
                }
            });
        }

        // --- 2. ADMIN PANEL: MANAGE KNOCKING ---
        function setupAdminPanel() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('badge');
                badge.innerText = snap.size;
                badge.style.display = snap.size > 0 ? "flex" : "none";

                window.showRequests = () => {
                    const list = document.getElementById('req-list');
                    list.innerHTML = '';
                    snap.forEach(d => {
                        const r = d.data();
                        const item = document.createElement('div');
                        item.className = 'req-item';
                        item.innerHTML = `
                            <span>${r.name}</span>
                            <div>
                                <button class="btn-deny" onclick="handleReq('${d.id}', 'rejected')">Deny</button>
                                <button class="btn-allow" onclick="handleReq('${d.id}', 'accepted')">Allow</button>
                            </div>`;
                        list.appendChild(item);
                    });
                    document.getElementById('modal').classList.add('open');
                };
            });
        }

        window.handleReq = async (id, status) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", id), { status });
        };

        // --- 3. CHAT ENGINE ---
        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === userUid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isMe ? 'me' : 'them'}`;
                msgDiv.innerHTML = `<div class="bubble"><small>${m.sender}</small><p>${m.text}</p></div>`;
                box.appendChild(msgDiv);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.sendMessage = async () => {
            const inp = document.getElementById('msg-input');
            if (!inp.value.trim()) return;
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName,
                uid: userUid,
                text: inp.value,
                timestamp: serverTimestamp()
            });
            inp.value = '';
        };

        initLounge();
    </script>
    <style>
        :root { --bg: #0b141a; --dark: #202c33; --accent: #00a884; --me: #005c4b; }
        body { margin: 0; background: var(--bg); color: #e9edef; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--dark); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        #h-name { margin: 0; font-size: 1rem; }
        #h-code { font-size: 0.7rem; color: #8696a0; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .message { display: flex; width: 100%; }
        .message.me { justify-content: flex-end; }
        .bubble { padding: 8px 12px; border-radius: 8px; max-width: 75%; position: relative; }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--dark); border-top-left-radius: 0; }
        .bubble small { font-size: 0.65rem; color: #ffd700; font-weight: bold; }
        .bubble p { margin: 4px 0 0; font-size: 0.95rem; }

        footer { background: var(--dark); padding: 10px 15px 30px; display: flex; gap: 10px; }
        #msg-input { flex: 1; background: #2a3942; border: none; color: white; padding: 12px 18px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--accent); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; }

        #admin-ctrl { display: none; position: relative; cursor: pointer; background: #3b4a54; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; }
        #badge { position: absolute; top: -8px; right: -8px; background: #f44336; width: 18px; height: 18px; border-radius: 50%; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.open { display: flex; }
        .modal-content { background: var(--dark); width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #30363d; }
        .btn-allow { background: var(--accent); border: none; color: white; padding: 5px 12px; border-radius: 5px; }
        .btn-deny { background: transparent; border: 1px solid #f44336; color: #f44336; padding: 5px 12px; border-radius: 5px; margin-right: 5px; }
    </style>
</head>
<body>
    <header>
        <div>
            <h2 id="h-name">Syncing...</h2>
            <div id="h-code"></div>
        </div>
        <div id="admin-ctrl" onclick="showRequests()">
            Lobby
            <div id="badge">0</div>
        </div>
    </header>

    <div id="chat-box"></div>

    <footer>
        <input id="msg-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </footer>

    <div id="modal" class="modal" onclick="this.classList.remove('open')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Entrance Requests</h3>
            <div id="req-list"></div>
        </div>
    </div>
</body>
</html>
