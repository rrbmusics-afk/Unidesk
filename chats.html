<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Secure Chat</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        let mediaRecorder;
        let audioChunks = [];

        // --- Core Functions ---
        async function pushMessage(type, payload, fileName = "") {
            const msgData = {
                sender: userName,
                type: type,
                timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            if (type === 'text') msgData.text = payload;
            else msgData.url = payload;
            if (fileName) msgData.fileName = fileName;

            try {
                await addDoc(collection(db, "lounges", loungeId, "messages"), msgData);
            } catch (e) { console.error("Write error:", e); }
        }

        window.startVoice = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const fileRef = ref(storage, `media/${loungeId}/v_${Date.now()}`);
                    const upload = await uploadBytes(fileRef, blob);
                    const url = await getDownloadURL(upload.ref);
                    pushMessage('audio', url);
                };
                mediaRecorder.start();
                document.getElementById('mic-btn').classList.add('recording');
            } catch (err) { alert("Mic required for voice notes."); }
        };

        window.stopVoice = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                document.getElementById('mic-btn').classList.remove('recording');
            }
        };

        window.sendText = () => {
            const input = document.getElementById('msg-input');
            if (input.value.trim()) {
                pushMessage('text', input.value.trim());
                input.value = '';
                updateUIState(false);
            }
        };

        window.uploadMedia = async (el) => {
            const file = el.files[0];
            if (!file) return;
            const type = file.type.startsWith('image') ? 'image' : 'doc';
            const fileRef = ref(storage, `media/${loungeId}/${Date.now()}_${file.name}`);
            const upload = await uploadBytes(fileRef, file);
            const url = await getDownloadURL(upload.ref);
            pushMessage(type, url, file.name);
        };

        // --- Listeners ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            document.getElementById('group-name').innerText = snap.data().loungeName;
            document.getElementById('group-pfp').src = snap.data().photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('group-id').innerText = `ID: ${loungeId}`;
        });

        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'them'}`;
                
                let inner = `<div class="bubble">`;
                if(!isMe) inner += `<div class="sender-name">${m.sender}</div>`;
                if(m.type === 'text') inner += `<p>${m.text}</p>`;
                else if(m.type === 'image') inner += `<img src="${m.url}" class="chat-img" onclick="window.open('${m.url}')">`;
                else if(m.type === 'audio') inner += `<audio controls src="${m.url}"></audio>`;
                else if(m.type === 'doc') inner += `<div class="doc-msg">📄 ${m.fileName}</div>`;
                
                inner += `<div class="time">${m.time || ''}</div></div>`;
                row.innerHTML = inner;
                chatBox.appendChild(row);
            });
            chatBox.scrollTo(0, chatBox.scrollHeight);
        });

        window.updateUIState = (typing) => {
            document.getElementById('mic-btn').style.display = typing ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = typing ? 'flex' : 'none';
        };
    </script>

    <style>
        :root {
            --bg: #05070a;
            --panel: #0d1117;
            --accent: #58a6ff;
            --me: #005c4b;
            --them: #21262d;
            --text: #c9d1d9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
            height: 100dvh; display: grid; grid-template-rows: auto 1fr auto; 
            overflow: hidden; 
        }

        /* HEADER */
        header { 
            background: var(--panel); padding: 10px 16px; 
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #30363d; cursor: pointer;
        }
        .pfp-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
        .meta h2 { font-size: 1rem; color: var(--accent); }
        .meta p { font-size: 0.7rem; color: #8b949e; }

        /* DOODLE BACKGROUND */
        #chat-box { 
            padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            background-color: var(--bg);
            background-image: 
                radial-gradient(var(--accent) 0.5px, transparent 0.5px),
                radial-gradient(var(--accent) 0.5px, #05070a 0.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            opacity: 0.9;
        }

        /* BUBBLES */
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { 
            max-width: 80%; padding: 8px 12px; border-radius: 12px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.5); position: relative;
        }
        .me .bubble { background: var(--me); border-top-right-radius: 0; }
        .them .bubble { background: var(--them); border-top-left-radius: 0; }
        
        .sender-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 4px; }
        .time { font-size: 0.6rem; color: #8b949e; text-align: right; margin-top: 4px; }
        .chat-img { width: 100%; border-radius: 8px; margin: 4px 0; }
        audio { height: 35px; width: 200px; filter: invert(1); }

        /* FOOTER */
        footer { 
            background: var(--panel); padding: 10px; 
            display: flex; align-items: center; gap: 10px; 
            border-top: 1px solid #30363d;
        }
        .input-wrap { 
            flex: 1; background: #161b22; border-radius: 24px; 
            padding: 0 15px; display: flex; align-items: center; border: 1px solid #30363d;
        }
        #msg-input { 
            flex: 1; background: transparent; border: none; 
            color: white; padding: 12px 0; outline: none; font-size: 1rem; 
        }
        .icon-btn { 
            width: 45px; height: 45px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; color: white; cursor: pointer;
        }
        .recording { background: #f85149 !important; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header onclick="window.location.href='info.html'">
        <img id="group-pfp" src="" class="pfp-img">
        <div class="meta">
            <h2 id="group-name">Lounge</h2>
            <p id="group-id">ID: 000000</p>
        </div>
    </header>

    <div id="chat-box"></div>

    <footer>
        <div class="input-wrap">
            <label for="file-up" style="cursor:pointer; margin-right:10px;">📎</label>
            <input type="file" id="file-up" hidden onchange="uploadMedia(this)">
            
            <input type="text" id="msg-input" placeholder="Message" 
                   oninput="updateUIState(this.value.trim().length > 0)">
        </div>

        <button id="mic-btn" class="icon-btn" 
                ontouchstart="startVoice()" 
                ontouchend="stopVoice()">🎤</button>
        
        <button id="send-btn" class="icon-btn" style="display:none" onclick="sendText()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
            </svg>
        </button>
    </footer>

</body>
</html>
