<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Integrated Storage for Media
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        // --- GLOBAL STATE ---
        let userIsAdmin = false;
        let mediaRecorder;
        let audioChunks = [];

        // --- INITIALIZE SESSION & ROLE ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            userIsAdmin = (data.admin === userName);

            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            if (userIsAdmin) {
                document.getElementById('admin-nav-btn').classList.add('visible');
                setupAdminLogic();
            } else {
                setupGuestSecurity();
            }
        });

        // --- ADMIN LOGIC ---
        function setupAdminLogic() {
            const q = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
            onSnapshot(q, (snap) => {
                const badge = document.getElementById('req-badge');
                badge.innerText = snap.size;
                badge.style.transform = snap.size > 0 ? "scale(1)" : "scale(0)";

                window.viewPending = () => {
                    const list = document.getElementById('pending-list');
                    list.innerHTML = '';
                    if(snap.empty) list.innerHTML = '<div class="empty-state">No pending requests</div>';
                    
                    snap.forEach(d => {
                        const r = d.data();
                        const div = document.createElement('div');
                        div.id = `req-row-${d.id}`;
                        div.className = 'req-item anim-slide-in';
                        div.innerHTML = `
                            <span>${r.name}</span>
                            <div class="req-actions">
                                <button class="reject-btn" onclick="updateEntry('${d.id}', 'rejected', '${r.name}')">DECLINE</button>
                                <button class="accept-btn" onclick="updateEntry('${d.id}', 'accepted', '${r.name}')">APPROVE</button>
                            </div>`;
                        list.appendChild(div);
                    });
                    document.getElementById('modal-req').classList.add('active');
                };
            });
        }

        window.updateEntry = async (reqId, status, targetName) => {
            const row = document.getElementById(`req-row-${reqId}`);
            if(row) row.style.animation = "slideOut 0.25s forwards";
            const reqRef = doc(db, "lounges", loungeId, "requests", reqId);
            await updateDoc(reqRef, { status: status });
            if (status === 'accepted') {
                await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(targetName) });
            }
        };

        // --- SECURITY ---
        function setupGuestSecurity() {
            if (userIsAdmin) return; 
            const q = query(collection(db, "lounges", loungeId, "requests"), 
                            where("name", "==", userName), 
                            where("status", "==", "rejected"));
            onSnapshot(q, (snap) => {
                if (!snap.empty) {
                    localStorage.removeItem('unidesk_session');
                    window.location.replace('decline.html');
                }
            });
        }

        // --- CHAT ENGINE & MEDIA INTEGRATION ---
        const chatQ = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(chatQ, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'} anim-fade-up`;
                
                let content = `<div class="bubble">`;
                if(!isMe) content += `<div class="s-name">${m.sender}</div>`;
                
                // Dynamic Message Types
                if(m.type === 'image') content += `<img src="${m.url}" class="msg-img" onclick="openMedia('${m.url}')">`;
                else if(m.type === 'audio') content += `<audio controls src="${m.url}" class="msg-audio"></audio>`;
                else if(m.type === 'doc') content += `<div class="doc-file" onclick="window.open('${m.url}')">📄 ${m.fileName}</div>`;
                else content += `<p>${m.text}</p>`;
                
                content += `<div class="time">${m.time}</div></div>`;
                div.innerHTML = content;
                box.appendChild(div);
            });
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        });

        // --- MEDIA SENDING LOGIC ---
        window.upImg = async (el) => {
            const file = el.files[0];
            if(!file) return;
            const r = ref(storage, `images/${loungeId}/${Date.now()}_${file.name}`);
            const s = await uploadBytes(r, file);
            pushMsg({ type: 'image', url: await getDownloadURL(s.ref) });
        };

        window.sendDoc = async (el) => {
            const files = Array.from(el.files).slice(0, 10);
            for(let f of files) {
                const r = ref(storage, `docs/${loungeId}/${Date.now()}_${f.name}`);
                const s = await uploadBytes(r, f);
                pushMsg({ type: 'doc', url: await getDownloadURL(s.ref), fileName: f.name });
            }
        };

        window.startAudio = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const r = ref(storage, `audio/${loungeId}/${Date.now()}`);
                    const snap = await uploadBytes(r, blob);
                    pushMsg({ type: 'audio', url: await getDownloadURL(snap.ref) });
                };
                mediaRecorder.start();
                document.getElementById('mic').classList.add('recording');
            } catch(e) { console.error("Mic access denied"); }
        };

        window.stopAudio = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('mic').classList.remove('recording'); } };

        async function pushMsg(extra) {
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ...extra
            });
        }

        window.sendText = () => {
            const inp = document.getElementById('msg-inp');
            const text = inp.value.trim();
            if(!text) return;
            pushMsg({ type: 'text', text });
            inp.value = ''; toggle(false);
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { 
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        };
        window.openMedia = (u) => { document.getElementById('full-img').src = u; document.getElementById('media-viewer').classList.add('active'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; --trans: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { height: 100vh; background: var(--bg); color: white; overflow: hidden; position: fixed; width: 100%; }
        #app-container { display: flex; flex-direction: column; height: 100%; }

        header { background: var(--panel); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 65px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .h-pfp-wrap { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; border: 2.5px solid var(--accent); }
        .h-info h2 { font-size: 0.9rem; }
        .h-info p { font-size: 0.7rem; color: var(--accent); }

        #admin-nav-btn { opacity: 0; transform: scale(0.8); transition: var(--trans); pointer-events: none; position: relative; width: 40px; height: 40px; background: rgba(88,166,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        #admin-nav-btn.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        #req-badge { position: absolute; top: -5px; right: -5px; background: var(--error); font-size: 0.6rem; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--panel); transform: scale(0); transition: 0.4s; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; width: 100%; opacity: 0; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 0.92rem; }
        .me .bubble { background: var(--me); border-bottom-right-radius: 2px; }
        .them .bubble { background: var(--them); border-bottom-left-radius: 2px; }
        
        .msg-img { width: 100%; border-radius: 8px; margin: 4px 0; max-height: 250px; object-fit: cover; }
        .msg-audio { width: 100%; height: 35px; margin: 5px 0; }
        .doc-file { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; margin: 4px 0; }

        .s-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: right; margin-top: 4px; }

        footer { background: var(--panel); padding: 10px 12px 30px; display: flex; align-items: center; gap: 8px; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 22px; padding: 0 12px; height: 44px; display: flex; align-items: center; gap: 8px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 0.95rem; }
        
        .f-ico { padding: 4px; color: #8696a0; display: flex; align-items: center; }
        .circle-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .recording { background: var(--error); animation: pulse 1s infinite; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: var(--trans); z-index: 1000; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .m-box { background: #1e2a32; width: 88%; max-width: 350px; border-radius: 20px; padding: 24px; transform: translateY(30px); transition: var(--trans); }
        .overlay.active .m-box { transform: translateY(0); }
        
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .accept-btn { background: var(--success); border: none; color: white; padding: 8px 14px; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }
        .reject-btn { background: transparent; border: 1px solid var(--error); color: var(--error); padding: 8px 14px; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade-up { animation: fadeUp 0.4s forwards; }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.05; } 100% { scale: 1; } }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="h-pfp-wrap"><img id="h-pfp" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="h-info"><h2 id="h-name">Lounge</h2><p id="h-code">#---</p></div>
            </div>
            <div id="admin-nav-btn" onclick="viewPending()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                <div id="req-badge">0</div>
            </div>
        </header>

        <div id="chat-box"></div>

        <footer>
            <div class="input-wrapper">
                <label for="doc-up" class="f-ico">
                    <svg width="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-2.48-2.02-4.5-4.5-4.5S7 2.52 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"/></svg>
                </label>
                <input type="file" id="doc-up" hidden multiple onchange="sendDoc(this)">

                <input type="text" id="msg-inp" placeholder="Type message..." oninput="toggle(this.value.trim().length > 0)">
                
                <label for="img-up" class="f-ico">
                    <svg width="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </label>
                <input type="file" id="img-up" hidden accept="image/*" onchange="upImg(this)">
            </div>

            <button id="mic" class="circle-btn" onmousedown="startAudio()" onmouseup="stopAudio()" ontouchstart="startAudio()" ontouchend="stopAudio()">
                <svg width="20" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg width="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <!-- Entrance Requests Modal -->
    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size: 0.95rem; text-align: center; text-transform: uppercase; font-weight: 800;">Entrance Requests</h3>
            <div id="pending-list"></div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div id="media-viewer" class="overlay" onclick="closeModals()">
        <img id="full-img" style="max-width:95%; max-height:80%; border-radius:12px; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
    </div>

</body>
</html>
