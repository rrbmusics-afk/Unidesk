<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AetherCore | Elite Lounge</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, orderBy, serverTimestamp, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';
        const { user: userName, lounge: loungeId } = session;

        // --- 1. LOUNGE SYNC & ADMIN CONTROLS ---
        onSnapshot(doc(db, "lounges", loungeId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            
            // UI Updates
            document.getElementById('h-name').innerText = data.loungeName;
            document.getElementById('h-code').innerText = "Code: " + loungeId;
            document.getElementById('h-pfp').src = data.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

            // ADMIN ONLY: Listen for Knocking Requests
            if (data.admin === userName) {
                const reqQuery = query(collection(db, "lounges", loungeId, "requests"), where("status", "==", "pending"));
                
                onSnapshot(reqQuery, (reqSnap) => {
                    const bar = document.getElementById('admin-req-bar');
                    if (reqSnap.size > 0) {
                        bar.style.display = 'flex';
                        document.getElementById('req-count').innerText = reqSnap.size;
                        
                        window.viewPending = () => {
                            const list = document.getElementById('pending-list');
                            list.innerHTML = '';
                            reqSnap.forEach(d => {
                                const r = d.data();
                                const div = document.createElement('div');
                                div.className = 'req-item';
                                div.innerHTML = `
                                    <span>${r.name}</span>
                                    <div style="display:flex; gap:8px;">
                                        <button class="reject-btn" onclick="handleDecision('${d.id}', 'rejected')">REJECT</button>
                                        <button class="accept-btn" onclick="handleDecision('${d.id}', 'accepted', '${r.name}')">ACCEPT</button>
                                    </div>`;
                                list.appendChild(div);
                            });
                            document.getElementById('modal-req').style.display = 'flex';
                        };
                    } else { 
                        bar.style.display = 'none'; 
                        closeModals(); 
                    }
                });
            }
        });

        // Decision Handler (Accept/Reject)
        window.handleDecision = async (reqId, status, requesterName) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", reqId), { status: status });
            if (status === 'accepted') {
                await updateDoc(doc(db, "lounges", loungeId), { members: arrayUnion(requesterName) });
            }
        };

        // --- 2. JOINER PROTECTION (Kicked if Rejected) ---
        const myReqQuery = query(collection(db, "lounges", loungeId, "requests"), where("name", "==", userName));
        onSnapshot(myReqQuery, (snap) => {
            snap.forEach(d => {
                if (d.data().status === 'rejected') {
                    alert("Admin has declined your entry.");
                    window.location.href = 'page.html';
                }
            });
        });

        // --- 3. CHAT LOGIC ---
        const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.sender === userName;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<div class="bubble">${!isMe ? `<div class="s-name">${m.sender}</div>` : ''}<p>${m.text}</p><div class="time">${m.time}</div></div>`;
                box.appendChild(div);
            });
            box.scrollTo(0, box.scrollHeight);
        });

        window.sendText = async () => {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            const text = inp.value;
            inp.value = ''; toggle(false);
            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName, text, type: 'text', timestamp: serverTimestamp(),
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        };

        window.toggle = (t) => {
            document.getElementById('mic').style.display = t ? 'none' : 'flex';
            document.getElementById('send').style.display = t ? 'flex' : 'none';
        };

        window.closeModals = () => { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #202c33; --accent: #58a6ff; --me: #005c4b; --them: #232d36; --error: #ff4d4d; --success: #2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; background: var(--bg); color: white; font-family: -apple-system, sans-serif; }
        #app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }

        header { background: var(--panel); padding: 10px 15px; display: flex; align-items: center; gap: 12px; height: 60px; flex-shrink: 0; }
        .h-pfp-wrap { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; border: 1.5px solid var(--accent); }
        .h-pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .h-info h2 { font-size: 0.9rem; }
        .h-info p { font-size: 0.7rem; color: var(--accent); opacity: 0.8; }

        #admin-req-bar { background: #1e2a32; padding: 0 15px; height: 44px; display: none; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent); flex-shrink: 0; }
        .req-txt { font-size: 0.7rem; font-weight: bold; color: var(--accent); letter-spacing: 0.5px; }
        .view-btn { background: var(--accent); border: none; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .bubble { max-width: 82%; padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; }
        .s-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .me .bubble { background: var(--me); border-top-right-radius: 2px; }
        .them .bubble { background: var(--them); border-top-left-radius: 2px; }
        .time { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-align: right; margin-top: 4px; }

        footer { background: var(--panel); padding: 8px 10px 12px 10px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-wrapper { flex: 1; background: #2a3942; border-radius: 24px; display: flex; align-items: center; padding: 0 15px; height: 42px; }
        #msg-inp { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        
        .circle-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .circle-btn svg { width: 22px; height: 22px; fill: white; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 2000; align-items: center; justify-content: center; }
        .m-box { background: #1e2a32; width: 88%; border-radius: 12px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .accept-btn { background: var(--success); border: none; color: white; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .reject-btn { background: transparent; border: 1px solid var(--error); color: var(--error); padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="h-pfp-wrap"><img id="h-pfp" src=""></div>
            <div class="h-info">
                <h2 id="h-name">Lounge</h2>
                <p id="h-code">Code: ------</p>
            </div>
        </header>

        <!-- Admin Access Bar -->
        <div id="admin-req-bar">
            <span class="req-txt"><span id="req-count">0</span> PENDING REQUESTS</span>
            <button class="view-btn" onclick="viewPending()">VIEW ALL</button>
        </div>

        <div id="chat-box"></div>

        <footer>
            <div class="input-wrapper">
                <input type="text" id="msg-inp" placeholder="Message..." autocomplete="off" oninput="toggle(this.value.trim().length > 0)">
            </div>
            <button id="mic" class="circle-btn">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send" class="circle-btn" style="display:none" onclick="sendText()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </div>

    <!-- Request Modal -->
    <div id="modal-req" class="overlay" onclick="closeModals()">
        <div class="m-box" onclick="event.stopPropagation()">
            <h3 style="color:var(--accent); margin-bottom:15px; font-size: 0.85rem; text-align: center;">NEW ACCESS REQUESTS</h3>
            <div id="pending-list"></div>
        </div>
    </div>

</body>
</html>
