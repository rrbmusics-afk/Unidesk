<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Chat Session</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const session = JSON.parse(localStorage.getItem('unidesk_session'));
        if (!session) window.location.href = 'page.html';

        const { user: userName, lounge: loungeId, mode } = session;
        const isAdmin = mode === 'create';

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Display the 6-digit code immediately
            document.getElementById('display-lounge-code').innerText = `ID: ${loungeId}`;

            // 2. Fetch the Lounge Name from Firebase
            const loungeRef = doc(db, "lounges", loungeId);
            const loungeSnap = await getDoc(loungeRef);
            
            if (loungeSnap.exists()) {
                document.getElementById('display-lounge-name').innerText = loungeSnap.data().loungeName;
            } else {
                document.getElementById('display-lounge-name').innerText = "Student Lounge";
            }

            if (isAdmin) {
                initAdminPanel();
            }
            listenForMessages();
        });

        // --- Message Handling ---
        window.sendMsg = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            await addDoc(collection(db, "lounges", loungeId, "messages"), {
                sender: userName,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        function listenForMessages() {
            const q = query(collection(db, "lounges", loungeId, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = '';
                snapshot.forEach(d => {
                    const data = d.data();
                    const isMe = data.sender === userName;
                    const div = document.createElement('div');
                    div.className = `msg ${isMe ? 'sent' : 'received'}`;
                    div.innerHTML = `
                        <small>${data.sender}</small>
                        <div class="bubble">${data.text}</div>
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- Admin Management (Knocking Requests) ---
        function initAdminPanel() {
            document.getElementById('admin-tools').style.display = 'block';
            onSnapshot(collection(db, "lounges", loungeId, "requests"), (snapshot) => {
                const list = document.getElementById('req-list');
                const badge = document.getElementById('req-count');
                let count = 0;
                list.innerHTML = '';

                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status === 'pending') {
                        count++;
                        const div = document.createElement('div');
                        div.className = 'req-item';
                        div.innerHTML = `
                            <span>${data.name} wants to join</span>
                            <button onclick="acceptEntry('${d.id}')">ACCEPT</button>
                        `;
                        list.appendChild(div);
                    }
                });
                badge.innerText = count;
                badge.style.display = count > 0 ? 'flex' : 'none';
            });
        }

        window.acceptEntry = async (id) => {
            await updateDoc(doc(db, "lounges", loungeId, "requests", id), { status: 'accepted' });
        };

        window.toggleReqPopup = () => {
            const pop = document.getElementById('req-popup');
            pop.classList.toggle('active');
        };
    </script>
    <style>
        :root {
            --bg: #0b141a;
            --panel: #111b21;
            --header: #202c33;
            --accent: #00a884;
            --me: #005c4b;
            --them: #202c33;
            --text: #e9edef;
            --dim: #8696a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            background: var(--header);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .lounge-info h3 { font-size: 1rem; color: var(--text); text-transform: uppercase; }
        .lounge-info p { font-size: 0.75rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: var(--bg);
            /* WhatsApp-style wallpaper pattern could be added here */
        }

        .msg { max-width: 80%; display: flex; flex-direction: column; }
        .msg small { font-size: 0.65rem; color: var(--accent); font-weight: bold; margin-bottom: 2px; margin-left: 5px; }
        .bubble { padding: 8px 12px; border-radius: 8px; font-size: 0.95rem; line-height: 1.4; }
        
        .sent { align-self: flex-end; }
        .sent .bubble { background: var(--me); border-top-right-radius: 0; }
        .sent small { align-self: flex-end; margin-right: 5px; }

        .received { align-self: flex-start; }
        .received .bubble { background: var(--them); border-top-left-radius: 0; }

        footer { background: var(--header); padding: 12px 20px; display: flex; align-items: center; gap: 15px; }
        #msg-input {
            flex: 1;
            background: #2a3942;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .send-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
        }

        /* Admin/Bell Styles */
        #admin-tools { position: relative; }
        .bell-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; position: relative; }
        #req-count {
            position: absolute; top: -2px; right: -2px;
            background: #f15c6d; color: white;
            font-size: 10px; width: 18px; height: 18px;
            border-radius: 50%; display: none; align-items: center; justify-content: center;
        }

        #req-popup {
            position: absolute; top: 50px; right: 0;
            background: var(--panel); width: 280px;
            border-radius: 8px; border: 1px solid #3b4a54;
            display: none; flex-direction: column; padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        #req-popup.active { display: flex; }
        .req-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #3b4a54;
        }
        .req-item span { font-size: 0.85rem; }
        .req-item button {
            background: var(--accent); border: none; color: white;
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="lounge-info">
            <h3 id="display-lounge-name">Loading...</h3>
            <p id="display-lounge-code">ID: 000000</p>
        </div>
        
        <div id="admin-tools" style="display: none;">
            <button class="bell-btn" onclick="toggleReqPopup()">
                🔔<span id="req-count">0</span>
            </button>
            <div id="req-popup">
                <p style="font-size: 0.7rem; color: var(--dim); margin-bottom: 10px;">ENTRY REQUESTS</p>
                <div id="req-list"></div>
            </div>
        </div>
    </header>

    <div id="chat-box"></div>

    <footer>
        <input type="text" id="msg-input" placeholder="Type a message" onkeypress="if(event.key === 'Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg>
        </button>
    </footer>

</body>
</html>
