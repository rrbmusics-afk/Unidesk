<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AetherCore | Lounge Access</title>
    <style>
        :root {
            --bg: #05070a;
            --card: #0d1117;
            --accent: #58a6ff;
            --text: #ffffff;
            --dim: #8b949e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100dvh; overflow: hidden; }

        .container { width: 90%; max-width: 400px; text-align: center; }
        .logo { font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
        .subtitle { font-size: 0.65rem; letter-spacing: 4px; color: var(--dim); text-transform: uppercase; margin-bottom: 2.5rem; }

        .lounge-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 2rem; background: #161b22; padding: 5px; border-radius: 16px; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--dim); padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        .input-group { margin-bottom: 1.2rem; text-align: left; }
        label { font-size: 0.75rem; color: var(--dim); margin: 0 0 8px 5px; display: block; font-weight: 600; }
        input { width: 100%; background: #161b22; border: 1px solid var(--border); border-radius: 14px; padding: 14px; color: white; outline: none; transition: 0.3s; font-size: 1rem; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2); }

        .action-btn { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--accent); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        
        #toast { visibility: hidden; background: #ff4d4d; color: white; padding: 16px; border-radius: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; font-weight: 600; }
        #toast.show { visibility: visible; animation: pop 0.4s ease-out; }
        @keyframes pop { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">AETHERCORE</h1>
        <p class="subtitle">Secure Discussion Lounge</p>

        <div class="lounge-card">
            <div class="tabs">
                <button class="tab-btn active" id="t-create" onclick="switchTab('create')">CREATE</button>
                <button class="tab-btn" id="t-join" onclick="switchTab('join')">JOIN</button>
            </div>

            <div id="section-create">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="c-user" placeholder="Enter name">
                </div>
                <div class="input-group">
                    <label>LOUNGE NAME</label>
                    <input type="text" id="c-lounge" placeholder="Group Subject">
                </div>
                <button class="action-btn" onclick="initLounge('create')">CREATE & START</button>
            </div>

            <div id="section-join" class="hidden">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="j-user" placeholder="Enter name">
                </div>
                <div class="input-group">
                    <label>6-DIGIT CODE</label>
                    <input type="text" id="j-code" placeholder="000000" maxlength="6">
                </div>
                <button class="action-btn" onclick="initLounge('join')">SEND JOIN REQUEST</button>
            </div>
        </div>
    </div>

    <div id="toast">Error Message</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            messagingSenderId: "882535016432",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.switchTab = (mode) => {
            document.getElementById('section-create').classList.toggle('hidden', mode !== 'create');
            document.getElementById('section-join').classList.toggle('hidden', mode !== 'join');
            document.getElementById('t-create').classList.toggle('active', mode === 'create');
            document.getElementById('t-join').classList.toggle('active', mode === 'join');
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = 'show';
            setTimeout(() => t.className = '', 3000);
        }

        window.initLounge = async (type) => {
            const user = document.getElementById(type === 'create' ? 'c-user' : 'j-user').value.trim();
            const target = document.getElementById(type === 'create' ? 'c-lounge' : 'j-code').value.trim();

            if (!user || !target) return showToast("All fields are required.");

            if (type === 'create') {
                const loungeId = Math.floor(100000 + Math.random() * 900000).toString();
                await setDoc(doc(db, "lounges", loungeId), {
                    loungeName: target,
                    admin: user, // Point 1: Creator is Admin
                    members: [user],
                    pending: [],
                    createdAt: new Date().getTime()
                });
                
                localStorage.setItem('unidesk_session', JSON.stringify({ user, lounge: loungeId }));
                window.location.href = 'chat.html';
            } else {
                const loungeRef = doc(db, "lounges", target);
                const snap = await getDoc(loungeRef);

                if (!snap.exists()) return showToast("Invalid Lounge Code.");

                // Point 2 & 5: Add user to pending list (knocking)
                await updateDoc(loungeRef, {
                    pending: arrayUnion(user)
                });

                showToast("Request sent! Wait for Admin approval.");
                
                // Store session, but chat.html will block them until they are in 'members' array
                localStorage.setItem('unidesk_session', JSON.stringify({ user, lounge: target }));
                setTimeout(() => window.location.href = 'chat.html', 2000);
            }
        };
    </script>
</body>
</html>
