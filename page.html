<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Student Lounge</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-blue: #58a6ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            z-index: 100;
        }

        .home-btn:active {
            transform: scale(0.95);
            background: var(--border-color);
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .lounge-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tab-system {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: #161b22;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: 0.3s;
            -webkit-user-select: text;
            user-select: text;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .footer-brand {
            position: absolute;
            bottom: 20px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #30363d;
        }

        #custom-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #ff4d4d;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            left: 50%;
            transform: translateX(-50%);
        }

        #custom-toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .hidden { display: none; }
    </style>
</head>
<body>

    <button class="home-btn" onclick="window.history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
    </button>

    <div class="container">
        <h1 class="logo">STUDENT LOUNGE</h1>
        <p class="subtitle">Discussion Room</p>

        <div class="lounge-card">
            <div class="tab-system">
                <button class="tab-btn active" onclick="switchMode('create')">CREATE</button>
                <button class="tab-btn" onclick="switchMode('join')">JOIN</button>
            </div>

            <div id="create-section">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="create-user" placeholder="e.g. Sharan">
                </div>
                <div class="input-group">
                    <label>LOUNGE NAME</label>
                    <input type="text" id="lounge-name" placeholder="e.g. Dev Squad">
                </div>
                <button class="action-btn" onclick="handleLounge('create')">CREATE LOUNGE</button>
            </div>

            <div id="join-section" class="hidden">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="join-user" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>LOUNGE CODE</label>
                    <input type="text" id="lounge-code" placeholder="Enter 6-digit code">
                </div>
                <button class="action-btn" onclick="handleLounge('join')">JOIN LOUNGE</button>
            </div>
        </div>
    </div>

    <div id="custom-toast">Please fill in all details</div>

    <div class="footer-brand">© 2026 AETHERCORE INTERACTIVE</div>

    <script>
        function showToast(message) {
            const toast = document.getElementById("custom-toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function switchMode(mode) {
            const createSec = document.getElementById('create-section');
            const joinSec = document.getElementById('join-section');
            const tabs = document.querySelectorAll('.tab-btn');

            if (mode === 'create') {
                createSec.classList.remove('hidden');
                joinSec.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                createSec.classList.add('hidden');
                joinSec.classList.remove('hidden');
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }

        function handleLounge(type) {
            let userName, loungeTarget;

            if (type === 'create') {
                userName = document.getElementById('create-user').value;
                loungeTarget = document.getElementById('lounge-name').value;
            } else {
                userName = document.getElementById('join-user').value;
                loungeTarget = document.getElementById('lounge-code').value;
            }

            if (!userName || !loungeTarget) {
                showToast("Please enter all details to proceed.");
                return;
            }

            const sessionData = {
                user: userName,
                lounge: loungeTarget,
                mode: type,
                timestamp: new Date().getTime()
            };

            localStorage.setItem('unidesk_session', JSON.stringify(sessionData));
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
