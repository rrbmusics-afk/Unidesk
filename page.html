<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Student Lounge</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-blue: #58a6ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-style: italic;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -1px;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 3rem;
        }

        .lounge-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tab-system {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: #161b22;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .footer-brand {
            position: absolute;
            bottom: 20px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #30363d;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">UNIDESK</h1>
        <p class="subtitle">STUDENT UTILITY SUITE</p>

        <div class="lounge-card">
            <div class="tab-system">
                <button class="tab-btn active" onclick="switchMode('create')">CREATE</button>
                <button class="tab-btn" onclick="switchMode('join')">JOIN</button>
            </div>

            <!-- Create Section -->
            <div id="create-section">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="create-user" placeholder="e.g. Sharan">
                </div>
                <div class="input-group">
                    <label>LOUNGE NAME</label>
                    <input type="text" id="lounge-name" placeholder="e.g. Dev Squad">
                </div>
                <button class="action-btn" onclick="handleLounge('create')">CREATE LOUNGE</button>
            </div>

            <!-- Join Section -->
            <div id="join-section" class="hidden">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="join-user" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>LOUNGE CODE</label>
                    <input type="text" id="lounge-code" placeholder="Enter 6-digit code">
                </div>
                <button class="action-btn" onclick="handleLounge('join')">JOIN LOUNGE</button>
            </div>
        </div>
    </div>

    <div class="footer-brand">© 2026 AETHERCORE INTERACTIVE</div>

    <script>
        function switchMode(mode) {
            const createSec = document.getElementById('create-section');
            const joinSec = document.getElementById('join-section');
            const tabs = document.querySelectorAll('.tab-btn');

            if (mode === 'create') {
                createSec.classList.remove('hidden');
                joinSec.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                createSec.classList.add('hidden');
                joinSec.classList.remove('hidden');
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        }

        function handleLounge(type) {
            let userName, loungeTarget;

            if (type === 'create') {
                userName = document.getElementById('create-user').value;
                loungeTarget = document.getElementById('lounge-name').value;
            } else {
                userName = document.getElementById('join-user').value;
                loungeTarget = document.getElementById('lounge-code').value;
            }

            if (!userName || !loungeTarget) {
                alert("Please fill in all details");
                return;
            }

            // Data Persistence for chat.html
            const sessionData = {
                user: userName,
                lounge: loungeTarget,
                mode: type,
                timestamp: new Date().getTime()
            };

            localStorage.setItem('unidesk_session', JSON.stringify(sessionData));
            
            // Redirect to chat.html
            window.location.href = 'chat.html';
        }
    </script>
</body>
</html>
