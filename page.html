<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidesk | Student Utility Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0B1219;
            --card-bg: #151C25;
            --accent-blue: #2D7FF9;
            --text-main: #FFFFFF;
            --text-dim: #6B7280;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 24px;
        }

        /* Branding Section */
        .brand-container {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            color: var(--accent-blue);
            letter-spacing: -1px;
            margin: 0;
        }

        .subtitle {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--text-dim);
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Featured Card (Student Lounge) */
        .featured-card {
            width: 100%;
            max-width: 400px;
            background: rgba(45, 127, 249, 0.05);
            border: 1px solid var(--accent-blue);
            border-radius: 32px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 40px;
            position: relative;
        }

        .icon-box-large {
            width: 64px;
            height: 64px;
            background: var(--accent-blue);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(45, 127, 249, 0.3);
        }

        /* Toolkit Section */
        .toolkit-label {
            width: 100%;
            max-width: 400px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .card-list {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .standard-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .standard-card:active {
            background: #1C2632;
        }

        .icon-box-small {
            width: 48px;
            height: 48px;
            background: #1F2937;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 18px;
        }

        .icon-box-small.yellow { color: #FBBF24; }

        .card-info h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .card-info p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        .chevron {
            margin-left: auto;
            color: var(--accent-blue);
            font-size: 14px;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 60px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #374151;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="logo">UNIDESK</h1>
        <div class="subtitle">Student Utility Suite</div>
    </div>

    <div class="featured-card">
        <div class="icon-box-large">
            <i class="fas fa-comment-dots"></i>
        </div>
        <div class="card-info">
            <h3>Student Lounge</h3>
            <p style="text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Secure Communication</p>
        </div>
        <i class="fas fa-chevron-right chevron"></i>
    </div>

    <div class="toolkit-label">Toolkit</div>

    <div class="card-list">
        <div class="standard-card">
            <div class="icon-box-small">
                <i class="fas fa-file-alt"></i>
            </div>
            <div class="card-info">
                <h3>Page Forge</h3>
                <p>Images to PDF Converter</p>
            </div>
        </div>

        <div class="standard-card">
            <div class="icon-box-small yellow">
                <i class="fas fa-user-tie"></i>
            </div>
            <div class="card-info">
                <h3>Resume Maker</h3>
                <p>Professional CV Builder</p>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Aethercore Interactive
    </footer>

</body>
</html>
