<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unidesk | Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --wa-bg: #0B1219; 
            --wa-panel: #151C25; 
            --wa-me: #2D7FF9; 
            --wa-them: #1F2937; 
            --u-blue: #2D7FF9; 
            --text-dim: #6B7280;
        }

        body, html { 
            margin: 0; padding: 0; height: 100dvh; 
            background: var(--wa-bg); color: white; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
        }

        /* Fixed Header - Matches 1000292103.jpg styling */
        header { 
            background: var(--wa-panel); 
            padding: 10px 16px; 
            display: flex; 
            align-items: center; 
            height: 75px; 
            gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        /* Fixed Image Overflow from 1000292720.jpg */
        .h-img { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; /* Matching the toolkit icon radius */
            object-fit: cover; 
            flex-shrink: 0;
            background: var(--wa-bg);
        }

        .h-id { font-size: 11px; color: var(--u-blue); font-weight: 800; letter-spacing: 1px; }

        #chat-flow { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            height: calc(100vh - 155px); 
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 24px 24px;
        }

        /* Message Bubbles */
        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            font-size: 14px; 
            line-height: 1.5;
            position: relative;
        }
        .msg-me { 
            align-self: flex-end; 
            background: var(--wa-me); 
            border-radius: 18px 18px 0 18px; 
            color: white;
        }
        .msg-them { 
            align-self: flex-start; 
            background: var(--wa-them); 
            border-radius: 18px 18px 18px 0; 
            color: #E5E7EB;
        }

        .sender-name { font-size: 10px; font-weight: 800; margin-bottom: 4px; display: block; text-transform: uppercase; color: var(--u-blue); }
        .msg-me .sender-name { color: rgba(255,255,255,0.8); }

        /* Footer Input Area */
        footer { 
            background: var(--wa-panel); 
            padding: 12px 16px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
        }

        .pill { 
            flex: 1; 
            background: #1F2937; 
            border-radius: 14px; 
            padding: 0 15px; 
            height: 48px; 
            display: flex; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .pill input { background: transparent; border: none; color: white; flex: 1; font-size: 15px; outline: none; }

        .send-btn { 
            width: 48px; height: 48px; border-radius: 14px; 
            background: var(--u-blue); border: none; color: white; 
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.95); }

        #admin-bar { 
            background: var(--u-blue); padding: 12px; 
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            cursor: pointer; display: none; text-align: center;
        }

        .hidden { display: none !important; }
        #modal { position: fixed; inset:0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items:center; justify-content:center; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div id="admin-bar" onclick="showReqs()">PENDING REQUESTS <i class="fas fa-chevron-right" style="margin-left:5px"></i></div>
    
    <header>
        <img id="h-img" class="h-img" alt="Avatar">
        <div style="flex:1">
            <h2 id="h-name" style="margin:0; font-size:16px; font-weight:700;">Lounge</h2>
            <span id="h-id" class="h-id"></span>
        </div>
        <i class="fas fa-ellipsis-v" style="color: var(--text-dim)"></i>
    </header>

    <div id="chat-flow"></div>

    <footer>
        <div class="pill"><input type="text" id="msg-in" placeholder="Type a message..."></div>
        <button class="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
    </footer>

    <div id="modal" class="hidden">
        <div style="background:var(--wa-panel); width:320px; padding:24px; border-radius:24px; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-top:0">Entry Requests</h3>
            <div id="req-list"></div>
            <button style="width:100%; padding:12px; margin-top:15px; border-radius:12px; border:none; background:var(--wa-them); color:white; font-weight:700;" onclick="document.getElementById('modal').classList.add('hidden')">CLOSE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbfmd0zmv_mFV0CG2OrhKPPeU3zPYGOBg",
            authDomain: "unidesk-a70ac.firebaseapp.com",
            projectId: "unidesk-a70ac",
            storageBucket: "unidesk-a70ac.firebasestorage.app",
            appId: "1:882535016432:web:6eca2645a47a827e779f35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const uid = params.get('uid');
        const userName = params.get('name');

        const snap = await getDoc(doc(db, "rooms", code));
        const room = snap.data();

        document.getElementById('h-img').src = room.avatar;
        document.getElementById('h-name').innerText = room.name;
        document.getElementById('h-id').innerText = `#${room.code}`;

        if(uid === room.admin) {
            onSnapshot(collection(db, "rooms", code, "requests"), s => {
                document.getElementById('admin-bar').style.display = s.empty ? 'none' : 'block';
                const list = document.getElementById('req-list');
                list.innerHTML = "";
                s.forEach(d => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <span style="font-size:14px; font-weight:600">${d.data().name}</span>
                        <button style="background:var(--u-blue); color:white; border:none; padding:6px 12px; border-radius:8px; font-size:11px; font-weight:800" onclick="approve('${d.id}')">APPROVE</button>
                    </div>`;
                });
            });
        }

        window.approve = async (id) => { await deleteDoc(doc(db, "rooms", code, "requests", id)); };
        window.showReqs = () => document.getElementById('modal').classList.remove('hidden');

        onSnapshot(query(collection(db, "rooms", code, "messages"), orderBy("ts", "asc")), s => {
            const flow = document.getElementById('chat-flow'); 
            flow.innerHTML = "";
            s.forEach(d => {
                const m = d.data(); const isMe = m.uid === uid;
                flow.innerHTML += `<div class="msg ${isMe?'msg-me':'msg-them'}">
                    <span class="sender-name">${isMe?'You':m.sender}</span>
                    ${m.text}
                </div>`;
            });
            flow.scrollTop = flow.scrollHeight;
        });

        window.send = async () => {
            const inp = document.getElementById('msg-in');
            if(!inp.value.trim()) return;
            const text = inp.value;
            inp.value = ""; // Clear immediately for UX
            await addDoc(collection(db, "rooms", code, "messages"), { text: text, uid, sender: userName, ts: serverTimestamp() });
        };
    </script>
</body>
</html>
