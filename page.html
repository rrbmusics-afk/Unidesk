<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIDESK | Student Lounge</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-blue: #58a6ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            z-index: 100;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 500;
        }

        .lounge-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tab-system {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            background: #161b22;
            padding: 5px;
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: 0.3s;
            user-select: text;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .action-btn {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #custom-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #ff4d4d;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            transition: 0.3s;
        }

        #custom-toast.show { visibility: visible; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <button class="home-btn" onclick="window.location.href='index.html'">Home</button>

    <div class="container">
        <h1 class="logo">STUDENT LOUNGE</h1>
        <p class="subtitle">DISCUSSION ROOM</p>

        <div class="lounge-card">
            <div class="tab-system">
                <button class="tab-btn active" onclick="switchMode('create')">CREATE</button>
                <button class="tab-btn" onclick="switchMode('join')">JOIN</button>
            </div>

            <div id="create-section">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="create-user" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>LOUNGE NAME</label>
                    <input type="text" id="lounge-name" placeholder="e.g. Mechanical Engineering">
                </div>
                <button class="action-btn" onclick="handleLounge('create')">CREATE LOUNGE</button>
            </div>

            <div id="join-section" class="hidden">
                <div class="input-group">
                    <label>YOUR NAME</label>
                    <input type="text" id="join-user" placeholder="Your name">
                </div>
                <div class="input-group">
                    <label>LOUNGE CODE</label>
                    <input type="text" id="lounge-code" placeholder="Enter 6-digit code">
                </div>
                <button class="action-btn" onclick="handleLounge('join')">JOIN LOUNGE</button>
            </div>
        </div>
    </div>

    <div id="custom-toast">Please fill in all details</div>

    <script>
        // Tab Switching Logic
        window.switchMode = function(mode) {
            const createSec = document.getElementById('create-section');
            const joinSec = document.getElementById('join-section');
            const tabs = document.querySelectorAll('.tab-btn');
            if (mode === 'create') {
                createSec.classList.remove('hidden');
                joinSec.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                createSec.classList.add('hidden');
                joinSec.classList.remove('hidden');
                tabs[1].classList.add('active');
                tabs[0].classList.remove('active');
            }
        };

        function showToast(message) {
            const toast = document.getElementById("custom-toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        // The "Brain" that connects to chat.html
        window.handleLounge = function(type) {
            let userName, loungeInput;
            const uniqueUid = "U" + Math.floor(Math.random() * 1000000);

            if (type === 'create') {
                userName = document.getElementById('create-user').value.trim();
                loungeInput = document.getElementById('lounge-name').value.trim();

                if (!userName || !loungeInput) return showToast("Fill in all details");

                // Generate random 6-digit code
                const code = Math.floor(100000 + Math.random() * 900000).toString();

                // Store data for chat.html to read
                localStorage.setItem('unidesk_session', JSON.stringify({
                    uid: uniqueUid,
                    user: userName,
                    lounge: code,
                    loungeName: loungeInput,
                    mode: 'create' // Tells chat.html: "I am the boss, let me in"
                }));

                window.location.href = 'chat.html';

            } else {
                userName = document.getElementById('join-user').value.trim();
                loungeInput = document.getElementById('lounge-code').value.trim();

                if (!userName || !loungeInput) return showToast("Fill in all details");
                if (loungeInput.length !== 6) return showToast("Code must be 6 digits");

                // Store data for chat.html to read
                localStorage.setItem('unidesk_session', JSON.stringify({
                    uid: uniqueUid,
                    user: userName,
                    lounge: loungeInput,
                    mode: 'join' // Tells chat.html: "I am a guest, verify me"
                }));

                window.location.href = 'chat.html';
            }
        }
    </script>
</body>
</html>
